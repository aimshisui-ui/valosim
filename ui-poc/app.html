.skScoutName{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--fg);line-height:1.1}
.skScoutSub{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:5px}
.skPers{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--club);
  background:color-mix(in srgb,var(--club) 14%,var(--bg-2));border:1px solid color-mix(in srgb,var(--club) 40%,transparent);
  border-radius:var(--r-pill);padding:3px 9px}
.skHome{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--fg-muted)}
.skSalary{margin-left:auto;text-align:right;flex:none}
.skSalary .v{font-family:var(--font-num);font-weight:600;font-size:15px;color:var(--fg)}
.skSalary .l{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin-top:1px}
.skAttrs{display:flex;flex-direction:column;gap:8px}
.skAttr{display:grid;grid-template-columns:70px 1fr 26px;align-items:center;gap:9px}
.skAttr .an{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-muted)}
.skAttr .av{font-family:var(--font-num);font-size:11.5px;font-weight:600;color:var(--fg);text-align:right}
/* generic thin progress bar (reused everywhere in scouting) */
.skBar{height:6px;border-radius:4px;background:var(--bg-3);overflow:hidden;position:relative}
.skBar>.skFill{position:absolute;inset:0 auto 0 0;height:100%;border-radius:4px;transition:width var(--t-mid) var(--ease)}
/* knowledge map */
.skFlag{font-family:var(--font-num);font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--fg-muted);
  background:var(--bg-3);border:1px solid var(--hairline);border-radius:4px;padding:2px 5px;line-height:1;display:inline-block}
.skMap{display:flex;flex-direction:column;gap:16px}
.skRegions{display:flex;flex-direction:column;gap:11px}
.skRegion{display:grid;grid-template-columns:120px 1fr 40px;align-items:center;gap:12px}
.skRegion .rn{font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.02em;color:var(--fg)}
.skRegion .rv{font-family:var(--font-num);font-size:12px;font-weight:600;text-align:right}
.skRegion .skBar{height:9px}
.skMaplab{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin-bottom:9px}
.skGridwrap{display:flex;flex-direction:column;gap:14px}
.skRegblock .rbhead{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.skRegblock .rbname{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-muted)}
.skRegblock .rbcount{font-family:var(--font-num);font-size:10px;color:var(--fg-ghost)}
.skGrid{display:flex;flex-wrap:wrap;gap:7px}
.skCty{position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:3px;
  width:56px;padding:7px 4px 6px;border-radius:7px;background:var(--bg-2);
  border:1px solid var(--hairline);cursor:default;transition:transform var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.skCty::before{content:"";position:absolute;inset:0;border-radius:7px;background:var(--cch,#3FD17A);
  opacity:var(--cop,.1);pointer-events:none}
.skCty:hover{transform:translateY(-2px);border-color:var(--border-strong)}
.skCty .cflag{position:relative;z-index:1;font-family:var(--font-num);font-size:10px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--fg)}
.skCty .cpct{position:relative;z-index:1;font-family:var(--font-num);font-size:8.5px;font-weight:600;color:var(--fg-muted)}
.skLegend{display:flex;align-items:center;gap:9px;margin-top:2px}
.skLegend .ll{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost)}
.skLegbar{flex:1;max-width:200px;height:8px;border-radius:4px;
  background:linear-gradient(90deg,#5A6172,#D4A14C,#3FD17A)}
/* active assignments */
.skAssigns{display:flex;flex-direction:column;gap:11px}
.skAssign{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:12px 14px;
  cursor:pointer;transition:border-color var(--t-fast) var(--ease),transform var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.skAssign:hover{border-color:color-mix(in srgb,var(--club) 45%,var(--border-strong));background:var(--bg-3);transform:translateX(2px)}
.skAssign:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.skAtop{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.skAtop .skName{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg)}
.skRole{font-size:9px;font-weight:700;letter-spacing:.03em;padding:2px 6px;border-radius:5px;flex:none}
.skAtop .skTeam{font-size:11px;color:var(--fg-muted);margin-left:auto}
.skAprog{display:flex;align-items:center;gap:11px}
.skAprog .skBar{flex:1;height:8px}
.skAprog .skDays{font-family:var(--font-num);font-size:11px;color:var(--fg-muted);flex:none;white-space:nowrap}
.skAmeta{display:flex;gap:16px;margin-top:9px}
.skAmeta .m{display:flex;flex-direction:column;gap:2px}
.skAmeta .m .k{font-size:8.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-ghost)}
.skAmeta .m .v{font-family:var(--font-num);font-size:12px;font-weight:600;color:var(--fg)}
/* completed reports */
.skDone{display:flex;flex-direction:column;gap:2px}
.skDonerow{display:grid;grid-template-columns:38px 1fr auto auto;align-items:center;gap:10px;
  padding:8px 8px;border-radius:6px;cursor:pointer;transition:background var(--t-fast) var(--ease)}
.skDonerow:hover{background:var(--bg-2)}
.skDonerow:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
.skDonerow .dn{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--fg)}
.skDonerow .dn .dt{font-size:10.5px;color:var(--fg-muted);margin-left:7px;font-family:var(--font-ui)}
.skAcc{font-family:var(--font-num);font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);
  border:1px solid;white-space:nowrap}

/* =====================================================================
   SCOUT tab (inside the Player modal). `.sk` prefix shared with the screen.
   ===================================================================== */
.skWrap{display:flex;flex-direction:column;gap:14px}
.skScan{display:flex;align-items:center;gap:8px;color:var(--fg-muted);font-size:12px;padding:16px 4px}
.skScandot{width:8px;height:8px;border-radius:50%;background:var(--club);animation:pulse 1.4s ease-in-out infinite;flex:none}
.skEmpty{color:var(--fg-muted);font-size:12px;padding:14px 4px}
/* preview / commission (unscouted) */
.skPrev{background:var(--bg-3);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:13px 15px;
  display:flex;flex-direction:column;gap:10px}
.skPrevtop{display:flex;align-items:center;gap:13px}
.skCovbig{flex:none;text-align:center;min-width:70px}
.skCovbig .v{font-family:var(--font-num);font-weight:700;font-size:24px;line-height:1}
.skCovbig .l{font-size:8.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-ghost);margin-top:2px}
.skPrevnote{min-width:0;flex:1}
.skPrevnote .rn{font-size:12.5px;font-weight:600;color:var(--fg);line-height:1.35}
.skPrevnote .rd{font-size:11px;color:var(--fg-muted);margin-top:4px;line-height:1.4}
.skPrevcov{margin-top:2px}
.skCommit{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:14px 15px;
  display:flex;flex-direction:column;gap:13px}
.skCommithead{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.skCommithead .t{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost)}
.skCommithead .v{font-family:var(--font-num);font-weight:600;font-size:14px;color:var(--fg)}
.skEst{display:flex;align-items:center;justify-content:space-between;gap:10px;
  background:var(--bg-3);border:1px solid var(--hairline);border-radius:6px;padding:9px 12px}
.skEst .el{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted)}
.skEst .ev{font-family:var(--font-num);font-weight:700;font-size:15px;color:var(--club)}
.skCommitbtn{border:1px solid var(--club);background:color-mix(in srgb,var(--club) 22%,var(--bg-2));color:var(--fg);cursor:pointer;
  font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
  padding:11px 16px;border-radius:7px;transition:all var(--t-fast) var(--ease)}
.skCommitbtn:hover{background:color-mix(in srgb,var(--club) 34%,var(--bg-2));box-shadow:0 0 12px color-mix(in srgb,var(--club) 35%,transparent)}
.skCommitbtn:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
/* in-progress */
.skInprog{background:var(--bg-3);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:14px 15px;
  display:flex;flex-direction:column;gap:12px}
.skInprog .ipTitle{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--fg)}
.skInprog .ipDot{width:8px;height:8px;border-radius:50%;background:var(--amber);flex:none;animation:pulse 1.6s ease-in-out infinite}
.skInprog .ipEta{margin-left:auto;font-family:var(--font-num);font-size:11px;color:var(--amber)}
.skInmeta{display:flex;gap:18px}
.skInmeta .m{display:flex;flex-direction:column;gap:2px}
.skInmeta .m .k{font-size:8.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-ghost)}
.skInmeta .m .v{font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--fg)}
/* scouted FM-style report */
.skReport{display:flex;flex-direction:column;gap:14px}
.skRephead{display:flex;align-items:center;gap:10px}
.skConf{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 11px;border-radius:var(--r-pill);
  border:1px solid}
.skConf.thorough{color:var(--green);background:rgba(63,209,122,.12);border-color:rgba(63,209,122,.45)}
.skConf.solid{color:var(--blue);background:rgba(0,212,255,.10);border-color:rgba(0,212,255,.42)}
.skConf.partial{color:var(--amber);background:rgba(212,161,76,.12);border-color:rgba(212,161,76,.45)}
.skConf.vague{color:var(--fg-muted);background:var(--bg-3);border-color:var(--border-strong)}
.skRephead .skAccnum{margin-left:auto;font-family:var(--font-num);font-size:12px;color:var(--fg-muted)}
.skRephead .skAccnum b{color:var(--fg);font-weight:600}
.skSW{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.skSW{grid-template-columns:1fr}}
.skCol .skColhead{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px}
.skStrength .skColhead{color:var(--green)}
.skWeak .skColhead{color:var(--red-text)}
.skItems{display:flex;flex-direction:column;gap:9px}
.skItem{display:flex;flex-direction:column;gap:5px;background:var(--bg-2);border:1px solid var(--hairline);
  border-radius:6px;padding:8px 10px}
.skStrength .skItem{border-left:2px solid var(--green)}
.skWeak .skItem{border-left:2px solid var(--red-text)}
.skItemtop{display:flex;align-items:baseline;gap:7px}
.skItemtop .ia{font-size:12px;font-weight:600;color:var(--fg)}
.skItemtop .ic{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-ghost);
  background:var(--bg-3);border:1px solid var(--hairline);border-radius:4px;padding:2px 6px;margin-left:auto}
.skItembar{display:flex;align-items:center;gap:8px}
.skItembar .skBar{flex:1;height:6px}
.skItembar .ival{font-family:var(--font-num);font-size:11px;font-weight:600;color:var(--fg);width:22px;text-align:right;flex:none}
.skColempty{color:var(--fg-ghost);font-size:11px;padding:6px 2px}
.skPot{display:flex;align-items:center;gap:14px;background:var(--bg-3);border:1px solid var(--hairline);
  border-radius:var(--r-tile);padding:12px 15px}
.skPot .pv{font-family:var(--font-num);font-weight:700;font-size:26px;line-height:1;color:var(--gold)}
.skPot .pv .q{font-size:15px;color:var(--fg-muted);margin-left:2px}
.skPot .pl{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-ghost)}
.skPot .pband{font-size:11px;color:var(--fg-muted);margin-top:3px}
.skFit{display:flex;flex-direction:column;gap:8px}
.skFitrow{display:grid;grid-template-columns:96px 1fr 34px;align-items:center;gap:10px}
.skFitrow .fr{font-size:11px;font-weight:600;color:var(--fg)}
.skFitrow .fv{font-family:var(--font-num);font-size:11px;font-weight:600;color:var(--fg-muted);text-align:right}
.skFitrow .skBar{height:7px}
.skVerdict{font-size:12.5px;line-height:1.55;color:var(--fg);font-style:italic;
  background:color-mix(in srgb,var(--club) 7%,var(--bg-3));border:1px solid var(--hairline);
  border-left:3px solid var(--club);border-radius:6px;padding:11px 14px}
.skSeclab{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin-bottom:8px}
.skTraits{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:7px}
.skTraits li{font-size:12px;color:var(--fg);line-height:1.45;padding-left:15px;position:relative}
.skTraits li::before{content:"\203A";position:absolute;left:3px;color:var(--club);font-weight:700}

/* =====================================================================
   NEW-GAME WIZARD  — a centered "start a career" screen (rail item #navNew).
   Configure club name / region / colour / org tier / difficulty, then post
   act:newgame:… ; on success the host boots the fresh world and pushes dashboard.
   All classes `ng`-prefixed so they never collide with any screen/tab. ===== */
#view.newgame{display:block;overflow:auto}
.ngWrap{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:34px 24px 48px}
.ngCard{width:min(760px,100%);background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-card);padding:26px 28px 24px;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel));
  opacity:0;transform:translateY(8px);transition:opacity .4s var(--ease),transform .4s var(--ease)}
.ngCard.in{opacity:1;transform:none}
.ngHead{display:flex;align-items:center;gap:15px;margin-bottom:22px}
.ngCrest{width:52px;height:52px;flex:none;border-radius:12px;display:grid;place-items:center;color:#fff;
  font-family:var(--font-display);font-weight:700;font-size:24px;box-shadow:0 4px 14px rgba(0,0,0,.35);transition:background .18s}
.ngTitle{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--fg);letter-spacing:.01em}
.ngSub{font-size:12.5px;color:var(--fg-muted);margin-top:3px}
.ngGrid{display:grid;grid-template-columns:1fr 1fr;gap:18px 20px}
.ngField{display:flex;flex-direction:column;gap:9px;min-width:0}
.ngField.ngFull{grid-column:1 / -1}
.ngLab{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost)}
.ngLabrow{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.ngInput{background:var(--bg-2);border:1px solid var(--hairline);border-radius:8px;color:var(--fg);
  font-family:var(--font-display);font-size:15px;font-weight:600;padding:10px 13px;width:100%;transition:border-color .14s}
.ngInput:focus{outline:none;border-color:color-mix(in srgb,var(--club) 60%,transparent)}
.ngSegRow{display:flex;gap:7px;flex-wrap:wrap}
.ngSeg{flex:1;min-width:78px;border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:12px;padding:9px 10px;border-radius:7px;transition:all var(--t-fast) var(--ease)}
.ngSeg:hover{color:var(--fg);border-color:var(--border-strong)}
.ngSeg.on{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 16%,var(--bg-2));
  box-shadow:0 0 9px color-mix(in srgb,var(--club) 30%,transparent)}
.ngSwRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ngSw{width:28px;height:28px;flex:none;border-radius:50%;cursor:pointer;background:var(--sw);
  border:2px solid transparent;box-shadow:0 0 0 1px var(--hairline);transition:transform .12s,box-shadow .12s}
.ngSw:hover{transform:scale(1.1)}
.ngSw.on{border-color:var(--bg-1);box-shadow:0 0 0 2px var(--sw),0 0 10px color-mix(in srgb,var(--sw) 55%,transparent)}
.ngTiers{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ngTier{text-align:left;border:1px solid var(--hairline);background:var(--bg-2);cursor:pointer;
  border-radius:9px;padding:11px 13px;display:flex;flex-direction:column;gap:3px;transition:all var(--t-fast) var(--ease)}
.ngTier:hover{border-color:var(--border-strong)}
.ngTier.on{border-color:var(--club);background:color-mix(in srgb,var(--club) 13%,var(--bg-2));
  box-shadow:0 0 10px color-mix(in srgb,var(--club) 26%,transparent)}
.ngTierName{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--fg)}
.ngTierBlurb{font-size:10.5px;color:var(--fg-muted);line-height:1.4}
.ngDiffval{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--club)}
.ngSlideline{display:flex;align-items:center;gap:11px}
.ngDiffend{font-size:10px;color:var(--fg-ghost);white-space:nowrap;flex:none}
.ngSlider{flex:1;accent-color:var(--club);height:4px;cursor:pointer}
.ngFoot{margin-top:24px;display:flex;flex-direction:column;gap:8px;align-items:center}
.ngStart{width:100%;border:1px solid var(--club);background:color-mix(in srgb,var(--club) 24%,var(--bg-2));color:var(--fg);cursor:pointer;
  font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;
  padding:14px 16px;border-radius:9px;transition:all var(--t-fast) var(--ease)}
.ngStart:hover{background:color-mix(in srgb,var(--club) 36%,var(--bg-2));box-shadow:0 0 14px color-mix(in srgb,var(--club) 38%,transparent)}
.ngStart:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
.ngNote{font-size:10.5px;color:var(--fg-muted);text-align:center}
@media(max-width:620px){.ngGrid{grid-template-columns:1fr}.ngTiers{grid-template-columns:1fr}}

/* =====================================================================
   SPONSOR panel (Finance screen) — the preseason 3-offer CHOICE while
   pending, else the ACTIVE deal + live progress. `sp`-prefixed. ===== */
.spCard{margin-top:14px}
.spCard.pending{border-color:color-mix(in srgb,var(--club) 45%,var(--hairline));box-shadow:0 0 0 1px color-mix(in srgb,var(--club) 22%,transparent),var(--hi-inset)}
.spNote{font-size:11.5px;color:var(--fg-muted);line-height:1.5;margin-bottom:12px}
.spOffers{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:12px}
.spOffer{display:flex;flex-direction:column;gap:6px;background:var(--bg-2);border:1px solid var(--hairline);border-radius:10px;padding:13px 14px}
.spOname{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--gold)}
.spOreq{font-size:11.5px;color:var(--fg);line-height:1.4;flex:1}
.spOrew{font-family:var(--font-num);font-size:11px;color:var(--fg-muted)}
.spOrew b{color:var(--green)}
.spChoose{margin-top:4px;border:1px solid var(--club);background:color-mix(in srgb,var(--club) 20%,var(--bg-2));color:var(--fg);cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:9px 10px;border-radius:7px;transition:all var(--t-fast) var(--ease)}
.spChoose:hover{background:color-mix(in srgb,var(--club) 32%,var(--bg-2));box-shadow:0 0 10px color-mix(in srgb,var(--club) 32%,transparent)}
.spDecline{border:1px solid var(--hairline);background:transparent;color:var(--fg-muted);cursor:pointer;font-size:11px;padding:8px 12px;border-radius:7px;transition:all var(--t-fast) var(--ease)}
.spDecline:hover{color:var(--fg);border-color:var(--border-strong)}
.spActrow{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.spActmain{min-width:0}
.spName{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--gold)}
.spReq{font-size:12px;color:var(--fg-muted);margin-top:3px}
.spProg{color:var(--fg)}
.spActside{display:flex;align-items:center;gap:10px;flex:none}
.spReward{font-family:var(--font-num);font-weight:700;font-size:18px;color:var(--green)}
.spPill{font-family:var(--font-display);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.spPill.paid{color:var(--green);background:color-mix(in srgb,var(--green) 16%,transparent);border:1px solid color-mix(in srgb,var(--green) 40%,transparent)}
.spPill.ontrack{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent);border:1px solid color-mix(in srgb,var(--green) 38%,transparent)}
.spPill.behind{color:var(--amber);background:color-mix(in srgb,var(--amber) 14%,transparent);border:1px solid color-mix(in srgb,var(--amber) 38%,transparent)}
@media(max-width:720px){.spOffers{grid-template-columns:1fr}}

/* Mail action bar (reading pane) — mark unread / star / delete / deep-link. */
.mactions{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 13px;padding-bottom:13px;border-bottom:1px solid var(--hairline)}
.mact{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;font-family:var(--font-display);font-size:10.5px;font-weight:600;letter-spacing:.02em;padding:6px 11px;border-radius:6px;transition:all var(--t-fast) var(--ease)}
.mact:hover{color:var(--fg);border-color:var(--border-strong)}
.mact.on{color:var(--gold);border-color:rgba(255,215,0,.45);background:color-mix(in srgb,var(--gold) 12%,var(--bg-2))}
.mact.link{color:var(--fg);border-color:color-mix(in srgb,var(--club) 50%,transparent);background:color-mix(in srgb,var(--club) 12%,var(--bg-2))}
.mact.link:hover{background:color-mix(in srgb,var(--club) 24%,var(--bg-2))}
.mact.danger{color:var(--red-text);border-color:rgba(255,70,85,.35)}
.mact.danger:hover{color:#fff;background:rgba(255,70,85,.2);border-color:var(--red)}
.mact.danger.armed{color:#fff;background:var(--red);border-color:var(--red);box-shadow:var(--red-glow)}
/* inbox filter pills (client-side) */
.mfilters{display:flex;flex-wrap:wrap;gap:5px;padding:2px 8px 10px}
.mfpill{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-size:9.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;
  padding:4px 10px;border-radius:var(--r-pill);transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.mfpill:hover{color:var(--fg);border-color:var(--border-strong)}
.mfpill.on{color:var(--fg);border-color:color-mix(in srgb,var(--club) 55%,transparent);background:color-mix(in srgb,var(--club) 16%,var(--bg-2))}

/* Dashboard sponsor nudge — a clickable banner when a sponsor choice is pending. */
.dashNudge{display:flex;align-items:center;gap:12px;cursor:pointer;margin-top:14px;padding:12px 16px;border-radius:10px;
  background:color-mix(in srgb,var(--club) 12%,var(--bg-1));border:1px solid color-mix(in srgb,var(--club) 45%,var(--hairline));
  transition:background .14s,border-color .14s}
.dashNudge:hover{background:color-mix(in srgb,var(--club) 20%,var(--bg-1));border-color:var(--club)}
.dashNudge .nIcon{width:26px;height:26px;flex:none;border-radius:7px;display:grid;place-items:center;background:color-mix(in srgb,var(--club) 26%,transparent);color:var(--fg);font-weight:700}
.dashNudge .nTxt{flex:1;min-width:0;font-size:12.5px;color:var(--fg)}
.dashNudge .nTxt b{font-weight:700}
.dashNudge .nGo{font-family:var(--font-display);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--club)}
/* Preseason hero (next-match card during the onboarding buffer). */
.preHero{padding:8px 0 4px;flex:1}
.preH{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--fg)}
.preP{font-size:11.5px;color:var(--fg-muted);line-height:1.5;margin-top:6px}
.preP b{color:var(--fg)}

/* Match-prep COMP EDITOR (Strategy screen) — 5 role-grouped agent pickers +
   legality badge. `comp`-prefixed; the Auto/Customize/Reset chips are `ag-`. */
.maprow.custom{flex-wrap:wrap}
.ag-custom-btn,.ag-reset{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;font-family:var(--font-display);font-size:9.5px;font-weight:600;letter-spacing:.03em;padding:5px 9px;border-radius:6px;transition:all var(--t-fast) var(--ease);margin-left:7px}
.ag-custom-btn:hover,.ag-reset:hover{color:var(--fg);border-color:var(--border-strong)}
.ag-custom-btn{color:var(--club);border-color:color-mix(in srgb,var(--club) 45%,transparent)}
.ag-custom-lbl{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--club)}
.compEditor{flex-basis:100%;margin-top:11px;padding-top:12px;border-top:1px solid var(--hairline)}
.compGrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.compSlot{display:flex;flex-direction:column;gap:4px}
.compSlab{font-family:var(--font-num);font-size:9px;color:var(--fg-ghost);text-align:center}
.compSel{width:100%;background:var(--bg-2);border:1px solid var(--hairline);border-radius:6px;color:var(--fg);font-family:var(--font-display);font-size:11px;font-weight:600;padding:6px 7px;cursor:pointer;transition:border-color .14s}
.compSel:hover{border-color:var(--border-strong)}
.compSel:focus{outline:none;border-color:color-mix(in srgb,var(--club) 55%,transparent)}
.compFoot{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.compSum{font-family:var(--font-num);font-size:11px;font-weight:600;color:var(--fg)}
.compBadge{font-family:var(--font-display);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:5px}
.compBadge.legal{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent);border:1px solid color-mix(in srgb,var(--green) 38%,transparent)}
.compBadge.off{color:var(--amber);background:color-mix(in srgb,var(--amber) 14%,transparent);border:1px solid color-mix(in srgb,var(--amber) 38%,transparent)}
.compHint{font-size:10px;color:var(--fg-muted);margin-left:auto}
@media(max-width:760px){.compGrid{grid-template-columns:repeat(2,1fr)}.compHint{margin-left:0;flex-basis:100%}}

/* =====================================================================
   RECRUITMENT hub — consolidated filterable/sortable/infinite-scroll player
   search (Search / Free Agents / Shortlist). `rc`-prefixed. ===== */
#view.recruitment{overflow:hidden}
.rcTabs{display:flex;gap:4px;margin:14px 0 10px;flex:none}
.rcTab{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;font-family:var(--font-display);font-weight:600;font-size:12px;padding:8px 14px;border-radius:8px 8px 0 0;transition:all var(--t-fast) var(--ease)}
.rcTab:hover{color:var(--fg)}
.rcTab.on{color:var(--fg);border-color:var(--club);border-bottom-color:transparent;background:color-mix(in srgb,var(--club) 12%,var(--bg-2))}
.rcTab .rcTn{font-family:var(--font-num);font-size:10px;color:var(--fg-ghost);margin-left:4px}
.rcFilters{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:10px;flex:none}
.rcSearch{background:var(--bg-2);border:1px solid var(--hairline);border-radius:8px;color:var(--fg);font-family:var(--font-ui);font-size:12px;padding:8px 11px;width:200px}
.rcSearch:focus{outline:none;border-color:color-mix(in srgb,var(--club) 55%,transparent)}
.rcRoles{display:flex;gap:4px}
.rcRoleChip{width:34px;border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:9px;padding:7px 0;border-radius:6px;transition:all var(--t-fast) var(--ease)}
.rcRoleChip:hover{color:var(--fg);border-color:var(--border-strong)}
.rcRoleChip.on{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 16%,var(--bg-2))}
.rcSel{background:var(--bg-2);border:1px solid var(--hairline);border-radius:8px;color:var(--fg);font-family:var(--font-ui);font-size:12px;padding:8px 9px;cursor:pointer}
.rcNum{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--fg-muted)}
.rcNum input{width:44px;background:var(--bg-2);border:1px solid var(--hairline);border-radius:6px;color:var(--fg);font-family:var(--font-num);font-size:11px;padding:6px 5px;text-align:center}
.rcCountLbl{margin-left:auto;font-family:var(--font-num);font-size:11px;color:var(--fg-muted)}
.rcCard{flex:1;min-height:0;display:flex;flex-direction:column;padding:0;overflow:hidden}
.rcHead{display:grid;grid-template-columns:minmax(150px,1.7fr) 84px 40px 42px 58px 62px 58px 38px minmax(90px,1fr) 82px 54px;gap:8px;align-items:center;padding:12px 14px 10px;border-bottom:1px solid var(--hairline);flex:none}
.rcHcell{font-family:var(--font-display);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-ghost);cursor:pointer;user-select:none;white-space:nowrap}
.rcHcell.num{text-align:right}
.rcHcell:hover{color:var(--fg-muted)}
.rcHcell.sorted{color:var(--club)}
.rcHcell.rcActs{cursor:default}
.rcScroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.rcBody{display:flex;flex-direction:column}
.rcRow{display:grid;grid-template-columns:minmax(150px,1.7fr) 84px 40px 42px 58px 62px 58px 38px minmax(90px,1fr) 82px 54px;gap:8px;align-items:center;padding:0 14px;height:46px;border-bottom:1px solid color-mix(in srgb,var(--hairline) 60%,transparent);cursor:pointer;transition:background .1s}
.rcRow:hover{background:var(--bg-1)}
.rcCell{font-size:12px;color:var(--fg);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rcCell.num{text-align:right;font-family:var(--font-num)}
.rcName{display:flex;align-items:center;gap:8px;min-width:0}
.rcRole{font-family:var(--font-display);font-weight:700;font-size:9px;padding:3px 5px;border-radius:4px;flex:none}
.rcNm{display:flex;flex-direction:column;min-width:0}
.rcNm .nm{font-weight:600;font-size:12.5px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcNm .tm{font-size:10px;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcFlag{font-family:var(--font-num);font-size:9px;color:var(--fg-ghost)}
.rcYours{color:var(--club);font-weight:600}.rcFa{color:var(--green)}
.rcPot{font-family:var(--font-num)}.rcPot.band{color:var(--fg-muted);font-size:10.5px}
.rcArch{font-size:10.5px;color:var(--fg-muted)}
.rcTag{font-size:8px;font-weight:700;letter-spacing:.03em;padding:1px 4px;border-radius:3px;margin-left:5px}
.rcTag.igl{color:var(--amber);background:color-mix(in srgb,var(--amber) 16%,transparent)}
.rcTag.wants{color:var(--red-text);background:rgba(255,70,85,.12)}
.rcKnow{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:5px}
.rcKnow.k-complete{color:var(--green);background:color-mix(in srgb,var(--green) 14%,transparent)}
.rcKnow.k-extensive{color:var(--blue);background:color-mix(in srgb,var(--blue) 14%,transparent)}
.rcKnow.k-basic{color:var(--fg-muted);background:var(--bg-2)}
.rcActs{display:flex;gap:4px;justify-content:flex-end}
.rcAct{width:22px;height:22px;border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-ghost);border-radius:5px;cursor:pointer;font-size:11px;line-height:1;display:grid;place-items:center;transition:all .1s}
.rcAct:hover{color:var(--fg);border-color:var(--border-strong)}
.rcAct.star.on{color:var(--gold);border-color:rgba(255,215,0,.4)}
.rcAct.eye.on{color:var(--club);border-color:color-mix(in srgb,var(--club) 45%,transparent)}
.rcDim{color:var(--fg-ghost)}
.rcEmpty{padding:40px;text-align:center;color:var(--fg-muted);font-size:13px}
/* Scouting Assignments (briefs) view inside the recruitment hub. */
#rcAssign{flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.rcAssignNote{font-size:12px;color:var(--fg-muted);line-height:1.5;margin:4px 0 14px;max-width:840px}
.rcAssignNote b{color:var(--fg)}
.rcBriefs{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.rcBrief{display:flex;align-items:center;gap:16px;background:var(--bg-1);border:1px solid var(--hairline);border-radius:10px;padding:12px 15px}
.rcBrInfo{flex:1;min-width:0}
.rcBrName{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--fg)}
.rcBrFilt{font-size:11px;color:var(--fg-muted);margin-top:2px}
.rcBrProg{width:220px;flex:none}
.rcBrStat{font-family:var(--font-num);font-size:11px;color:var(--fg-muted)}
.rcBrStat b{color:var(--fg)}
.rcBrBar{height:6px;border-radius:3px;background:var(--bg-3);overflow:hidden;border:1px solid var(--hairline);margin-top:5px}
.rcBrBar>i{display:block;height:100%;background:color-mix(in srgb,var(--club) 70%,transparent);border-radius:3px;transition:width .2s}
.rcBrDel{flex:none;border:1px solid rgba(255,70,85,.35);background:transparent;color:var(--red-text);cursor:pointer;font-size:11px;padding:7px 12px;border-radius:7px;transition:all .12s}
.rcBrDel:hover{color:#fff;background:rgba(255,70,85,.2);border-color:var(--red)}
.rcBriefForm{flex:none;max-width:840px}
.rcBfGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px 14px;margin-bottom:14px}
.rcBf{display:flex;flex-direction:column;gap:5px}
.rcBf>span{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-ghost)}
.rcBf input,.rcBf select{background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;color:var(--fg);font-family:var(--font-ui);font-size:12px;padding:8px 10px}
.rcBf input:focus,.rcBf select:focus{outline:none;border-color:color-mix(in srgb,var(--club) 55%,transparent)}
.rcBfAge{display:flex;align-items:center;gap:8px}
.rcBfAge input{width:60px;text-align:center;font-family:var(--font-num)}
.rcBfAge i{color:var(--fg-ghost);font-style:normal}
.rcBfCreate{border:1px solid var(--club);background:color-mix(in srgb,var(--club) 22%,var(--bg-2));color:var(--fg);cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:11px 18px;border-radius:8px;transition:all .12s}
.rcBfCreate:hover{background:color-mix(in srgb,var(--club) 34%,var(--bg-2));box-shadow:0 0 12px color-mix(in srgb,var(--club) 35%,transparent)}
@media(max-width:820px){.rcBfGrid{grid-template-columns:1fr 1fr}}
/* Staff sub-tab (Coaches/Scouts/Analysts market) inside the recruitment hub. */
#rcStaff{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.rcStTabs{display:flex;gap:5px;margin:2px 0 12px;flex:none}
.rcStRole{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;font-family:var(--font-display);font-weight:600;font-size:11px;padding:7px 14px;border-radius:7px;transition:all .12s}
.rcStRole:hover{color:var(--fg)}
.rcStRole.on{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 14%,var(--bg-2))}
.rcStCur{font-size:12px;color:var(--fg-muted);margin-bottom:12px;flex:none}
.rcStCur b{color:var(--fg)}
.rcStCard{flex:1;min-height:0;display:flex;flex-direction:column;padding:0;overflow:hidden}
.rcStHead,.rcStRow{display:grid;grid-template-columns:minmax(140px,1.4fr) minmax(120px,1.2fr) 60px 110px 70px;gap:10px;align-items:center;padding:0 16px}
.rcStHead{padding:12px 16px 10px;border-bottom:1px solid var(--hairline);flex:none;font-family:var(--font-display);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-ghost)}
.rcStHead .num{text-align:right}
.rcStScroll{flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.rcStRow{height:48px;border-bottom:1px solid color-mix(in srgb,var(--hairline) 60%,transparent)}
.rcStRow:hover{background:var(--bg-1)}
.rcStName{font-weight:600;font-size:12.5px;color:var(--fg)}
.rcStPers{font-size:11.5px;color:var(--fg-muted)}
.rcStRep,.rcStAsk{font-family:var(--font-num);font-size:12px;text-align:right}
.rcStAsk{color:var(--fg)}
.rcStPer{font-size:9px;color:var(--fg-ghost)}
.rcStActc{text-align:right}
.rcStHire{border:1px solid color-mix(in srgb,var(--club) 50%,transparent);background:color-mix(in srgb,var(--club) 14%,var(--bg-2));color:var(--fg);cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:6px 13px;border-radius:6px;transition:all .12s}
.rcStHire:hover{background:color-mix(in srgb,var(--club) 26%,var(--bg-2))}
</style>
</head>

  <main id="view"></main>

  <!-- PLAYER DETAIL MODAL (floats above #view; populated by renderPlayerModal) -->

<script>
/* =====================================================================
   THE BRIDGE (WebView2 integration contract)
   ===================================================================== */
const bridge = (window.chrome && window.chrome.webview) || null;
function post(s){ if(bridge) bridge.postMessage(s); }

/* =====================================================================
   SHARED HELPERS (superset of both source files)
   ===================================================================== */
/* Motion preference — OS setting, overridable from the main-menu Settings panel
   (persisted in localStorage: "1"=reduce, "0"=full, absent=follow OS). */
let reduced = (function(){
  try{ const s=localStorage.getItem("vlr_reduced"); if(s==="1") return true; if(s==="0") return false; }catch(_){}
  return matchMedia("(prefers-reduced-motion:reduce)").matches;
})();
/* Autosave preference (Settings): after each advance the app posts act:save:auto. */
let autosaveOn = (function(){ try{ return localStorage.getItem("vlr_autosave")!=="0"; }catch(_){ return true; } })();
const $ = (s,r=document)=>r.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const TONE={pos:"--green",info:"--blue",warn:"--amber",crit:"--red",neutral:"--fg-muted"};
const ROLE={Duelist:["DUE","--r-duelist"],Initiator:["INI","--r-initiator"],Controller:["CON","--r-controller"],Sentinel:["SEN","--r-sentinel"]};
const cssvar=v=>v && v.startsWith("--")?getComputedStyle(document.documentElement).getPropertyValue(v).trim():v;
// Covers every category the engine pushes to the news feed (GameManager
// push_news sites). Anything unmapped still falls back to --fg-muted gray.
const NEWS_COLOR={Result:"--blue","Roster Move":"--purple",Awards:"--amber","MVP Race":"--purple",
  Upset:"--red",Dynasty:"--gold",Retirement:"--fg-muted","Retirement Watch":"--fg-muted",
  Breakout:"--green",Prospect:"--green","Hot Streak":"--green",Slump:"--amber",
  Milestone:"--gold",Historic:"--gold",Rumor:"--purple",Rivalry:"--red",
  Coaching:"--amber",Tournament:"--blue"};
const lerpColor=(a,b,t)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
  const ra=pa>>16,ga=pa>>8&255,ba=pa&255,rb=pb>>16,gb=pb>>8&255,bb=pb&255;
  const r=Math.round(ra+(rb-ra)*t),g=Math.round(ga+(gb-ga)*t),bl=Math.round(ba+(bb-ba)*t);
  return`rgb(${r},${g},${bl})`;};
// dashboard ovr scale (64..84)
const ovrColorDash=o=>{const t=Math.max(0,Math.min(1,(o-64)/20));
  return t<0.5 ? lerpColor("#8B93A3","#D4A14C",t/0.5) : lerpColor("#D4A14C","#3FD17A",(t-0.5)/0.5);};
// roster ovr scale (55..90)
const ovrColorRoster=o=>{const t=Math.max(0,Math.min(1,(o-55)/35));
  return t<0.5?lerpColor("#8B93A3","#D4A14C",t/0.5):lerpColor("#D4A14C","#3FD17A",(t-0.5)/0.5);};
const attrColor=v=>{const t=Math.max(0,Math.min(1,(v-40)/50));
  return t<0.5?lerpColor("#5A6172","#D4A14C",t/0.5):lerpColor("#D4A14C","#3FD17A",(t-0.5)/0.5);};
const fmtK=k=>{const a=Math.abs(k);const s=k<0?"-":"";return a>=1000?`${s}$${(a/1000).toFixed(a>=10000?0:1)}M`:`${s}$${a}K`;};
/* Nav-rail mail badge — fed by dashboard header (unread_mail) and the mail screen (unread). */
function setMailBadge(n){
  const b=$("#mailBadge"); if(b==null||n==null) return;
  const v=+n||0; b.hidden=v<=0; b.textContent=v>99?"99+":String(v);
}

/* =====================================================================
   renderDashboard(D, club)  — D is the inner `dashboard` object
   ===================================================================== */
function renderDashboard(D, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="dashboard";

  /* pre-game / empty-payload guard */
  if(!D || !D.header){
    view.innerHTML='<div class="preempty">Waiting for a season — start or load a save to populate your dashboard.</div>';
    return;
  }

  view.innerHTML=DASH_SKEL;

  /* ===== header ===== */
  const h=D.header;
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  $("#dayVal").textContent=`${h.day_in_year} / 200`;
  const meta=$("#hmeta");
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase]]
    .forEach(([cl,tx])=>meta.appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== sponsor nudge — pending preseason choice → jump to Finance ===== */
  const nudge=$("#dashNudge");
  if(nudge){
    if(h.sponsor_pending){
      nudge.innerHTML=`<div class="dashNudge" role="button" tabindex="0">
        <span class="nIcon">$</span>
        <span class="nTxt"><b>Choose your season sponsor</b> — three offers are on the table. Pick one for a year-end bonus.</span>
        <span class="nGo">Open Finance →</span>
      </div>`;
      const nb=nudge.querySelector(".dashNudge");
      const goFin=()=>go('finance');
      nb.addEventListener("click",goFin);
      nb.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); goFin(); } });
    }else{ nudge.innerHTML=''; }
  }

  /* ===== day-rail (driven by the engine's real phase ring; falls back to the
     old fixed ticks only if the host predates the phases export) ===== */
  const seasonDays=+D.season_days||200;
  const dr=$("#dayrail"), prog=Math.max(0,Math.min(1,(h.day_in_year||0)/seasonDays));
  const shortPhase=s=>String(s||'').replace(/^Regionals/i,'Reg').replace(/^Offseason$/i,'Off').replace(/^Champions$/i,'Champs');
  const PHASES=(D.phases&&D.phases.length)
    ? D.phases.map(p=>[shortPhase(p.name),Math.max(0,Math.min(1,(Math.max(1,+p.start)-1)/seasonDays))])
    : [["Stage 1",0.14],["Regionals",0.52],["Masters",0.74],["Champions",0.92]];
  PHASES.forEach(([nm,p])=>{
    const lit=p<=prog;
    const tk=el("div","tick"+(lit?" lit":"")); tk.style.left=(p*100)+"%"; dr.appendChild(tk);
    const lb=el("div","tlab"+(lit?" lit":""),nm); lb.style.left=(p*100)+"%"; dr.appendChild(lb);
  });
  $("#todayDot").style.left=(prog*100)+"%";
  /* standings footer: real phase, not skeleton fiction */
  const stP=$("#stPhase");
  if(stP) stP.textContent=String(h.current_phase||'').toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
  /* nav mail badge (header carries the unread count on the dashboard payload) */
  setMailBadge(h.unread_mail);

  /* ===== KPI strip ===== */
  const kc=$("#kpis");
  (D.kpis||[]).forEach((k,i)=>{
    const t=el("div","kpi"+(k.today?" today":""));
    t.classList.add("bevel-tr");
    t.style.setProperty("--accent",cssvar(TONE[k.tone]||"--amber"));
    t.innerHTML=`<div class="klab">${esc(k.label)}</div><div class="kval" data-final="${esc(k.value)}">${esc(k.value)}</div>${k.subline?`<div class="ksub">${esc(k.subline)}</div>`:""}<div class="kbar"></div>`;
    if(k.label==="NEXT MATCH" && D.next_match && D.next_match.days_until===0 && !(D.header && D.header.in_preseason)){t.classList.add("today");}
    kc.appendChild(t);
  });

  /* ===== objectives ===== */
  const ob=$("#objBody"); const o=D.objectives||{met:0,total:0,goals:[]};
  $("#objStat").textContent=o.total?`${o.met} of ${o.total} met`:"";
  const objGoals=o.goals||[];
  if(!objGoals.length) ob.appendChild(el("div","empty","No board objectives set for this phase."));
  objGoals.forEach(g=>{
    const row=el("div","obj");
    row.innerHTML=`<div class="top">
        <span class="chip ${g.met?'met':'unmet'}">${g.met?'✓':''}</span>
        ${g.mandatory?'<span class="pill primary">Primary</span>':''}
        <span class="txt">${esc(g.text)}</span>
        <span class="frac">${Math.round(g.pct*100)}%</span>
      </div>
      <div class="track"><div class="tf" data-pct="${g.pct}" style="background:${g.met?'var(--green)':'var(--amber)'}"></div></div>
      <div class="prog">${esc(g.progress)}</div>`;
    ob.appendChild(row);
  });

  /* ===== standings ===== */
  const sr=$("#stRows");
  const stT=$("#stTitle"); if(stT) stT.textContent=(D.header.region?D.header.region+" League":"League");
  $("#stStat").textContent=esc(D.header.current_phase||"");
  const standings=D.standings||[];
  if(!standings.length) sr.appendChild(el("div","empty","Standings not available yet."));
  standings.forEach(t=>{
    const row=el("div","srow"+(t.is_user?" user":""));
    row.setAttribute("role","row");
    if(t.is_user) row.setAttribute("aria-current","true");
    const tk=t.rank===1?"tick1":(t.rank<=8?"tick4":"");
    const tkLabel=t.rank===1?'<span class="sr-only">League leader</span>':(t.rank<=8?'<span class="sr-only">Playoff position</span>':'');
    const initial=esc(String(t.team_name).slice(0,1));
    row.innerHTML=`<span class="rk ${tk}">${t.rank}${tkLabel}</span>
      <span class="team"><span class="mono-chip">${initial}</span><span class="nm">${esc(t.team_name)}${t.is_user?'<span class="sr-only"> (your team)</span>':''}</span></span>
      <span class="wl">${t.wins}-${t.losses}</span>
      <span class="ov" data-ovr="${t.ovr}">${t.ovr.toFixed(1)}</span>`;
    row.style.cursor="pointer"; row.tabIndex=0;
    const openTp=()=>go("teamprofile:"+t.team_name);
    row.addEventListener("click",openTp);
    row.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openTp(); } });
    sr.appendChild(row);
  });
  sr.querySelectorAll(".ov").forEach(e=>e.style.color=ovrColorDash(parseFloat(e.dataset.ovr)));

  /* ===== next match hero ===== */
  const nm=D.next_match;
  lastNextMatch=nm||null; lastInPreseason=!!(D.header&&D.header.in_preseason);
  // Fall back to the real ROSTER OVR KPI (not 0) and an em-dash rank when the
  // user has no resolvable standings row (preseason / unranked).
  const rosterOvrKpi=(D.kpis||[]).find(k=>k.label==="ROSTER OVR");
  const me=standings.find(s=>s.is_user)||{team_name:D.header.club_name,ovr:parseFloat(rosterOvrKpi&&rosterOvrKpi.value)||0,rank:"—"};
  if(D.header && D.header.in_preseason){
    const pd=+D.header.preseason_days||0;
    $("#cHero").innerHTML=`
      <div class="hh"><span class="t">Preseason</span><span class="s num" style="color:var(--fg-muted)">${pd} day${pd===1?'':'s'} to Stage 1</span></div>
      <div class="preHero">
        <div class="preH">Settle in before your first match</div>
        <div class="preP">Review your squad, staff, strategy and the league table — make any roster or transfer moves — then kick off the season.${nm?` First up: <b>${esc(nm.opponent)}</b>.`:''}</div>
      </div>
      <button class="cta live" id="preCta">Continue Preseason</button>`;
    const pc=$("#preCta"); if(pc) pc.addEventListener('click',()=>post("advance:day:dashboard"));
  }else if(!nm){
    $("#cHero").innerHTML=`
      <div class="hh"><span class="t">Next Match</span></div>
      <div class="empty">No upcoming fixture — off-week.</div>`;
  }else{
    const meInit=esc(String(me.team_name).slice(0,1)), oppInit=esc(String(nm.opponent).slice(0,1));
    const diff=me.ovr-nm.opp_ovr, mePct=Math.max(15,Math.min(85,50+diff*6));
    $("#cHero").innerHTML=`
      <div class="hh"><span class="t">Next Match</span><span class="s num" style="color:var(--fg-muted)">${nm.days_until===0?'TODAY':'in '+nm.days_until+'d'}</span></div>
      <div class="vs">
        <div class="side"><div class="big-chip" style="background:color-mix(in srgb,var(--club) 22%,var(--bg-2));color:var(--club)">${meInit}</div><div class="sn">${esc(me.team_name)}</div><div class="so">OVR ${(+me.ovr).toFixed(0)} · #${esc(String(me.rank))}</div></div>
        <div class="mid">VS</div>
        <div class="side"><div class="big-chip" style="background:var(--bg-2);color:var(--fg-muted)">${oppInit}</div><div class="sn">${esc(nm.opponent)}</div><div class="so">OVR ${(+nm.opp_ovr).toFixed(0)} · #${esc(String(nm.opp_rank))}</div></div>
      </div>
      <div class="tape"><div style="width:${mePct}%;background:var(--club)"></div><div style="flex:1;background:var(--fg-ghost)"></div></div>
      ${nm.days_until===0?(function(){
        const tt=+(D.header&&D.header.team_talk)||0;
        const favored=(+me.ovr||0)>=(+nm.opp_ovr||0);
        const opts=[[1,'Calm','best when favored'],[2,'Fire-up','best as underdog'],[3,'Focus','always solid']];
        return `<div class="ttRow"><span class="ttLab">Team talk</span>${opts.map(([v,l,h])=>
          `<button type="button" class="ttChip${tt===v?' on':''}${(v===1&&favored)||(v===2&&!favored)?' fit':''}" data-tt="${v}" title="${h}">${l}</button>`).join('')}
        </div>`;})():''}
      <button class="cta ${nm.days_until===0?'live':'soon'}"${nm.days_until===0?'':' disabled'}>${nm.days_until===0?'ENTER MATCHDAY':'Awaiting matchday — in '+nm.days_until+'d'}</button>`;
    // Team talk chips: one-shot pre-match edge, consumed by the next series.
    $("#cHero").querySelectorAll('[data-tt]').forEach(b=>b.addEventListener('click',()=>{
      const cur=+(D.header&&D.header.team_talk)||0;
      const v=(+b.dataset.tt===cur)?0:+b.dataset.tt;   // click again to clear
      post("act:teamtalk:"+v+":dashboard");
    }));
    // Enter Matchday → play the next match and jump to the result screen.
    const cta=$("#cHero .cta");
    if(cta && nm.days_until===0) cta.addEventListener('click',()=>post("advance:match:match"));
  }

  /* ===== form & finance ===== */
  const bt=Array.isArray(D.budget_trend)?D.budget_trend.filter(v=>typeof v==="number"):[];
  const ffb=$("#ffBody");
  const formRows=D.last_5_form||[];
  const f5=formRows.length?formRows.map(f=>{
    // Opponent/score are blank until a team match-log exists; fall back to a
    // meaningful Win/Loss tooltip instead of a bare " ".
    const tip=(f.opponent||f.score)?(f.opponent+' '+f.score).trim():(String(f.result).toUpperCase()==='W'?'Win':'Loss');
    return `<div class="seg ${esc(String(f.result).toLowerCase())}" title="${esc(tip)}">${esc(f.result)}</div>`;
  }).join(""):'<div class="empty" style="padding:2px 0">No recent matches.</div>';
  const W=bt.length, last=W?bt[W-1]:0;
  // Slope-driven trend colour: rising budget reads positive, falling negative, flat neutral.
  const slope=W>=2?last-bt[0]:0;
  const trendVar=W<2?"--blue":(slope>0?"--green":(slope<0?"--red":"--blue"));
  const tc=cssvar(trendVar);
  let sparkHTML;
  if(W===0){
    sparkHTML=`<div class="spark-empty">No budget history.</div>`;
  }else if(W===1){
    // Single point — no line to draw; show a centred marker over the value.
    sparkHTML=`<div class="sparkwrap"><div class="sparkdot" style="left:50%;top:50%;background:${tc};box-shadow:0 0 0 4px color-mix(in srgb,${tc} 22%,transparent)"></div></div>`;
  }else{
    const mn=Math.min(...bt), mx=Math.max(...bt), pad=(mx-mn)*0.15||1;
    const sw=300, sh=54, padX=7;
    const span=(mx-mn)+2*pad;
    const pts=bt.map((v,i)=>{
      const x=padX+(i/(W-1))*(sw-2*padX), y=sh-4-((v-mn+pad)/span)*(sh-8); return[x,y];});
    const path="M"+pts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L ");
    // Area tapers to the baseline at both ends (no full-height rectangle block).
    const area=path+` L ${pts[W-1][0].toFixed(1)} ${sh} L ${pts[0][0].toFixed(1)} ${sh} Z`;
    const lp=pts[W-1];
    const dotLeft=(lp[0]/sw)*100, dotTop=(lp[1]/sh)*100;
    sparkHTML=`<div class="sparkwrap">
      <svg class="spark" viewBox="0 0 ${sw} ${sh}" preserveAspectRatio="none">
        <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="${tc}" stop-opacity=".22"/><stop offset="1" stop-color="${tc}" stop-opacity="0"/></linearGradient></defs>
        <path d="${area}" fill="url(#bg)"/>
        <path class="sline" d="${path}" fill="none" stroke="${tc}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="sparkdot" style="left:${dotLeft.toFixed(2)}%;top:${dotTop.toFixed(2)}%;background:${tc};box-shadow:0 0 0 4px color-mix(in srgb,${tc} 22%,transparent)"></div>
    </div>`;
  }
  ffb.innerHTML=`
    <div><div class="lab">Last 5</div><div class="form5">${f5}</div></div>
    <div><div class="lab">Budget Trend <span class="now">$${esc(String(last))}K</span></div>
      ${sparkHTML}</div>`;

  /* ===== squad ===== */
  const sb=$("#squadBody"); const stars=D.star_players||[];
  $("#sqStat").textContent=stars.length+" · by OVR";
  if(!stars.length) sb.appendChild(el("div","empty","No players on the roster."));
  stars.forEach((p,i)=>{
    const[rl,rc]=ROLE[p.primary_role]||["?","--fg-muted"];
    const row=el("div","pl"+(i===0?" top":""));
    row.innerHTML=`<span class="role" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
      <span class="ph">${esc(p.name)}</span>
      ${p.igl?'<span class="tag">IGL</span>':''}
      <span class="stat"><span class="sv" style="color:${ovrColorRoster(p.ovr)}">${p.ovr}</span><span class="sl">OVR</span></span>
      <span class="stat"><span class="sv" style="color:${p.avg_rating>=1.20?'var(--gold)':'var(--fg)'}">${p.avg_rating.toFixed(2)}</span><span class="sl">RAT</span></span>
      <span class="stat"><span class="sv">${p.kd_ratio.toFixed(2)}</span><span class="sl">K/D</span></span>`;
    if(p.id!=null){
      row.style.cursor="pointer"; row.tabIndex=0; row.setAttribute("role","button");
      const open=()=>openPlayerModal(p.id);
      row.addEventListener("click",open);
      row.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); open(); } });
    }
    sb.appendChild(row);
  });

  /* ===== news ===== */
  const nb=$("#newsBody");
  const newsItems=D.news||[];
  if(!newsItems.length) nb.appendChild(el("div","empty","No recent news."));
  newsItems.forEach(n=>{
    const c=cssvar(NEWS_COLOR[n.category]||"--fg-muted");
    const row=el("div","nw");
    row.innerHTML=`<span class="npill" style="color:var(--fg);background:color-mix(in srgb,${c} 18%,transparent);border:1px solid color-mix(in srgb,${c} 45%,transparent)">${esc(n.category)}</span>
      <span class="nh">${esc(n.headline)}</span>
      <span class="nd">Y${esc(String(n.year))}·D${esc(String(n.day))}</span>`;
    nb.appendChild(row);
  });

  /* ===== motion ===== */
  function animateCountUp(){
    document.querySelectorAll("#view .kval").forEach(e=>{
      const fin=e.dataset.final;
      // Only count up a single CLEAN number (e.g. $620K, 76, #3, +18). Skip
      // compound values like "9-3", "2d", "OPEN" — those display as-is.
      if(!/^[$#+]?\d+(\.\d+)?[KMB%]?$/.test(fin))return;
      const m=fin.match(/\d+(\.\d+)?/);
      if(!m)return; const target=parseFloat(m[0]); const prefix=fin.slice(0,m.index), suffix=fin.slice(m.index+m[0].length);
      const dec=(m[0].split(".")[1]||"").length; let start=null, dur=700;
      function step(ts){ if(!start)start=ts; const t=Math.min(1,(ts-start)/dur); const ev=1-Math.pow(1-t,3);
        e.textContent=prefix+(target*ev).toFixed(dec)+suffix; if(t<1)requestAnimationFrame(step); else e.textContent=fin; }
      requestAnimationFrame(step);
    });
  }
  function run(){
    // entrance stagger
    const seq=["#header","#dayrail","#cObjectives","#cStandings","#cHero","#cSquad","#cForm","#cNews"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"), 60+i*45); }); }
    // day-rail fill + today
    setTimeout(()=>{ const df=$("#dayFill"), td=$("#todayDot"); if(df)df.style.width=(prog*100)+"%"; if(td)td.style.opacity=1; }, reduced?0:120);
    // objective tracks
    setTimeout(()=>document.querySelectorAll("#view .tf").forEach(t=>t.style.width=(parseFloat(t.dataset.pct)*100)+"%"), reduced?0:300);
    // sparkline draw-on
    const sl=document.querySelector("#view .sline");
    if(sl && !reduced){ const len=sl.getTotalLength(); sl.style.strokeDasharray=len; sl.style.strokeDashoffset=len;
      sl.getBoundingClientRect(); sl.style.transition="stroke-dashoffset 800ms ease"; setTimeout(()=>sl.style.strokeDashoffset=0,250); }
    // count up
    if(!reduced) setTimeout(animateCountUp,150);
  }
  run();
}

/* =====================================================================
   ROSTER GOD-MODE  — module-scoped so it survives the full #view rebuild
   that every host state push triggers. `godMode` gates the inline
   attribute/potential steppers; `selectedPlayerId` remembers which player
   the detail panel is showing so the user keeps editing the same player
   across re-renders (host mutates → re-pushes roster state → renderRoster).
   WRITE actions post exact colon-commands; the host clamps 1..99, mutates,
   re-pushes fresh roster state (auto re-render) + a toast. We do NOT
   optimistically update the DOM — the re-render shows the new value + OVR.
   ===================================================================== */
let godMode = false;
let selectedPlayerId = null;
function rosterSetAttr(playerId, attrName, newValue){ post("act:setattr:"+playerId+":"+attrName+":"+newValue+":roster"); }
function rosterSetPot(playerId, newValue){ post("act:setpot:"+playerId+":"+newValue+":roster"); }
// Badge add/remove — names contain spaces; host splits on ':' only, so pass
// the name verbatim (no url-encoding). Host mutates + re-pushes + toasts.
function rosterAddBadge(playerId, badgeName){ post("act:addbadge:"+playerId+":"+badgeName+":roster"); }
function rosterRmBadge(playerId, badgeName){ post("act:rmbadge:"+playerId+":"+badgeName+":roster"); }
// Fire a head staffer from the roster staff strip. role is "coach"|"scout"|
// "analyst"; host removes them + re-pushes roster state + a toast.
function rosterFireStaff(role){ post("act:firestaff:"+role+":roster"); }

/* =====================================================================
   renderRoster(R, club)  — R is the inner `roster` object
   ===================================================================== */
function renderRoster(R, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="roster";

  if(!R || !R.header){
    view.innerHTML='<div class="preempty">No squad loaded — open via the app or inject a save export to populate the roster.</div>';
    return;
  }

  view.innerHTML=ROSTER_SKEL;

  /* ===== header ===== */
  const h=R.header, team=R.team||{};
  $("#clubName").textContent=h.club_name;
  const mono=(h.tag||h.club_name||"V").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  $("#hSize").textContent=(team.size!=null?team.size:(R.players||[]).length)+" players";
  $("#hOvr").textContent=(team.ovr!=null?(+team.ovr).toFixed(1):"—");
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase],["",team.brand]]
    .filter(([,tx])=>tx)
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== KPI strip ===== */
  const kc=$("#kpis");
  (R.kpis||[]).forEach(k=>{
    const t=el("div","kpi bevel-tr");
    t.style.setProperty("--accent",cssvar(TONE[k.tone]||"--amber"));
    t.innerHTML=`<div class="klab">${esc(k.label)}</div><div class="kval">${esc(k.value)}</div>${k.subline?`<div class="ksub">${esc(k.subline)}</div>`:""}<div class="kbar"></div>`;
    kc.appendChild(t);
  });

  /* ===== roster table ===== */
  const players=(R.players||[]).slice();
  const rb=$("#rosterBody");
  const expiringN=players.filter(pp=>pp.contract && +pp.contract.years_left<=1).length;
  $("#rStat").textContent=`${players.length} · click a player`+(expiringN?` · ${expiringN} expiring`:'');

  /* ===== GOD MODE toggle (Roster card header) =====
     Flips the module-scoped `godMode` flag and re-renders the CURRENT detail
     panel (re-runs selectPlayer for the selected index) so steppers appear /
     disappear without losing the selected player. */
  const rHead=$("#cRoster .chead");
  if(rHead){
    const gt=el("button","godtoggle"+(godMode?" on":""),`<span class="gtdot"></span>${godMode?"GOD MODE ON":"God Mode"}`);
    gt.type="button";
    gt.setAttribute("aria-pressed", godMode?"true":"false");
    gt.title="Toggle God Mode — edit attributes & potential";
    gt.addEventListener("click",()=>{
      godMode=!godMode;
      gt.classList.toggle("on", godMode);
      gt.innerHTML=`<span class="gtdot"></span>${godMode?"GOD MODE ON":"God Mode"}`;
      gt.setAttribute("aria-pressed", godMode?"true":"false");
      const cg=$("#clubGodBar"); if(cg) cg.style.display=godMode?"":"none";
      selectPlayer(currentDetailIdx());
    });
    rHead.appendChild(gt);
  }

  /* ===== CLUB editor (god mode) =====
     Rename the club (tag/colors/logo reseed on the host), set the budget in $K,
     set prestige 0-99. Sits under the KPI strip; hidden until god mode is on. */
  {
    const bar=el("div","clubGod");
    bar.id="clubGodBar";
    if(!godMode) bar.style.display="none";
    bar.innerHTML=`<span class="cgLab">Club · God Mode</span>
      <span class="cgField"><label>Name</label><input type="text" maxlength="26" data-cg="name" placeholder="${esc(h.club_name||'Club name')}"></span>
      <span class="cgField"><label>Budget $K</label><input type="number" min="0" max="100000" step="50" data-cg="budget" placeholder="e.g. 2000"></span>
      <span class="cgField"><label>Prestige</label><input type="number" min="0" max="99" step="1" data-cg="prestige" placeholder="0-99"></span>
      <button type="button" class="cgApply" data-cg-apply="1">Apply</button>`;
    const kpisEl=$("#kpis");
    if(kpisEl && kpisEl.parentNode) kpisEl.parentNode.insertBefore(bar, kpisEl.nextSibling);
    const ap=bar.querySelector("[data-cg-apply]");
    if(ap) ap.addEventListener("click",()=>{
      bar.querySelectorAll("[data-cg]").forEach(inp=>{
        const v=(inp.value||"").replace(/:/g,"").trim();
        if(v!=="") post("act:teamset:"+inp.dataset.cg+":"+v+":roster");
      });
    });
  }
  rb.appendChild(el("div","rhead",`<span>ROLE</span><span>PLAYER</span><span>AGE</span><span>OVR</span><span>POT</span><span>RAT</span><span>K/D</span><span>CONTRACT</span>`));
  // Bench/start swap targets: best bench player to bring in, weakest starter to drop.
  const starters=players.filter(p=>p.slot==="starter");
  const bench=players.filter(p=>p.slot==="bench");
  const topBench=bench.length?bench.reduce((a,b)=>b.ovr>a.ovr?b:a):null;
  const weakestStarter=starters.length?starters.reduce((a,b)=>b.ovr<a.ovr?b:a):null;
  let benchShown=false;
  players.forEach((p,i)=>{
    if(p.slot==="bench" && !benchShown){ rb.appendChild(el("div","rsub","Bench")); benchShown=true; }
    const[rl,rc]=ROLE[p.role]||["?","--fg-muted"];
    const badges=`${p.igl?'<span class="rbadge igl">IGL</span>':''}${p.flex?'<span class="rbadge flex">FLEX</span>':''}${p.transfer_requested?'<span class="rbadge out">WANTS OUT</span>':''}`;
    const growth=p.growth>0?`<span class="g">+${p.growth}</span>`:'';
    const yrs=p.contract?p.contract.years_left:0;
    const sal=p.contract?fmtK(p.contract.salary_k):'';
    // Bench (starter→drop topBench in) / Start (bench→swap with weakestStarter) action.
    let actBtn='';
    if(p.slot==="starter" && topBench){ actBtn=`<button type="button" class="benchbtn" data-a="${p.id}" data-b="${topBench.id}">Bench</button>`; }
    else if(p.slot==="bench" && weakestStarter){ actBtn=`<button type="button" class="benchbtn start" data-a="${weakestStarter.id}" data-b="${p.id}">Start</button>`; }
    const row=el("div","rrow"+(i===0?" sel":""));
    row.dataset.idx=i;
    row.innerHTML=`<span class="rrole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
      <span class="rname"><span class="nm">${esc(p.name)}</span>${badges}<button type="button" class="pmOpenBtn" data-pm-open="${esc(String(p.id))}" title="View full profile" aria-label="View ${esc(p.name)} profile">&#10530;</button></span>
      <span class="rcell dim">${p.age}</span>
      <span class="rcell" style="color:${ovrColorRoster(p.ovr)}">${p.ovr}</span>
      <span class="rpot"><span class="dim" style="color:var(--fg-muted)">${p.potential}</span>${growth}</span>
      <span class="rcell" style="color:${p.avg_rating>=1.15?'var(--green)':(p.avg_rating<0.95?'var(--red-text)':'var(--fg)')}">${(+p.avg_rating).toFixed(2)}</span>
      <span class="rcell">${(+p.kd).toFixed(2)}</span>
      <span class="rcontract"${yrs<=1?' style="color:'+(yrs<=0?'var(--red-text)':'var(--amber)')+'" title="Contract expiring — re-sign or lose them to free agency"':''}>${yrs}y · ${sal}</span>
      ${actBtn}`;
    row.addEventListener("click",()=>selectPlayer(i));
    const ab=row.querySelector(".benchbtn");
    if(ab) ab.addEventListener("click",ev=>{ ev.stopPropagation(); post("act:bench:"+ab.dataset.a+":"+ab.dataset.b+":roster"); });
    // Open the Player Detail modal — stopPropagation so it doesn't also fire the
    // row's select handler (existing bench/select behavior is untouched).
    const ob=row.querySelector(".pmOpenBtn");
    if(ob) ob.addEventListener("click",ev=>{ ev.stopPropagation(); openPlayerModal(p.id); });
    rb.appendChild(row);
  });

  /* ===== player detail ===== */
  // Map the remembered selectedPlayerId back to a current index (players is a
  // fresh array each render); fall back to 0 if that player is gone.
  function currentDetailIdx(){
    if(selectedPlayerId!=null){
      const j=players.findIndex(pp=>pp.id===selectedPlayerId);
      if(j>=0) return j;
    }
    return 0;
  }
  function selectPlayer(i){
    const p=players[i]; if(!p) return;
    selectedPlayerId=p.id;   // remember across the full #view rebuild on next state push
    document.querySelectorAll("#view .rrow").forEach(r=>r.classList.toggle("sel", r.dataset.idx==String(i)));
    $("#dStat").textContent=p.slot==="starter"?"Starter":"Bench";
    const[rl,rc]=ROLE[p.role]||["?","--fg-muted"];
    const c=p.contract||{};
    const cr=p.career||{}, so=p.solo||{}, pe=p.personality||{}, ac=p.accolades||{};
    // Attributes in their natural engine (enum) order; names are snake_case so
    // underscores become spaces and CSS capitalize handles the casing.
    // GOD MODE: keep the bar in both modes; when on, wrap the value in − / +
    // steppers that post setattr (value∓1). Read-only mode is byte-identical
    // to before (just the .an / .ab / .av spans).
    const attrHTML=(p.attributes||[]).map(a=>{
      const nm=esc(String(a.name).replace(/_/g,' '));
      const bar=`<span class="ab"><span class="af" style="width:${a.value}%;background:${attrColor(a.value)}"></span></span>`;
      if(godMode){
        const dis=v=>v?' disabled':'';
        const val=`<span class="attredit" data-attr="${esc(a.name)}">`
          +`<button type="button" class="stepbtn" data-d="-1"${dis(a.value<=1)} aria-label="Decrease ${nm}">&minus;</button>`
          +`<span class="av">${a.value}</span>`
          +`<button type="button" class="stepbtn" data-d="1"${dis(a.value>=99)} aria-label="Increase ${nm}">+</button>`
          +`</span>`;
        return `<div class="attr"><span class="an">${nm}</span>${bar}${val}</div>`;
      }
      return `<div class="attr"><span class="an">${nm}</span>${bar}<span class="av">${a.value}</span></div>`;
    }).join("");
    const pool=(p.agent_pool||[]).map(a=>`<span class="achip${a.name===p.signature_agent?' sig':''}">${esc(a.name)}</span>`).join("");
    // ===== GOD-MODE BADGES editor =====
    // Current badges (read player.badges); when god mode is on each chip gets a
    // × remove control + an add-control (select of R.all_badges minus held).
    const playerBadges=(p.badges||[]);
    const allBadges=(R.all_badges||[]);
    let badgesHTML;
    if(godMode){
      const chips=playerBadges.length
        ? playerBadges.map(b=>`<span class="gbchip"><span class="gbname">${esc(b)}</span><button type="button" class="gbx" data-badge-rm="1" data-badge-id="${p.id}" data-badge-name="${esc(b)}" aria-label="Remove ${esc(b)}">&times;</button></span>`).join("")
        : `<span class="gbempty">No badges</span>`;
      const available=allBadges.filter(b=>playerBadges.indexOf(b)<0);
      let addCtl;
      if(available.length){
        addCtl=`<select class="gbsel" data-badge-sel="1" aria-label="Select badge to add"><option value="" disabled selected>+ Add badge…</option>`
          +available.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join("")
          +`</select><button type="button" class="gbadd" data-badge-add="1" data-badge-id="${p.id}" disabled>Add</button>`;
      }else{
        addCtl=`<span class="gbempty">All badges applied</span>`;
      }
      badgesHTML=`<div class="gbwrap">${chips}</div><div class="gbwrap" style="margin-top:8px">${addCtl}</div>`;
    }else{
      badgesHTML=`<div class="gbwrap">${playerBadges.length
        ? playerBadges.map(b=>`<span class="gbchip"><span class="gbname">${esc(b)}</span></span>`).join("")
        : `<span class="gbempty">No badges</span>`}</div>`;
    }
    const persona=[["ambition",pe.ambition],["loyalty",pe.loyalty],["greed",pe.greed],["ego",pe.ego]]
      .map(([n,v])=>`<div class="pbar"><span class="pn">${n}</span><span class="pt"><span class="pf" style="width:${v||0}%"></span></span><span class="pv">${v||0}</span></div>`).join("");
    const traj=p.trajectory||"Established";
    const trajCol=(traj==="Future Star"||traj==="Rising")?"var(--green)":(traj==="Slump"||traj==="Declining")?"var(--red-text)":(traj==="Twilight"?"var(--amber)":"var(--fg-muted)");
    const moodCol=p.mood>=62?"var(--green)":(p.mood<42?"var(--red-text)":"var(--amber)");
    const titles=(ac.titles||[]).slice(0,8);
    const accHTML=(ac.total>0||ac.mvps>0||ac.role_awards>0)
      ? `<div class="trophies"><span><b>${ac.regional}</b> Regional</span><span><b>${ac.masters}</b> Masters</span><span><b>${ac.worlds}</b> Worlds</span>${ac.mvps?`<span><b>${ac.mvps}</b> MVP</span>`:''}</div>${titles.length?`<div class="titlelist">${titles.map(esc).join(' · ')}</div>`:''}`
      : `<div class="empty" style="padding:2px 0">No major honors yet — career ahead of them.</div>`;

    $("#detailBody").innerHTML=`<div class="pd">
      <div class="pdhead">
        <div class="pdid">
          <div class="pdname">${esc(p.name)}</div>
          <div class="pdsub">
            <span class="rrole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
            <span>${esc(p.role)}${p.contract_role&&p.contract_role!==p.role?` · signed ${esc(p.contract_role)}`:''}</span>
            <span class="dot"></span><span>${p.age}y</span>
            <span class="dot"></span><span>${esc(p.country||p.region||'')}</span>
            ${p.igl?'<span class="tchip" style="color:var(--amber);border-color:rgba(212,161,76,.45)">IGL</span>':''}
            ${p.flex?'<span class="tchip" style="color:var(--blue);border-color:rgba(0,212,255,.4)">Flex</span>':''}
          </div>
          <div class="pdsub" style="margin-top:8px">
            <span class="tchip" style="color:${trajCol};border-color:color-mix(in srgb,${trajCol} 45%,transparent)">${esc(traj)}</span>
            <span>Morale</span><span class="pt" style="width:84px;height:6px;background:var(--bg-3);border-radius:3px;overflow:hidden;display:inline-block"><span style="display:block;height:100%;width:${p.mood||0}%;background:${moodCol}"></span></span>
            <span class="num" style="color:${moodCol}">${p.mood||0}</span>
            <span class="dot"></span><span class="achip sig" style="padding:2px 9px">${esc(pe.desire||'')}</span>
          </div>
        </div>
        <div class="pdovr">
          <div class="ovrbox"><div class="v" style="color:${ovrColorRoster(p.ovr)}">${p.ovr}</div><div class="l">OVR</div></div>
          <div class="ovrbox"><div class="v" style="color:var(--fg-muted)">${p.potential}</div>${godMode?`<div class="attredit" data-pot="1"><button type="button" class="stepbtn" data-d="-1"${p.potential<=1?' disabled':''} aria-label="Decrease potential">&minus;</button><button type="button" class="stepbtn" data-d="1"${p.potential>=99?' disabled':''} aria-label="Increase potential">+</button></div>`:''}<div class="l">Potential</div></div>
        </div>
      </div>

      <div>
        <div class="seclab">Career Performance</div>
        <div class="stats">
          <div class="stat"><div class="v">${(+(cr.avg_rating||0)).toFixed(2)}</div><div class="l">Rating</div></div>
          <div class="stat"><div class="v">${(+(cr.kd||0)).toFixed(2)}</div><div class="l">K/D</div></div>
          <div class="stat"><div class="v">${Math.round(cr.adr||0)}</div><div class="l">ADR</div></div>
          <div class="stat"><div class="v">${Math.round(cr.hs_pct||0)}%</div><div class="l">HS%</div></div>
          <div class="stat"><div class="v">${Math.round(cr.kast_pct||0)}%</div><div class="l">KAST</div></div>
          <div class="stat"><div class="v">${Math.round(cr.entry_pct||0)}%</div><div class="l">Entry</div></div>
        </div>
        <div class="season">This season: <b>${p.season_matches||0}</b> matches · rating <b>${(+(p.season_avg_rating||0)).toFixed(2)}</b> · K/D <b>${(+(p.season_kd||0)).toFixed(2)}</b> &nbsp;·&nbsp; career <b>${cr.matches||0}</b> matches · solo MMR <b>${so.mmr||0}</b> (peak ${so.peak_mmr||0})</div>
      </div>

      <div>
        <div class="seclab">Attributes</div>
        <div class="attrs">${attrHTML}</div>
      </div>

      <div>
        <div class="seclab">Agent Pool · ${p.agent_pool_size||(p.agent_pool||[]).length}</div>
        <div class="chips">${pool||'<span class="empty" style="padding:0">No agents assigned.</span>'}</div>
      </div>

      <div>
        <div class="seclab">Badges${godMode?' · God Mode':''}</div>
        ${badgesHTML}
      </div>

      <div>
        <div class="seclab">Personality</div>
        <div class="persona">${persona}</div>
      </div>

      <div>
        <div class="seclab">Contract</div>
        <div class="contract-row">
          <div class="cbox"><div class="v">${c.years_left||0}y</div><div class="l">Years left</div></div>
          <div class="cbox"><div class="v">${fmtK(c.salary_k||0)}</div><div class="l">Salary / yr</div></div>
          <div class="cbox"><div class="v">${c.signing_bonus_k?fmtK(c.signing_bonus_k):'—'}</div><div class="l">Sign bonus</div></div>
          <div class="cbox"><div class="v" style="color:${c.promised_starter?'var(--green)':'var(--fg-muted)'}">${c.promised_starter?'Yes':'No'}</div><div class="l">Starter pledge</div></div>
        </div>
      </div>

      <div>
        <div class="seclab">Honors</div>
        ${accHTML}
      </div>
    </div>`;

    /* ===== GOD MODE: wire the inline steppers (only present when godMode) =====
       Each click computes a clamped ∓1 off this render's value and posts the
       exact bridge command; the host mutates + re-pushes roster state, which
       re-renders the panel (with the new value + recomputed OVR). No optimistic
       DOM update. stopPropagation keeps a stepper click from selecting the row
       (the steppers live in the detail panel, but we guard regardless). */
    if(godMode){
      $("#detailBody").querySelectorAll(".attr .attredit").forEach(wrap=>{
        const attrName=wrap.dataset.attr;
        const cur=(p.attributes||[]).find(a=>a.name===attrName);
        const base=cur?+cur.value:0;
        wrap.querySelectorAll(".stepbtn").forEach(btn=>{
          btn.addEventListener("click",ev=>{
            ev.stopPropagation();
            const nv=Math.max(1,Math.min(99, base + (+btn.dataset.d)));
            if(nv!==base) rosterSetAttr(p.id, attrName, nv);
          });
        });
      });
      const potWrap=$("#detailBody").querySelector(".ovrbox .attredit[data-pot]");
      if(potWrap){
        const basePot=+p.potential||0;
        potWrap.querySelectorAll(".stepbtn").forEach(btn=>{
          btn.addEventListener("click",ev=>{
            ev.stopPropagation();
            const nv=Math.max(1,Math.min(99, basePot + (+btn.dataset.d)));
            if(nv!==basePot) rosterSetPot(p.id, nv);
          });
        });
      }
      // ===== GOD MODE: wire badge remove (×) + add controls =====
      // Same pattern as the steppers: data-* carry id/name, stopPropagation
      // guards row-select. Host mutates + re-pushes + toasts → re-render.
      $("#detailBody").querySelectorAll("[data-badge-rm]").forEach(btn=>{
        btn.addEventListener("click",ev=>{
          ev.stopPropagation();
          rosterRmBadge(btn.dataset.badgeId, btn.dataset.badgeName);
        });
      });
      const badgeSel=$("#detailBody").querySelector("[data-badge-sel]");
      const badgeAdd=$("#detailBody").querySelector("[data-badge-add]");
      if(badgeSel && badgeAdd){
        // Enable Add only once a real badge is chosen.
        badgeSel.addEventListener("change",ev=>{ ev.stopPropagation(); badgeAdd.disabled=!badgeSel.value; });
        badgeSel.addEventListener("click",ev=>ev.stopPropagation());
        badgeAdd.addEventListener("click",ev=>{
          ev.stopPropagation();
          if(badgeSel.value) rosterAddBadge(badgeAdd.dataset.badgeId, badgeSel.value);
        });
      }
    }
  }

  /* ===== staff + chemistry strip ===== */
  const staff=R.staff||{}, strip=$("#strip");
  // roleKey is the host's fire-staff key (coach/scout/analyst); when a staffer
  // is present a subtle danger-accent Fire control (.fireBtn) is added to the
  // card footer, wired below with a two-step inline confirm.
  function staffCard(role,roleKey,s,bars){
    if(!s) return el("div","scard",`<div class="role">${role}</div><div class="empty" style="margin:auto 0">Position vacant.</div>`);
    const barsHTML=bars.map(([n,v])=>`<div class="pbar"><span class="pn" style="width:84px;flex:none">${n}</span><span class="pt"><span class="pf" style="width:${v}%;background:${attrColor(v)}"></span></span><span class="pv">${v}</span></div>`).join("");
    const q=s.quality!=null?`Q ${s.quality}`:(s.reputation!=null?`Rep ${s.reputation}`:"");
    const fire=`<button type="button" class="fireBtn" data-fire-role="${esc(roleKey)}" title="Fire ${esc(s.name)}" aria-label="Fire ${esc(s.name)}">Fire</button>`;
    const card=el("div","scard staffclick",`<div class="role">${role}</div><div class="sn">${esc(s.name)}</div><div class="sp">${esc(s.personality||'')}</div>
      <div class="sbars">${barsHTML}</div>
      <div class="sfoot"><span>${q}${s.report_depth?` · depth ${s.report_depth}`:''}</span><span class="sfoot-right"><span class="sal">${fmtK(s.salary_k||0)}/yr</span>${fire}</span></div>`);
    // Card opens the staff profile modal; the Fire button keeps its own handler.
    if(s.id!=null){
      card.tabIndex=0; card.setAttribute("role","button");
      card.setAttribute("aria-label","View "+String(s.name||"")+" profile");
      card.addEventListener("click",ev=>{ if(ev.target.closest(".fireBtn")) return; openStaffModal(s.id); });
      card.addEventListener("keydown",ev=>{ if((ev.key==="Enter"||ev.key===" ")&&!ev.target.closest(".fireBtn")){ ev.preventDefault(); openStaffModal(s.id); } });
    }
    return card;
  }
