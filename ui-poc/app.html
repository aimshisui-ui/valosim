        : '<span class="sigchip">No signature agents</span>';
      // segmented prep control — each button posts act:prep on click
      const segHTML=PREP_LABELS.map((lab,i)=>
        `<button type="button" class="segbtn${i===lvl?" on":""}" data-lvl="${i}"${
          i===lvl?' aria-pressed="true"':''}>${esc(lab)}</button>`).join("");
      // agent override — Auto (+ Customize) or a Custom 5-slot comp editor (+ Reset)
      const agents=(Array.isArray(m.agents)&&m.agents.length===5)?m.agents.slice():null;
      const isCustom=!!agents;
      const agHTML=isCustom
        ? `<span class="ag-custom-lbl">Custom comp</span><button type="button" class="ag-reset" data-act="auto">Reset to Auto</button>`
        : `<span class="ag-auto">Auto</span><button type="button" class="ag-custom-btn" data-act="custom">Customize</button>`;
      const mapName=String(m.name||"");
      const row=el("div","maprow"+(isCustom?" custom":""));
      row.dataset.map=mapName;
      row.innerHTML=`<div class="mleft">
          <div class="mname">${esc(m.name)}</div>
          <div class="sigrow">${sigHTML}</div>
        </div>
        <div class="mright">
          <div class="segctl">${segHTML}</div>
          <div class="agstat">${agHTML}</div>
        </div>
        ${isCustom?stratCompEditorHTML(mapName, agents, allAgents):''}`;
      row.querySelectorAll(".segbtn").forEach(btn=>{
        btn.addEventListener("click",()=>stratSetPrep(mapName, +btn.dataset.lvl));
      });
      const resetBtn=row.querySelector(".ag-reset");
      if(resetBtn) resetBtn.addEventListener("click",()=>stratAgentAuto(mapName));
      const custBtn=row.querySelector(".ag-custom-btn");
      if(custBtn) custBtn.addEventListener("click",()=>stratAgentSet(mapName, stratSeedComp(sigs, allAgents)));
      if(isCustom){
        const sels=Array.from(row.querySelectorAll(".compSel"));
        sels.forEach(sel=>sel.addEventListener("change",()=>{
          const picks=sels.map(s=>s.value);
          if(new Set(picks).size===5) stratAgentSet(mapName, picks);   // distinct → persist
          else stratAgentSet(mapName, agents);                          // dup race → revert
        }));
      }
      mb.appendChild(row);
    });
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cOpp","#cMaps"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}

/* =====================================================================
   renderCalendar(C, club)  — C is the inner `calendar` object (read-only).
   Season ring (11-phase stepper) + upcoming fixtures list.
   ===================================================================== */
const CAL_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">—</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Calendar</div><div class="val" id="hCalDay">—</div></div>
  </div>

  <div class="calgrid">
    <div class="calring enter" id="calRing"></div>
    <div class="card enter" id="cCalSched" style="flex:1">
      <div class="chead"><span class="t">Upcoming</span><span class="s" id="calSchedStat"></span></div>
      <div class="cbody" id="calSchedBody"></div>
    </div>
  </div>`;

function renderCalendar(C, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="calendar";

  if(!C || !C.header){
    view.innerHTML='<div class="preempty">No calendar loaded — start or load a season to see the schedule and season ring.</div>';
    return;
  }

  view.innerHTML=CAL_SKEL;

  /* ===== header ===== */
  const h=C.header;
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  const dayInYear=(C.day_in_year!=null)?C.day_in_year:h.day_in_year;
  const dayTotal=(C.day_total!=null)?C.day_total:200;
  $("#hCalDay").textContent=`DAY ${esc(String(dayInYear))} / ${esc(String(dayTotal))}`;
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${dayInYear}/${dayTotal}`],["",h.current_phase]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== season ring (11-phase horizontal stepper) ===== */
  const ring=$("#calRing");
  const phases=Array.isArray(C.phases)?C.phases:[];
  // connecting track + a fill line spanning past phases up to the current node
  ring.appendChild(el("div","caltrack"));
  const phaseN=phases.length;
  const dayInPhase=(C.day_in_phase!=null)?C.day_in_phase:0;
  const phaseMatchdays=(C.phase_matchdays!=null && C.phase_matchdays>0)?C.phase_matchdays:0;
  const phasePct=phaseMatchdays?Math.max(0,Math.min(1,dayInPhase/phaseMatchdays)):0;
  if(phaseN>1){
    const curIdx=(C.phase_idx!=null)?C.phase_idx:phases.findIndex(p=>p.is_current);
    // fraction of the track that is "complete" — past phases plus current progress
    const segFrac = curIdx>=0 ? (curIdx + phasePct)/(phaseN-1) : 0;
    const fl=el("div","calfillline");
    // track runs left:34px → right:34px; width = available span * segFrac
    fl.style.width=`calc((100% - 68px) * ${Math.max(0,Math.min(1,segFrac)).toFixed(4)})`;
    ring.appendChild(fl);
  }
  phases.forEach(ph=>{
    const cls = ph.is_current?"current":(ph.is_past?"past":"");
    const node=el("div","calnode"+(cls?" "+cls:""));
    let inner=`<div class="caldot">${ph.is_past?'✓':''}</div><div class="calnm">${esc(ph.name)}</div>`;
    if(ph.is_current){
      inner+=`<div class="calsub">Day ${esc(String(dayInPhase))} of ${esc(String(phaseMatchdays))}</div>
        <div class="calprog"><div class="calpf" style="width:${(phasePct*100).toFixed(1)}%"></div></div>`;
    }
    node.innerHTML=inner;
    ring.appendChild(node);
  });
  if(!phaseN){ ring.appendChild(el("div","empty","No season phases available.")); }

  /* ===== upcoming schedule ===== */
  const schedule=Array.isArray(C.schedule)?C.schedule:[];
  $("#calSchedStat").textContent=schedule.length?`${schedule.length} fixtures`:"";
  const scb=$("#calSchedBody");
  if(!schedule.length){
    scb.appendChild(el("div","empty","No upcoming fixtures — off-week."));
  }else{
    const list=el("div","calsched");
    schedule.forEach(s=>{
      const row=el("div","calrow"+(s.is_user?" user":""));
      const when=s.days_until===0?"Today":`in ${esc(String(s.days_until))}d`;
      const dot=s.is_user?'<span class="caludot"></span>':'<span class="caludot off"></span>';
      const aChip=s.a_tag?`<span class="calchip">${esc(s.a_tag)}</span>`:'';
      const bChip=s.b_tag?`<span class="calchip">${esc(s.b_tag)}</span>`:'';
      const label=s.label?`<span class="callabel">${esc(s.label)}</span>`:'';
      row.innerHTML=`${dot}<span class="calwhen${s.days_until===0?" now":""}">${when}</span>
        <span class="calmid">${aChip}<span class="calvs">${esc(s.a)} vs ${esc(s.b)}</span>${bChip}${label}</span>`;
      list.appendChild(row);
    });
    scb.appendChild(list);
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#calRing","#cCalSched"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}

/* =====================================================================
   SCOUTING screen — renderScouting(S, club).
   S is the FULL data object the host pushes for screen:"scouting" (carries
   club_color + a `scouting` object). Centerpiece is the KNOWLEDGE MAP: region
   coverage bars + a country heat-grid (flag chips tinted/opacity-scaled by the
   scout's coverage of that country — home region hot, abroad cold). Plus the
   head-scout card, active 1–3 week assignments, and completed reports. Rows
   open the player modal (post nav:playermodal:<id>). All `sk`-prefixed classes.
   ===================================================================== */
// coverage 0–100 → color-graded (low=muted/red, mid=amber, high=green). Reuses
// the shared lerpColor with the same stops as attrColor's high band so the map
// reads consistently with the rest of the app.
const skCovColor=v=>{const t=Math.max(0,Math.min(1,(+v||0)/100));
  return t<0.5?lerpColor("#5A6172","#D4A14C",t/0.5):lerpColor("#D4A14C","#3FD17A",(t-0.5)/0.5);};
// coverage 0–100 → heat-tint opacity for a country chip (unknown≈faint, known≈bold).
const skCovOpacity=v=>{const t=Math.max(0,Math.min(1,(+v||0)/100));return (0.06+t*0.42).toFixed(3);};
// accuracy 0–100 → label + color for a completed-report chip.
// Thresholds MATCH the exporter's confidence tiers (DashboardExport 80/55/30)
// so the list chip never disagrees with the opened report.
function skAccInfo(a){
  const v=Math.max(0,Math.min(100,+a||0));
  const c=skCovColor(v);
  const lab=v>=80?"Thorough":v>=55?"Solid":v>=30?"Partial":"Vague";
  return {v,c,lab};
}
// small role chip (matches the tinted role look used across the app).
function skRoleChip(role){
  const[rl,rc]=ROLE[role]||["?","--fg-muted"];
  return `<span class="skRole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>`;
}
function skFlag(iso){ return `<span class="skFlag">${esc(String(iso||"").toUpperCase())||"—"}</span>`; }

    const home=(s.region||s.country_iso)
      ? `<span class="skHome">${s.country_iso?skFlag(s.country_iso):''}${s.region?'<span>'+esc(s.region)+'</span>':''}</span>`
      : '';
    scoutBody.innerHTML=`<div class="skScout">
      <div class="skScoutTop">
        <div class="skScoutCrest">${esc(smono)}</div>
        <div class="skScoutId">
          <div class="skScoutName">${esc(s.name||'Head Scout')}</div>
          <div class="skScoutSub">
            ${s.personality?`<span class="skPers">${esc(s.personality)}</span>`:''}
            ${home}
          </div>
        </div>
        <div class="skSalary"><div class="v">${s.salary_k!=null?esc(fmtK(s.salary_k)):'—'}</div><div class="l">Salary</div></div>
      </div>
      <div class="skAttrs">${attrHTML}</div>
    </div>`;
  }

  /* ===== knowledge map ===== */
  const mapBody=$("#skMapBody");
  const cov=(hasScout && sc.coverage) ? sc.coverage : null;
  if(!cov){
    $("#skMapStat").textContent="";
    mapBody.innerHTML='<div class="skNoscout">Hire a head scout to start mapping the world’s talent.</div>';
  }else{
    const regions=Array.isArray(cov.regions)?cov.regions:[];
    const countries=Array.isArray(cov.countries)?cov.countries:[];
    $("#skMapStat").textContent=`${esc(String(countries.length))} countries`;
    // region bars
    const regHTML=regions.map(r=>{
      const v=Math.max(0,Math.min(100,+r.coverage||0));
      const c=skCovColor(v);
      return `<div class="skRegion">
        <span class="rn">${esc(r.region||'—')}</span>
        <span class="skBar"><span class="skFill" style="width:${v}%;background:${c}"></span></span>
        <span class="rv" style="color:${c}">${Math.round(v)}%</span>
      </div>`;
    }).join('') || '<div class="empty">No regional coverage yet.</div>';
    // country heat-grid, grouped by region (region order follows the region bars).
    const order=regions.map(r=>r.region);
    const byRegion={};
    countries.forEach(c=>{ const k=c.region||'Other'; (byRegion[k]||(byRegion[k]=[])).push(c); });
    // any region present on countries but not in the region bars → appended after.
    Object.keys(byRegion).forEach(k=>{ if(order.indexOf(k)<0) order.push(k); });
    const gridHTML=order.filter(k=>byRegion[k]&&byRegion[k].length).map(k=>{
      const list=byRegion[k].slice().sort((a,b)=>(+b.coverage||0)-(+a.coverage||0));
      const chips=list.map(c=>{
        const v=Math.max(0,Math.min(100,+c.coverage||0));
        const tint=skCovColor(v);
        const title=`${esc(c.name||c.iso||'')} — ${Math.round(v)}% known`;
        return `<span class="skCty" style="--cch:${tint};--cop:${skCovOpacity(v)}" title="${title}">
          <span class="cflag">${esc(String(c.iso||'').toUpperCase())||'?'}</span>
          <span class="cpct">${Math.round(v)}</span>
        </span>`;
      }).join('');
      return `<div class="skRegblock">
        <div class="rbhead"><span class="rbname">${esc(k)}</span><span class="rbcount">${list.length}</span></div>
        <div class="skGrid">${chips}</div>
      </div>`;
    }).join('');
    mapBody.innerHTML=`<div class="skMap">
      <div>
        <div class="skMaplab">Regional Coverage</div>
        <div class="skRegions">${regHTML}</div>
      </div>
      <div>
        <div class="skMaplab">Country Knowledge</div>
        <div class="skGridwrap">${gridHTML||'<div class="empty">No country data.</div>'}</div>
        <div class="skLegend"><span class="ll">Unknown</span><span class="skLegbar"></span><span class="ll">Known</span></div>
      </div>
    </div>`;
  }

  /* ===== active assignments ===== */
  const assignBody=$("#skAssignBody");
  $("#skAssignStat").textContent=assigns.length?`${esc(String(assigns.length))} active`:"";
  if(!assigns.length){
    assignBody.innerHTML='<div class="empty">No active assignments — commission a scout report from any player’s Scout tab.</div>';
  }else{
    const wrap=el("div","skAssigns");
    assigns.forEach(a=>{
      const pct=Math.max(0,Math.min(100,+a.pct||0));
      const covv=Math.max(0,Math.min(100,+a.coverage||0));
      const card=el("div","skAssign");
      card.dataset.pm=String(a.player_id);
      card.setAttribute("role","button");
      card.setAttribute("tabindex","0");
      card.setAttribute("aria-label",`Open ${esc(a.name)} profile`);
      card.innerHTML=`<div class="skAtop">
          ${skFlag(a.country_iso)}${skRoleChip(a.role)}
          <span class="skName">${esc(a.name||'—')}</span>
          <span class="skTeam">${a.team?esc(a.team):'Free Agent'}</span>
        </div>
        <div class="skAprog">
          <span class="skBar"><span class="skFill" style="width:${pct}%;background:var(--club)"></span></span>
          <span class="skDays">${esc(String(a.days_remaining!=null?a.days_remaining:'—'))}d left of ${esc(String(a.total_days!=null?a.total_days:'—'))}d</span>
        </div>
        <div class="skAmeta">
          <div class="m"><span class="k">Progress</span><span class="v">${Math.round(pct)}%</span></div>
          <div class="m"><span class="k">Invested</span><span class="v">${a.money_k!=null?esc(fmtK(a.money_k)):'$0K'}</span></div>
          <div class="m"><span class="k">Coverage</span><span class="v" style="color:${skCovColor(covv)}">${Math.round(covv)}%</span></div>
        </div>`;
      card.addEventListener("click",()=>openPlayerModal(a.player_id,'scout'));
      card.addEventListener("keydown",ev=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); openPlayerModal(a.player_id,'scout'); } });
      wrap.appendChild(card);
    });
    assignBody.appendChild(wrap);
  }

  /* ===== completed reports ===== */
  const doneBody=$("#skDoneBody");
  $("#skDoneStat").textContent=completed.length?`${esc(String(completed.length))} scouted`:"";
  if(!completed.length){
    doneBody.innerHTML='<div class="empty">No completed reports yet.</div>';
  }else{
    const wrap=el("div","skDone");
    completed.forEach(c=>{
      const acc=skAccInfo(c.accuracy);
      const row=el("div","skDonerow");
      row.dataset.pm=String(c.player_id);
      row.setAttribute("role","button");
      row.setAttribute("tabindex","0");
      row.setAttribute("aria-label",`Open ${esc(c.name)} scout report`);
      row.innerHTML=`${skFlag(c.country_iso)}
        <span class="dn">${esc(c.name||'—')}${c.team?'<span class="dt">'+esc(c.team)+'</span>':''}</span>
        ${skRoleChip(c.role)}
        <span class="skAcc" style="color:${acc.c};border-color:color-mix(in srgb,${acc.c} 55%,transparent);background:color-mix(in srgb,${acc.c} 12%,transparent)">${acc.lab} · ${acc.v}%</span>`;
      row.addEventListener("click",()=>openPlayerModal(c.player_id,'scout'));
      row.addEventListener("keydown",ev=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); openPlayerModal(c.player_id,'scout'); } });
      wrap.appendChild(row);
    });
    doneBody.appendChild(wrap);
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cSkScout","#cSkMap","#cSkAssign","#cSkDone"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}

/* =====================================================================
   renderNewgame(N, club) — the New-Career wizard. N is msg.data for screen
   "newgame": { newgame:{ regions[], tiers[{idx,name,blurb}], diff_min/max/default } }.
   Pure form (no live preview): pick name/region/colour/tier/difficulty, then
   post act:newgame:<name>:<region>:<tierIdx>:<diffx100>:<colorHex>:newgame. On
   success the host boots the fresh world and pushes dashboard (replacing this).
   ===================================================================== */
const NG_COLORS=["FF4655","5A6CFF","3FD17A","D4A14C","B45CFF","00C2D4","FF8A3D","E5486B"];
function renderNewgame(N, club){
  const view=$("#view"); view.className="newgame";

  document.documentElement.style.setProperty("--club", "#"+defColor);

  const regionBtns=regions.map((r,i)=>`<button type="button" class="ngSeg${i===0?' on':''}" data-ng-region="${esc(r)}">${esc(r)}</button>`).join('');
  const colorSw=NG_COLORS.map((c,i)=>`<button type="button" class="ngSw${i===0?' on':''}" data-ng-color="${esc(c)}" style="--sw:#${esc(c)}" aria-label="Club colour ${esc(c)}"></button>`).join('');
  const defTier = tiers.length ? (tiers.some(t=>+t.idx===2)?2:+tiers[0].idx) : 2;
  const tierCards=tiers.length
    ? tiers.map(t=>`<button type="button" class="ngTier${+t.idx===defTier?' on':''}" data-ng-tier="${esc(String(t.idx))}">
        <span class="ngTierName">${esc(t.name)}</span>
        <span class="ngTierBlurb">${esc(t.blurb)}</span>
      </button>`).join('')
    : '<div class="ngTierBlurb">No org tiers available.</div>';

  view.innerHTML=`<div class="ngWrap">
    <div class="ngCard enter" id="ngCard">
      <div class="ngHead">
        <div class="ngCrest" id="ngCrest" style="background:#${defColor}">M</div>
        <div>
          <div class="ngTitle">Start a New Career</div>
          <div class="ngSub">Found your org, pick your region and ambition, then take it from the bottom to the world stage.</div>
        </div>
      </div>
      <div class="ngGrid">
        <div class="ngField ngFull">
          <label class="ngLab" for="ngName">Club name</label>
          <input type="text" id="ngName" class="ngInput" maxlength="28" placeholder="e.g. Mirage Esports" value="Mirage">
        </div>
        <div class="ngField">
          <span class="ngLab">Region</span>
          <div class="ngSegRow" data-ng-regions>${regionBtns}</div>
        </div>
        <div class="ngField">
          <span class="ngLab">Club colour</span>
          <div class="ngSwRow" data-ng-colors>${colorSw}</div>
        </div>
        <div class="ngField ngFull">
          <span class="ngLab">Org tier</span>
          <div class="ngTiers" data-ng-tiers>${tierCards}</div>
        </div>
        <div class="ngField ngFull">
          <div class="ngLabrow"><span class="ngLab">Difficulty</span><span class="ngDiffval" id="ngDiffVal">Standard</span></div>
          <div class="ngSlideline">
            <span class="ngDiffend">Easier</span>
            <input type="range" id="ngDiff" class="ngSlider" min="${Math.round(dMin*100)}" max="${Math.round(dMax*100)}" step="5" value="${Math.round(dDef*100)}" aria-label="Difficulty">
            <span class="ngDiffend">Harder</span>
          </div>
        </div>
      </div>
      <div class="ngFoot">
        <button type="button" class="ngStart" id="ngStart">Start Career</button>
        <div class="ngNote">This replaces your current session with a fresh world.</div>
      </div>
    </div>
  </div>`;

  /* ---- wiring ---- */
  const nameInp=$("#ngName"), diffInp=$("#ngDiff"), diffVal=$("#ngDiffVal"), crest=$("#ngCrest");
  const pick=(sel,btn)=>view.querySelectorAll(sel).forEach(o=>o.classList.toggle('on', o===btn));
  view.querySelectorAll('[data-ng-region]').forEach(b=>b.addEventListener('click',()=>pick('[data-ng-region]',b)));
  view.querySelectorAll('[data-ng-tier]').forEach(b=>b.addEventListener('click',()=>pick('[data-ng-tier]',b)));
  view.querySelectorAll('[data-ng-color]').forEach(b=>b.addEventListener('click',()=>{
    pick('[data-ng-color]',b);
    const hex="#"+b.dataset.ngColor;
    document.documentElement.style.setProperty("--club", hex);
    if(crest) crest.style.background=hex;
  }));
  const updCrest=()=>{ if(crest){ const c=String((nameInp&&nameInp.value)||'M').replace(/[^A-Za-z]/g,'').slice(0,1).toUpperCase()||'M'; crest.textContent=c; } };
  if(nameInp){ nameInp.addEventListener('input',updCrest); updCrest(); }
  const diffLabel=v=>{ const d=v/100; if(d<0.85) return "Underdog-friendly"; if(d<0.98) return "Relaxed"; if(d<=1.02) return "Standard"; if(d<=1.15) return "Competitive"; return "Brutal"; };

  const startBtn=$("#ngStart");
  if(startBtn) startBtn.addEventListener('click',()=>{
    // team names are colon-free in the engine; strip any ':' the user typed so
    // the colon-delimited bridge command parses to the expected 8 tokens.
    let name=((nameInp&&nameInp.value)||"").replace(/:/g,' ').trim().slice(0,28);

    const tEl=view.querySelector('[data-ng-tier].on');   const tier=tEl?tEl.dataset.ngTier:String(defTier);
    const cEl=view.querySelector('[data-ng-color].on');  const color=cEl?cEl.dataset.ngColor:defColor;

  const card=$("#ngCard");
  if(card){ if(reduced) card.classList.add("in"); else setTimeout(()=>card.classList.add("in"),40); }
}

/* =====================================================================
   renderRecruitment(R, club) — the consolidated RECRUITMENT hub. R is msg.data
   for screen "recruitment": { recruitment:{ header, regions[], players[], counts } }.
   A filterable / sortable / infinite-scroll player-search table with Search /
   Free Agents / Shortlist sub-tabs. Rows open the player modal; the star/eye
   toggle favorite/watch (act:favorite / act:watch, re-push). All client-side
   filter+sort+paging over the exported pool. `rc`-prefixed classes.
   ===================================================================== */
let rcState = null;    // {tab,q,roles:Set,region,ageMin,ageMax,ovrMin,potMin,avail,sortKey,sortDir,shown}
let rcPool  = [];      // the exported players array (kept for re-filter on scroll)
let rcBriefs = [];     // active FM-style scouting briefs
let rcScout  = null;   // head-scout info {name,read_depth}
let rcStaffData = null; // staff market {current,coaches[],scouts[],analysts[]}
let rcStaffRole = 'coaches';   // active staff sub-toggle
const RC_STAFF_ROLES=[['coaches','Coaches','coach'],['scouts','Scouts','scout'],['analysts','Analysts','analyst']];
const RC_PAGE = 60;    // rows rendered per infinite-scroll page
const RC_COLS = [
  {k:'name', lab:'Player', num:false},
  {k:'role', lab:'Role',   num:false},
  {k:'age',  lab:'Age',    num:true},
  {k:'ovr',  lab:'OVR',    num:true},
  {k:'pot',  lab:'POT',    num:true},
  {k:'value',lab:'Value',  num:true},
  {k:'wage', lab:'Wage',   num:true},
  {k:'yrs',  lab:'Yrs',    num:true},
  {k:'arch', lab:'Personality', num:false},
  {k:'know', lab:'Knowledge',   num:false},
];
function rcSortVal(p, key){
  switch(key){
    case 'name': return String(p.name||'').toLowerCase();
    case 'role': return String(p.role||'');
    case 'age':  return +p.age||0;
    case 'ovr':  return +p.ovr||0;
    case 'pot':  return p.pot_known?(+p.pot||0):(+p.pot_hi||0);
    case 'value':return +p.value_k||0;
    case 'wage': return +p.wage_k||0;
    case 'yrs':  return +p.years_left||0;
    case 'arch': return String(p.archetype||'');
    case 'know': return ({Complete:3,Extensive:2,Basic:1})[p.knowledge]||0;
    default: return +p.ovr||0;
  }
}
/* Filtered-view cache: the scroll handler reads rcFiltered().length on every
   scroll tick — without this, the whole world pool re-filters + re-sorts per
   pixel of scrolling on the game's biggest table. */
let rcFilterCache=null;
function rcFiltered(){
  if(rcFilterCache) return rcFilterCache;
  const st=rcState, q=(st.q||'').toLowerCase();
  let rows=rcPool.filter(p=>{
    if(st.tab==='fa' && !p.is_fa) return false;
    if(st.tab==='shortlist' && !(p.favorited||p.watched)) return false;
    if(q && !(String(p.name).toLowerCase().includes(q) || String(p.team).toLowerCase().includes(q))) return false;
    if(st.roles.size && !st.roles.has(p.role)) return false;
    if(st.region!=='All' && p.region!==st.region) return false;
    if((+p.age||0)<st.ageMin || (+p.age||0)>st.ageMax) return false;
    if((+p.ovr||0)<st.ovrMin) return false;
    const potv=p.pot_known?(+p.pot||0):(+p.pot_hi||0);
    if(potv<st.potMin) return false;
    if(st.avail==='fa' && !p.is_fa) return false;
    if(st.avail==='wants' && !p.wants_out) return false;
    return true;
  });
  const dir=st.sortDir==='asc'?1:-1;
  rows.sort((a,b)=>{ const av=rcSortVal(a,st.sortKey), bv=rcSortVal(b,st.sortKey);
    if(typeof av==='string') return dir*av.localeCompare(bv);
    return dir*((av)-(bv)); });
  rcFilterCache=rows;
  return rows;
}
function rcRowHTML(p){
  const[rl,rc]=ROLE[p.role]||["?","--fg-muted"];
  const roleChip=`<span class="rcRole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>`;
  const flag=p.country_iso?`<span class="rcFlag">${esc(String(p.country_iso).toUpperCase())}</span>`:'';
  const teamTxt=p.on_user_team?'<span class="rcYours">Your Club</span>':(p.is_fa?'<span class="rcFa">Free Agent</span>':esc(p.team));
  const pot=p.pot_known?`<span class="rcPot">${esc(String(p.pot))}</span>`:`<span class="rcPot band">${esc(String(p.pot_lo))}–${esc(String(p.pot_hi))}</span>`;
  const val=p.is_fa?'<span class="rcDim">—</span>':esc(fmtK(p.value_k));
  const igl=p.igl?'<span class="rcTag igl">IGL</span>':'';
  const wants=p.wants_out?'<span class="rcTag wants">Wants out</span>':'';
  const know=`<span class="rcKnow k-${esc(String(p.knowledge||'Basic').toLowerCase())}">${esc(p.knowledge||'Basic')}</span>`;
  const favCls=p.favorited?' on':'', watchCls=p.watched?' on':'';
  return `<div class="rcRow" data-pm="${esc(String(p.id))}" role="button" tabindex="0">
    <span class="rcCell rcName">${roleChip}<span class="rcNm"><span class="nm">${esc(p.name)}${igl}</span><span class="tm">${teamTxt}${flag?' · '+flag:''}${wants}</span></span></span>
    <span class="rcCell">${esc(p.role)}</span>
    <span class="rcCell num">${esc(String(p.age))}</span>
    <span class="rcCell num"><b style="color:${ovrColorRoster(+p.ovr)}">${esc(String(p.ovr))}</b></span>
    <span class="rcCell num">${pot}</span>
    <span class="rcCell num">${val}</span>
    <span class="rcCell num">${esc(fmtK(p.wage_k))}</span>
    <span class="rcCell num">${esc(String(p.years_left))}y</span>
    <span class="rcCell rcArch">${esc(p.archetype||'')}</span>
    <span class="rcCell">${know}</span>
    <span class="rcCell rcActs">
      <button type="button" class="rcAct star${favCls}" data-rc-fav="${esc(String(p.id))}" title="Favorite">★</button>
      <button type="button" class="rcAct eye${watchCls}" data-rc-watch="${esc(String(p.id))}" title="Watchlist">◉</button>
    </span>
  </div>`;
}
function rcRenderHead(){
  const host=$("#rcHeadRow"); if(!host) return;
  host.innerHTML=RC_COLS.map(c=>{
    const arrow=rcState.sortKey===c.k?(rcState.sortDir==='asc'?' ▲':' ▼'):'';
    return `<span class="rcHcell${c.num?' num':''}${rcState.sortKey===c.k?' sorted':''}" data-rc-sort="${c.k}">${esc(c.lab)}${arrow}</span>`;
  }).join('')+'<span class="rcHcell rcActs"></span>';
  host.querySelectorAll('[data-rc-sort]').forEach(hc=>hc.addEventListener('click',()=>{
    const k=hc.dataset.rcSort;
    if(rcState.sortKey===k) rcState.sortDir=rcState.sortDir==='asc'?'desc':'asc';
    else { rcState.sortKey=k; rcState.sortDir=(k==='name'||k==='role'||k==='arch')?'asc':'desc'; }
    rcRenderHead(); rcRenderBody(true);
  }));
}
function rcRenderBody(reset){
  const host=$("#rcBody"); if(!host) return;
  if(reset) rcFilterCache=null;   // filters/sort changed → rebuild the view
  const rows=rcFiltered();
  $("#rcCount").textContent = rows.length ? `${rows.length} players` : "no matches";
  if(reset) rcState.shown = RC_PAGE;
  const slice=rows.slice(0, rcState.shown);
  host.innerHTML = slice.length
    ? slice.map(rcRowHTML).join('')
    : `<div class="rcEmpty">No players match these filters. Loosen them to see more.</div>`;
  // wire rows + action buttons
  host.querySelectorAll('.rcRow').forEach(r=>{
    r.addEventListener('click',ev=>{ if(ev.target.closest('.rcAct')) return; openPlayerModal(+r.dataset.pm); });
    r.addEventListener('keydown',e=>{ if(e.key==='Enter'){ openPlayerModal(+r.dataset.pm); } });
  });
  host.querySelectorAll('[data-rc-fav]').forEach(b=>b.addEventListener('click',ev=>{
    ev.stopPropagation(); const on=!b.classList.contains('on');
    post("act:"+(on?'favorite':'unfavorite')+":"+b.dataset.rcFav+":recruitment"); }));
  host.querySelectorAll('[data-rc-watch]').forEach(b=>b.addEventListener('click',ev=>{
    ev.stopPropagation(); const on=!b.classList.contains('on');
    post("act:"+(on?'watch':'unwatch')+":"+b.dataset.rcWatch+":recruitment"); }));
}
/* Toggle between the player table (search/fa/shortlist) and the Assignments view. */
function rcApplyTab(){
  const t=rcState.tab, isA=t==='assignments', isS=t==='staff', isTable=!isA&&!isS;
  const filters=$("#rcFilters"), card=document.querySelector('.rcCard'), assign=$("#rcAssign"), staff=$("#rcStaff");
  if(filters) filters.style.display=isTable?'flex':'none';
  if(card) card.style.display=isTable?'flex':'none';
  if(assign) assign.style.display=isA?'block':'none';
  if(staff) staff.style.display=isS?'block':'none';
  if(isA) rcRenderAssignments(); else if(isS) rcRenderStaff(); else rcRenderBody(true);
}
/* FM-style scouting BRIEFS: active-brief cards (progress bar = revealed/matches)
   + a create form. Create → act:addbrief; remove → act:clearbrief (both re-push). */
function rcRenderAssignments(){
  const host=$("#rcAssign"); if(!host) return;
  const sName=(rcScout&&rcScout.name)||'';
  const info=sName
    ? `Head scout <b>${esc(sName)}</b> (read depth ${esc(String(rcScout.read_depth||0))}) works your briefs each day — assess a talent profile and matching players get revealed over time, gated by your scout's regional knowledge.`
    : `Hire a head scout (Transfers → staff) to work briefs faster. Briefs still reveal a couple of players per day.`;
  const briefs=rcBriefs.length
    ? rcBriefs.map(b=>{
        const pct=(+b.matches>0)?Math.min(100,Math.round((+b.revealed)/(+b.matches)*100)):0;
        return `<div class="rcBrief">
          <div class="rcBrInfo"><div class="rcBrName">${esc(b.name)}</div>
            <div class="rcBrFilt">${esc(b.role)} · age ${esc(String(b.age_min))}–${esc(String(b.age_max))} · POT ${esc(String(b.min_pot))}+ · ${esc(b.region)}</div></div>
          <div class="rcBrProg">
            <div class="rcBrStat"><b>${esc(String(b.revealed))}</b> / ${esc(String(b.matches))} scouted · ${esc(String(b.days))}d</div>
            <div class="rcBrBar"><i style="width:${pct}%"></i></div></div>
          <button type="button" class="rcBrDel" data-br-del="${esc(String(b.idx))}">Remove</button>
        </div>`; }).join('')
    : `<div class="rcEmpty">No active scouting briefs — create one below to point your scout at a talent profile.</div>`;
  const roleOpts=[['-1','Any role'],['0','Duelist'],['1','Initiator'],['2','Controller'],['3','Sentinel']];
  const regionOpts=[['','Any region'],['Americas','Americas'],['EMEA','EMEA'],['Pacific','Pacific']];
  host.innerHTML=`
    <div class="rcAssignNote">${info}</div>
    <div class="rcBriefs">${briefs}</div>
    <div class="card enter in rcBriefForm">
      <div class="chead"><span class="t">New Scouting Brief</span><span class="s">assign your head scout</span></div>
      <div class="cbody">
        <div class="rcBfGrid">
          <label class="rcBf"><span>Name</span><input type="text" id="rcBfName" maxlength="28" placeholder="e.g. U23 Duelist gems"></label>
          <label class="rcBf"><span>Role</span><select id="rcBfRole">${roleOpts.map(([v,l])=>`<option value="${v}">${esc(l)}</option>`).join('')}</select></label>
          <label class="rcBf"><span>Region</span><select id="rcBfRegion">${regionOpts.map(([v,l])=>`<option value="${esc(v)}">${esc(l)}</option>`).join('')}</select></label>
          <label class="rcBf"><span>Age range</span><span class="rcBfAge"><input type="number" id="rcBfAgeMin" min="15" max="40" value="15"><i>–</i><input type="number" id="rcBfAgeMax" min="15" max="40" value="23"></span></label>
          <label class="rcBf"><span>Min potential</span><input type="number" id="rcBfPot" min="0" max="99" value="78"></label>
        </div>
        <button type="button" class="rcBfCreate" id="rcBfCreate">Assign Scout</button>
      </div>
    </div>`;
  host.querySelectorAll('[data-br-del]').forEach(b=>b.addEventListener('click',()=>post("act:clearbrief:"+b.dataset.brDel+":recruitment")));
  const cr=$("#rcBfCreate");
  if(cr) cr.addEventListener('click',()=>{
    const nm=(($("#rcBfName").value||'').replace(/:/g,' ').trim()||'Scouting focus').slice(0,28);
    const role=$("#rcBfRole").value, region=$("#rcBfRegion").value;
    const aMin=$("#rcBfAgeMin").value||15, aMax=$("#rcBfAgeMax").value||40, pot=$("#rcBfPot").value||0;
    post("act:addbrief:"+nm+":"+role+":"+aMin+":"+aMax+":"+pot+":"+region+":recruitment");
  });
}
/* STAFF market inside the hub — Coaches / Scouts / Analysts toggle + a table
   (name, personality, reputation, asking wage) + Hire. hire → act:hirestaff. */
function rcRenderStaff(){
  const host=$("#rcStaff"); if(!host) return;
  const sd=rcStaffData||{}, cur=sd.current||{};
  const toggle=RC_STAFF_ROLES.map(([k,lab])=>`<button type="button" class="rcStRole${rcStaffRole===k?' on':''}" data-st-role="${k}">${esc(lab)}</button>`).join('');
  const pool=Array.isArray(sd[rcStaffRole])?sd[rcStaffRole]:[];
  const roleKey=(RC_STAFF_ROLES.find(r=>r[0]===rcStaffRole)||['','','coach'])[2];
  const c=cur[roleKey];
  const curHTML=c
    ? `<div class="rcStCur">Current ${esc(roleKey)}: <b>${esc(c.name)}</b> · ${esc(c.personality)} · Rep ${esc(String(c.reputation))} · ${esc(fmtK(c.salary_k))}/yr</div>`
    : `<div class="rcStCur">No ${esc(roleKey)} on staff — hiring one is an upgrade.</div>`;
  const rows=pool.length
    ? pool.slice().sort((a,b)=>(+b.reputation||0)-(+a.reputation||0)).map(s=>`<div class="rcStRow" data-st-open="${esc(String(s.id))}" role="button" tabindex="0" title="View profile">
        <span class="rcStName">${esc(s.name)}</span>
        <span class="rcStPers">${esc(s.personality)}</span>
        <span class="rcStRep num">${esc(String(s.reputation))}</span>
        <span class="rcStAsk num">${esc(fmtK(s.ask_k))}<span class="rcStPer">/yr</span></span>
        <span class="rcStActc"><button type="button" class="rcStHire" data-st-hire="${esc(String(s.id))}">Hire</button></span>
      </div>`).join('')
    : `<div class="rcEmpty">No ${esc(rcStaffRole)} on the market right now.</div>`;
  host.innerHTML=`
    <div class="rcStTabs">${toggle}</div>
    ${curHTML}
    <div class="card enter in rcStCard">
      <div class="rcStHead"><span>Name</span><span>Personality</span><span class="num">Rep</span><span class="num">Asking</span><span></span></div>
      <div class="rcStScroll"><div class="rcStBody">${rows}</div></div>
    </div>`;
  host.querySelectorAll('[data-st-role]').forEach(b=>b.addEventListener('click',()=>{ rcStaffRole=b.dataset.stRole; rcRenderStaff(); }));
  host.querySelectorAll('[data-st-hire]').forEach(b=>b.addEventListener('click',ev=>{ ev.stopPropagation(); post("act:hirestaff:"+roleKey+":"+b.dataset.stHire+":recruitment"); }));
  host.querySelectorAll('[data-st-open]').forEach(r=>{
    r.addEventListener('click',ev=>{ if(ev.target.closest('.rcStHire')) return; openStaffModal(+r.dataset.stOpen); });
    r.addEventListener('keydown',ev=>{ if(ev.key==="Enter"&&!ev.target.closest('.rcStHire')){ ev.preventDefault(); openStaffModal(+r.dataset.stOpen); } });
  });
}
const RECRUIT_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">Recruitment</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock dual"><div><div class="lab">Budget</div><div class="val" id="rcBudget">—</div></div><div><div class="lab">Wage Room</div><div class="val" id="rcWage">—</div></div></div>

function renderRecruitment(R, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view"); view.className="recruitment";
  const rec=(R&&R.recruitment)||null;
  if(!rec){ view.innerHTML='<div class="preempty">No recruitment data — start a career to scout the market.</div>'; return; }
  const h=rec.header||{}, players=Array.isArray(rec.players)?rec.players:[], counts=rec.counts||{};
  rcPool=players; rcFilterCache=null;
  rcBriefs=Array.isArray(rec.briefs)?rec.briefs:[];
  rcScout=rec.scout||null;
  rcStaffData=rec.staff||null;
  // preserve filter state across re-pushes (favorite/watch re-render); reset only on first open
  if(!rcState){ rcState={tab:'search',q:'',roles:new Set(),region:'All',ageMin:15,ageMax:40,ovrMin:0,potMin:0,avail:'all',sortKey:'ovr',sortDir:'desc',shown:RC_PAGE}; }

  view.innerHTML=RECRUIT_SKEL;
  $("#clubName").textContent="Recruitment";
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  $("#rcBudget").textContent = h.budget_k!=null ? fmtK(h.budget_k) : "—";
  $("#rcWage").textContent   = h.wage_room_k!=null ? fmtK(h.wage_room_k)+" p/w" : "—";

  // ---- sub-tabs ----
  const staffN=rcStaffData?((rcStaffData.coaches||[]).length+(rcStaffData.scouts||[]).length+(rcStaffData.analysts||[]).length):null;
  const tabs=[['search','Search',counts.total],['fa','Free Agents',counts.free_agents],['shortlist','Shortlist',counts.shortlist],['assignments','Assignments',rcBriefs.length],['staff','Staff',staffN]];
  $("#rcTabs").innerHTML=tabs.map(([k,lab,n])=>
    `<button type="button" class="rcTab${rcState.tab===k?' on':''}" data-rc-tab="${k}">${esc(lab)}${n!=null?` <span class="rcTn">${esc(String(n))}</span>`:''}</button>`).join('');
  $("#rcTabs").querySelectorAll('[data-rc-tab]').forEach(b=>b.addEventListener('click',()=>{
    rcState.tab=b.dataset.rcTab;
    $("#rcTabs").querySelectorAll('.rcTab').forEach(t=>t.classList.toggle('on',t===b));
    rcApplyTab(); }));

  // ---- filter bar ----
  const regions=['All'].concat(Array.isArray(rec.regions)?rec.regions:[]);
  const roleChips=['Duelist','Initiator','Controller','Sentinel'].map(r=>{
    const[rl]=ROLE[r]||["?"]; return `<button type="button" class="rcRoleChip${rcState.roles.has(r)?' on':''}" data-rc-role="${r}">${rl}</button>`; }).join('');
  $("#rcFilters").innerHTML=`
    <input type="text" class="rcSearch" id="rcSearch" placeholder="Search name or club…" value="${esc(rcState.q)}">
    <div class="rcRoles">${roleChips}</div>
    <select class="rcSel" id="rcRegion">${regions.map(r=>`<option value="${esc(r)}"${rcState.region===r?' selected':''}>${esc(r)}</option>`).join('')}</select>
    <select class="rcSel" id="rcAvail">
      <option value="all"${rcState.avail==='all'?' selected':''}>Any status</option>
      <option value="fa"${rcState.avail==='fa'?' selected':''}>Free agents</option>
      <option value="wants"${rcState.avail==='wants'?' selected':''}>Wants out</option>
    </select>
    <label class="rcNum">Min OVR <input type="number" id="rcOvr" min="0" max="99" value="${rcState.ovrMin}"></label>
    <label class="rcNum">Min POT <input type="number" id="rcPot" min="0" max="99" value="${rcState.potMin}"></label>
    <label class="rcNum">Age <input type="number" id="rcAgeMin" min="15" max="40" value="${rcState.ageMin}"><span>–</span><input type="number" id="rcAgeMax" min="15" max="40" value="${rcState.ageMax}"></label>
    <span class="rcCountLbl" id="rcCount"></span>`;
  const F=$("#rcFilters");
  F.querySelector('#rcSearch').addEventListener('input',e=>{ rcState.q=e.target.value; rcRenderBody(true); });
  F.querySelectorAll('[data-rc-role]').forEach(b=>b.addEventListener('click',()=>{
    const r=b.dataset.rcRole; if(rcState.roles.has(r)) rcState.roles.delete(r); else rcState.roles.add(r);
    b.classList.toggle('on'); rcRenderBody(true); }));
  F.querySelector('#rcRegion').addEventListener('change',e=>{ rcState.region=e.target.value; rcRenderBody(true); });
  F.querySelector('#rcAvail').addEventListener('change',e=>{ rcState.avail=e.target.value; rcRenderBody(true); });
  const numWire=(id,key,lo,hi)=>F.querySelector(id).addEventListener('input',e=>{ let v=+e.target.value; if(isNaN(v))v=lo; v=Math.max(lo,Math.min(hi,v)); rcState[key]=v; rcRenderBody(true); });
  numWire('#rcOvr','ovrMin',0,99); numWire('#rcPot','potMin',0,99); numWire('#rcAgeMin','ageMin',15,40); numWire('#rcAgeMax','ageMax',15,40);

  // ---- sortable column header ----
  rcRenderHead();

  // ---- infinite scroll ----
  const sc=$("#rcScroll");
  sc.addEventListener('scroll',()=>{
    if(sc.scrollTop+sc.clientHeight >= sc.scrollHeight-120){
      const total=rcFiltered().length;
      if(rcState.shown<total){ rcState.shown+=RC_PAGE; rcRenderBody(false); }
    }
  });

  rcApplyTab();
}
window.__recruitment = renderRecruitment;

/* =====================================================================
   renderAwards(A, club)  — A is the inner `awards` object (read-only).
   LEFT: MVP races (one small board per category). RIGHT: a stack of the
   last-season recap card + an all-time history card. All three source
   arrays (mvp_race / last_season / history) can be EMPTY early in a save
   — each section degrades to its own graceful empty-state.
   ===================================================================== */
const AWARDS_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">—</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Season</div><div class="val" id="hAwards">AWARDS</div></div>
  </div>

  <div class="awgrid">
    <div class="awcol">
      <div class="card enter" id="cRaces" style="flex:1">
        <div class="chead"><span class="t">MVP Race</span><span class="s" id="raceStat"></span></div>
        <div class="cbody" id="raceBody"></div>
      </div>
    </div>
    <div class="awcol">
      <div class="card enter" id="cRecap" style="flex:1">
        <div class="chead"><span class="t">Season Awards</span><span class="s" id="recapStat"></span></div>
        <div class="cbody" id="recapBody"></div>
      </div>
      <div class="card enter" id="cHistory" style="flex:1">
        <div class="chead"><span class="t">All-Time History</span><span class="s" id="histStat"></span></div>
        <div class="cbody" id="histBody"></div>
      </div>
    </div>
  </div>`;

function renderAwards(A, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="awards";

  if(!A || !A.header){
    view.innerHTML='<div class="preempty">No awards loaded — start or load a season to track MVP races and award history.</div>';
    return;
  }

  view.innerHTML=AWARDS_SKEL;

  /* ===== header ===== */
  const h=A.header;
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== MVP races (one board per category) ===== */
  const races=Array.isArray(A.mvp_race)?A.mvp_race:[];
  $("#raceStat").textContent=races.length?`${races.length} ${races.length===1?'board':'boards'}`:"";
  const rb=$("#raceBody");
  if(!races.length){
    rb.appendChild(el("div","empty","Races begin once the season is underway."));
  }else{
    const wrap=el("div","racewrap");
    races.forEach(board=>{
      const cands=Array.isArray(board.candidates)?board.candidates:[];
      const card=el("div","racecard");
      let rowsHTML="";
      if(!cands.length){
        rowsHTML='<div class="empty" style="padding:6px 2px">No candidates yet.</div>';
      }else{
        rowsHTML=cands.map((c,i)=>{
          const[rl,rc]=ROLE[c.role]||["?","--fg-muted"];
          const igl=c.igl?'<span class="racebadge">IGL</span>':'';
          const team=(c.team&&String(c.team).trim())?`<span class="rteam">${esc(c.team)}</span>`:'';
          const score=(typeof c.score==="number")?c.score.toFixed(2):esc(String(c.score==null?"":c.score));
          const d=(typeof c.delta==="number")?c.delta:0;
          const dCls=d>0?"up":(d<0?"down":"flat");
          const dArrow=d>0?"▲":(d<0?"▼":"–");
          const dTxt=d!==0?`<span class="racedelta ${dCls}">${dArrow}${Math.abs(d)}</span>`:'';
          const blurb=(c.blurb&&String(c.blurb).trim())?`<div class="rblurbrow" title="${esc(c.blurb)}">${esc(c.blurb)}</div>`:'';
          return `<div class="racerow${i===0?" lead":""}">
            <span class="rrk">${i+1}</span>
            <span class="raceid">
              <span class="racerole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
              <span class="rnm">${esc(c.name)}</span>${igl}${team}
            </span>
            <span class="racescore">${score}</span>
            <span class="racetrend">${dTxt}</span>
            ${blurb}
          </div>`;
        }).join("");
      }
      card.innerHTML=`<div class="rchead"><span class="rctitle">${esc(board.category)}</span><span class="rccount">${cands.length} ranked</span></div>${rowsHTML}`;
      wrap.appendChild(card);
    });
    rb.appendChild(wrap);
  }

  /* ===== season-awards recap (most-recent finished season) ===== */
  const recap=Array.isArray(A.last_season)?A.last_season:[];
  $("#recapStat").textContent=recap.length?(recap[0].year!=null?`Year ${esc(String(recap[0].year))}`:`${recap.length}`):"";
  const rcb=$("#recapBody");
  if(!recap.length){
    rcb.appendChild(el("div","empty","No season has finished yet."));
  }else{
    const stack=el("div","recap");
    recap.forEach(a=>{
      const coach=a.is_coach?'<span class="rccoach">Coach</span>':'';
      const team=(a.winner_team&&String(a.winner_team).trim())?`<span class="rcteam">${esc(a.winner_team)}</span>`:'';
      const exp=(a.explanation&&String(a.explanation).trim())?`<div class="rcexp">${esc(a.explanation)}</div>`:'';
      const fins=Array.isArray(a.finalists)?a.finalists:[];
      let finHTML="";
      if(fins.length){
        finHTML='<div class="rcfin">'+fins.map(f=>{
          const sc=(typeof f.score==="number")?f.score.toFixed(2):esc(String(f.score==null?"":f.score));
          return `<span class="recapfin">${esc(f.name)} <b>(${sc})</b></span>`;
        }).join("")+'</div>';
      }
      const card=el("div","recapcard");
      card.innerHTML=`<div class="rccat">${esc(a.category)}</div>
        <div class="rcwin"><span class="rcname">${esc(a.winner_name)}</span>${team}${coach}</div>
        ${exp}${finHTML}`;
      stack.appendChild(card);
    });
    rcb.appendChild(stack);
  }

  /* ===== all-time history (most-recent first; compact rows) ===== */
  const history=Array.isArray(A.history)?A.history:[];
  $("#histStat").textContent=history.length?`${history.length}`:"";
  const hb=$("#histBody");
  if(!history.length){
    hb.appendChild(el("div","empty","No award history yet."));
  }else{
    history.forEach(e=>{
      const row=el("div","histrow");
      row.innerHTML=`<span class="hyr">Y${esc(String(e.year))}</span>
        <span class="hcat">${esc(e.category)}</span>
        <span class="hwin${e.is_coach?" coach":""}">${esc(e.winner_name)}</span>`;
      hb.appendChild(row);
    });
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cRaces","#cRecap","#cHistory"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}

/* =====================================================================
   renderBrackets(B, club)  — B is the inner `brackets` object (read-only).
   One card per active tournament; renders the double-elimination tree
   (upper bracket columns, then lower bracket, then a prominent grand
   final), plus any scheduled-but-unplayed `current` matchups for a fresh
   seeded bracket. `tournaments` is EMPTY outside playoff phases — degrade
   to a graceful empty-state. The user's team (header.club_name) is
   emphasised in club colour throughout.
   ===================================================================== */
const BRACKETS_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">—</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Stage</div><div class="val" id="hBrackets">PLAYOFFS</div></div>
  </div>

  <div class="brkgrid" id="brkGrid"></div>`;

function renderBrackets(B, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="brackets";

  if(!B || !B.header){
    view.innerHTML='<div class="preempty">No brackets loaded — start or load a season to follow playoff brackets.</div>';
    return;
  }

  view.innerHTML=BRACKETS_SKEL;

  /* ===== header ===== */
  const h=B.header;
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== tournaments ===== */
  const myTeam=String(h.club_name||"");
  const isUser=name=>!!name && String(name)===myTeam;
  const grid=$("#brkGrid");
  const tournaments=Array.isArray(B.tournaments)?B.tournaments:[];

  if(!tournaments.length){
    grid.innerHTML='<div class="preempty">No playoffs in progress — brackets appear during Regionals, Masters &amp; Champions.</div>';
  }else{
    /* one rendered match card (played or scheduled) */
    function matchCard(m, extraCls){
      if(!m) return "";
      const played=!!m.played;
      const winner=(m.winner&&String(m.winner).trim())?String(m.winner):"";
      const aName=esc(m.a||"TBD"), bName=esc(m.b||"TBD");
      const aTag=(m.a_tag&&String(m.a_tag).trim())?`<span class="btag">${esc(m.a_tag)}</span>`:'';
      const bTag=(m.b_tag&&String(m.b_tag).trim())?`<span class="btag">${esc(m.b_tag)}</span>`:'';
      const aWin=played && winner && winner===String(m.a);
      const bWin=played && winner && winner===String(m.b);
      const aCls=`bteam${aWin?" win":(played?" loss":"")}${isUser(m.a)?" user":""}`;
      const bCls=`bteam${bWin?" win":(played?" loss":"")}${isUser(m.b)?" user":""}`;
      const aScore=played?esc(String(m.a_score==null?0:m.a_score)):"–";
      const bScore=played?esc(String(m.b_score==null?0:m.b_score)):"–";
      const bo=(m.best_of!=null)?`<span class="bbo">Bo${esc(String(m.best_of))}</span>`:'';
      const lab=(m.label&&String(m.label).trim())?esc(m.label):(played?"Final":"Scheduled");
      const cls=`bmatch${played?"":" sched"}${extraCls?" "+extraCls:""}`;
      return `<div class="${cls}">
        <div class="blabel"><span>${lab}</span>${bo}</div>
        <div class="${aCls}"><span class="bnm">${aTag}${aName}</span><span class="bscore">${aScore}</span></div>
        <div class="bvs">vs</div>
        <div class="${bCls}"><span class="bnm">${bTag}${bName}</span><span class="bscore">${bScore}</span></div>
      </div>`;
    }
    /* a labelled column of rounds → returns the .brkt flex row of columns */
    function bracketRows(rounds, prefix){
      const rs=Array.isArray(rounds)?rounds:[];
      if(!rs.length) return "";
      const cols=rs.map((round,ri)=>{
        const matches=Array.isArray(round)?round:[];
        if(!matches.length) return "";
        // Prefer an explicit match label for the column header; else a generic round name.
        const colLab=(matches[0]&&matches[0].label&&String(matches[0].label).trim())
          ? esc(matches[0].label) : `${prefix} Round ${ri+1}`;
        return `<div class="brktcol">
          <div class="bcollab">${colLab}</div>
          ${matches.map(m=>matchCard(m)).join("")}
        </div>`;
      }).filter(Boolean).join("");
      return cols?`<div class="brkt">${cols}</div>`:"";
    }

    tournaments.forEach(t=>{
      const card=el("div","tourn");
      const round=(t.round_label&&String(t.round_label).trim())?`<span class="tround">${esc(t.round_label)}</span>`:'';
      let champRibbon="";
      if(t.finished && t.champion && String(t.champion).trim()){
        const champUser=isUser(t.champion)?' style="color:var(--club);background:color-mix(in srgb,var(--club) 12%,transparent);border-color:color-mix(in srgb,var(--club) 45%,transparent)"':'';
        champRibbon=`<span class="tchamp"${champUser}>🏆 ${esc(t.champion)}</span>`;
      }
      let inner=`<div class="thead"><span class="tname">${esc(t.name)}</span>${round}${champRibbon}</div>`;

      const upperHTML=bracketRows(t.upper, "Upper");
      const lowerHTML=bracketRows(t.lower, "Lower");
      const gfRounds=Array.isArray(t.grand_final)?t.grand_final:[];
      const gf=gfRounds.find(m=>m);
      const current=Array.isArray(t.current)?t.current:[];

      // Has any actual bracket history been drawn?
      const hasTree=!!(upperHTML||lowerHTML||gf);

      let scroll="";
      if(upperHTML){ scroll+=`<div class="brktsub">Upper Bracket</div>${upperHTML}`; }
      if(lowerHTML){ scroll+=`<div class="brktsub lower">Lower Bracket</div>${lowerHTML}`; }
      if(gf){ scroll+=`<div class="brktsub gf">Grand Final</div><div class="brkt">${matchCard(gf,"gf")}</div>`; }

      // Scheduled-but-unplayed matchups for the live round. Always show when a
      // fresh bracket has no history; also useful as a "next up" footer.
      if(current.length && !hasTree){
        scroll+=`<div class="brktsub">Scheduled Matchups</div><div class="brktcurrent">`+
          current.map(c=>{
            const lower=c.lower?'<span class="clower">LB</span>':'';
            const aCls=`cside${isUser(c.a)?" user":""}`;
            const bCls=`cside b${isUser(c.b)?" user":""}`;
            return `<div class="curmatch"><span class="${aCls}">${esc(c.a||"TBD")}</span><span class="cvs">vs</span><span class="${bCls}">${esc(c.b||"TBD")}</span>${lower}</div>`;
          }).join("")+`</div>`;
      }

      if(!scroll){
        scroll=`<div class="empty">Bracket seeded — matchups appear once the round is drawn.</div>`;
      }
      inner+=`<div class="brktscroll">${scroll}</div>`;
      card.innerHTML=inner;
      grid.appendChild(card);
    });
  }

  /* ===== motion ===== */
  function run(){
    const cards=["#header"].concat(Array.from(document.querySelectorAll("#view .tourn")).map((c,i)=>{c.id="tourn"+i;return "#tourn"+i;}));
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ cards.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  // tournament cards aren't .enter (created dynamically); fade the header in.
  $("#header") && $("#header").classList.add("enter");
  run();
}

/* =====================================================================
   renderTeamProfile(TP, club)  — TP is the WHOLE msg.data (it carries
   `found`, `club_color`, `team_profile`), NOT an inner object like the
   other screens. Displays ANY team (not just the user's), reached by
   clicking a standings row in renderCompetition. Read-only. When the
   requested team can't be resolved the host pushes {found:false,
   requested:"<name>"} (no team_profile) — render a friendly empty-state.
   Uniquely-named .tp* classes; reuses the shared header / card / KPI
   language. A "Back to standings" link returns to renderCompetition.
   ===================================================================== */

    <div class="hclock dual">
      <div><div class="lab">Rank</div><div class="val" id="hTPRank">—</div></div>
      <div><div class="lab">Team OVR</div><div class="val" id="hTPOvr">—</div></div>
    </div>
  </div>

  <div class="tpidentity enter" id="tpIdentity"></div>

  <div class="tpgrid">
    <div class="tpcol">
      <div class="card enter" id="cTPRoster" style="flex:1">

        <div class="cbody" id="tpRosterBody"></div>

    </div>
