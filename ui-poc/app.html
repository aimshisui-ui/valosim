    const roleLab=SM_ROLE[s.role]||"Staff";
    const flag=s.country_iso?`<span class="plate">${esc(String(s.country_iso).toUpperCase())}</span>`:'';
    const teamLine=s.retired?'Retired':(s.is_free_agent?'Free Agent':esc(s.team_name||'—'));
    const yours=s.on_user_team?'<span class="pmYourclub">Your Club</span>':'';
    const attrs=Array.isArray(s.attrs)?s.attrs:[];
    const editable=godMode && s.on_user_team===true;   // god-mode edits only touch YOUR staff
    const bars=attrs.map(a=>{
      const v=Math.max(0,Math.min(99,+a.value||0));
      const step=editable&&a.key?`<span class="smStep"><button type="button" class="stepbtn" data-sm-set="${esc(a.key)}" data-d="-1"${v<=1?' disabled':''} aria-label="Decrease ${esc(a.name||'')}">&minus;</button><button type="button" class="stepbtn" data-sm-set="${esc(a.key)}" data-d="1"${v>=99?' disabled':''} aria-label="Increase ${esc(a.name||'')}">+</button></span>`:'';
      return `<div class="smAttr${editable?' edit':''}" data-sm-val="${v}" data-sm-key="${esc(a.key||'')}"><span class="an">${esc(a.name||'')}</span>
        <span class="skBar"><span class="skFill" style="width:${v}%;background:${attrColor(v)}"></span></span>
        <span class="av num">${v}</span>${step}</div>`;
    }).join('');
    const career=[];
    if(s.career_seasons!=null) career.push(`<span><b>${esc(String(s.career_seasons))}</b> seasons</span>`);
    if(s.career_titles!=null)  career.push(`<span><b>${esc(String(s.career_titles))}</b> titles</span>`);
    if(s.career_coty)          career.push(`<span><b>${esc(String(s.career_coty))}</b> COTY</span>`);
    if(s.career_finds!=null)   career.push(`<span><b>${esc(String(s.career_finds))}</b> gems found</span>`);
    if(s.career_reports!=null) career.push(`<span><b>${esc(String(s.career_reports))}</b> opp. reports</span>`);
    if(s.report_depth!=null)   career.push(`<span>report depth <b>${esc(String(s.report_depth))}</b>/5</span>`);
    const contract = s.is_free_agent
      ? `Asking <b>${esc(fmtK(s.ask_k||0))}/yr</b>`
      : s.retired ? 'No active contract'
      : `<b>${esc(fmtK(s.salary_k||0))}/yr</b>${s.years_left!=null?` · ${esc(String(s.years_left))} yr${+s.years_left===1?'':'s'} left`:''}`;
    const hire = s.is_free_agent
      ? `<button type="button" class="mvSkip" data-sm-hire="${esc(s.role)}" data-sm-id="${esc(String(s.id))}">Hire as ${esc(roleLab)} · ${esc(fmtK(s.ask_k||0))}/yr</button>`
      : '';
    // God-mode contract/salary editor (own staff only)
    const yl=(s.years_left!=null)?Math.max(0,+s.years_left):0;
    const salK=Math.max(0,+s.salary_k||0);
    const godEdit=editable?`<div class="smGod">
      <div class="smGodRow"><span class="gl">Salary</span>
        <span class="smStep"><button type="button" class="stepbtn" data-sm-set="salary" data-v="${salK-10}"${salK<=10?' disabled':''} aria-label="Lower salary">&minus;</button><button type="button" class="stepbtn" data-sm-set="salary" data-v="${salK+10}"${salK>=500?' disabled':''} aria-label="Raise salary">+</button></span>
        <span class="gv num">${esc(fmtK(salK))}/yr</span></div>
      <div class="smGodRow"><span class="gl">Contract years</span>
        <span class="smStep"><button type="button" class="stepbtn" data-sm-set="years" data-v="${yl-1}"${yl<=0?' disabled':''} aria-label="Fewer years">&minus;</button><button type="button" class="stepbtn" data-sm-set="years" data-v="${yl+1}"${yl>=5?' disabled':''} aria-label="More years">+</button></span>
        <span class="gv num">${yl} yr${yl===1?'':'s'}</span></div>
      <div class="smGodRow"><span class="gl">Reputation</span>
        <span class="smStep"><button type="button" class="stepbtn" data-sm-set="reputation" data-v="${(+s.reputation||0)-1}"${(+s.reputation||0)<=1?' disabled':''} aria-label="Lower reputation">&minus;</button><button type="button" class="stepbtn" data-sm-set="reputation" data-v="${(+s.reputation||0)+1}"${(+s.reputation||0)>=99?' disabled':''} aria-label="Raise reputation">+</button></span>
        <span class="gv num">${esc(String(s.reputation!=null?s.reputation:'—'))}</span></div>
    </div>`:'';
    const godChip=(s.on_user_team===true)?`<button type="button" class="godtoggle${godMode?' on':''}" data-sm-god="1" aria-pressed="${godMode?'true':'false'}" title="Toggle God Mode — edit staff attributes & contract"><span class="gtdot"></span>${godMode?'GOD MODE ON':'God Mode'}</button>`:'';
    const renameBtn=editable?`<button type="button" class="pmNameEdit" data-sm-rename="${esc(String(s.id))}" title="Rename (god mode)">&#9998;</button>`:'';
    host.innerHTML=`
      <div class="pmHead">
        <div class="pmWash"></div>
        <div class="pmHrow">
          <div class="pmCrest">${esc(mono)}</div>
          <div class="pmHid">
            <div class="pmName">${esc(s.name||'—')}${yours}${renameBtn}</div>
            <div class="pmSub">
              <span class="plate div">${esc(roleLab)}</span>
              ${s.personality?`<span style="color:var(--amber)">${esc(s.personality)}</span>`:''}
              ${flag}
              <span class="dot"></span><span>${s.age!=null?esc(String(s.age))+'y':''}</span>
              <span class="dot"></span><span>${teamLine}</span>
            </div>
          </div>
          <div class="pmHovr"><div class="pmOvrbox"><div class="v" style="color:${attrColor(+s.reputation||0)}">${esc(String(s.reputation!=null?s.reputation:'—'))}</div><div class="l">REP</div></div></div>
        </div>
        ${godChip?`<div class="pmActions">${godChip}</div>`:''}
      </div>
      <div class="pmBody">
        <div class="pmSec"><div class="pmSeclab">Attributes${editable?' · God Mode':''}</div><div class="smAttrs">${bars||'<div class="pmEmpty">No attribute data.</div>'}</div></div>
        <div class="pmSec"><div class="pmSeclab">Career</div>${career.length?`<div class="pmTrophies">${career.join('')}</div>`:'<div class="pmEmpty">No career record yet.</div>'}</div>
        <div class="pmSec"><div class="pmSeclab">Contract</div><div class="smContract">${contract}</div>${godEdit}${hire}</div>
      </div>`;
    const hb=host.querySelector('[data-sm-hire]');
    if(hb) hb.addEventListener('click',()=>{
      const scr=(typeof currentScreen==='string'&&currentScreen)?currentScreen:'dashboard';
      post("act:hirestaff:"+hb.dataset.smHire+":"+hb.dataset.smId+":"+scr);
      closeStaffModal();
    });
    // God chip: local toggle + re-render from the same payload (no host round-trip).
    const gc=host.querySelector('[data-sm-god]');
    if(gc) gc.addEventListener('click',()=>{ godMode=!godMode; renderStaffModal(D); });
    // Attribute steppers (data-d ±1 off the row's current value) + contract steppers
    // (data-v absolute). Both post act:staffset and the staffmodal state re-pushes.
    host.querySelectorAll('[data-sm-set]').forEach(b=>b.addEventListener('click',()=>{
      const key=b.dataset.smSet; let v;
      if(b.dataset.v!=null){ v=+b.dataset.v; }
      else{ const row=b.closest('[data-sm-val]'); v=(+((row&&row.dataset.smVal)||0))+(+b.dataset.d||0); }
      post("act:staffset:"+s.id+":"+key+":"+v+":staffmodal");
    }));
    // Inline rename (mirrors the player-modal god rename; colons stripped).
    const rb=host.querySelector('[data-sm-rename]');
    if(rb) rb.addEventListener('click',()=>{
      const nameEl=host.querySelector('.pmName'); if(!nameEl) return;
      const cur=(s.name||'').toString();
      nameEl.innerHTML=`<input type="text" class="pmNameInput" maxlength="26" value="${esc(cur)}" aria-label="Staff name">`;
      const inp=nameEl.querySelector('.pmNameInput'); if(!inp) return;
      inp.focus(); inp.select();
      let done=false;
      const commit=()=>{ if(done) return; done=true;
        const v=(inp.value||'').replace(/:/g,'').trim();
        if(v && v!==cur) post("act:staffset:"+s.id+":name:"+v+":staffmodal"); else renderStaffModal(D);
      };
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commit(); } else if(e.key==='Escape'){ done=true; renderStaffModal(D); } });
      inp.addEventListener('blur',commit);
    });
  }
  smOpen=true; smSeq=++modalSeq;
  modal.classList.add("open");
  modal.setAttribute("aria-hidden","false");
}

// Verdict → color for the mood pill.
function pmMoodColor(total){ return total>=62?"var(--green)":(total<42?"var(--red-text)":"var(--amber)"); }

/* renderPlayerModal(D) — D is the FULL data object the host pushes for
   screen:"playermodal" (see the data contract). Builds the whole modal,
   shows it, restores the active tab, and wires every control. */
function renderPlayerModal(D){
  const m=$("#pmModal"), host=$("#pmContent");
  if(!m || !host) return;
  // club tint (header crest + accents) — fall back to existing --club.
  if(D && D.club_color) m.style.setProperty("--club", D.club_color);

  // ---- not found ----
  if(!D || D.found===false){
    pmPlayerId = (D && D.requested_id!=null) ? D.requested_id : null;
    host.innerHTML=`<div class="pmHead"><div class="pmHrow"><div class="pmHid"><div class="pmName">Player</div></div></div></div>
      <div class="pmBody"><div class="pmNotfound"><div>Player not found.</div></div></div>`;
    pmOpen=true; pmSeq=++modalSeq; m.classList.add("open"); m.setAttribute("aria-hidden","false");
    return;
  }

  const p=D.player||{};
  // Fresh player (or the modal being re-rendered for a different id) → forget
  // that we've fetched interest, so opening the tab re-fires the scan for the
  // new player. A same-id re-push (e.g. a god-mode edit) keeps pmInterestAsked
  // so we don't re-flash. The cached payload (if any) still paints instantly.
  if(pmPlayerId!==p.id){ pmInterestAsked=null; pmScoutAsked=null; }
  pmPlayerId=p.id;
  const editable = godMode && p.editable===true;
  const[rl,rc]=ROLE[p.role]||["?","--fg-muted"];
  const mono=String(p.name||"V").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  const dis=v=>v?' disabled':'';

  /* ===== header bits ===== */
  const flag = p.country_iso ? `<span class="pmFlag">${esc(String(p.country_iso).toUpperCase())}</span>` : '';
  const teamLine = p.retired ? 'Retired' : (p.team_name?esc(p.team_name):'Free Agent');
  const tags = `${p.igl?'<span class="pmTag igl">IGL</span>':''}${p.flex?'<span class="pmTag flex">Flex</span>':''}${p.retired?'<span class="pmTag retired">Retired</span>':''}`;
  const yourclub = p.on_user_team ? '<span class="pmYourclub">Your Club</span>' : '';
  const desire = p.desire ? `<span class="pmDesire" title="${esc(p.desire_blurb||'')}">${esc(p.desire)}</span>` : '';

  // OVR / POTENTIAL tiles (fog-of-war).
  let potBox;
  if(p.potential_known){
    const potStepper = editable
      ? `<div class="attredit" data-pmpot="1"><button type="button" class="stepbtn" data-d="-1"${dis(+p.potential<=1)} aria-label="Decrease potential">&minus;</button><button type="button" class="stepbtn" data-d="1"${dis(+p.potential>=99)} aria-label="Increase potential">+</button></div>`
      : '';
    potBox=`<div class="pmOvrbox"><div class="v" style="color:var(--fg-muted)">${esc(String(p.potential))}</div>${potStepper}<div class="l">Potential</div></div>`;
  }else{
    const band=`${esc(String(p.potential_lo))}–${esc(String(p.potential_hi))}`;
    potBox=`<div class="pmOvrbox"><div class="b" style="color:var(--fg-muted)">${band}<span class="q"> ?</span></div><div class="l">Potential</div></div>`;
  }

  // Action buttons row.
  let actions='';
  actions+=`<button type="button" class="pmBtn star${p.favorited?' on':''}" data-pm-fav="1">${p.favorited?'★ Favorited':'☆ Favorite'}</button>`;
  actions+=`<button type="button" class="pmBtn${p.watched?' on':''}" data-pm-watch="1">${p.watched?'Watching':'Watch'}</button>`;
  if(p.scoutable){
    const cr=(p.scout_credits!=null)?`<span class="pmcount">${esc(String(p.scout_credits))} cr</span>`:'';
    actions+=`<button type="button" class="pmBtn" data-pm-scout="1">Scout ${cr}</button>`;
  }
  if(p.can_queue){
    actions+=`<button type="button" class="pmBtn primary" data-pm-queue="1">Queue Ranked Match</button>`;
  }
  // Sign — free agents the user can bring in. Jumps to the Sign tab's terms form.
  if((p.team_name==='Free Agent') && !p.retired && p.on_user_team!==true){
    actions+=`<button type="button" class="pmBtn primary" data-pm-signjump="1">Sign Free Agent</button>`;
  }
  // Bid — a rival's contracted player. Jumps to the Bid tab's fee form.
  if(p.biddable===true && p.on_user_team!==true){
    actions+=`<button type="button" class="pmBtn primary" data-pm-bidjump="1">Make Transfer Bid</button>`;
  }
  // Release — ONLY for players on the user's own team (can't release rivals/FAs).
  // Two-step inline confirm: first click arms it ("Confirm release?"), a second
  // click within a few seconds posts. Distinct danger accent (.pmDanger).
  if(p.on_user_team===true){
    actions+=`<button type="button" class="pmBtn pmDanger" data-pm-release="1">Release</button>`;
  }
  // God-mode toggle chip (reuses the .godtoggle look) — only meaningful when the
  // player is editable; always shown so the user can flip it.
  const godChip=`<button type="button" class="godtoggle${godMode?' on':''}" data-pm-god="1" aria-pressed="${godMode?'true':'false'}" title="Toggle God Mode — edit attributes & potential"><span class="gtdot"></span>${godMode?'GOD MODE ON':'God Mode'}</button>`;

  const headHTML=`<div class="pmHead">
    <div class="pmWash"></div>
    <div class="pmHrow">
      <div class="pmCrest">${esc(mono)}</div>
      <div class="pmHid">
        <div class="pmName">${esc(p.name)}${yourclub}${(godMode && p.editable===true)?`<button type="button" class="pmNameEdit" data-pm-rename="${p.id}" title="Rename (god mode)">&#9998;</button>`:''}</div>
        <div class="pmSub">
          <span class="pmRole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
          <span>${esc(p.role||'')}</span>
          ${flag?'<span class="dot"></span>'+flag:''}
          <span>${esc(p.country||'')}</span>
          <span class="dot"></span><span>${p.age!=null?esc(String(p.age))+'y':''}</span>
          <span class="dot"></span><span>${teamLine}</span>
          ${p.archetype?'<span class="dot"></span><span>'+esc(p.archetype)+'</span>':''}
          ${p.rep_tier?'<span class="pmStature" title="Reputation / stature — drives transfer cost, wages, and which clubs can attract this player">'+esc(p.rep_tier)+'</span>':''}
          ${tags}${desire}
        </div>
      </div>
      <div class="pmHovr">
        <div class="pmOvrbox"><div class="v" style="color:${ovrColorRoster(+p.ovr)}">${esc(String(p.ovr))}</div><div class="l">OVR</div></div>
        ${potBox}
      </div>
    </div>
    <div class="pmActions">${actions}${godChip}</div>
  </div>`;

  /* ===== tabs =====
     OVERVIEW + DETAIL always; MAPS + AGENTS always; IGL only when the player
     carries an igl_profile (non-IGLs have it null → no tab, no pane). If the
     remembered pmTab points at the (now absent) igl tab for a non-IGL, fall
     back to overview so a stale tab never leaves the body blank. */
  const hasIgl = !!(p.igl_profile && typeof p.igl_profile==='object');
  // Re-sign negotiation tab — ONLY for players on the user's own team.
  const hasResign = p.on_user_team===true;
  // Sign tab — ONLY for free agents the user could actually sign (not retired,
  // not already on the user's roster). Mutually exclusive with Re-sign.
  const canSign = (p.team_name==='Free Agent') && !p.retired && p.on_user_team!==true;
  // Bid tab — ONLY for a RIVAL's contracted player (host flags `biddable`).
  const canBid = (p.biddable===true) && p.on_user_team!==true;
  if(pmTab==='igl' && !hasIgl) pmTab='overview';
  if(pmTab==='resign' && !hasResign) pmTab='overview';
  if(pmTab==='sign' && !canSign) pmTab='overview';
  if(pmTab==='bid' && !canBid) pmTab='overview';
  // Interest tab is always present, so no stale-tab guard needed for it.
  const tabsHTML=`<div class="pmTabs">
    <button type="button" class="pmTab${pmTab==='overview'?' on':''}" data-pm-tab="overview">Overview</button>
    <button type="button" class="pmTab${pmTab==='detail'?' on':''}" data-pm-tab="detail">Detail</button>
    <button type="button" class="pmTab${pmTab==='maps'?' on':''}" data-pm-tab="maps">Maps</button>
    <button type="button" class="pmTab${pmTab==='agents'?' on':''}" data-pm-tab="agents">Agents</button>
    ${hasIgl?`<button type="button" class="pmTab${pmTab==='igl'?' on':''}" data-pm-tab="igl">IGL</button>`:''}
    <button type="button" class="pmTab${pmTab==='interest'?' on':''}" data-pm-tab="interest">Interest</button>
    <button type="button" class="pmTab${pmTab==='scout'?' on':''}" data-pm-tab="scout">Scout</button>
    ${hasResign?`<button type="button" class="pmTab${pmTab==='resign'?' on':''}" data-pm-tab="resign">Re-sign</button>`:''}
    ${canSign?`<button type="button" class="pmTab${pmTab==='sign'?' on':''}" data-pm-tab="sign">Sign</button>`:''}
    ${canBid?`<button type="button" class="pmTab${pmTab==='bid'?' on':''}" data-pm-tab="bid">Bid</button>`:''}
  </div>`;

  /* ===== OVERVIEW pane ===== */
  const mood=D.player && D.player.mood;
  let moodHTML='';
  if(mood){
    const mcol=pmMoodColor(mood.total);
    const labels=(Array.isArray(mood.labels)?mood.labels:[]).map(l=>{
      const d=+l.delta||0, cls=d>0?'up':(d<0?'down':'flat'), sgn=d>0?'+':'';
      return `<div class="pmLabel"><span class="ln">${esc(l.label)}</span><span class="ld ${cls}">${sgn}${d}</span></div>`;
    }).join('');
    const duo=mood.best_duo?`<div class="pmDuo">Best duo <b>${esc(mood.best_duo.name)}</b><span class="dv">${(+mood.best_duo.value).toFixed(2)}</span></div>`:'';
    const wantsout=mood.transfer_requested?'<span class="pmWantsout">Wants Out</span>':'';
    moodHTML=`<div class="pmSec"><div class="pmSeclab">Mood</div>
      <div class="pmMood">
        <div class="pmMoodtop">
          <span class="mv" style="color:${mcol}">${esc(String(mood.total))}</span>
          <span class="mverdict" style="color:${mcol};background:color-mix(in srgb,${mcol} 14%,var(--bg-3));border:1px solid color-mix(in srgb,${mcol} 40%,transparent)">${esc(mood.verdict||'')}</span>
          <span class="pmMoodbar"><span class="mf" style="width:${Math.max(0,Math.min(100,+mood.total))}%;background:${mcol}"></span></span>
          ${wantsout}
        </div>
        ${labels?`<div class="pmLabels">${labels}</div>`:''}
        ${duo}
      </div></div>`;
  }
  const so=p.solo||{}, cr=p.career||{}, ct=p.contract||{};
  const rankedHTML=`<div class="pmSec"><div class="pmSeclab">Ranked (Solo Queue)</div>
    <div class="pmStats">
      <div class="pmStat"><div class="v">${esc(String(so.mmr!=null?so.mmr:'—'))}</div><div class="l">MMR</div></div>
      <div class="pmStat"><div class="v">${esc(String(so.peak_mmr!=null?so.peak_mmr:'—'))}</div><div class="l">Peak</div></div>
      <div class="pmStat"><div class="v">${esc(String(so.rank||'—'))}</div><div class="l">Rank</div></div>
      <div class="pmStat"><div class="v">${so.kd!=null?(+so.kd).toFixed(2):'—'}</div><div class="l">K/D</div></div>
      <div class="pmStat"><div class="v">${esc(String(so.wins!=null?so.wins:0))}-${esc(String(so.losses!=null?so.losses:0))}</div><div class="l">W-L</div></div>
    </div></div>`;
  const careerHTML=`<div class="pmSec"><div class="pmSeclab">Career</div>
    <div class="pmStats">
      <div class="pmStat"><div class="v">${esc(String(cr.matches!=null?cr.matches:0))}</div><div class="l">Matches</div></div>
      <div class="pmStat"><div class="v">${cr.kd!=null?(+cr.kd).toFixed(2):'—'}</div><div class="l">K/D</div></div>
      <div class="pmStat"><div class="v">${cr.avg_rating!=null?(+cr.avg_rating).toFixed(2):'—'}</div><div class="l">Rating</div></div>
      <div class="pmStat"><div class="v">${Math.round(cr.kast_pct||0)}%</div><div class="l">KAST</div></div>
      <div class="pmStat"><div class="v">${Math.round(cr.adr||0)}</div><div class="l">ADR</div></div>
      <div class="pmStat"><div class="v">${Math.round(cr.hs_pct||0)}%</div><div class="l">HS%</div></div>
      <div class="pmStat"><div class="v">${esc(String(cr.mvps!=null?cr.mvps:0))}</div><div class="l">MVPs</div></div>
    </div></div>`;
  // OVR/POT block for overview, with the potential stepper when editable.
  let ovBlock;
  if(p.potential_known){
    const potStep = editable
      ? `<div class="attredit" data-pmpot="1" style="justify-content:center;margin-top:4px"><button type="button" class="stepbtn" data-d="-1"${dis(+p.potential<=1)} aria-label="Decrease potential">&minus;</button><span class="av">${esc(String(p.potential))}</span><button type="button" class="stepbtn" data-d="1"${dis(+p.potential>=99)} aria-label="Increase potential">+</button></div>`
      : `<div class="v" style="color:var(--fg-muted)">${esc(String(p.potential))}</div>`;
    ovBlock=`<div class="pmStat"><div class="v" style="color:${ovrColorRoster(+p.ovr)}">${esc(String(p.ovr))}</div><div class="l">OVR</div></div>
      <div class="pmStat">${potStep}<div class="l">Potential</div></div>`;
  }else{
    ovBlock=`<div class="pmStat"><div class="v" style="color:${ovrColorRoster(+p.ovr)}">${esc(String(p.ovr))}</div><div class="l">OVR</div></div>
      <div class="pmStat"><div class="b" style="font-family:var(--font-num);font-weight:600;color:var(--fg-muted)">${esc(String(p.potential_lo))}–${esc(String(p.potential_hi))} ?</div><div class="l">Potential</div></div>`;
  }
  const ratingHTML=`<div class="pmSec"><div class="pmSeclab">Overall</div><div class="pmStats">${ovBlock}</div></div>`;
  const contractHTML=`<div class="pmSec"><div class="pmSeclab">Contract</div>
    <div class="pmContract">
      <div class="pmCbox"><div class="v">${ct.salary_k!=null?esc(fmtK(ct.salary_k)):'—'}</div><div class="l">Salary / yr</div></div>
      <div class="pmCbox"><div class="v">${esc(String(ct.exp_year!=null?ct.exp_year:'—'))}</div><div class="l">Expires</div></div>
      <div class="pmCbox"><div class="v">${esc(String(ct.years_left!=null?ct.years_left:'—'))}y</div><div class="l">Years left</div></div>
    </div></div>`;
  const overviewHTML=`<div class="pmPane${pmTab==='overview'?' on':''}" data-pm-pane="overview">
    ${moodHTML}${ratingHTML}${rankedHTML}${careerHTML}${contractHTML}</div>`;

  /* ===== DETAIL pane ===== */
  // personal info
  const hometown=[p.birth_city,p.country].filter(x=>x&&String(x).trim()).map(esc).join(', ');
  const personalHTML=`<div class="pmSec"><div class="pmSeclab">Personal</div>
    <div class="pmRow2">
      <div class="pmKv">
        <div class="pmKvrow"><span class="k">Full name</span><span class="vv">${esc([p.first,p.last].filter(Boolean).join(' ')||p.name||'')}</span></div>
        <div class="pmKvrow"><span class="k">Hometown</span><span class="vv">${hometown||'—'}</span></div>
        <div class="pmKvrow"><span class="k">Born</span><span class="vv">${esc(String(p.birth_year!=null?p.birth_year:'—'))}${flag?' '+'':''}</span></div>
      </div>
      <div class="pmKv">
        <div class="pmKvrow"><span class="k">Country</span><span class="vv">${flag} ${esc(p.country||'—')}</span></div>
        <div class="pmKvrow"><span class="k">Age</span><span class="vv">${esc(String(p.age!=null?p.age:'—'))}</span></div>
        <div class="pmKvrow"><span class="k">Work / Cons.</span><span class="vv">${esc(String(p.work_ethic!=null?p.work_ethic:'—'))} / ${esc(String(p.consistency!=null?p.consistency:'—'))}</span></div>
      </div>
    </div></div>`;

  // attributes (bars + optional god-mode steppers; attr name passed VERBATIM
  // exactly as the roster god-mode does — host splits on ':' only).
  const attrHTML=(Array.isArray(p.attributes)?p.attributes:[]).map(a=>{
    const nm=esc(String(a.name).replace(/_/g,' '));
    const bar=`<span class="ab"><span class="af" style="width:${a.value}%;background:${attrColor(a.value)}"></span></span>`;
    if(editable){
      const val=`<span class="attredit" data-pmattr="${esc(a.name)}">`
        +`<button type="button" class="stepbtn" data-d="-1"${dis(a.value<=1)} aria-label="Decrease ${nm}">&minus;</button>`
        +`<span class="av">${esc(String(a.value))}</span>`
        +`<button type="button" class="stepbtn" data-d="1"${dis(a.value>=99)} aria-label="Increase ${nm}">+</button>`
        +`</span>`;
      return `<div class="pmAttr"><span class="an">${nm}</span>${bar}${val}</div>`;
    }
    return `<div class="pmAttr"><span class="an">${nm}</span>${bar}<span class="av">${esc(String(a.value))}</span></div>`;
  }).join('');
  const attrsHTML=`<div class="pmSec"><div class="pmSeclab">Attributes</div>
    <div class="pmAttrs">${attrHTML||'<span class="pmEmpty">No attributes.</span>'}</div></div>`;

  // agent pool
  const poolHTML=(Array.isArray(p.agent_pool)?p.agent_pool:[]).map(a=>{
    const[,arc]=ROLE[a.role]||["?","--fg-muted"];
    const sig=a.name===p.signature_agent?' sig':'';
    return `<span class="pmChip${sig}"><span class="pmdot" style="background:${cssvar(arc)}"></span>${esc(a.name)}</span>`;
  }).join('');
  const agentHTML=`<div class="pmSec"><div class="pmSeclab">Agent Pool · ${(p.agent_pool||[]).length}</div>
    <div class="pmChips">${poolHTML||'<span class="pmEmpty">No agents.</span>'}</div></div>`;

  // badges (god-mode add/remove mirrors the roster .gb* editor exactly)
  const held=Array.isArray(p.badges)?p.badges:[];
  const allB=Array.isArray(p.all_badges)?p.all_badges:[];
  let badgesHTML;
  if(editable){
    const chips=held.length
      ? held.map(b=>`<span class="gbchip"><span class="gbname">${esc(b)}</span><button type="button" class="gbx" data-pm-badgerm="${esc(b)}" aria-label="Remove ${esc(b)}">&times;</button></span>`).join('')
      : '<span class="gbempty">No badges</span>';
    const avail=allB.filter(b=>held.indexOf(b)<0);
    let addCtl;
    if(avail.length){
      addCtl=`<select class="gbsel" data-pm-badgesel="1" aria-label="Select badge to add"><option value="" disabled selected>+ Add badge…</option>`
        +avail.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('')
        +`</select><button type="button" class="gbadd" data-pm-badgeadd="1" disabled>Add</button>`;
    }else{ addCtl='<span class="gbempty">All badges applied</span>'; }
    badgesHTML=`<div class="gbwrap">${chips}</div><div class="gbwrap" style="margin-top:8px">${addCtl}</div>`;
  }else{
    badgesHTML=`<div class="gbwrap">${held.length?held.map(b=>`<span class="gbchip"><span class="gbname">${esc(b)}</span></span>`).join(''):'<span class="gbempty">No badges</span>'}</div>`;
  }
  const badgesSec=`<div class="pmSec"><div class="pmSeclab">Badges${editable?' · God Mode':''}</div>${badgesHTML}</div>`;

  // accolades
  const ac=p.accolades||{};
  const titles=Array.isArray(ac.titles)?ac.titles:[];
  const hasAcc=(ac.total>0||ac.mvps>0||ac.role_awards>0||ac.igl_oty>0||titles.length>0);
  const accHTML=`<div class="pmSec"><div class="pmSeclab">Accolades</div>
    ${hasAcc
      ? `<div class="pmTrophies"><span><b>${esc(String(ac.regional||0))}</b> Regional</span><span><b>${esc(String(ac.masters||0))}</b> Masters</span><span><b>${esc(String(ac.worlds||0))}</b> Worlds</span><span><b>${esc(String(ac.mvps||0))}</b> MVP</span><span><b>${esc(String(ac.role_awards||0))}</b> Role</span>${ac.igl_oty?`<span><b>${esc(String(ac.igl_oty))}</b> IGL OTY</span>`:''}</div>${titles.length?`<div class="pmTitlelist">${titles.map(t=>`<span>${esc(t)}</span>`).join('')}</div>`:''}`
      : '<div class="pmEmpty">No major honors yet.</div>'}</div>`;

  // season history table
  const hist=Array.isArray(p.history)?p.history:[];
  let histHTML;
  if(hist.length){
    const rows=hist.map(h=>`<div class="pmHistrow">
      <span class="hy">Y${esc(String(h.year))}</span>
      <span class="hy">${esc(String(h.age!=null?h.age:''))}</span>
      <span class="ht">${esc(h.team||'—')}</span>
      <span>${h.rating!=null?(+h.rating).toFixed(2):'—'}</span>
      <span>${h.kd!=null?(+h.kd).toFixed(2):'—'}</span>
      <span>${Math.round(h.kast||0)}%</span>
      <span>${esc(String(h.placement||'—'))}</span>
      <span>${h.salary_k!=null?esc(fmtK(h.salary_k)):'—'}</span>
    </div>`).join('');
    histHTML=`<div class="pmHist"><div class="pmHisthead"><span>YEAR</span><span>AGE</span><span>TEAM</span><span>RAT</span><span>K/D</span><span>KAST</span><span>PLC</span><span>SALARY</span></div>${rows}</div>`;
  }else{ histHTML='<div class="pmEmpty">No season history on record.</div>'; }
  const histSec=`<div class="pmSec"><div class="pmSeclab">Season History</div>${histHTML}</div>`;

  // per-tournament stat lines (host emits newest year first; Stage+Regionals of a
  // split share one line, each Masters/Champions is its own)
  const tourn=Array.isArray(p.tournament_stats)?p.tournament_stats:[];
  let tournHTML;
  if(tourn.length){
    const rows=tourn.map(t=>`<div class="pmTournrow">
      <span class="ht">${esc(String(t.label||'—'))}</span>
      <span class="hy">Y${esc(String(t.year||''))}</span>
      <span>${esc(String(t.maps!=null?t.maps:0))}</span>
      <span>${esc(String(t.kills!=null?t.kills:0))}-${esc(String(t.deaths!=null?t.deaths:0))}-${esc(String(t.assists!=null?t.assists:0))}</span>
      <span>${t.kd!=null?(+t.kd).toFixed(2):'—'}</span>
      <span style="color:${attrColor(Math.max(0,Math.min(100,((+t.rating||0)-0.6)*100)))}">${t.rating!=null?(+t.rating).toFixed(2):'—'}</span>
      <span>${t.adr!=null?Math.round(+t.adr):'—'}</span>
      <span>${t.kast_pct!=null?Math.round(+t.kast_pct)+'%':'—'}</span>
    </div>`).join('');
    tournHTML=`<div class="pmTourn"><div class="pmTournhead"><span>TOURNAMENT</span><span>YR</span><span>MAPS</span><span>K-D-A</span><span>K/D</span><span>RAT</span><span>ADR</span><span>KAST</span></div>${rows}</div>`;
  }else{ tournHTML='<div class="pmEmpty">No tournament appearances yet.</div>'; }
  const tournSec=`<div class="pmSec"><div class="pmSeclab">By Tournament</div>${tournHTML}</div>`;

  const detailHTML=`<div class="pmPane${pmTab==='detail'?' on':''}" data-pm-pane="detail">
    ${personalHTML}${attrsHTML}${agentHTML}${badgesSec}${accHTML}${tournSec}${histSec}</div>`;

  /* ===== MAPS pane (read-only) =====
     Map mastery: optional "comfort map" highlight + a table of played maps
     sorted by matches desc. avg rating colored via attrColor (rating ~1.0
     baseline → scaled to 0–100 band for the helper); bonus shown signed and
     green when positive. Rookies with no map data get a muted empty state. */
  const sgn1=v=>{const n=+v||0;return (n>0?'+':n<0?'−':'')+Math.abs(n).toFixed(1);};
  // map rating → color: ratings cluster ~0.7..1.7, remap onto attrColor's 0..100.
  const ratColor=r=>attrColor(Math.max(0,Math.min(100,((+r||0)-0.6)*100)));
  const comfortMap=p.comfort_map!=null?String(p.comfort_map):'';
  const mapsRaw=Array.isArray(p.maps)?p.maps.slice():[];
  mapsRaw.sort((a,b)=>(+b.matches||0)-(+a.matches||0));
  let mapsBody;
  if(mapsRaw.length){
    const rows=mapsRaw.map(mp=>{
      const isComf=comfortMap && mp.map===comfortMap;
      const bn=+mp.bonus||0;
      return `<div class="pmMaprow${isComf?' comf':''}">
        <span class="mn">${esc(String(mp.map||'—'))}${isComf?'<span class="pmComfdot" title="Comfort map">★</span>':''}</span>
        <span class="mm">${esc(String(mp.matches!=null?mp.matches:0))}</span>
        <span class="mr" style="color:${ratColor(mp.avg_rating)}">${mp.avg_rating!=null?(+mp.avg_rating).toFixed(2):'—'}</span>
        <span class="mp">${mp.peak_rating!=null?(+mp.peak_rating).toFixed(2):'—'}</span>
        <span class="mb" style="color:${bn>0?'var(--green)':bn<0?'var(--red-text)':'var(--fg-muted)'}">${mp.bonus!=null?sgn1(mp.bonus):'—'}</span>
      </div>`;
    }).join('');
    mapsBody=`<div class="pmMaps"><div class="pmMaphead"><span>MAP</span><span>M</span><span>AVG</span><span>PEAK</span><span>BONUS</span></div>${rows}</div>`;
  }else{
    mapsBody='<div class="pmEmpty">No map data yet.</div>';
  }
  const comfHTML=comfortMap?`<div class="pmComfort">Comfort map <b>${esc(comfortMap)}</b></div>`:'';
  const mapsHTML=`<div class="pmPane${pmTab==='maps'?' on':''}" data-pm-pane="maps">
    <div class="pmSec"><div class="pmSeclab">Map Mastery</div>${comfHTML}${mapsBody}</div></div>`;

  /* ===== AGENTS pane (read-only) =====
     Full agent pool. Signature agent floated to the top and gold-highlighted.
     Each row: name (★ if signature), role chip (ROLE color), signed mastery
     bonus, and — when matches>0 — matches + avg/peak rating; matches===0 →
     muted "untested". signature_agent_name surfaced prominently at top. */
  const sigName=p.signature_agent_name!=null?String(p.signature_agent_name):'';
  const poolRaw=Array.isArray(p.agent_pool)?p.agent_pool.slice():[];
  poolRaw.sort((a,b)=>{
    const as=a.signature?1:0, bs=b.signature?1:0;
    if(as!==bs) return bs-as;                                  // signature first
    return (+b.matches||0)-(+a.matches||0);                    // then most-played
  });
  let agentsBody;
  if(poolRaw.length){
    agentsBody=poolRaw.map(a=>{
      const[arl,arc]=ROLE[a.role]||["?","--fg-muted"];
      const isSig=!!a.signature;
      const mb=+a.mastery_bonus||0;
      const played=(+a.matches||0)>0;
      const stats=played
        ? `<span class="pmAgstats"><span class="s"><b>${esc(String(a.matches))}</b> M</span><span class="s"><b style="color:${ratColor(a.avg_rating)}">${a.avg_rating!=null?(+a.avg_rating).toFixed(2):'—'}</b> avg</span><span class="s"><b>${a.peak_rating!=null?(+a.peak_rating).toFixed(2):'—'}</b> peak</span></span>`
        : `<span class="pmAgstats untested">untested</span>`;
      return `<div class="pmAgentrow${isSig?' sig':''}">
        <span class="pmAgname">${isSig?'<span class="pmStar" title="Signature agent">★</span>':''}${esc(String(a.name||'—'))}</span>
        <span class="pmAgrole" style="color:${cssvar(arc)};background:color-mix(in srgb,${cssvar(arc)} 16%,transparent);border:1px solid color-mix(in srgb,${cssvar(arc)} 42%,transparent)">${esc(String(a.role||arl))}</span>
        <span class="pmAgbonus" style="color:${mb>0?'var(--green)':mb<0?'var(--red-text)':'var(--fg-muted)'}">${a.mastery_bonus!=null?sgn1(a.mastery_bonus):'—'}</span>
        ${stats}
      </div>`;
    }).join('');
  }else{
    agentsBody='<div class="pmEmpty">No agents in pool.</div>';
  }
  const sigHTML=sigName?`<div class="pmComfort">Signature <b>${esc(sigName)}</b></div>`:'';
  const agentsHTML=`<div class="pmPane${pmTab==='agents'?' on':''}" data-pm-pane="agents">
    <div class="pmSec"><div class="pmSeclab">Agent Pool · ${poolRaw.length}</div>${sigHTML}<div class="pmAgents">${agentsBody}</div></div></div>`;

  /* ===== IGL pane (read-only; only built when igl_profile present) =====
     Impact stat row + four tendency sliders (0–100 marker between two poles)
     + leadership attributes rendered like the Detail attribute bars. */
  let iglHTML='';
  if(hasIgl){
    const ig=p.igl_profile||{};

    const impactHTML=`<div class="pmSec"><div class="pmSeclab">IGL Impact</div>

      ['decision','Decision Making'],['intelligence','Intelligence'],['adaptability','Adaptability']

    const iglAttrHTML=iglAttrDefs.map(([k,lab])=>{

      return `<div class="pmAttr"><span class="an">${esc(lab)}</span>${bar}<span class="av">${val!=null?esc(String(val)):'—'}</span></div>`;
    }).join('');
    const iglAttrsSec=`<div class="pmSec"><div class="pmSeclab">Leadership Attributes</div>
      <div class="pmAttrs">${iglAttrHTML}</div></div>`;
    iglHTML=`<div class="pmPane${pmTab==='igl'?' on':''}" data-pm-pane="igl">
      ${impactHTML}${tendHTML}${iglAttrsSec}</div>`;
  }

  /* ===== INTEREST pane (always present) =====
     A market scouting report: which rival clubs are pursuing / admiring this
     player, with the AI's real reasons and any blockers. The pane's inner region
     ([data-pi-body]) is filled by a get:playerinterest push (pmApplyInterest),
     updating ONLY this region. Seed it from cache if we have a prior payload for
     this player (no re-flash), else a subtle "scanning the market" placeholder
     that stays until the push lands. */
  const cachedInterest = (pmPlayerId!=null) ? pmInterestCache[pmPlayerId] : null;
  const interestSeed = cachedInterest
    ? pmInterestBodyHTML(cachedInterest)
    : `<div class="piScan"><span class="piScandot"></span>Scanning the market…</div>`;
  const interestHTML=`<div class="pmPane${pmTab==='interest'?' on':''}" data-pm-pane="interest">
    <div class="pmSec"><div class="pmSeclab">Market Interest <button type="button" class="pmRescan" data-pi-rescan title="Re-run the market scan (interest shifts as budgets and form move)">↻ Rescan</button></div>
      <div class="piWrap" data-pi-body>${interestSeed}</div>

  /* ===== SCOUT pane (always present) =====
     The head-scout's report on this player. The pane's inner region

     updating ONLY this region. Seed from cache (no re-flash) if we have a prior
     payload for this player, else a subtle "scouting" placeholder until the push

  const cachedScout = (pmPlayerId!=null) ? pmScoutCache[pmPlayerId] : null;
  const scoutSeed = cachedScout
    ? pmScoutBodyHTML(cachedScout)
    : `<div class="skScan"><span class="skScandot"></span>Consulting your scout…</div>`;
  const scoutHTML=`<div class="pmPane${pmTab==='scout'?' on':''}" data-pm-pane="scout">
    <div class="pmSec"><div class="pmSeclab">Scout Report <button type="button" class="pmRescan" data-sk-rescan title="Refresh the report with current form">↻ Refresh</button></div>

  /* ===== RE-SIGN pane (only when on_user_team) =====
     The form's default values come from the ASK the host echoes in the previous
     preview if we have one for THIS player, else from the contract. We seed
     pmResignForm here so the first preview push (fired on tab-open) uses sane
     numbers, then let the DOM inputs drive it afterward. */
  let resignHTML='';
  if(hasResign){
    // Fresh player → drop any stale preview cache/form from a previous player.
    if(!pmResignForm || pmResignForm.id!==p.id){ pmResignForm=null; pmResignLast=null; }
    const askYears = (pmResignLast && pmResignLast.ask && pmResignLast.ask.years) || ((ct.years_left||0)+1) || 2;
    const askAmt   = (pmResignLast && pmResignLast.ask && pmResignLast.ask.amount_k) || ct.salary_k || 50;
    const askMin   = (pmResignLast && pmResignLast.ask && pmResignLast.ask.min_acceptable_k) || Math.round(askAmt*0.7);
    // slider ranges (per spec)
    const salMin = Math.max(10, Math.round(askMin*0.6));
    const salMax = Math.max(salMin+10, Math.round(askAmt*1.8));
    const bonMax = Math.max(10, Math.round(askAmt));
    // seed form once per player (preserve across resignpreview re-renders)
    if(!pmResignForm){
      pmResignForm={
        id:p.id,
        years:Math.max(1,Math.min(5, askYears)),
        amount:Math.max(salMin,Math.min(salMax, Math.round(askAmt))),
        bonus:0,
        starter:false,
        role:-1
      };
    }
    const f=pmResignForm;
    const roleDefs=[['-1','Natural'],['0','Duelist'],['1','Initiator'],['2','Controller'],['3','Sentinel']];
    const roleBtns=roleDefs.map(([rv,rlab])=>
      `<button type="button" class="rsRole${String(f.role)===rv?' on':''}" data-rs-role="${rv}">${esc(rlab)}</button>`
    ).join('');
    resignHTML=`<div class="pmPane${pmTab==='resign'?' on':''}" data-pm-pane="resign">
      <div class="pmSec"><div class="pmSeclab">Contract Extension</div>
      <div class="rsForm" data-rs-ranges="${salMin},${salMax},${bonMax}">
        <div class="rsControls">
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Years</span><span class="rsVal" data-rs-yearsval>${f.years}</span></div>
            <div class="rsSlideline">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-rs-step="years" data-d="-1" aria-label="Fewer years">&minus;</button></span>
              <input type="range" class="rsSlider" data-rs-input="years" min="1" max="5" step="1" value="${f.years}" aria-label="Contract length in years">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-rs-step="years" data-d="1" aria-label="More years">+</button></span>
            </div>
          </div>
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Salary / yr</span><span class="rsVal" data-rs-salval>${esc(fmtK(f.amount))}</span></div>
            <div class="rsSlideline">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-rs-step="amount" data-d="-5" aria-label="Lower salary">&minus;</button></span>
              <input type="range" class="rsSlider" data-rs-input="amount" min="${salMin}" max="${salMax}" step="1" value="${f.amount}" aria-label="Annual salary in thousands">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-rs-step="amount" data-d="5" aria-label="Raise salary">+</button></span>
            </div>
            <div class="rsRowhead"><span class="rsHint">Ask ${esc(fmtK(askAmt))} · min ${esc(fmtK(askMin))}</span></div>
          </div>
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Signing bonus</span><span class="rsVal" data-rs-bonval>${esc(fmtK(f.bonus))}</span></div>
            <div class="rsSlideline">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-rs-step="bonus" data-d="-5" aria-label="Lower bonus">&minus;</button></span>
              <input type="range" class="rsSlider" data-rs-input="bonus" min="0" max="${bonMax}" step="1" value="${f.bonus}" aria-label="Signing bonus in thousands">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-rs-step="bonus" data-d="5" aria-label="Raise bonus">+</button></span>
            </div>
          </div>
          <label class="rsCheck">
            <input type="checkbox" data-rs-input="starter"${f.starter?' checked':''}>
            <span class="rsCheckbox"></span>
            <span class="rsCktx"><b>Promise starter role</b><span>Guarantees a starting spot — boosts acceptance but binds you.</span></span>
          </label>
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Offered role</span></div>
            <div class="rsRoles" data-rs-roles>${roleBtns}</div>
            <div class="rsRolefit${f.role===-1?' natural':''}" data-rs-rolefit></div>
          </div>
        </div>
        <div class="rsPredside">
          <div class="rsPredict" data-rs-predict>
            <div class="rsExplain">Adjust the terms to see how ${esc(p.name||'the player')} will respond.</div>
          </div>
          <div class="rsSubmitrow">
            <button type="button" class="rsSubmit" data-rs-submit>Offer Extension</button>
            <div class="rsSubmitnote" data-rs-submitnote>Adjust the terms above, then send your offer.</div>
          </div>
        </div>
      </div>
      </div>
    </div>`;
  }

  /* ===== SIGN pane (only when canSign) =====
     A free-agent NEGOTIATION: assigned role (grounded fit read), wage offer,
     contract length and an optional signing bonus. The wage/years/bonus feed the
     SAME live acceptance preview as re-signing (get:resignpreview — the host
     resolves FAs too), so the verdict card shows will-accept / ask / counter
     before you commit. Submit posts the 8-arg signfa; the player can refuse. */
  let signHTML='';
  if(canSign){
    if(!pmSignForm || pmSignForm.id!==p.id){
      const askSeed=Math.max(10, Math.min(180, +(p.contract&&p.contract.salary_k)||50));
      pmSignForm={ id:p.id, years:2, role:-1, bonus:0, amount:askSeed,
        name:(p.name||'Player'), roleName:(p.role||''), ovr:(+p.ovr||0),
        fits:(Array.isArray(p.role_fits)?p.role_fits:[]) };
    }
    const f=pmSignForm;
    const budgetK=Math.max(0, +D.user_budget_k||0);
    const bonusMax=Math.max(0, Math.min(budgetK, 1000));   // step in $5K below
    const roleDefs=[['-1','Natural'],['0','Duelist'],['1','Initiator'],['2','Controller'],['3','Sentinel']];
    const roleBtns=roleDefs.map(([rv,rlab])=>
      `<button type="button" class="rsRole${String(f.role)===rv?' on':''}" data-sg-role="${rv}">${esc(rlab)}</button>`
    ).join('');
    signHTML=`<div class="pmPane${pmTab==='sign'?' on':''}" data-pm-pane="sign">
      <div class="pmSec"><div class="pmSeclab">Sign Free Agent · Negotiation</div>
      <div class="rsForm sgForm">
        <div class="rsControls">
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Assigned role</span></div>
            <div class="rsRoles" data-sg-roles>${roleBtns}</div>
            <div class="rsRolefit sgRolefit" data-sg-rolefit></div>
          </div>
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Wage offer</span><span class="rsVal" data-sg-amountval>${esc(fmtK(f.amount))}/yr</span></div>
            <div class="rsSlideline">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-sg-step="amount" data-d="-5" aria-label="Lower wage">&minus;</button></span>
              <input type="range" class="rsSlider" data-sg-input="amount" min="10" max="180" step="5" value="${f.amount}" aria-label="Wage offer in thousands per year">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-sg-step="amount" data-d="5" aria-label="Raise wage">+</button></span>
            </div>
          </div>
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Contract length</span><span class="rsVal" data-sg-yearsval>${f.years} yrs</span></div>
            <div class="rsSlideline">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-sg-step="years" data-d="-1" aria-label="Fewer years">&minus;</button></span>
              <input type="range" class="rsSlider" data-sg-input="years" min="1" max="5" step="1" value="${f.years}" aria-label="Contract length in years">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-sg-step="years" data-d="1" aria-label="More years">+</button></span>
            </div>
          </div>
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Signing bonus</span><span class="rsVal" data-sg-bonval>${esc(fmtK(f.bonus))}</span></div>

              <span class="rsStep"><button type="button" class="rsStepbtn" data-sg-step="bonus" data-d="-5" aria-label="Lower bonus">&minus;</button></span>
              <input type="range" class="rsSlider" data-sg-input="bonus" min="0" max="${bonusMax}" step="5" value="${Math.min(f.bonus,bonusMax)}" aria-label="Signing bonus in thousands">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-sg-step="bonus" data-d="5" aria-label="Raise bonus">+</button></span>
            </div>
            <div class="rsRowhead"><span class="rsHint">Optional · your budget ${esc(fmtK(budgetK))}</span></div>
          </div>
        </div>
        <div class="rsPredside">
          <div class="rsPredict sgPredict" data-sg-predict></div>
          <div class="rsSubmitrow">
            <button type="button" class="rsSubmit" data-sg-submit>Offer to ${esc(p.name||'Player')}</button>
            <div class="rsSubmitnote">No fee — but the player weighs your wage, length, role and club before signing.</div>
          </div>
        </div>
      </div>
      </div>
    </div>`;
  }

  /* ===== BID pane (only when canBid) =====
     A transfer-bid form for a rival's contracted player: one fee slider anchored
     on the exported market value, a live fee-vs-value verdict + summary, and a
     submit that posts the buyplayer bid. There's no live preview — the real
     outcome (accept / reject + the seller's asking hint) arrives as a host toast. */
  let bidHTML='';
  if(canBid){
    const valueK=Math.max(0, +p.transfer_value_k||0);
    const budgetK=Math.max(0, +D.user_budget_k||0);
    const seller=String(p.seller_team||p.team_name||'');
    // slider ceiling: comfortably above value so a strong overbid is reachable,
    // but never demand more than the club could ever pay.
    const feeMax=Math.max(10, Math.min(Math.max(budgetK, Math.round(valueK*1.6)), Math.round(valueK*2.5)+10));
    if(!pmBidForm || pmBidForm.id!==p.id){
      pmBidForm={ id:p.id, fee:Math.min(valueK||10, feeMax), value:valueK, budget:budgetK,
        name:(p.name||'Player'), seller:seller };
    }
    const f=pmBidForm;
    bidHTML=`<div class="pmPane${pmTab==='bid'?' on':''}" data-pm-pane="bid">
      <div class="pmSec"><div class="pmSeclab">Transfer Bid</div>
      <div class="rsForm sgForm">
        <div class="rsControls">
          <div class="rsRow">
            <div class="rsRowhead"><span class="rsLab">Transfer fee</span><span class="rsVal" data-bd-feeval>${esc(fmtK(f.fee))}</span></div>
            <div class="rsSlideline">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-bd-step data-d="-5" aria-label="Lower fee">&minus;</button></span>
              <input type="range" class="rsSlider" data-bd-input min="0" max="${feeMax}" step="5" value="${f.fee}" aria-label="Transfer fee in thousands">
              <span class="rsStep"><button type="button" class="rsStepbtn" data-bd-step data-d="5" aria-label="Raise fee">+</button></span>
            </div>
            <div class="rsRowhead"><span class="rsHint">${esc(seller)} · market value ${esc(fmtK(valueK))} · your budget ${esc(fmtK(budgetK))}</span></div>
          </div>
        </div>
        <div class="rsPredside">
          <div class="rsBanner fair" data-bd-verdict></div>
          <div class="rsPredict sgPredict" data-bd-summary></div>
          <div class="rsSubmitrow">
            <button type="button" class="rsSubmit" data-bd-submit>Bid for ${esc(p.name||'Player')}</button>
            <div class="rsSubmitnote">One bid per window — a rejection tells you what they'd take.</div>
          </div>
        </div>
      </div>
      </div>
    </div>`;
  }

  host.innerHTML=headHTML+tabsHTML+`<div class="pmBody">${overviewHTML}${detailHTML}${mapsHTML}${agentsHTML}${iglHTML}${interestHTML}${scoutHTML}${resignHTML}${signHTML}${bidHTML}</div>`;

  /* ===== show + wire ===== */
  pmOpen=true; pmSeq=++modalSeq; m.classList.add("open"); m.setAttribute("aria-hidden","false");

  // tab switching (client-side; no bridge)
  host.querySelectorAll("[data-pm-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      pmTab=btn.dataset.pmTab;
      host.querySelectorAll(".pmTab").forEach(t=>t.classList.toggle("on", t.dataset.pmTab===pmTab));
      host.querySelectorAll(".pmPane").forEach(pn=>pn.classList.toggle("on", pn.dataset.pmPane===pmTab));
      // First-open of the Re-sign tab: fire a preview so the card isn't blank.
      if(pmTab==='resign' && !pmResignLast) pmResignPreviewDebounced();
      // First-open of the Interest tab: fetch the market scan (once per player).
      if(pmTab==='interest') pmInterestFetch(p.id);
      // First-open of the Scout tab: fetch the scout report (once per player).
      if(pmTab==='scout') pmScoutFetch(p.id);
    });
  });
  // Modal opened DIRECTLY on the Interest tab (remembered from a prior open) →
  // fire the fetch now so the pane fills without a click.
  if(pmTab==='interest') pmInterestFetch(p.id);
  // Same for the Scout tab. Also (re)wire the commission slider/button if we
  // painted the pane from a cached unscouted payload (no push will re-wire it).
  if(pmTab==='scout') pmScoutFetch(p.id);
  if(cachedScout){
    const skRegion=host.querySelector("[data-sk-body]");
    if(skRegion) pmWireScout(skRegion, cachedScout);
  }
  // Rescan buttons — drop the cached intel and re-fetch (interest/scout data is
  // day-sensitive; advance() also clears these caches globally).
  const piR=host.querySelector('[data-pi-rescan]');
  if(piR) piR.addEventListener('click',()=>{ if(pmPlayerId!=null){ delete pmInterestCache[pmPlayerId]; pmInterestAsked=null; pmInterestFetch(pmPlayerId); } });
  const skRb=host.querySelector('[data-sk-rescan]');
  if(skRb) skRb.addEventListener('click',()=>{ if(pmPlayerId!=null){ delete pmScoutCache[pmPlayerId]; pmScoutAsked=null; pmScoutFetch(pmPlayerId); } });

  // header actions
  const fav=host.querySelector("[data-pm-fav]"); if(fav) fav.addEventListener("click",()=>pmFavorite(p.id, !p.favorited));
  const wat=host.querySelector("[data-pm-watch]"); if(wat) wat.addEventListener("click",()=>pmWatch(p.id, !p.watched));
  const sct=host.querySelector("[data-pm-scout]"); if(sct) sct.addEventListener("click",()=>pmScout(p.id));
  const que=host.querySelector("[data-pm-queue]"); if(que) que.addEventListener("click",()=>pmQueueMatch(p.id));
  // Release — two-step inline confirm (NO native confirm() dialog, which would
  // hang a headless host). First click arms the button for ~4s; a second click
  // while armed posts the release. Clicking away / timeout disarms it.
  const rel=host.querySelector("[data-pm-release]");
  if(rel){
    let armed=false, t=null;
    const disarm=()=>{ armed=false; rel.classList.remove("armed"); rel.textContent="Release"; if(t){ clearTimeout(t); t=null; } };
    rel.addEventListener("click",ev=>{
      ev.stopPropagation();
      if(!armed){
        armed=true; rel.classList.add("armed"); rel.textContent="Confirm release?";
        t=setTimeout(disarm,4000);
      }else{
        disarm(); pmRelease(p.id);
      }
    });
  }
  // god-mode toggle — flip the shared flag, then re-render THIS modal from D so
  // edit controls appear/disappear without a host round-trip.
  const god=host.querySelector("[data-pm-god]");
  if(god) god.addEventListener("click",()=>{ godMode=!godMode; renderPlayerModal(D); });

  // GOD MODE: inline rename. Clicking the ✎ swaps the name for a text input;
  // Enter/blur commits via act:setname (colons stripped so the command stays valid).
  const rn=host.querySelector("[data-pm-rename]");
  if(rn) rn.addEventListener("click",()=>{
    const nameEl=host.querySelector(".pmName"); if(!nameEl) return;
    const id=rn.getAttribute("data-pm-rename");
    const cur=(p.name||"").toString();
    nameEl.innerHTML=`<input type="text" class="pmNameInput" maxlength="24" value="${esc(cur)}" aria-label="Player name">`;
    const inp=nameEl.querySelector(".pmNameInput"); if(!inp) return;
    inp.focus(); inp.select();
    let done=false;
    const commit=()=>{ if(done) return; done=true;
      const v=(inp.value||"").replace(/:/g,"").trim();
      if(v && v!==cur) post("act:setname:"+id+":"+v+":playermodal"); else renderPlayerModal(D);
    };
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); commit(); } else if(e.key==="Escape"){ done=true; renderPlayerModal(D); } });
    inp.addEventListener("blur",commit);
  });

  /* ===== RE-SIGN pane wiring (only when the pane exists) =====
     Every control writes into pmResignForm and fires a debounced preview push.
     The sliders/steppers/roles are the user's inputs — the resignpreview push
     only re-renders the prediction CARD (see pmApplyResignPreview), never these,
     so dragging stays smooth. Submit posts the commit; the host re-pushes the
     modal so we never refresh manually here. */
  if(hasResign && pmResignForm){
    const clampIn=(inp,v)=>{ const lo=+inp.min,hi=+inp.max; if(isFinite(lo))v=Math.max(lo,v); if(isFinite(hi))v=Math.min(hi,v); return v; };
    // range sliders (years / amount / bonus)
    host.querySelectorAll('.rsSlider[data-rs-input]').forEach(inp=>{
      const key=inp.dataset.rsInput;
      inp.addEventListener('input',()=>{
        pmResignForm[key]=+inp.value;
        pmResignSyncFormLabels();
        pmResignPreviewDebounced();
      });
    });
    // +/- steppers move the matching slider by data-d, then re-preview.
    host.querySelectorAll('.rsStepbtn[data-rs-step]').forEach(btn=>{
      btn.addEventListener('click',ev=>{
        ev.stopPropagation();
        const key=btn.dataset.rsStep, d=+btn.dataset.d;
        const inp=host.querySelector(`[data-rs-input="${key}"]`);
        if(!inp) return;
        const nv=clampIn(inp, (+pmResignForm[key])+d);
        if(nv!==+pmResignForm[key]){ inp.value=nv; pmResignForm[key]=nv; pmResignSyncFormLabels(); pmResignPreviewDebounced(); }
      });
    });
    // starter-promise checkbox
    const chk=host.querySelector('input[type=checkbox][data-rs-input="starter"]');
    if(chk) chk.addEventListener('change',()=>{ pmResignForm.starter=chk.checked; pmResignPreviewDebounced(); });
    // offered-role segmented buttons (-1 natural / 0..3)
    host.querySelectorAll('[data-rs-role]').forEach(rb=>{
      rb.addEventListener('click',()=>{
        pmResignForm.role=+rb.dataset.rsRole;
        host.querySelectorAll('[data-rs-role]').forEach(o=>o.classList.toggle('on', o===rb));
        // natural picks clear the fit line immediately; the preview refills it.
        const rf=host.querySelector('[data-rs-rolefit]');
        if(rf && pmResignForm.role===-1){ rf.textContent=''; rf.classList.add('natural'); }
        pmResignPreviewDebounced();
      });
    });
    // submit — commit the current form. Host re-pushes playermodal (no manual refresh).
    const sub=host.querySelector('[data-rs-submit]');
    if(sub) sub.addEventListener('click',()=>{ if(pmResignForm) pmResignSubmit(pmResignForm); });
    // If the Re-sign tab is the active one on (re)render, refresh the card from
    // any cached preview and fire a fresh one so it's never blank.
    if(pmTab==='resign'){
      if(pmResignLast) pmApplyResignPreview(pmResignLast);
      pmResignPreviewDebounced();
    }
  }

  /* ===== SIGN pane wiring (only when the pane exists) =====
     Header "Sign Free Agent" jumps to the tab; the form's controls write into
     pmSignForm and re-sync the fit line + summary client-side (no host round
     trip). Submit posts the 7-arg signfa; the host re-pushes the modal. */
  const sgjump=host.querySelector("[data-pm-signjump]");
  if(sgjump) sgjump.addEventListener("click",()=>{
    if(!canSign) return;
    pmTab='sign';
    host.querySelectorAll(".pmTab").forEach(t=>t.classList.toggle("on", t.dataset.pmTab==='sign'));
    host.querySelectorAll(".pmPane").forEach(pn=>pn.classList.toggle("on", pn.dataset.pmPane==='sign'));
  });
  if(canSign && pmSignForm){
    const clampIn=(inp,v)=>{ const lo=+inp.min,hi=+inp.max; if(isFinite(lo))v=Math.max(lo,v); if(isFinite(hi))v=Math.min(hi,v); return v; };
    host.querySelectorAll('.rsSlider[data-sg-input]').forEach(inp=>{
      const key=inp.dataset.sgInput;
      inp.addEventListener('input',()=>{ pmSignForm[key]=+inp.value; pmSignSync(); });
    });
    host.querySelectorAll('.rsStepbtn[data-sg-step]').forEach(btn=>{
      btn.addEventListener('click',ev=>{
        ev.stopPropagation();
        const key=btn.dataset.sgStep, d=+btn.dataset.d;
        const inp=host.querySelector(`[data-sg-input="${key}"]`);
        if(!inp) return;
        const nv=clampIn(inp,(+pmSignForm[key])+d);
        if(nv!==+pmSignForm[key]){ inp.value=nv; pmSignForm[key]=nv; pmSignSync(); }
      });
    });
    host.querySelectorAll('[data-sg-role]').forEach(rb=>{
      rb.addEventListener('click',()=>{
        pmSignForm.role=+rb.dataset.sgRole;
        host.querySelectorAll('[data-sg-role]').forEach(o=>o.classList.toggle('on', o===rb));
        pmSignSync();
      });
    });
    const sgsub=host.querySelector('[data-sg-submit]');
    if(sgsub) sgsub.addEventListener('click',()=>{ if(pmSignForm) pmSignSubmit(pmSignForm); });
    pmSignSync();   // initial fill so the fit line + summary aren't blank
  }

  /* ===== BID pane wiring (only when the pane exists) =====
     Header "Make Transfer Bid" jumps to the tab; the fee slider/steppers write
     into pmBidForm and re-sync the verdict + summary client-side. Submit posts
     the buyplayer bid; the host toasts the outcome (and re-pushes on acceptance). */
  const bdjump=host.querySelector("[data-pm-bidjump]");
  if(bdjump) bdjump.addEventListener("click",()=>{
    if(!canBid) return;
    pmTab='bid';
    host.querySelectorAll(".pmTab").forEach(t=>t.classList.toggle("on", t.dataset.pmTab==='bid'));
    host.querySelectorAll(".pmPane").forEach(pn=>pn.classList.toggle("on", pn.dataset.pmPane==='bid'));
  });
  if(canBid && pmBidForm){
    const feeInp=host.querySelector('[data-bd-input]');
    if(feeInp){
      feeInp.addEventListener('input',()=>{ pmBidForm.fee=+feeInp.value; pmBidSync(); });
      host.querySelectorAll('.rsStepbtn[data-bd-step]').forEach(btn=>{
        btn.addEventListener('click',ev=>{
          ev.stopPropagation();
          const lo=+feeInp.min, hi=+feeInp.max, d=+btn.dataset.d;
          let nv=Math.max(lo, Math.min(hi, (+pmBidForm.fee)+d));
          if(nv!==+pmBidForm.fee){ feeInp.value=nv; pmBidForm.fee=nv; pmBidSync(); }
        });
      });
    }
    const bdsub=host.querySelector('[data-bd-submit]');
    if(bdsub) bdsub.addEventListener('click',()=>{ if(pmBidForm) pmBidSubmit(pmBidForm); });
    pmBidSync();   // initial fill so the verdict + summary aren't blank
  }

  // god-mode steppers + badge editor (only present when editable)
  if(editable){
    host.querySelectorAll(".pmAttr .attredit[data-pmattr]").forEach(wrap=>{
      const an=wrap.dataset.pmattr;
      const cur=(p.attributes||[]).find(a=>a.name===an);
      const base=cur?+cur.value:0;
      wrap.querySelectorAll(".stepbtn").forEach(btn=>btn.addEventListener("click",ev=>{
        ev.stopPropagation();
        const nv=Math.max(1,Math.min(99, base+(+btn.dataset.d)));
        if(nv!==base) pmSetAttr(p.id, an, nv);
      }));
    });
    host.querySelectorAll(".attredit[data-pmpot]").forEach(wrap=>{
      const base=+p.potential||0;
      wrap.querySelectorAll(".stepbtn").forEach(btn=>btn.addEventListener("click",ev=>{
        ev.stopPropagation();
        const nv=Math.max(1,Math.min(99, base+(+btn.dataset.d)));
        if(nv!==base) pmSetPot(p.id, nv);
      }));
    });
    host.querySelectorAll("[data-pm-badgerm]").forEach(btn=>btn.addEventListener("click",ev=>{
      ev.stopPropagation(); pmRmBadge(p.id, btn.dataset.pmBadgerm);
    }));
    const bsel=host.querySelector("[data-pm-badgesel]"), badd=host.querySelector("[data-pm-badgeadd]");
    if(bsel && badd){
      bsel.addEventListener("change",()=>{ badd.disabled=!bsel.value; });
      badd.addEventListener("click",()=>{ if(bsel.value) pmAddBadge(p.id, bsel.value); });
    }
  }
}

let currentScreen = "dashboard";

function setNavActive(screen){
  // Parameterized screens arrive as "teamprofile:<name>" — key off the base only.
  const base=String(screen||"").split(":")[0];
  const home=$("#navHome"), squad=$("#navSquad"), comp=$("#navComp"), strat=$("#navStrat"), awd=$("#navAwd"), brk=$("#navBrk"), rec=$("#navRec"), matchb=$("#navMatch"), fin=$("#navFin"), mkt=$("#navMkt"), scout=$("#navScout"), recruit=$("#navRecruit"), mail=$("#navMail"), cal=$("#navCal"), fav=$("#navFav"), watch=$("#navWatch"), newg=$("#navNew");
  [home,squad,comp,strat,awd,brk,rec,matchb,fin,mkt,scout,recruit,mail,cal,fav,watch,newg].forEach(b=>{ if(b){ b.classList.remove("active"); b.removeAttribute("aria-current"); } });
  // teamprofile + playermodal have NO rail button — leave the rail untouched
  // (don't fall back to home). playermodal is a floating overlay so the rail
  // must keep highlighting whatever screen is underneath it.
  if(base==="teamprofile" || base==="playermodal") return;
  const map={roster:squad,competition:comp,strategy:strat,awards:awd,brackets:brk,records:rec,match:matchb,finance:fin,market:mkt,scouting:scout,recruitment:recruit,mail:mail,calendar:cal,favorites:fav,watchlist:watch,newgame:newg,dashboard:home};
  const active = map[base] || home;
  if(active){ active.classList.add("active"); active.setAttribute("aria-current","page"); }
}

function render(screen, data, club){
  if(screen==="dashboard") renderDashboard(data, club);
  else if(screen==="roster") renderRoster(data, club);
  else if(screen==="competition") renderCompetition(data, club);

  else if(screen==="scouting") renderScouting(data, club);

function go(screen){
  document.body.classList.remove("menuMode");   // leaving the title screen
  currentScreen = screen;
  setNavActive(screen);
  if(bridge) post("nav:"+screen);
  else renderFromFallback(screen);
}

/* Matchday guard: advancing with Continue/Phase on matchday sims your own
   series (Phase can sim a whole bracket run) off-screen. First press warns;
   pressing again within 4s proceeds. Set by renderDashboard. */
let advanceArmed=null, lastNextMatch=null, lastInPreseason=false;
function advance(mode){
  if(!bridge) return;
  const matchToday = lastNextMatch && lastNextMatch.days_until===0 && !lastInPreseason;
  if((mode==='day'||mode==='phase') && matchToday){
    const now=Date.now();
    if(!advanceArmed || advanceArmed.mode!==mode || now>advanceArmed.until){
      advanceArmed={mode:mode,until:now+4000};
      showToast('warn','Your match is TODAY — press again to sim it, or use Match to play it.');
      return;
    }
  }
  advanceArmed=null;
  // The cmdbar Match button exists to watch your series — always land on the viewer.
  post("advance:"+mode+":"+(mode==='match'?'match':currentScreen));
  // Market/scout intel goes stale the moment the world advances.
  pmInterestCache={}; pmScoutCache={}; pmInterestAsked=null; pmScoutAsked=null;
  // Autosave (Settings): the host processes commands in order, so this saves
  // the post-advance world. "quiet" = no toast, no re-push; silently skipped
  // by the host during active tournaments.
  if(autosaveOn) post("act:save:auto:quiet");
}
/* Global shortcuts: Space = Continue, M = skip to match, 1-9 = rail screens.
   Ignored while typing, over buttons, in modals, or on the title screen. */
document.addEventListener("keydown",e=>{
  if(e.ctrlKey||e.altKey||e.metaKey) return;
  const t=e.target;
  if(t && (t.tagName==="INPUT"||t.tagName==="SELECT"||t.tagName==="TEXTAREA"||t.tagName==="BUTTON"||t.isContentEditable)) return;
  if(pmOpen||smOpen) return;
  if(document.body.classList.contains("menuMode")) return;
  const k=e.key;
  if(k===" "){ e.preventDefault(); advance('day'); }
  else if(k==="m"||k==="M"){ e.preventDefault(); advance('match'); }
  else if(k>="1"&&k<="9"){
    const s=["dashboard","roster","competition","strategy","market","recruitment","scouting","mail","calendar"][+k-1];
    if(s) go(s);
  }
});
// Host-drivable hooks (used by vlrweb.exe --shot --adv for headless verification
// of the advance loop and, later, any action). Harmless in a normal browser.
window.__advance = advance;
window.__go = go;

/* God-mode verification hook — lets the host enable god mode headlessly for a
   screenshot. Sets the module-scoped flag and, if the roster screen is active,
   re-renders the roster so the inline steppers appear on the selected player
   (renderRoster re-applies godMode + re-selects selectedPlayerId on render).
   Re-renders from bundled ROSTER_DATA when there's no bridge; otherwise asks
   the host to re-push roster state. */
window.__godmode = function(on){

    if(RAW && RAW.roster) renderRoster(RAW.roster, RAW.club_color);
    else if(bridge) post("get:roster");
