<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Valosim — App (WebView2 Shell)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   SHARED BASE (identical across dashboard.html + roster.html — once)
   ===================================================================== */
:root{
  /* surfaces — page → forward */
  --bg-0:#0B0D12; --bg-1:#171A24; --bg-2:#1C202C; --bg-3:#242938;
  --hairline:#2A2F3D; --border-strong:#3A4152;
  --hi-inset:inset 0 1px 0 rgba(233,236,241,.05);
  /* text */
  --fg:#E9ECF1; --fg-muted:#8B93A3; --fg-ghost:#7C8499;
  /* brand + semantics */
  --red:#FF4655; --red-tint:rgba(255,70,85,.10); --red-glow:0 0 16px rgba(255,70,85,.35);
  --red-text:#FF8A94; /* soft danger red for text on dark — use instead of the raw hex */
  --green:#3FD17A; --amber:#D4A14C; --blue:#00D4FF; --purple:#7B5EFF; --gold:#FFD700;
  /* role colors */
  --r-duelist:#FF4655; --r-initiator:#00D4FF; --r-controller:#7B5EFF; --r-sentinel:#3FD17A;
  /* club color (per-org) */
  --club:#FF4655;
  /* post-match sides — cool blue / warm red for scoreboard clarity */
  --mv-blue:#4C8DFF; --mv-red:#FF5C6C;
  /* spacing 8pt */
  --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s7:32px;
  /* radius */
  --r-card:10px; --r-tile:8px; --r-pill:999px; --bevel:12px;
  /* type */
  --font-display:"Space Grotesk",system-ui,sans-serif;
  --font-ui:"Inter",system-ui,sans-serif;
  --font-num:"IBM Plex Mono",ui-monospace,monospace;
  /* motion */
  --ease:cubic-bezier(.2,.8,.2,1); --t-fast:140ms; --t-mid:220ms; --t-slow:300ms;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{overflow-x:auto;overflow-y:hidden}
body{
  width:100vw; min-width:1240px; height:100vh; overflow:hidden;
  background:
    radial-gradient(1200px 600px at 60% -10%, rgba(255,70,85,.05), transparent 60%),
    radial-gradient(900px 500px at 100% 110%, rgba(123,94,255,.04), transparent 60%),
    var(--bg-0);
  color:var(--fg); font-family:var(--font-ui);
  display:grid; grid-template-columns:80px 1fr;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.bevel{clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.bevel-tr{clip-path:polygon(0 0,calc(100% - var(--bevel)) 0,100% var(--bevel),100% 100%,0 100%)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ===================== NAV RAIL ===================== */
.nav{
  background:var(--bg-0); border-right:1px solid var(--hairline);
  display:flex; flex-direction:column; align-items:center; padding:13px 0 158px; gap:2px;
  height:100vh; overflow-y:auto; overflow-x:hidden;
  scrollbar-width:thin; scrollbar-color:var(--border-strong) transparent;
}
.nav::-webkit-scrollbar{width:5px}
.nav::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.nav::-webkit-scrollbar-track{background:transparent}
.nav .crest{
  width:40px;height:40px;border-radius:11px;background:var(--bg-3);
  border:1px solid var(--border-strong); display:grid;place-items:center;
  font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--fg);
  position:sticky;top:0;z-index:2; margin-bottom:9px; flex:none;
}
.nav .crest::after{content:"";position:absolute;bottom:-5px;left:8px;right:8px;height:2px;background:var(--club);border-radius:2px}
.nav button{
  width:66px;min-height:44px;border:0;background:transparent;border-radius:10px;
  color:var(--fg-muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;position:relative;padding:6px 2px;flex:none;
  transition:color var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
}
.nav button:hover{color:var(--fg);background:var(--bg-1)}
.nav button.active{color:var(--fg);background:var(--bg-1)}
.nav button.active::before{content:"";position:absolute;left:-7px;top:8px;bottom:8px;width:3px;border-radius:0 3px 3px 0;background:var(--red);box-shadow:0 0 10px rgba(255,70,85,.5)}
.nav .nlab{font-size:8px;font-weight:600;letter-spacing:.01em;text-align:center;line-height:1.05;white-space:normal;max-width:100%}
.nav .navdiv{width:38px;height:1px;background:var(--hairline);margin:7px 0 5px;flex:none}
.nav svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav .nbadge{position:absolute;top:4px;right:9px;min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;
  font-family:var(--font-num);font-size:8.5px;font-weight:600;display:grid;place-items:center;padding:0 3px;line-height:1;
  border:1px solid var(--bg-0);pointer-events:none}

/* ===================== COMMAND BAR (NEW) ===================== */
.cmdbar{
  position:fixed; left:0; bottom:0; width:80px; z-index:30;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:10px 0 14px; background:linear-gradient(180deg,transparent,var(--bg-0) 38%);
}
.cmdbar button{
  width:48px; border:1px solid var(--hairline); background:var(--bg-1);
  color:var(--fg-muted); border-radius:9px; cursor:pointer;
  font-family:var(--font-display); font-weight:600; font-size:9px;
  letter-spacing:.04em; text-transform:uppercase;
  display:flex; flex-direction:column; align-items:center; gap:4px; padding:7px 0 6px;
  box-shadow:var(--hi-inset);
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease);
}
.cmdbar button:hover{color:var(--fg);background:var(--bg-2);border-color:var(--border-strong)}
.cmdbar button svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}
.cmdbar button.primary{color:var(--fg);border-color:color-mix(in srgb,var(--club) 55%,transparent);background:color-mix(in srgb,var(--club) 16%,var(--bg-1))}
.cmdbar button.primary:hover{background:color-mix(in srgb,var(--club) 26%,var(--bg-1))}

/* ===================== CONTENT (#view replaces .content) ===================== */
#view{padding:18px 28px 20px;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ===================== MAIN MENU (title screen) ===================== */
/* Hiding the rail removes it from grid flow, so #view auto-places into the FIRST
   column — the template must collapse to one column or the menu renders 0-wide. */
body.menuMode{grid-template-columns:1fr}
body.menuMode nav.nav{display:none}
#view.mainmenu{padding:0;align-items:center;justify-content:center;position:relative;overflow:hidden}
#view.mainmenu::before{content:"";position:absolute;inset:-20%;pointer-events:none;
  background:radial-gradient(ellipse 60% 45% at 50% 30%,color-mix(in srgb,var(--club) 14%,transparent),transparent 70%)}
.mmWrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:34px;width:min(560px,92vw)}
.mmLogo{font-family:var(--font-display);font-weight:700;font-size:64px;letter-spacing:-.03em;line-height:.95;text-align:center}
.mmLogo span{display:block;font-size:26px;letter-spacing:.42em;color:var(--club);margin-top:6px}
.mmTag{margin-top:10px;font-size:13px;color:var(--fg-muted);text-align:center;letter-spacing:.02em}
.mmBtns{display:flex;flex-direction:column;gap:11px;width:320px}
.mmBtn{cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--fg);background:var(--bg-1);border:1px solid var(--border-strong);border-radius:12px;padding:14px 0;
  transition:border-color .15s,background .15s,transform .12s}
.mmBtn:hover:not(:disabled){border-color:var(--club);transform:translateY(-1px)}
.mmBtn.primary{color:#fff;background:color-mix(in srgb,var(--club) 82%,#000);border-color:transparent;
  box-shadow:0 6px 26px color-mix(in srgb,var(--club) 30%,transparent)}
.mmBtn.ghost{color:var(--fg-muted);background:transparent}
.mmBtn:disabled{opacity:.38;cursor:default}
.mmPanel{width:min(560px,92vw)}
.mmSlots{display:flex;flex-direction:column;gap:9px}
.mmSlot{display:flex;align-items:center;gap:14px;background:var(--bg-1);border:1px solid var(--hairline);
  border-radius:11px;padding:12px 16px;font-size:13px}
.mmSlot .sn{font-family:var(--font-display);font-weight:700;min-width:70px;color:var(--fg-ghost);text-transform:uppercase;font-size:10.5px;letter-spacing:.09em}
.mmSlot .si{flex:1;min-width:0;color:var(--fg)}
.mmSlot .si .sub{font-size:11px;color:var(--fg-muted);margin-top:1px}
.mmSlot button{cursor:pointer;font-size:11px;font-weight:700;color:var(--fg);background:var(--bg-2);
  border:1px solid var(--border-strong);border-radius:8px;padding:7px 14px}
.mmSlot button:hover{border-color:var(--club)}
.mmSlot button.danger:hover{border-color:var(--red)}
.mmSet{display:flex;flex-direction:column;gap:10px}
.mmSetRow{display:flex;align-items:center;gap:14px;background:var(--bg-1);border:1px solid var(--hairline);
  border-radius:11px;padding:13px 16px;font-size:13px}
.mmSetRow .sl{flex:1}
.mmSetRow .sl .sub{font-size:11px;color:var(--fg-muted);margin-top:1px}
.mmToggle{cursor:pointer;width:46px;height:24px;border-radius:12px;border:1px solid var(--border-strong);
  background:var(--bg-2);position:relative;flex:none}
.mmToggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
  background:var(--fg-muted);transition:left .15s,background .15s}
.mmToggle.on{background:color-mix(in srgb,var(--club) 55%,var(--bg-2));border-color:var(--club)}
.mmToggle.on::after{left:24px;background:#fff}
.mmFoot{font-size:10px;color:var(--fg-ghost);letter-spacing:.14em;text-transform:uppercase}
.preempty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--fg-muted);font-size:15px;letter-spacing:.01em;text-align:center;padding:40px}

/* header (shared shell; dashboard uses single clock, roster uses gapped clock) */
.header{
  position:relative;height:76px;background:var(--bg-1);border:1px solid var(--hairline);
  box-shadow:var(--hi-inset);border-radius:var(--r-card);padding:0 22px;
  display:flex;align-items:center;gap:18px;overflow:hidden;
}
.header::before{content:"";position:absolute;top:0;left:0;height:2px;width:30%;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
  animation:sweep 6s linear infinite}
.header .wash{position:absolute;top:0;left:0;width:200px;height:100%;
  background:linear-gradient(90deg,color-mix(in srgb,var(--club) 14%,transparent),transparent);pointer-events:none}
.header .hcrest{width:52px;height:52px;border-radius:13px;background:var(--bg-3);
  border:1px solid var(--border-strong);display:grid;place-items:center;
  font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--fg);z-index:1;flex:none}
.header .htitle{z-index:1}
.header .hname{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:-.02em;line-height:1.05}
.header .hmeta{display:flex;gap:7px;margin-top:7px}
.plate{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--fg-muted);background:var(--bg-2);border:1px solid var(--hairline);
  padding:4px 9px;clip-path:polygon(6px 0,100% 0,100% 100%,0 100%,0 6px)}
.plate.div{color:#ffb3ba;background:rgba(255,70,85,.10);border-color:rgba(255,70,85,.30)}
.header .hclock{margin-left:auto;text-align:right;z-index:1}
.header .hclock.dual{display:flex;gap:22px}
.header .hclock .lab{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--fg-ghost);text-transform:uppercase}
.header .hclock .val{font-family:var(--font-num);font-size:15px;color:var(--fg);margin-top:3px}
.header .hclock.dual .val{font-size:18px}

/* shared card */
.card{background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-card);padding:16px 18px;display:flex;flex-direction:column;min-height:0;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chead .t{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted)}
.chead .s{font-family:var(--font-num);font-size:11.5px;color:var(--fg-muted)}
.cbody{flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.cbody::-webkit-scrollbar{width:6px}.cbody::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.cbody.nocap{overflow:visible;flex:none}
.cbody.fademask{-webkit-mask-image:linear-gradient(to bottom,#000 calc(100% - 22px),transparent);mask-image:linear-gradient(to bottom,#000 calc(100% - 22px),transparent)}

/* shared KPI strip — unified height 90px (good for both screens) */
.kpis{display:flex;gap:12px;margin-top:14px}
.kpi{flex:1;background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-tile);padding:13px 15px 0;height:90px;position:relative;overflow:hidden}
.kpi .klab{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--fg-muted)}
.kpi .kval{font-family:var(--font-num);font-weight:600;font-size:28px;line-height:1;margin-top:10px;color:var(--fg)}
.kpi .ksub{font-size:10.5px;color:var(--fg-muted);margin-top:6px}
.kpi .kbar{position:absolute;left:0;bottom:0;height:4px;width:35%;border-radius:0 2px 0 0;background:var(--accent,var(--amber));
  transition:width 200ms var(--ease)}
.kpi:hover .kbar{width:100%}
.kpi.today{border-color:var(--red);animation:pulse 1.7s ease-in-out infinite}
.kpi.today .kval{color:var(--red)}

/* shared empties / entrance */
.empty{color:var(--fg-muted);font-size:12px;padding:10px 2px}
.enter{opacity:0;transform:translateY(8px)}
.enter.in{opacity:1;transform:none;transition:opacity var(--t-mid) var(--ease),transform var(--t-mid) var(--ease)}
@keyframes sweep{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(255,70,85,0)}50%{box-shadow:0 0 16px rgba(255,70,85,.45)}}
*:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  .enter{opacity:1;transform:none}
  .dayrail .today{opacity:1}
}

/* =====================================================================
   DASHBOARD-SPECIFIC
   ===================================================================== */
/* day-rail */
.dayrail{position:relative;height:34px;margin:10px 4px 0;display:flex;align-items:center}
.dayrail .track{position:absolute;left:0;right:0;height:2px;background:var(--bg-2);border-radius:2px}
.dayrail .fill{position:absolute;left:0;height:2px;border-radius:2px;width:0;
  background:linear-gradient(90deg,var(--amber),var(--gold));box-shadow:0 0 6px rgba(212,161,76,.28);
  transition:width 900ms var(--ease)}
.dayrail .tick{position:absolute;top:50%;transform:translate(-50%,-50%) rotate(45deg);
  width:9px;height:9px;background:var(--bg-0);border:1.5px solid var(--fg-ghost);border-radius:2px;z-index:1}
.dayrail .tick.lit{background:var(--amber);border-color:var(--amber);box-shadow:0 0 10px rgba(212,161,76,.55)}
.dayrail .tlab{position:absolute;top:-15px;transform:translateX(-50%);font-size:9.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost);white-space:nowrap}
.dayrail .tlab.lit{color:var(--amber)}
.dayrail .today{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;
  background:var(--red);border:2px solid var(--bg-0);box-shadow:var(--red-glow);z-index:2;opacity:0;transition:opacity 400ms 900ms}

/* cockpit grid (dashboard 12-col) */
.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px;margin-top:16px;flex:1;min-height:0}
.colA{grid-column:span 4;display:flex;flex-direction:column;gap:16px;min-height:0}
.colB{grid-column:span 4;min-height:0}
.colC{grid-column:span 4;display:flex;flex-direction:column;gap:16px;min-height:0}

/* objectives */
.obj{display:flex;flex-direction:column;gap:5px;padding:9px 0;border-bottom:1px solid var(--hairline)}
.obj:last-child{border-bottom:0}
.obj .top{display:flex;align-items:center;gap:8px}
.chip{width:17px;height:17px;border-radius:5px;display:grid;place-items:center;font-size:11px;font-weight:700;flex:none}
.chip.met{background:rgba(63,209,122,.16);color:var(--green);border:1px solid rgba(63,209,122,.4)}
.chip.unmet{background:transparent;color:var(--amber);border:1px solid rgba(212,161,76,.5)}
.pill{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:2px 7px;border-radius:var(--r-pill);flex:none}
.pill.primary{background:rgba(255,70,85,.14);color:var(--red-text);border:1px solid rgba(255,70,85,.45)}
.obj .txt{font-size:13px;font-weight:500;color:var(--fg);line-height:1.3}
.obj .frac{margin-left:auto;font-family:var(--font-num);font-size:12px;color:var(--fg-muted);flex:none}
.track{height:6px;background:var(--bg-2);border-radius:3px;overflow:hidden;margin-top:3px}
.track .tf{height:100%;width:0;border-radius:3px;transition:width 600ms var(--ease)}
.obj .prog{font-size:10.5px;color:var(--fg-muted)}

/* standings */
.stbl{width:100%;font-size:13.5px}
.stbl .sh{display:grid;grid-template-columns:34px 1fr 56px 48px;gap:6px;padding:0 6px 8px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:1}
.srow{display:grid;grid-template-columns:34px 1fr 56px 48px;gap:6px;align-items:center;height:36px;padding:0 6px;
  border-top:1px solid var(--hairline);position:relative;transition:background var(--t-fast) var(--ease)}
.srow:hover{background:var(--bg-2)}
.srow .rk{font-family:var(--font-num);color:var(--fg-muted);position:relative;padding-left:7px}
.srow.user{background:var(--red-tint)}
.srow.user::before{content:"";position:absolute;left:-18px;top:0;bottom:0;width:3px;background:var(--red)}
.srow.user .nm{color:var(--club);font-weight:600}
.srow .tick4::after{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:2px;background:var(--green)}
.srow .tick1::after{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:2px;background:var(--gold)}
.srow .team{display:flex;align-items:center;gap:9px;min-width:0}
.mono-chip{width:20px;height:20px;border-radius:5px;background:var(--bg-3);border:1px solid var(--border-strong);
  display:grid;place-items:center;font-family:var(--font-display);font-size:11px;font-weight:600;color:var(--fg-muted);flex:none}
.srow .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow .wl{font-family:var(--font-num);text-align:right;color:var(--fg)}
.srow .ov{font-family:var(--font-num);font-weight:600;text-align:right}
.stfoot{display:flex;align-items:center;gap:18px;padding-top:11px;margin-top:8px;border-top:1px solid var(--hairline);font-size:10.5px;color:var(--fg-muted)}
.stfoot .lg{display:flex;align-items:center;gap:6px}
.stfoot .lg i{width:8px;height:3px;border-radius:2px;display:inline-block}

/* next match hero */
.hero{background:var(--bg-3);border:1px solid var(--border-strong);box-shadow:0 8px 24px rgba(0,0,0,.45);
  border-radius:var(--r-card);padding:14px 16px;clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.hero .hh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.hero .hh .t{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted)}
.hero .vs{display:flex;align-items:center;justify-content:center;gap:16px}
.hero .side{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0}
.hero .big-chip{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:17px}
.hero .side .sn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.hero .side .so{font-family:var(--font-num);font-size:11px;color:var(--fg-muted)}
.hero .mid{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--fg-ghost)}
.hero .tape{display:flex;height:5px;border-radius:3px;overflow:hidden;margin:11px 0 10px;background:var(--bg-2)}
.hero .cta{display:block;width:100%;text-align:center;padding:9px;border-radius:8px;border:0;cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:12.5px;letter-spacing:.04em}
.hero .cta.live{background:var(--red);color:#fff;box-shadow:var(--red-glow)}
.hero .cta.live:hover{filter:brightness(1.12)}
.hero .cta:active{transform:translateY(1px)}
.hero .cta.soon{background:var(--bg-2);color:var(--fg-muted);border:1px solid var(--hairline)}

/* form & finance */
.ff{display:flex;flex-direction:column;gap:14px}
.ff .lab{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:7px}
.form5{display:flex;gap:6px}
.seg{flex:1;height:26px;border-radius:4px;display:grid;place-items:center;font-family:var(--font-num);font-size:10px;font-weight:600;
  clip-path:polygon(4px 0,100% 0,100% 100%,0 100%,0 4px)}
.seg.w{background:rgba(63,209,122,.16);color:var(--green);border:1px solid rgba(63,209,122,.35)}
.seg.l{background:rgba(255,70,85,.14);color:var(--red-text);border:1px solid rgba(255,70,85,.35)}
.ff .now{font-family:var(--font-num);font-size:13px;color:var(--fg);float:right;margin-top:-2px}

/* squad list (dashboard) */
.pl{display:flex;align-items:center;gap:11px;height:38px;padding:0 4px;border-top:1px solid var(--hairline);position:relative}
.pl:first-child{border-top:0}
.pl .role{font-family:var(--font-num);font-size:9.5px;font-weight:600;letter-spacing:.06em;padding:3px 6px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);flex:none}
.pl .ph{font-size:13.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl .tag{font-size:8.5px;font-weight:700;letter-spacing:.06em;color:var(--amber);border:1px solid rgba(212,161,76,.4);border-radius:4px;padding:1px 4px}
.pl .stat{display:flex;flex-direction:column;align-items:flex-end;width:42px;flex:none}
.pl .stat .sv{font-family:var(--font-num);font-size:13px;font-weight:600;line-height:1.1}
.pl .stat .sl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost)}
.pl.top .ph::after{content:"★";color:var(--gold);margin-left:6px;font-size:11px}
.pl.top{box-shadow:inset 0 0 0 1px rgba(255,215,0,.12)}

/* news */
.nw{display:flex;align-items:center;gap:10px;padding:8px 4px;border-top:1px solid var(--hairline)}
.nw:first-child{border-top:0}
.npill{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:5px;flex:none;white-space:nowrap;max-width:128px;overflow:hidden;text-overflow:ellipsis}
.nw .nh{font-size:13px;font-weight:600;color:var(--fg);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nw .nd{font-family:var(--font-num);font-size:10px;color:var(--fg-ghost);flex:none}

/* sparkline */
.spark{width:100%;height:54px;display:block}
.sparkwrap{position:relative;width:100%;height:54px}
.sparkdot{position:absolute;width:7px;height:7px;border-radius:50%;transform:translate(-50%,-50%)}
.spark-empty{height:54px;display:flex;align-items:center;color:var(--fg-muted);font-size:12px}

/* =====================================================================
   ROSTER-SPECIFIC  (.grid→.rgrid, .col→.rcol, .strip→.rstrip)
   ===================================================================== */
.rgrid{display:grid;grid-template-columns:7fr 5fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.rcol{display:flex;flex-direction:column;gap:14px;min-height:0}

/* roster table */
.rhead,.rrow{display:grid;grid-template-columns:46px 1fr 34px 40px 56px 46px 46px 86px;gap:7px;align-items:center;padding:0 8px}
.rhead{height:26px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);position:sticky;top:0;background:var(--bg-1);z-index:2}
.rhead span:nth-child(n+3){text-align:right}
.rsub{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);padding:10px 8px 4px;border-top:1px solid var(--hairline);margin-top:4px}
.rrow{height:42px;border-top:1px solid var(--hairline);cursor:pointer;position:relative;transition:background var(--t-fast) var(--ease)}
.rrow:hover{background:var(--bg-2)}
.rrow.sel{background:color-mix(in srgb,var(--club) 12%,transparent)}
.rrow.sel::before{content:"";position:absolute;left:-16px;top:0;bottom:0;width:3px;background:var(--club)}
.rrole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.rname{display:flex;align-items:center;gap:7px;min-width:0}
.rname .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none}
.rbadge.igl{color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.rbadge.flex{color:var(--blue);border:1px solid rgba(0,212,255,.4)}
.rbadge.out{color:var(--red-text);background:rgba(255,70,85,.14);border:1px solid rgba(255,70,85,.45)}
.rcell{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.rcell.dim{color:var(--fg-muted)}
.rpot{font-family:var(--font-num);font-size:13px;text-align:right}
.rpot .g{font-size:10px;color:var(--green);margin-left:3px}
.rcontract{font-family:var(--font-num);font-size:11px;text-align:right;color:var(--fg-muted)}

/* player detail */
.pd{display:flex;flex-direction:column;gap:13px}
.pdhead{display:flex;align-items:flex-start;gap:13px}
.pdid{min-width:0;flex:1}
.pdname{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.01em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdsub{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;font-size:11.5px;color:var(--fg-muted)}
.pdsub .dot{width:3px;height:3px;border-radius:50%;background:var(--fg-ghost)}
.tchip{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:var(--r-pill);border:1px solid var(--border-strong);color:var(--fg-muted)}
.pdovr{display:flex;gap:9px;flex:none}
.ovrbox{width:62px;text-align:center;background:var(--bg-2);border:1px solid var(--hairline);border-radius:9px;padding:8px 0}
.ovrbox .v{font-family:var(--font-num);font-weight:600;font-size:24px;line-height:1}
.ovrbox .l{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted);margin-top:3px}
.seclab{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin:2px 0 7px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
.stat{background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:7px 4px;text-align:center}
.stat .v{font-family:var(--font-num);font-weight:600;font-size:14px;line-height:1}
.stat .l{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted);margin-top:4px}
.season{font-size:11px;color:var(--fg-muted);margin-top:8px}
.season b{color:var(--fg);font-family:var(--font-num);font-weight:600}
.attrs{display:grid;grid-template-columns:1fr 1fr;gap:5px 18px}
.attr{display:flex;align-items:center;gap:8px}
.attr .an{font-size:10.5px;color:var(--fg-muted);width:112px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
.attr .ab{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.attr .af{height:100%;border-radius:3px;min-width:2px}
.attr .av{font-family:var(--font-num);font-size:11px;width:20px;text-align:right;color:var(--fg)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.achip{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);background:var(--bg-2);border:1px solid var(--hairline);color:var(--fg);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.achip.sig{border-color:rgba(255,215,0,.5);color:var(--gold);box-shadow:0 0 0 1px rgba(255,215,0,.12)}
.persona{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;margin-top:2px}
.pbar{display:flex;align-items:center;gap:8px}
.pbar .pn{font-size:10.5px;color:var(--fg-muted);width:70px;text-transform:capitalize}
.pbar .pt{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pbar .pf{height:100%;border-radius:3px;background:var(--purple)}
.pbar .pv{font-family:var(--font-num);font-size:11px;width:20px;text-align:right}
.contract-row{display:flex;gap:8px}
.cbox{flex:1;background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:8px;text-align:center}
.cbox .v{font-family:var(--font-num);font-weight:600;font-size:14px}
.cbox .l{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted);margin-top:4px}
.trophies{display:flex;gap:14px;font-size:11px;color:var(--fg-muted);margin-bottom:6px}
.trophies b{font-family:var(--font-num);color:var(--gold);font-size:14px}
.titlelist{font-size:11px;color:var(--fg-muted);line-height:1.5}

/* staff + chemistry strip */
.rstrip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;min-height:172px;margin-top:14px;flex:none}
.scard{background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);border-radius:var(--r-card);padding:12px 14px;display:flex;flex-direction:column;min-height:0}
.scard .role{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost)}
.scard .sn{font-family:var(--font-display);font-weight:600;font-size:15px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none}
.scard .role,.scard .sp{flex:none}
.scard .sp{font-size:10.5px;color:var(--amber);margin-top:1px}
.scard .sbars{margin-top:9px;display:flex;flex-direction:column;gap:5px;flex:1}
.scard .sfoot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--hairline);font-size:10.5px;color:var(--fg-muted)}
.scard .sfoot>span:first-child{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.scard .sfoot .sfoot-right{display:inline-flex;align-items:center;gap:9px;flex:none}
.scard .sfoot .sal{font-family:var(--font-num);color:var(--fg);white-space:nowrap}
/* Short-viewport safety: the roster page force-fits 100vh under #view's overflow:hidden,
   so on shorter windows the staff strip's contract + Fire footer clipped off the bottom.
   Let the page scroll instead, and floor the grid so the strip is always reachable. */
#view.roster{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
#view.roster::-webkit-scrollbar{width:7px}
#view.roster::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
#view.roster .rgrid{min-height:430px}
#view.roster .rstrip{margin-bottom:4px}
.chemrow{display:flex;align-items:center;gap:8px;font-size:11.5px;padding:4px 0}
.chemrow .pair{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.chemrow .cv{font-family:var(--font-num);font-weight:600;flex:none}

/* =====================================================================
   COMPETITION-SPECIFIC  (.cgrid 7fr/5fr — full standings + schedule)
   ===================================================================== */
.cgrid{display:grid;grid-template-columns:7fr 5fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.ccol{display:flex;flex-direction:column;gap:14px;min-height:0}
/* standings region/division switcher */
.cswitch{display:flex;flex-direction:column;gap:7px;padding:2px 6px 12px;border-bottom:1px solid var(--hairline);margin-bottom:10px}
.cswRow{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cswLab{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-ghost);min-width:52px}
.cswPill{display:inline-flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;font-weight:600;color:var(--fg-muted);
  background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-pill);padding:4px 12px;
  transition:color .12s,border-color .12s,background .12s}
.cswPill:hover{color:var(--fg);border-color:var(--border-strong)}
.cswPill.on{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 14%,var(--bg-2))}
.cswPill .home{color:var(--gold);font-size:11px;line-height:1}
/* full standings table (extends dashboard .stbl with FORM column) */
.cstbl{width:100%;font-size:13.5px}
.cstbl .csh{display:grid;grid-template-columns:34px 1fr 60px 52px 132px;gap:8px;padding:0 6px 8px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:1}
.cstbl .csh span:nth-child(3),.cstbl .csh span:nth-child(4){text-align:right}
.cstbl .csh span:nth-child(5){text-align:center}
.cszone{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;
  padding:4px 0 2px;color:var(--fg-ghost);border-top:1px dashed var(--border-strong)}
.cszone.up{color:var(--green)}
.cszone.down{color:var(--red-text)}
.csrow{display:grid;grid-template-columns:34px 1fr 60px 52px 132px;gap:8px;align-items:center;height:38px;padding:0 6px;
  border-top:1px solid var(--hairline);position:relative;transition:background var(--t-fast) var(--ease)}
.csrow:hover{background:var(--bg-2)}
.csrow:first-of-type{border-top:0}
.csrow.user{background:var(--red-tint)}
.csrow.user::before{content:"";position:absolute;left:-18px;top:0;bottom:0;width:3px;background:var(--red)}
.csrow.user .nm{color:var(--club);font-weight:600}
.csrow .rk{font-family:var(--font-num);color:var(--fg-muted);position:relative;padding-left:7px}
.csrow .team{display:flex;align-items:center;gap:9px;min-width:0}
.csrow .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csrow .tg{font-size:9px;font-weight:700;letter-spacing:.05em;color:var(--fg-ghost);flex:none}
.csrow .wl{font-family:var(--font-num);text-align:right;color:var(--fg)}
.csrow .ov{font-family:var(--font-num);font-weight:600;text-align:right}
.csrow .cform{display:flex;gap:4px;justify-content:flex-end}
.fseg{width:20px;height:20px;border-radius:4px;display:grid;place-items:center;font-family:var(--font-num);font-size:9.5px;font-weight:600;flex:none;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px)}
.fseg.w{background:rgba(63,209,122,.16);color:var(--green);border:1px solid rgba(63,209,122,.35)}
.fseg.l{background:rgba(255,70,85,.14);color:var(--red-text);border:1px solid rgba(255,70,85,.35)}
.fseg.e{background:var(--bg-2);color:var(--fg-ghost);border:1px solid var(--hairline)}
/* schedule rows */
.sch{display:flex;align-items:center;gap:11px;padding:9px 4px;border-top:1px solid var(--hairline)}
.sch:first-child{border-top:0}
.sch .when{font-family:var(--font-num);font-size:11px;font-weight:600;color:var(--fg-muted);width:54px;flex:none;text-align:right}
.sch .when.now{color:var(--red)}
.sch .mid{flex:1;min-width:0}
.sch .mu{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sch .lb{font-size:10px;color:var(--fg-ghost);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sch.user{background:color-mix(in srgb,var(--club) 9%,transparent);border-radius:6px}
.sch.user::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.sch.user .mu{color:var(--club)}
.sch .udot{width:6px;height:6px;border-radius:50%;background:var(--club);flex:none;box-shadow:0 0 8px color-mix(in srgb,var(--club) 60%,transparent)}
.sch .udot.off{background:transparent;box-shadow:none}

/* =====================================================================
   FINANCE-SPECIFIC  (.fgrid 7fr/5fr — salary breakdown + staff/transfers)
   ===================================================================== */
.fgrid{display:grid;grid-template-columns:7fr 5fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.fcol{display:flex;flex-direction:column;gap:14px;min-height:0}
/* wages table */
.wtbl{width:100%;font-size:13.5px}
.wtbl .wh{display:grid;grid-template-columns:54px 1fr 44px 88px;gap:8px;padding:0 6px 8px;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:1}
.wtbl .wh span:nth-child(3),.wtbl .wh span:nth-child(4){text-align:right}
.wrow{display:grid;grid-template-columns:54px 1fr 44px 88px;gap:8px;align-items:center;height:38px;padding:0 6px;
  border-top:1px solid var(--hairline);transition:background var(--t-fast) var(--ease)}
.wrow:hover{background:var(--bg-2)}
.wrow:first-of-type{border-top:0}
.wrole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.wrow .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wrow .yr{font-family:var(--font-num);font-size:12px;text-align:right;color:var(--fg-muted)}
.wrow .sal{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.wfoot{display:flex;align-items:center;justify-content:space-between;padding-top:11px;margin-top:8px;
  border-top:1px solid var(--border-strong)}
.wfoot .fl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted)}
.wfoot .fv{font-family:var(--font-num);font-weight:600;font-size:16px;color:var(--fg)}
/* staff rows */
.strow{display:flex;align-items:center;gap:11px;height:36px;padding:0 4px;border-top:1px solid var(--hairline)}
.strow:first-child{border-top:0}
.strow .rl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost);width:90px;flex:none}
.strow .nm{font-size:13px;font-weight:600;color:var(--fg);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strow .sal{font-family:var(--font-num);font-size:12px;color:var(--fg-muted);flex:none}
/* transfer rows */
.tfrow{display:flex;align-items:center;gap:11px;padding:8px 4px;border-top:1px solid var(--hairline)}
.tfrow:first-child{border-top:0}
.tfrow .mid{flex:1;min-width:0}
.tfrow .pl{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tfrow .mv{font-size:10.5px;color:var(--fg-ghost);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tfrow .fee{font-family:var(--font-num);font-size:12.5px;font-weight:600;color:var(--green);flex:none;text-align:right}
.tfrow .fee.free{color:var(--fg-muted)}
.tfrow .yr{font-family:var(--font-num);font-size:10px;color:var(--fg-ghost);flex:none;width:34px;text-align:right}

/* =====================================================================
   MAIL-SPECIFIC  (.mgrid 5fr/7fr — inbox list + reading pane)
   ===================================================================== */
.mgrid{display:grid;grid-template-columns:5fr 7fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.mcol{display:flex;flex-direction:column;gap:14px;min-height:0}
/* inbox list */
.mlist{display:flex;flex-direction:column}
.mrow{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;height:50px;padding:0 8px;
  border-top:1px solid var(--hairline);cursor:pointer;position:relative;transition:background var(--t-fast) var(--ease)}
.mrow:first-child{border-top:0}
.mrow:hover{background:var(--bg-2)}
.mrow.sel{background:color-mix(in srgb,var(--club) 12%,transparent)}
.mrow.sel::before{content:"";position:absolute;left:-16px;top:0;bottom:0;width:3px;background:var(--club)}
.mpill{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:5px;flex:none;
  white-space:nowrap;max-width:92px;overflow:hidden;text-overflow:ellipsis;justify-self:start}
.msub{display:flex;align-items:center;gap:7px;min-width:0;font-size:13.5px;font-weight:600;color:var(--fg);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msub.read{font-weight:500;color:var(--fg-muted)}
.msub .mt{min-width:0;overflow:hidden;text-overflow:ellipsis}
.mdot{width:7px;height:7px;border-radius:50%;background:var(--club);flex:none;box-shadow:0 0 7px color-mix(in srgb,var(--club) 60%,transparent)}
.mstar{color:var(--gold);font-size:11px;flex:none}
.mdate{font-family:var(--font-num);font-size:10.5px;color:var(--fg-ghost);flex:none;text-align:right;justify-self:end}
/* reading pane */
.mpane{display:flex;flex-direction:column;gap:13px}
.mpane .mphead{display:flex;flex-direction:column;gap:9px}
.mpane .msubject{font-family:var(--font-display);font-weight:700;font-size:21px;letter-spacing:-.01em;line-height:1.15;color:var(--fg)}
.mpane .mmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--fg-muted)}
.mpane .mmeta .dot{width:3px;height:3px;border-radius:50%;background:var(--fg-ghost);flex:none}
.mpane .mmeta .mamt{font-family:var(--font-num);font-weight:600;color:var(--green)}
.mpane .mbyline{display:inline-flex;align-items:center;align-self:flex-start;gap:6px;font-size:10.5px;font-weight:600;
  padding:3px 10px;border-radius:var(--r-pill);background:var(--bg-2);border:1px solid var(--border-strong);color:var(--fg)}
.mbody{white-space:pre-line;font-size:13.5px;line-height:1.6;color:var(--fg);padding-top:4px;border-top:1px solid var(--hairline)}
.mpane-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--fg-muted);font-size:13px;text-align:center;padding:30px}

/* =====================================================================
   STRATEGY-SPECIFIC  (.sgrid 5fr/7fr — opponent scouting + map prep)
   ===================================================================== */
.sgrid{display:grid;grid-template-columns:5fr 7fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.scol{display:flex;flex-direction:column;gap:14px;min-height:0}
/* next-opponent scouting card body */
.oppcard{display:flex;flex-direction:column;gap:14px}
.oppcard .oppname{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.01em;line-height:1.1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oppcard .oppsub{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;font-size:11.5px;color:var(--fg-muted)}
.oppcard .oppsub .dot{width:3px;height:3px;border-radius:50%;background:var(--fg-ghost);flex:none}
.oppcard .intel{display:inline-flex;align-self:flex-start;align-items:center;gap:6px;font-size:9.5px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:var(--r-pill);
  background:var(--bg-2);border:1px solid var(--border-strong);color:var(--fg-muted)}
.oppcard .noanalyst{font-size:11px;color:var(--amber);background:rgba(212,161,76,.10);
  border:1px solid rgba(212,161,76,.30);border-radius:7px;padding:7px 10px;line-height:1.4}
.oppcard .ovrline{display:flex;align-items:baseline;gap:9px}
.oppcard .ovrline .ov{font-family:var(--font-num);font-weight:600;font-size:30px;line-height:1;color:var(--fg)}
.oppcard .ovrline .band{font-family:var(--font-num);font-size:12px;color:var(--fg-muted)}
.oppcard .ovrline .ovl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin-left:auto}
.oppcard .formrow{display:flex;align-items:center;gap:8px}
.oppcard .formrow .fl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost)}
.oppcard .formpills{display:flex;gap:5px}
.fpill{width:21px;height:21px;border-radius:4px;display:grid;place-items:center;font-family:var(--font-num);
  font-size:10px;font-weight:600;flex:none;clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px)}
.fpill.w{background:rgba(63,209,122,.16);color:var(--green);border:1px solid rgba(63,209,122,.35)}
.fpill.l{background:rgba(255,70,85,.14);color:var(--red-text);border:1px solid rgba(255,70,85,.35)}
.fpill.e{background:var(--bg-2);color:var(--fg-ghost);border:1px solid var(--hairline)}
.sblock{display:flex;flex-direction:column;gap:7px}
.sblock .sl{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost)}
.sblock .stext{font-size:12.5px;line-height:1.5;color:var(--fg)}
.sblock.rec .stext{color:var(--fg);background:color-mix(in srgb,var(--club) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--club) 35%,transparent);border-radius:7px;padding:9px 11px}
.kplist{display:flex;flex-wrap:wrap;gap:6px}
.kp{font-size:11px;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);background:var(--bg-2);
  border:1px solid var(--hairline);color:var(--fg);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* map prep card — one row per map */
.maprow{display:flex;align-items:center;gap:12px;padding:13px 6px;border-top:1px solid var(--hairline)}
.maprow:first-child{border-top:0}
.maprow .mleft{min-width:0;flex:1;display:flex;flex-direction:column;gap:6px}
.maprow .mname{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--fg);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.maprow .sigrow{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.sigchip{font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:var(--r-pill);background:var(--bg-2);
  border:1px solid var(--hairline);color:var(--fg-muted);max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.maprow .mright{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex:none}
.segctl{display:flex;gap:0;border:1px solid var(--hairline);border-radius:7px;overflow:hidden;background:var(--bg-2)}
.segbtn{border:0;background:transparent;color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;
  padding:6px 12px;border-right:1px solid var(--hairline);
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.segbtn:last-child{border-right:0}
.segbtn:hover{color:var(--fg);background:var(--bg-3)}
.segbtn.on{color:var(--fg);background:color-mix(in srgb,var(--club) 26%,var(--bg-2));
  box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--club) 55%,transparent)}
.agstat{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--fg-muted);max-width:240px}
.agstat .ag-auto{color:var(--fg-muted)}
.agstat .ag-custom{color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agstat .ag-reset{border:1px solid var(--border-strong);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:9px;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;flex:none;transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.agstat .ag-reset:hover{color:var(--fg);border-color:var(--club)}

/* =====================================================================
   ROSTER BENCH/START ACTION BUTTON (small, subtle, right-aligned in row)
   ===================================================================== */
/* Absolutely positioned so it overlays the row's right edge (over the CONTRACT
   column's trailing space) without adding a 9th grid track that would wrap. */
.benchbtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:3;
  border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 9px;border-radius:6px;clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);opacity:0;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),opacity var(--t-fast) var(--ease)}
.rrow:hover .benchbtn,.rrow.sel .benchbtn,.benchbtn:focus-visible{opacity:1}
.benchbtn:hover{color:var(--fg);background:var(--bg-3);border-color:var(--club)}
.benchbtn.start{color:var(--green);border-color:color-mix(in srgb,var(--green) 40%,var(--hairline))}
.benchbtn.start:hover{color:#fff;background:color-mix(in srgb,var(--green) 26%,var(--bg-2));border-color:var(--green)}

/* =====================================================================
   ROSTER GOD-MODE EDITOR (toggle chip + inline attribute/potential steppers)
   ===================================================================== */
/* Toggle chip — sits in the Roster card header next to the row count. Subtle
   when off; --club-colored when on. */
.godtoggle{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 9px;border-radius:var(--r-pill);display:inline-flex;align-items:center;gap:5px;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.godtoggle:hover{color:var(--fg);border-color:var(--border-strong)}
.godtoggle .gtdot{width:6px;height:6px;border-radius:50%;background:var(--fg-ghost);flex:none}
.godtoggle.on{color:var(--fg);border-color:color-mix(in srgb,var(--club) 55%,transparent);
  background:color-mix(in srgb,var(--club) 18%,var(--bg-2))}
.godtoggle.on .gtdot{background:var(--club);box-shadow:0 0 7px color-mix(in srgb,var(--club) 65%,transparent)}
/* Inline editor wrapper around an attribute/potential value: − [val] + */
.attredit{display:inline-flex;align-items:center;gap:4px}
.stepbtn{border:1px solid var(--hairline);background:var(--bg-3);color:var(--fg-muted);cursor:pointer;
  width:16px;height:16px;line-height:1;border-radius:4px;padding:0;flex:none;
  font-family:var(--font-num);font-size:12px;font-weight:600;display:grid;place-items:center;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.stepbtn:hover{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 22%,var(--bg-3))}
.stepbtn:disabled{opacity:.35;cursor:default}
.stepbtn:disabled:hover{color:var(--fg-muted);border-color:var(--hairline);background:var(--bg-3)}
/* Potential box stepper variant — slightly larger to sit under the OVR box value */
.ovrbox .attredit{justify-content:center;margin-top:2px}
.ovrbox .attredit .stepbtn{width:18px;height:18px}
/* GOD-MODE BADGES editor (gb* — god badge). Chips echo .achip styling; the ×
   remove control is subtle but clearly clickable; the add control mirrors the
   dark stepper look. Read-only mode shows plain .gbchip with no .gbx / .gbadd. */
.gbwrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.gbchip{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;
  padding:3px 9px;border-radius:var(--r-pill);background:var(--bg-2);border:1px solid var(--hairline);
  color:var(--fg);max-width:170px}
.gbchip .gbname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gbx{border:0;background:transparent;color:var(--fg-ghost);cursor:pointer;padding:0;margin:-1px -2px -1px 0;
  width:14px;height:14px;line-height:1;border-radius:50%;flex:none;font-family:var(--font-num);font-size:12px;font-weight:600;
  display:grid;place-items:center;transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.gbx:hover{color:var(--red-text);background:rgba(255,70,85,.16)}
.gbempty{font-size:11px;color:var(--fg-muted);padding:0}
.gbsel{font-family:var(--font-ui);font-size:11px;font-weight:600;color:var(--fg);
  background:var(--bg-3);border:1px solid var(--hairline);border-radius:6px;padding:4px 8px;cursor:pointer;
  max-width:200px;transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.gbsel:hover{border-color:var(--border-strong)}
.gbsel:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
.gbsel option{background:var(--bg-2);color:var(--fg)}
.gbadd{border:1px solid var(--hairline);background:var(--bg-3);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;
  padding:5px 11px;border-radius:6px;flex:none;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.gbadd:hover{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 22%,var(--bg-3))}
.gbadd:disabled{opacity:.35;cursor:default}
.gbadd:disabled:hover{color:var(--fg-muted);border-color:var(--hairline);background:var(--bg-3)}

/* =====================================================================
   CALENDAR-SPECIFIC  (season ring stepper + upcoming schedule)
   ===================================================================== */
.calgrid{display:flex;flex-direction:column;gap:16px;margin-top:16px;flex:1;min-height:0}
/* season ring — horizontal stepper of phase nodes connected by a track */
.calring{position:relative;display:flex;align-items:flex-start;justify-content:space-between;
  padding:30px 18px 16px;background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-card);flex:none;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.calring .caltrack{position:absolute;left:34px;right:34px;top:42px;height:2px;background:var(--bg-3);border-radius:2px;z-index:0}
.calring .calfillline{position:absolute;left:34px;top:42px;height:2px;background:linear-gradient(90deg,var(--amber),var(--club));
  border-radius:2px;z-index:0;box-shadow:0 0 8px color-mix(in srgb,var(--club) 35%,transparent)}
.calnode{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0;flex:1;text-align:center}
.calnode .caldot{width:13px;height:13px;border-radius:50%;background:var(--bg-0);border:2px solid var(--border-strong);
  display:grid;place-items:center;font-size:8px;font-weight:700;color:var(--bg-0);flex:none}
.calnode.past .caldot{background:var(--green);border-color:var(--green);color:var(--bg-0)}
.calnode.current .caldot{background:var(--club);border-color:var(--club);box-shadow:0 0 12px color-mix(in srgb,var(--club) 60%,transparent);
  transform:scale(1.25)}
.calnode .calnm{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-ghost);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.calnode.past .calnm{color:var(--fg-muted)}
.calnode.current .calnm{color:var(--club)}
.calnode .calsub{font-family:var(--font-num);font-size:9px;color:var(--fg-muted);white-space:nowrap}
.calprog{width:56px;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden;margin-top:1px}
.calprog .calpf{height:100%;border-radius:2px;background:var(--club);box-shadow:0 0 6px color-mix(in srgb,var(--club) 50%,transparent)}
/* upcoming schedule list */
.calsched{display:flex;flex-direction:column}
.calrow{display:flex;align-items:center;gap:12px;padding:11px 6px;border-top:1px solid var(--hairline)}
.calrow:first-child{border-top:0}
.calrow .calwhen{font-family:var(--font-num);font-size:11px;font-weight:600;color:var(--fg-muted);width:62px;flex:none;text-align:right}
.calrow .calwhen.now{color:var(--red)}
.calrow .calmid{flex:1;min-width:0;display:flex;align-items:center;gap:9px}
.calrow .calvs{font-size:13.5px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calrow.user .calvs{color:var(--club)}
.calchip{font-family:var(--font-num);font-size:9.5px;font-weight:600;color:var(--fg-muted);background:var(--bg-2);
  border:1px solid var(--border-strong);border-radius:5px;padding:2px 6px;flex:none}
.calrow .callabel{font-size:10.5px;color:var(--fg-ghost);flex:none;margin-left:auto;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:160px}
.calrow.user{background:color-mix(in srgb,var(--club) 9%,transparent);border-radius:6px}
.caludot{width:6px;height:6px;border-radius:50%;background:var(--club);flex:none;
  box-shadow:0 0 8px color-mix(in srgb,var(--club) 60%,transparent)}
.caludot.off{background:transparent;box-shadow:none}

/* =====================================================================
   MARKET / TRANSFERS-SPECIFIC  (single Free Agents card → scrollable FA table)
   Uniquely-named classes (.mktgrid / .fatable / .farow / .signbtn …) so they
   never collide with any existing screen's selectors.
   ===================================================================== */
.mktgrid{display:flex;flex-direction:column;gap:16px;margin-top:16px;flex:1;min-height:0}
.mktgrid .card{flex:1}
/* free-agents table */
.fatable{width:100%;font-size:13.5px}
.fahead,.farow{display:grid;grid-template-columns:48px 1fr 40px 50px 50px 78px 88px 78px;gap:9px;align-items:center;padding:0 8px}
.fahead{height:26px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:2}
.fahead span:nth-child(n+3){text-align:right}
.fahead span:last-child{text-align:right}
.farow{height:46px;border-top:1px solid var(--hairline);position:relative;transition:background var(--t-fast) var(--ease)}
.farow:first-of-type{border-top:0}
.farow:hover{background:var(--bg-2)}
.farole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.faname{display:flex;align-items:center;gap:7px;min-width:0}
.faname .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fabadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none}
.fabadge.igl{color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.fasig{font-size:10px;color:var(--fg-ghost);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px;flex:none}
.facell{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.facell.dim{color:var(--fg-muted)}
.faovr{font-family:var(--font-num);font-weight:600;font-size:14px;text-align:right}
.fapot{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg-muted)}
.faregion{justify-self:end}
.fachip{font-family:var(--font-num);font-size:9.5px;font-weight:600;letter-spacing:.03em;color:var(--fg-muted);background:var(--bg-2);
  border:1px solid var(--border-strong);border-radius:5px;padding:2px 7px;white-space:nowrap;max-width:84px;overflow:hidden;text-overflow:ellipsis}
.faask{font-family:var(--font-num);font-weight:600;font-size:13px;text-align:right;color:var(--green)}
.fasign{justify-self:end}
.signbtn{border:1px solid color-mix(in srgb,var(--club) 50%,var(--hairline));
  background:color-mix(in srgb,var(--club) 16%,var(--bg-2));color:var(--fg);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
  padding:6px 14px;border-radius:6px;clip-path:polygon(4px 0,100% 0,100% 100%,0 100%,0 4px);
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.signbtn:hover{background:color-mix(in srgb,var(--club) 30%,var(--bg-2));border-color:var(--club)}
.signbtn:active{transform:translateY(1px)}

/* staff market (HIRE STAFF section appended below the Free Agents card) —
   uniquely-named .sm* classes so they never collide with any existing screen. */
.smsec{display:flex;flex-direction:column;gap:14px}
.smrole{display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--hairline);padding-top:14px}
.smrole:first-child{border-top:0;padding-top:0}
.smrolehead{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.smrolehead .smtitle{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--fg)}
.smrolehead .smtitle::before{content:"";display:inline-block;width:3px;height:11px;border-radius:2px;
  background:var(--club);margin-right:8px;vertical-align:-1px}
.smrolehead .smcount{font-family:var(--font-num);font-size:10.5px;color:var(--fg-ghost)}
.smcur{display:flex;align-items:center;gap:10px;background:color-mix(in srgb,var(--club) 9%,var(--bg-2));
  border:1px solid color-mix(in srgb,var(--club) 28%,var(--hairline));border-radius:var(--r-tile);padding:9px 12px}
.smcur .smcurlab{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);flex:none}
.smcur .smname{font-size:13.5px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smcur .smmeta{font-size:11px;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.smcur .smask{font-family:var(--font-num);font-weight:600;font-size:13px;color:var(--fg);margin-left:auto;flex:none}
.smcur.empty{color:var(--fg-muted)}
.smcur.empty .smemptytxt{font-size:12px;color:var(--fg-muted)}
.smlist{display:flex;flex-direction:column}
.smrow{display:grid;grid-template-columns:1fr 150px 44px 78px 78px;gap:10px;align-items:center;height:44px;
  padding:0 10px;border-top:1px solid var(--hairline);transition:background var(--t-fast) var(--ease)}
.smrow:first-child{border-top:0}
.smrow:hover{background:var(--bg-2)}
.smrow .smname{font-size:13.5px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smrow .smmeta{font-size:11px;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smrep{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.smrow .smask{font-family:var(--font-num);font-weight:600;font-size:13px;text-align:right;color:var(--green)}
.smhirewrap{justify-self:end}
.smhire{border:1px solid color-mix(in srgb,var(--club) 50%,var(--hairline));
  background:color-mix(in srgb,var(--club) 16%,var(--bg-2));color:var(--fg);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
  padding:6px 14px;border-radius:6px;clip-path:polygon(4px 0,100% 0,100% 100%,0 100%,0 4px);
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.smhire:hover{background:color-mix(in srgb,var(--club) 30%,var(--bg-2));border-color:var(--club)}
.smhire:active{transform:translateY(1px)}
.smempty{color:var(--fg-muted);font-size:12px;padding:9px 10px;border-top:1px solid var(--hairline)}
.smlist .smempty:first-child{border-top:0}

/* =====================================================================
   AWARDS-SPECIFIC  (.awgrid 7fr/5fr — MVP races | season recap + history)
   Uniquely-named classes (.awgrid / .racecard / .racerow …) so they never
   collide with any existing screen's selectors.
   ===================================================================== */
.awgrid{display:grid;grid-template-columns:7fr 5fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.awcol{display:flex;flex-direction:column;gap:14px;min-height:0}
/* MVP race — a stack of small per-category boards inside the scrollable card body */
.racewrap{display:flex;flex-direction:column;gap:16px}
.racecard{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);
  box-shadow:var(--hi-inset);padding:11px 12px}
.racecard .rchead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.racecard .rctitle{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--fg)}
.racecard .rccount{font-family:var(--font-num);font-size:10.5px;color:var(--fg-ghost)}
.racerow{display:grid;grid-template-columns:26px 1fr auto auto;gap:2px 9px;align-items:center;min-height:34px;
  padding:3px 4px;border-top:1px solid var(--hairline);position:relative}
/* analyst blurb gets its own full-width line — the old 74px trend box rendered ~5 chars */
.racerow .rblurbrow{grid-column:2/-1;font-size:10px;color:var(--fg-ghost);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-bottom:2px}
.racerow:first-of-type{border-top:0}
.racerow.lead{background:color-mix(in srgb,var(--gold) 9%,transparent);border-radius:5px}
.racerow .rrk{font-family:var(--font-num);font-size:12px;font-weight:600;color:var(--fg-muted);text-align:center}
.racerow.lead .rrk{color:var(--gold)}
.racerole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);flex:none}
.raceid{display:flex;align-items:center;gap:7px;min-width:0}
.raceid .rnm{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.raceid .rteam{font-size:10.5px;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none;max-width:108px}
.racebadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none;
  color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.racescore{font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--fg);text-align:right}
.racetrend{display:flex;align-items:center;gap:4px;justify-content:flex-end;flex:none}
.racedelta{font-family:var(--font-num);font-size:10.5px;font-weight:600;flex:none;display:inline-flex;align-items:center;gap:1px}
.racedelta.up{color:var(--green)}.racedelta.down{color:var(--red-text)}.racedelta.flat{color:var(--fg-ghost)}
/* season-awards recap entries */
.recap{display:flex;flex-direction:column;gap:12px}
.recapcard{border-top:1px solid var(--hairline);padding-top:12px}
.recapcard:first-child{border-top:0;padding-top:0}
.recapcard .rccat{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost)}
.recapcard .rcwin{display:flex;align-items:baseline;gap:8px;margin-top:5px;flex-wrap:wrap}
.recapcard .rcname{font-family:var(--font-display);font-weight:700;font-size:16px;color:var(--gold);letter-spacing:-.01em}
.recapcard .rcteam{font-size:11.5px;color:var(--fg-muted)}
.recapcard .rccoach{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);
  border:1px solid rgba(0,212,255,.4);border-radius:4px;padding:1px 5px;flex:none}
.recapcard .rcexp{font-size:12px;line-height:1.5;color:var(--fg);margin-top:6px}
.recapcard .rcfin{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.recapfin{font-size:10.5px;color:var(--fg-muted);background:var(--bg-2);border:1px solid var(--hairline);
  border-radius:var(--r-pill);padding:2px 9px;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.recapfin b{font-family:var(--font-num);color:var(--fg);font-weight:600}
/* all-time history compact rows */
.histrow{display:grid;grid-template-columns:42px 1fr auto;gap:9px;align-items:center;height:30px;padding:0 4px;
  border-top:1px solid var(--hairline);font-size:12px}
.histrow:first-child{border-top:0}
.histrow .hyr{font-family:var(--font-num);font-size:11px;color:var(--fg-ghost)}
.histrow .hcat{color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.histrow .hwin{font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;justify-self:end;max-width:150px}
.histrow .hwin.coach{color:var(--blue)}

/* =====================================================================
   BRACKETS-SPECIFIC  (.brkgrid stacked tournament cards — double-elim trees)
   Uniquely-named classes (.brkt / .brktcol / .bmatch / .bteam / .bscore …)
   so they never collide with any existing screen's selectors.
   ===================================================================== */
.brkgrid{display:flex;flex-direction:column;gap:16px;margin-top:16px;flex:1;min-height:0}
.tourn{background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-card);padding:16px 18px;display:flex;flex-direction:column;min-height:0;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.tourn .thead{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex:none}
.tourn .tname{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:var(--fg)}
.tourn .tround{font-family:var(--font-num);font-size:11px;color:var(--fg-muted)}
.tourn .tchamp{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:var(--gold);background:rgba(255,215,0,.10);
  border:1px solid rgba(255,215,0,.4);border-radius:var(--r-pill);padding:4px 11px}
.brktscroll{overflow:auto;flex:1;min-height:0;padding-bottom:4px;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.brktscroll::-webkit-scrollbar{width:7px;height:7px}
.brktscroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.brktsub{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);
  margin:14px 0 8px}
.brktsub:first-child{margin-top:0}
.brktsub.lower{color:var(--red-text)}
.brktsub.gf{color:var(--gold)}
.brkt{display:flex;align-items:flex-start;gap:18px;min-width:min-content}
.brktcol{display:flex;flex-direction:column;gap:10px;justify-content:center;min-width:178px;flex:none}
.brktcol .bcollab{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-ghost);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bmatch{background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:7px 9px;
  display:flex;flex-direction:column;gap:4px;width:178px;flex:none;position:relative}
.bmatch.sched{border-style:dashed;border-color:var(--border-strong);background:transparent}
.bmatch .blabel{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-ghost);
  display:flex;align-items:center;justify-content:space-between;gap:6px}
.bmatch .bbo{font-family:var(--font-num);font-weight:600;color:var(--fg-muted)}
.bteam{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;height:22px}
.bteam .bnm{font-size:12px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.bteam .btag{font-family:var(--font-num);font-size:8.5px;font-weight:700;color:var(--fg-ghost);flex:none}
.bteam.win .bnm{font-weight:700;color:var(--fg)}
.bteam.loss .bnm{color:var(--fg-muted)}
.bteam.user .bnm{color:var(--club);font-weight:600}
.bteam.user.win .bnm{font-weight:700}
.bscore{font-family:var(--font-num);font-size:13px;font-weight:600;color:var(--fg-muted);text-align:right;flex:none}
.bteam.win .bscore{color:var(--green)}
.bmatch.sched .bscore{color:var(--fg-ghost)}
.bmatch.gf{border-color:color-mix(in srgb,var(--gold) 45%,var(--border-strong));
  box-shadow:0 0 0 1px rgba(255,215,0,.14),var(--hi-inset);background:color-mix(in srgb,var(--gold) 7%,var(--bg-2))}
.bmatch.gf .blabel{color:var(--gold)}
.bvs{font-family:var(--font-num);font-size:8px;letter-spacing:.1em;color:var(--fg-ghost);text-align:center;margin:-1px 0}
.brktcurrent{display:flex;flex-direction:column;gap:8px}
.curmatch{display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--fg);padding:8px 10px;
  background:var(--bg-2);border:1px dashed var(--border-strong);border-radius:7px}
.curmatch .cside{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.curmatch .cside.b{text-align:right}
.curmatch .cside.user{color:var(--club);font-weight:600}
.curmatch .cvs{font-family:var(--font-num);font-size:10px;color:var(--fg-ghost);flex:none}
.curmatch .clower{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--red-text);
  border:1px solid rgba(255,70,85,.4);border-radius:4px;padding:1px 5px;flex:none}

/* =====================================================================
   COMPETITION STANDINGS — clickable row affordance (Team Profile)
   Subtle pointer + hover background only; layout/spacing of .csrow is
   untouched. Uniquely named so it never collides with existing screens.
   ===================================================================== */
.csrow.tpclick{cursor:pointer}
.csrow.tpclick:hover{background:var(--bg-3)}
.csrow.tpclick:focus-visible{outline:2px solid var(--blue);outline-offset:-2px;border-radius:4px}

/* =====================================================================
   TEAM-PROFILE-SPECIFIC  (.tp* — any team, reached by clicking standings)
   Uniquely-named classes (.tpgrid / .tphead / .tpidentity / .tproster /
   .tprow / .tpstaff / .tphist …) so they never collide with any existing
   screen's selectors. Reuses the shared .card / .kpi / header language.
   ===================================================================== */
.tpback{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;border:1px solid var(--hairline);
  background:var(--bg-1);color:var(--fg-muted);cursor:pointer;border-radius:7px;
  font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:.04em;
  padding:6px 12px;box-shadow:var(--hi-inset);
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.tpback:hover{color:var(--fg);background:var(--bg-2);border-color:var(--border-strong)}
.tpback .tparrow{font-family:var(--font-num);font-size:13px;line-height:1}
/* header badge tinted with the profiled team's club color */
.tphead .hcrest{background:color-mix(in srgb,var(--club) 22%,var(--bg-3));
  border-color:color-mix(in srgb,var(--club) 55%,var(--border-strong));color:var(--fg)}
.tppill{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;padding:3px 8px;border-radius:var(--r-pill);margin-left:10px;flex:none;
  color:var(--club);background:color-mix(in srgb,var(--club) 16%,transparent);
  border:1px solid color-mix(in srgb,var(--club) 50%,transparent)}
.tphead .hname{display:inline-flex;align-items:center}
/* identity KPI strip — reuses the shared .kpis/.kpi look */
.tpidentity{display:flex;gap:12px;margin-top:14px;flex:none}
.tpchip{flex:1;background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-tile);padding:13px 15px;position:relative;overflow:hidden}
.tpchip .tpclab{font-size:10px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--fg-muted)}
.tpchip .tpcval{font-family:var(--font-num);font-weight:600;font-size:22px;line-height:1;margin-top:10px;color:var(--fg)}
.tpchip .tpcsub{font-size:10.5px;color:var(--fg-muted);margin-top:6px}
.tpchip .tpcbar{position:absolute;left:0;bottom:0;height:4px;width:35%;border-radius:0 2px 0 0;
  background:var(--club);transition:width 200ms var(--ease)}
.tpchip:hover .tpcbar{width:100%}
/* two-column body grid (7fr/5fr) — roster on the left, staff + finance + history right */
.tpgrid{display:grid;grid-template-columns:7fr 5fr;gap:16px;margin-top:16px;flex:1;min-height:0}
.tpcol{display:flex;flex-direction:column;gap:14px;min-height:0}
/* finances mini-row inside the right column */
.tpfin{display:flex;gap:10px;flex:none}
.tpfinbox{flex:1;background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:9px 11px;text-align:center}
.tpfinbox .v{font-family:var(--font-num);font-weight:600;font-size:15px;color:var(--fg);line-height:1}
.tpfinbox .l{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost);margin-top:5px}
/* roster table */
.tproster{width:100%;font-size:13.5px}
.tproster .tprh{display:grid;grid-template-columns:62px 1fr 40px 46px 46px 50px;gap:8px;padding:0 8px 8px;
  font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:2}
.tproster .tprh span:nth-child(n+3){text-align:right}
.tprsub{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);
  padding:10px 8px 4px;border-top:1px solid var(--hairline);margin-top:4px}
.tprow{display:grid;grid-template-columns:62px 1fr 40px 46px 46px 50px;gap:8px;align-items:center;height:42px;
  padding:0 8px;border-top:1px solid var(--hairline);transition:background var(--t-fast) var(--ease)}
.tprow:hover{background:var(--bg-2)}
.tprow.bench{opacity:.62}
.tpslot{font-family:var(--font-num);font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:3px 6px;border-radius:5px;justify-self:start;border:1px solid var(--hairline);color:var(--fg-muted);background:var(--bg-2)}
.tpslot.start{color:var(--fg);border-color:color-mix(in srgb,var(--club) 50%,var(--hairline));
  background:color-mix(in srgb,var(--club) 14%,var(--bg-2))}
.tprole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.tpname{display:flex;align-items:center;gap:7px;min-width:0}
.tpname .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpbadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none;
  color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.tpcell{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.tpcell.dim{color:var(--fg-muted)}
/* make-offer (rival roster only) — trailing actions column. Uniquely-named
   .mo* classes; only applied when the roster carries the .morival modifier so
   the user-view grid (6 cols) is left exactly as it was. */
.tproster.morival .tprh,.tproster.morival .tprow{grid-template-columns:62px 1fr 40px 46px 46px 50px 118px}
.moact{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:3px;justify-self:end;min-width:0;overflow:hidden}
.mowage{font-family:var(--font-num);font-size:9.5px;font-weight:600;letter-spacing:.02em;color:var(--fg-ghost);
  white-space:nowrap;flex:none}
.mowage b{color:var(--fg-muted);font-weight:600}
.mobtn{border:1px solid color-mix(in srgb,var(--club) 50%,var(--hairline));
  background:color-mix(in srgb,var(--club) 16%,var(--bg-2));color:var(--fg);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.05em;text-transform:uppercase;
  padding:6px 12px;border-radius:6px;clip-path:polygon(4px 0,100% 0,100% 100%,0 100%,0 4px);white-space:nowrap;flex:none;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.mobtn:hover{background:color-mix(in srgb,var(--club) 30%,var(--bg-2));border-color:var(--club)}
.mobtn:active{transform:translateY(1px)}
.mobtn.armed{color:#fff;background:var(--red);border-color:var(--red);box-shadow:var(--red-glow)}
/* staff block */
.tpstaff{display:flex;flex-direction:column}
.tpstrow{display:flex;align-items:center;gap:11px;height:38px;padding:0 4px;border-top:1px solid var(--hairline)}
.tpstrow:first-child{border-top:0}
