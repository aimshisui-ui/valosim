  strip.appendChild(staffCard("Head Coach","coach",staff.coach,staff.coach?[["Tactical",staff.coach.tactical],["Development",staff.coach.development],["Leadership",staff.coach.leadership],["Experience",staff.coach.experience]]:[]));
  strip.appendChild(staffCard("Head Scout","scout",staff.scout,staff.scout?[["Judgement",staff.scout.judgement],["Network",staff.scout.network],["Projection",staff.scout.projection],["Experience",staff.scout.experience]]:[]));
  strip.appendChild(staffCard("Head Analyst","analyst",staff.analyst,staff.analyst?[["Tactical Read",staff.analyst.tactical_read],["Opp. Insight",staff.analyst.opponent_insight],["Prep",staff.analyst.prep],["Experience",staff.analyst.experience]]:[]));
  // Wire Fire controls — two-step inline confirm (no native confirm()). First
  // click arms ("Confirm?"), a second within ~4s posts act:firestaff:<role>:roster.
  strip.querySelectorAll(".fireBtn").forEach(btn=>{
    const roleKey=btn.dataset.fireRole;
    let armed=false, t=null;
    const disarm=()=>{ armed=false; btn.classList.remove("armed"); btn.textContent="Fire"; if(t){ clearTimeout(t); t=null; } };
    btn.addEventListener("click",ev=>{
      ev.stopPropagation();
      if(!armed){
        armed=true; btn.classList.add("armed"); btn.textContent="Confirm?";
        t=setTimeout(disarm,4000);
      }else{
        disarm(); rosterFireStaff(roleKey);
      }
    });
  });
  // chemistry card
  const chem=R.chemistry||[];
  const chemCard=el("div","scard");
  let chemBody='<div class="role">Chemistry</div>';
  if(chem.length){
    chemBody+='<div style="margin-top:8px;flex:1;overflow:hidden">'+chem.slice(0,5).map(c=>{
      const v=+c.value, col=v>0.2?'var(--green)':(v<-0.2?'var(--red-text)':'var(--fg-muted)');
      return `<div class="chemrow"><span class="pair">${esc(c.a)} <span style="color:var(--fg-ghost)">—</span> ${esc(c.b)}</span><span class="cv" style="color:${col}">${v>=0?'+':''}${v.toFixed(2)}</span></div>`;
    }).join('')+'</div>';
  }else{ chemBody+='<div class="empty" style="flex:1">Chemistry still forming — too early to read.</div>'; }
  // Footer (team index) shows regardless of whether per-pair rows exist.
  chemBody+=`<div class="sfoot"><span>team index</span><span class="sal">${team.chemistry_index!=null?team.chemistry_index:'—'}</span></div>`;
  chemCard.innerHTML=chemBody;
  strip.appendChild(chemCard);

  /* ===== init ===== */
  // Re-select the previously-selected player (by stable id) so editing an
  // attribute — which re-pushes state and rebuilds #view — keeps the same
  // player open and god mode still applied. Falls back to index 0.
  selectPlayer(currentDetailIdx());
  function run(){
    const seq=["#header","#kpis","#cRoster","#cDetail","#strip"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
    if(!reduced) setTimeout(()=>document.querySelectorAll("#view .attr .af,#view .pbar .pf").forEach(b=>{const w=b.style.width;b.style.width="0";b.getBoundingClientRect();b.style.transition="width 600ms var(--ease)";requestAnimationFrame(()=>b.style.width=w);}),260);
  }
  run();
}

/* =====================================================================
   renderCompetition(C, club)  — C is the inner `competition` object
   ===================================================================== */
function renderCompetition(C, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="competition";

  if(!C || !C.header){
    view.innerHTML='<div class="preempty">No competition loaded — start or load a season to see standings and the schedule.</div>';
    return;
  }

  view.innerHTML=COMP_SKEL;

  /* ===== header ===== */
  const h=C.header;
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  $("#hLeague").textContent=h.league_name||"—";
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== standings (full table with form) ===== */
  $("#standTitle").textContent=esc(h.league_name||"Standings");
  const standings=C.standings||[];
  $("#standStat").textContent=standings.length?`${standings.length} teams`:"";
  const sb=$("#standBody");

  /* region + division switcher — browse ANY region and tier (VCT / Challengers /
     Open Circuit). Host remembers the view (nav:competition:<region>:<tier>). */
  const V=C.view||{};
  if(Array.isArray(V.regions)&&V.regions.length){
    const curR=String(V.region||''), curT=+V.tier||1;
    const homeR=String(V.user_region||''), homeT=+V.user_tier||1;
    const regPills=V.regions.map(r=>{
      const home=(r===homeR)?'<span class="home" title="Your region">⌂</span>':'';
      return `<button type="button" class="cswPill${r===curR?' on':''}" data-csw-region="${esc(r)}">${esc(r)}${home}</button>`;
    }).join('');
    const tiers=Array.isArray(V.tiers)?V.tiers:[{tier:1,label:'VCT'}];
    const tierPills=tiers.map(ti=>{
      const home=(curR===homeR && +ti.tier===homeT)?'<span class="home" title="Your division">⌂</span>':'';
      return `<button type="button" class="cswPill${+ti.tier===curT?' on':''}" data-csw-tier="${+ti.tier}">${esc(ti.label||('Tier '+ti.tier))}${home}</button>`;
    }).join('');
    const sw=el("div","cswitch");
    sw.innerHTML=`<div class="cswRow"><span class="cswLab">Region</span>${regPills}</div>
      <div class="cswRow"><span class="cswLab">Division</span>${tierPills}</div>`;
    sw.querySelectorAll('[data-csw-region]').forEach(b=>b.addEventListener('click',()=>{
      post("nav:competition:"+b.dataset.cswRegion+":1");   // region change resets to its top flight
    }));
    sw.querySelectorAll('[data-csw-tier]').forEach(b=>b.addEventListener('click',()=>{
      post("nav:competition:"+curR+":"+b.dataset.cswTier);
    }));
    sb.appendChild(sw);
  }
  const tbl=el("div","cstbl");
  tbl.appendChild(el("div","csh",`<span>RK</span><span>TEAM</span><span>W-L</span><span>OVR</span><span>FORM</span>`));
  if(!standings.length){
    tbl.appendChild(el("div","empty","Standings not available yet."));
  }else{
    // Zone separators (engine rules: T1 = top-8 playoffs / bottom-3 relegation
    // gauntlet; T2 = champion promoted / bottom-2 down; T3 = top-2 promoted).
    const tierNow=+(V.tier||1), nRows=standings.length;
    const promoCut=tierNow===1?8:(tierNow===2?1:2);
    const relCut=tierNow===1?3:(tierNow===2?2:0);
    standings.forEach((t,zi)=>{
      if(zi===promoCut && nRows>promoCut+1) tbl.appendChild(el("div","cszone up",tierNow===1?"Playoff line · top 8":"Promotion line"));
      if(relCut && zi===nRows-relCut && zi>promoCut) tbl.appendChild(el("div","cszone down",tierNow===1?"Relegation gauntlet · bottom 3":"Relegation · bottom 2"));
      const row=el("div","csrow tpclick"+(t.is_user?" user":""));
      row.tabIndex=0; row.title="View team profile"; row.setAttribute("aria-label","View "+String(t.team_name||"")+" profile");
      const openProfile=()=>go("teamprofile:"+String(t.team_name||""));
      row.addEventListener("click",openProfile);
      row.addEventListener("keydown",ev=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); openProfile(); } });
      if(t.is_user) row.setAttribute("aria-current","true");
      const initial=esc(String(t.team_name||"").slice(0,1));
      const form=Array.isArray(t.form)?t.form:[];
      let formHTML="";
      for(let i=0;i<5;i++){
        const r=form[i];
        if(r==null){ formHTML+='<span class="fseg e">·</span>'; }
        else{ const rl=String(r).toUpperCase(); formHTML+=`<span class="fseg ${rl==="W"?"w":"l"}">${esc(rl)}</span>`; }
      }
      const tagHTML=t.tag?`<span class="tg">${esc(t.tag)}</span>`:"";
      row.innerHTML=`<span class="rk">${esc(String(t.rank))}</span>
        <span class="team"><span class="mono-chip">${initial}</span><span class="nm">${esc(t.team_name)}${t.is_user?'<span class="sr-only"> (your team)</span>':''}</span>${tagHTML}</span>
        <span class="wl">${esc(String(t.wins))}-${esc(String(t.losses))}</span>
        <span class="ov" data-ovr="${esc(String(t.ovr))}">${(+t.ovr).toFixed(1)}</span>
        <span class="cform">${formHTML}</span>`;
      tbl.appendChild(row);
    });
  }
  sb.appendChild(tbl);
  sb.querySelectorAll(".ov").forEach(e=>e.style.color=ovrColorDash(parseFloat(e.dataset.ovr)));

  /* ===== schedule (upcoming) ===== */
  const schedule=C.schedule||[];
  $("#schedStat").textContent=schedule.length?`${schedule.length} fixtures`:"";
  const scb=$("#schedBody");
  if(!schedule.length){
    scb.appendChild(el("div","empty","No upcoming fixtures — off-week."));
  }else{
    schedule.forEach(s=>{
      const row=el("div","sch"+(s.is_user?" user":""));
      const when=s.days_until===0?"Today":`in ${esc(String(s.days_until))}d`;
      const aName=s.a_tag||s.a||"", bName=s.b_tag||s.b||"";
      const matchup=`${esc(aName)} vs ${esc(bName)}`;
      const dot=s.is_user?'<span class="udot"></span>':'<span class="udot off"></span>';
      row.innerHTML=`${dot}<span class="when${s.days_until===0?" now":""}">${when}</span>
        <span class="mid"><div class="mu">${matchup}</div>${s.label?`<div class="lb">${esc(s.label)}</div>`:""}</span>`;
      scb.appendChild(row);
    });
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cStand","#cSched"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}

/* =====================================================================
   renderFinance(F, club)  — F is the inner `finance` object
   ===================================================================== */
function renderFinance(F, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="finance";

  if(!F || !F.header){
    view.innerHTML='<div class="preempty">No finances loaded — start or load a season to see the budget, payroll and transfers.</div>';
    return;
  }

  view.innerHTML=FIN_SKEL;

  /* ===== header ===== */
  const h=F.header, sm=F.summary||{};
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  $("#hTier").textContent=sm.wealth_tier||"—";
  $("#hPrestige").textContent=sm.prestige!=null?String(sm.prestige):"—";
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== KPI ribbon (same as dashboard) ===== */
  const kc=$("#kpis");
  (F.kpis||[]).forEach(k=>{
    const t=el("div","kpi bevel-tr");
    t.style.setProperty("--accent",cssvar(TONE[k.tone]||"--amber"));
    t.innerHTML=`<div class="klab">${esc(k.label)}</div><div class="kval">${esc(k.value)}</div>${k.subline?`<div class="ksub">${esc(k.subline)}</div>`:""}<div class="kbar"></div>`;
    kc.appendChild(t);
  });

  /* ===== sponsor (preseason choice while pending, else the active deal) =====
     When the engine flags a pending sponsor choice, show the 3 offers with
     Choose buttons (+ Decline). Otherwise surface the active deal, its
     requirement, live progress and reward. Posts act:choosesponsor:<idx>. */
  const sp=F.sponsor, spHost=$("#finSponsor");
  if(spHost && sp && (sp.pending || sp.active)){
    if(sp.pending && Array.isArray(sp.offers) && sp.offers.length){
      const cards=sp.offers.map(o=>`
        <div class="spOffer">
          <div class="spOname">${esc(o.name)}</div>
          <div class="spOreq">${esc(o.requirement)}</div>
          <div class="spOrew">Reward <b>+${esc(fmtK(o.reward_k||0))}</b></div>
          <button type="button" class="spChoose" data-sp-choose="${esc(String(o.idx))}">Choose</button>
        </div>`).join('');
      spHost.innerHTML=`<div class="card enter in spCard pending">
        <div class="chead"><span class="t">Choose Your Season Sponsor</span><span class="s">preseason · one pick</span></div>
        <div class="cbody">
          <div class="spNote">A sponsor pays a one-time year-end bonus if you hit its target. Pick the deal that fits your season plan.</div>
          <div class="spOffers">${cards}</div>
          <button type="button" class="spDecline" data-sp-choose="-1">Decline — no sponsor this season</button>
        </div>
      </div>`;
    }else if(sp.active){
      const statusPill = sp.credited
        ? `<span class="spPill paid">Paid</span>`
        : `<span class="spPill ${sp.on_track?'ontrack':'behind'}">${sp.on_track?'On track':'Behind'}</span>`;
      spHost.innerHTML=`<div class="card enter in spCard active">
        <div class="chead"><span class="t">Active Sponsor</span><span class="s">reward at year-end</span></div>
        <div class="cbody">
          <div class="spActrow">
            <div class="spActmain">
              <div class="spName">${esc(sp.name||'—')}</div>
              <div class="spReq">${esc(sp.requirement||'')}${sp.progress?` <span class="spProg">— ${esc(sp.progress)}</span>`:''}</div>
            </div>
            <div class="spActside">
              <div class="spReward">+${esc(fmtK(sp.reward_k||0))}</div>
              ${statusPill}
            </div>
          </div>
        </div>
      </div>`;
    }
    spHost.querySelectorAll('[data-sp-choose]').forEach(b=>b.addEventListener('click',()=>{
      post("act:choosesponsor:"+b.dataset.spChoose+":finance");
    }));
  }else if(spHost){
    spHost.innerHTML='';
  }

  /* ===== salary breakdown ===== */
  const wages=F.wages||[];
  $("#wageStat").textContent=wages.length?`${wages.length} players`:"";
  const wb=$("#wageBody");
  const wtbl=el("div","wtbl");
  wtbl.appendChild(el("div","wh",`<span>ROLE</span><span>PLAYER</span><span>YRS</span><span>SALARY</span>`));
  if(!wages.length){
    wtbl.appendChild(el("div","empty","No players under contract."));
  }else{
    wages.forEach(w=>{
      const[rl,rc]=ROLE[w.role]||["?","--fg-muted"];
      const row=el("div","wrow");
      const wy=+w.years_left||0;
      row.innerHTML=`<span class="wrole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
        <span class="nm">${esc(w.name)}</span>
        <span class="yr"${wy<=1?' style="color:'+(wy<=0?'var(--red-text)':'var(--amber)')+'" title="Expiring deal"':''}>${esc(String(wy))}y</span>
        <span class="sal">${esc(fmtK(w.salary_k||0))}</span>`;
      wtbl.appendChild(row);
    });
  }
  wb.appendChild(wtbl);
  const foot=el("div","wfoot");
  foot.innerHTML=`<span class="fl">Total Payroll</span><span class="fv">${esc(fmtK(sm.payroll_k||0))}</span>`;
  wb.appendChild(foot);

  /* ===== staff ===== */
  const staff=F.staff||[];
  $("#staffStat").textContent=staff.length?`${staff.length}`:"";
  const stb=$("#staffBody");
  if(!staff.length){
    stb.appendChild(el("div","empty","No staff under contract."));
  }else{
    staff.forEach(s=>{
      const row=el("div","strow");
      row.innerHTML=`<span class="rl">${esc(s.role)}</span>
        <span class="nm">${esc(s.name)}</span>
        <span class="sal">${esc(fmtK(s.salary_k||0))}/yr</span>`;
      stb.appendChild(row);
    });
  }

  /* ===== transfers (newest first) ===== */
  const transfers=(F.transfers||[]).slice().sort((a,b)=>(b.year||0)-(a.year||0));
  $("#tfStat").textContent=transfers.length?`${transfers.length}`:"";
  const tb=$("#tfBody");
  if(!transfers.length){
    tb.appendChild(el("div","empty","No transfer history yet."));
  }else{
    transfers.forEach(t=>{
      const free=t.fee_k===0;
      const fee=free?"Free":fmtK(t.fee_k||0);
      const row=el("div","tfrow");
      row.innerHTML=`<span class="mid"><div class="pl">${esc(t.player)}</div><div class="mv">${esc(t.from)} <span style="color:var(--fg-muted)">&rarr;</span> ${esc(t.to)}</div></span>
        <span class="fee${free?" free":""}">${esc(fee)}</span>
        <span class="yr">Y${esc(String(t.year))}</span>`;
      tb.appendChild(row);
    });
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#kpis","#cWages","#cStaff","#cTransfers"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*50); }); }
  }
  run();
}

/* =====================================================================
   renderFavorites(F, club)  — F is the FULL data object the host pushes for
   screen:"favorites" (carries club_color + favorites:{count,players}). A
   titled, scrollable list of starred players. Each row opens the player modal
   on click; a per-row ✕ unfavorites. Uniquely-named .fav* classes so they
   never collide with any existing screen's selectors. Mirrors the .card /
   header language of renderMarket / renderFinance.
   ===================================================================== */
const FAV_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">Favorites</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Favorites</div><div class="val" id="hFavCount">—</div></div>
  </div>

  <div class="favgrid">
    <div class="card enter" id="cFav" style="flex:1">
      <div class="chead"><span class="t">Favorited Players</span><span class="s" id="favStat"></span></div>
      <div class="cbody" id="favBody"></div>
    </div>
  </div>`;

function renderFavorites(F, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="favorites";

  view.innerHTML=FAV_SKEL;
  // Header crest: mirror the persistent nav crest (this payload has no club name).
  $("#hcrest").textContent=$("#navCrest").textContent;

  const fav=(F && F.favorites) || {};
  const players=Array.isArray(fav.players)?fav.players:[];
  const count=(fav.count!=null)?fav.count:players.length;
  $("#hFavCount").textContent=String(count);
  $("#favStat").textContent=count?`${esc(String(count))} starred`:"";

  const body=$("#favBody");
  if(!players.length){
    body.appendChild(el("div","empty","No favorited players yet — open a player and tap ★ Favorite."));
  }else{
    const tbl=el("div","favtable");
    tbl.appendChild(el("div","favhead",`<span>CTRY</span><span>PLAYER</span><span>ROLE</span><span>AGE</span><span>OVR</span><span>TEAM</span><span>M</span><span>RAT</span><span>MMR</span><span></span>`));
    players.forEach(pl=>{
      const[rl,rc]=ROLE[pl.role]||["?","--fg-muted"];
      const igl=pl.igl?'<span class="favbadge igl">IGL</span>':'';
      const iso=esc(String(pl.country_iso||"").toUpperCase())||"—";
      const rating=(pl.avg_rating!=null)?(+pl.avg_rating).toFixed(2):"—";
      const row=el("div","favrow");
      row.dataset.pm=String(pl.id);
      row.setAttribute("role","button");
      row.setAttribute("tabindex","0");
      row.setAttribute("aria-label",`Open ${esc(pl.name)} profile`);
      row.innerHTML=`<span class="favflag">${iso}</span>
        <span class="favname"><span class="nm">${esc(pl.name)}</span>${igl}</span>
        <span class="favrole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
        <span class="favcell dim">${esc(String(pl.age))}</span>
        <span class="favovr" style="color:${ovrColorRoster(+pl.ovr)}">${esc(String(pl.ovr))}</span>
        <span class="favteam">${pl.team_name?esc(pl.team_name):'<span class="dim">Free Agent</span>'}</span>
        <span class="favcell dim">${esc(String(pl.career_matches!=null?pl.career_matches:0))}</span>
        <span class="favcell">${rating}</span>
        <span class="favcell">${esc(String(pl.mmr!=null?pl.mmr:'—'))}</span>
        <span class="favx"><button type="button" class="favunfav" data-unfav="${esc(String(pl.id))}" title="Remove from favorites" aria-label="Unfavorite ${esc(pl.name)}">&times;</button></span>`;
      row.addEventListener("click",()=>openPlayerModal(pl.id));
      row.addEventListener("keydown",ev=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); openPlayerModal(pl.id); } });
      const x=row.querySelector(".favunfav");
      if(x) x.addEventListener("click",ev=>{ ev.stopPropagation(); favUnfavorite(pl.id); });
      tbl.appendChild(row);
    });
    body.appendChild(tbl);
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cFav"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}
// WRITE action — remove a player from favorites (from the favorites list).
function favUnfavorite(id){ post("act:unfavorite:"+id+":favorites"); }

/* =====================================================================
   renderWatchlist(W, club)  — W is the FULL data object the host pushes for
   screen:"watchlist" (carries club_color + watchlist:{count,entries}). Like
   the favorites list, but each row also carries a status <select>
   (Watching/Scouting/Bidding), an editable note input, and an unwatch ✕.
   Row click (away from those controls) opens the player modal. Uniquely-named
   .wl* classes so they never collide with any existing screen's selectors.
   ===================================================================== */
const WL_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">Watchlist</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Targets</div><div class="val" id="hWlCount">—</div></div>
  </div>

  <div class="wlgrid">
    <div class="card enter" id="cWl" style="flex:1">
      <div class="chead"><span class="t">Scouting Watchlist</span><span class="s" id="wlStat"></span></div>
      <div class="cbody" id="wlBody"></div>
    </div>
  </div>`;

// Status code → label (0=Watching, 1=Scouting, 2=Bidding).
const WL_STATUS=["Watching","Scouting","Bidding"];

function renderWatchlist(W, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="watchlist";

  view.innerHTML=WL_SKEL;
  $("#hcrest").textContent=$("#navCrest").textContent;

  const wl=(W && W.watchlist) || {};
  const entries=Array.isArray(wl.entries)?wl.entries:[];
  const count=(wl.count!=null)?wl.count:entries.length;
  $("#hWlCount").textContent=String(count);
  $("#wlStat").textContent=count?`${esc(String(count))} tracked`:"";

  const body=$("#wlBody");
  if(!entries.length){
    body.appendChild(el("div","empty","No watchlist targets — open a player and tap Watch."));
  }else{
    const tbl=el("div","wltable");
    tbl.appendChild(el("div","wlhead",`<span>CTRY</span><span>PLAYER</span><span>ROLE</span><span>AGE</span><span>OVR</span><span>TEAM</span><span>STATUS</span><span>NOTE</span><span></span>`));
    entries.forEach(en=>{
      const[rl,rc]=ROLE[en.role]||["?","--fg-muted"];
      const igl=en.igl?'<span class="wlbadge igl">IGL</span>':'';
      const iso=esc(String(en.country_iso||"").toUpperCase())||"—";
      const status=(en.status!=null)?(+en.status):0;
      const opts=WL_STATUS.map((lab,i)=>`<option value="${i}"${i===status?' selected':''}>${esc(lab)}</option>`).join('');
      const row=el("div","wlrow");
      row.dataset.pm=String(en.id);
      row.innerHTML=`<span class="wlflag">${iso}</span>
        <span class="wlname"><span class="nm">${esc(en.name)}</span>${igl}</span>
        <span class="wlrole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>
        <span class="wlcell dim">${esc(String(en.age))}</span>
        <span class="wlovr" style="color:${ovrColorRoster(+en.ovr)}">${esc(String(en.ovr))}</span>
        <span class="wlteam">${en.team_name?esc(en.team_name):'<span class="dim">Free Agent</span>'}</span>
        <span class="wlstatuswrap"><select class="wlstatus" data-wlstatus="${esc(String(en.id))}" aria-label="Watch status for ${esc(en.name)}">${opts}</select>${status===2?`<button type="button" class="wlbid" data-wlbid="${esc(String(en.id))}" title="Open the ${en.team_name?'Bid':'Sign'} tab">Bid →</button>`:''}</span>
        <span class="wlnotewrap"><input type="text" class="wlnote" data-wlnote="${esc(String(en.id))}" value="${esc(en.note||'')}" placeholder="Add a note…" aria-label="Note for ${esc(en.name)}"></span>
        <span class="wlx"><button type="button" class="wlunwatch" data-unwatch="${esc(String(en.id))}" title="Remove from watchlist" aria-label="Unwatch ${esc(en.name)}">&times;</button></span>`;
      // Row click opens the modal, but NOT when the click originated on an
      // interactive control (select / note input / unwatch button).
      row.addEventListener("click",ev=>{
        if(ev.target.closest(".wlstatus,.wlnote,.wlunwatch,.wlbid")) return;
        openPlayerModal(en.id);
      });
      const sel=row.querySelector(".wlstatus");
      if(sel) sel.addEventListener("change",ev=>{ ev.stopPropagation(); wlSetStatus(en.id, +sel.value); });
      // "Bidding" status gets a real action: jump straight to the negotiation tab.
      const bidBtn=row.querySelector(".wlbid");
      if(bidBtn) bidBtn.addEventListener("click",ev=>{ ev.stopPropagation(); openPlayerModal(en.id, en.team_name?'bid':'sign'); });
      const note=row.querySelector(".wlnote");
      if(note){
        // commit on blur and on Enter; track the last-committed value so we
        // don't re-post an unchanged note.
        let last=en.note||"";
        const commit=()=>{ const v=note.value; if(v!==last){ last=v; wlSetNote(en.id, v); } };
        note.addEventListener("blur",commit);
        note.addEventListener("keydown",ev=>{ if(ev.key==="Enter"){ ev.preventDefault(); note.blur(); } });
        note.addEventListener("click",ev=>ev.stopPropagation());
      }
      const x=row.querySelector(".wlunwatch");
      if(x) x.addEventListener("click",ev=>{ ev.stopPropagation(); wlUnwatch(en.id); });
      tbl.appendChild(row);
    });
    body.appendChild(tbl);
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cWl"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}
// WRITE actions — watchlist edits (from the watchlist screen).
function wlUnwatch(id){ post("act:unwatch:"+id+":watchlist"); }
function wlSetStatus(id, code){ post("act:watchstatus:"+id+":"+code+":watchlist"); }
// Note text is passed verbatim — the host splits on ':' and rejoins the tail.
function wlSetNote(id, text){ post("act:watchnote:"+id+":"+text+":watchlist"); }

/* =====================================================================
   renderRecords(R, club)  — R is the FULL data object the host pushes for
   screen:"records" (carries club_color + records:{player_pool, goat_career,
   goat_season, hall_of_fame, leaders{...}}). A read-only all-time hub with
   four client-side sub-tabs: GOAT (Career), GOAT (Season), Hall of Fame,
   Leaders. Every player row opens the existing player modal via
   nav:playermodal:<id>. All arrays may be empty early in a save — each pane
   degrades to its own graceful empty state. Uniquely-named .rec* classes.
   ===================================================================== */
let recTab = "career";  // remembered active sub-tab within the session

const REC_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">Records</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Hall of History</div><div class="val" id="hRecPool">—</div></div>
  </div>

  <div class="recwrap card enter" id="cRec" style="flex:1">
    <div class="rectabs" id="recTabs">
      <button type="button" class="rectab" data-rec-tab="career">GOAT (Career)</button>
      <button type="button" class="rectab" data-rec-tab="season">GOAT (Season)</button>
      <button type="button" class="rectab" data-rec-tab="hof">Hall of Fame</button>
      <button type="button" class="rectab" data-rec-tab="leaders">Leaders</button>
    </div>
    <div class="recpane" data-rec-pane="career"><div class="recbody" id="recCareer"></div></div>
    <div class="recpane" data-rec-pane="season"><div class="recbody" id="recSeason"></div></div>
    <div class="recpane" data-rec-pane="hof"><div class="recbody" id="recHof"></div></div>
    <div class="recpane" data-rec-pane="leaders"><div class="recbody" id="recLeaders"></div></div>
  </div>`;

// Fixed render order for the six leader boards.
const REC_LEADER_ORDER=["rating","kills","mvps","trophies","adr","kast"];
// Boards whose value is a float (2-dec). Everything else prints as a plain int.
const REC_FLOAT_LEADERS={rating:1,adr:1,kast:1};

// Shared bits for a player row (flag + name+IGL + role chip).
function recFlag(iso){ return `<span class="recflag">${esc(String(iso||"").toUpperCase())||"—"}</span>`; }
function recRoleChip(role){
  const[rl,rc]=ROLE[role]||["?","--fg-muted"];
  return `<span class="recrole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>`;
}
function recTeamCell(name){ return name?esc(name):'<span class="dim">Free Agent</span>'; }

// Attach the modal-open behaviour to a row that carries data-pm=<id>.
function recWireRow(row, id){
  row.dataset.pm=String(id);
  row.setAttribute("role","button");
  row.setAttribute("tabindex","0");
  row.addEventListener("click",()=>openPlayerModal(id));
  row.addEventListener("keydown",ev=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); openPlayerModal(id); } });
}

function renderRecords(R, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="records";

  view.innerHTML=REC_SKEL;
  $("#hcrest").textContent=$("#navCrest").textContent;

  const rec=(R && R.records) || {};
  const pool=(rec.player_pool!=null)?rec.player_pool:0;
  $("#hRecPool").textContent=pool?`${fmtInt(pool)}`:"—";
  const meta=$("#hmeta");
  meta.appendChild(el("span","plate",`${fmtInt(pool)} players tracked`));

  /* ===== GOAT (Career) ===== */
  const career=Array.isArray(rec.goat_career)?rec.goat_career:[];
  const cBody=$("#recCareer");
  if(!career.length){
    cBody.appendChild(el("div","recempty","Not enough career history yet."));
  }else{
    const tbl=el("div","rectable career");
    tbl.appendChild(el("div","rechead",`<span>#</span><span>CTRY</span><span>PLAYER</span><span>ROLE</span><span>TEAM</span><span>SCORE</span>`));
    career.forEach(p=>{
      const rank=(p.rank!=null)?+p.rank:0;
      const igl=p.igl?'<span class="recbadge igl">IGL</span>':'';
      const gcls=rank===1?" g1":rank===2?" g2":rank===3?" g3":"";
      const row=el("div","recrow");
      row.innerHTML=`<span class="recrank${gcls}">${esc(String(rank))}</span>
        ${recFlag(p.country_iso)}
        <span class="recname"><span class="nm">${esc(p.name)}</span>${igl}</span>
        ${recRoleChip(p.role)}
        <span class="recteam">${recTeamCell(p.team_name)}</span>
        <span class="recscore">${fmt1(p.score)}</span>`;
      recWireRow(row, p.id);
      tbl.appendChild(row);
    });
    cBody.appendChild(tbl);
  }

  /* ===== GOAT (Season) ===== */
  const season=Array.isArray(rec.goat_season)?rec.goat_season:[];
  const sBody=$("#recSeason");
  if(!season.length){
    sBody.appendChild(el("div","recempty","Not enough season history yet."));
  }else{
    const tbl=el("div","rectable season");
    tbl.appendChild(el("div","rechead",`<span>#</span><span>CTRY</span><span>PLAYER</span><span>ROLE</span><span>SEASON</span><span>RAT</span><span>K/D</span><span>SCORE</span>`));
    season.forEach(p=>{
      const rank=(p.rank!=null)?+p.rank:0;
      const igl=p.igl?'<span class="recbadge igl">IGL</span>':'';
      const gcls=rank===1?" g1":rank===2?" g2":rank===3?" g3":"";
      const seasonTxt=(p.season!=null?`<span class="yr">${esc(String(p.season))}</span>`:'')+
        (p.season_team?`<span class="tm">${esc(p.season_team)}</span>`:'');
      const row=el("div","recrow");
      row.innerHTML=`<span class="recrank${gcls}">${esc(String(rank))}</span>
        ${recFlag(p.country_iso)}
        <span class="recname"><span class="nm">${esc(p.name)}</span>${igl}</span>
        ${recRoleChip(p.role)}
        <span class="recseason">${seasonTxt||'<span class="tm">—</span>'}</span>
        <span class="reccell">${fmt2(p.season_rating)}</span>
        <span class="reccell">${fmt2(p.season_kd)}</span>
        <span class="recscore">${fmt1(p.score)}</span>`;
      recWireRow(row, p.id);
      tbl.appendChild(row);
    });
    sBody.appendChild(tbl);
  }

  /* ===== Hall of Fame ===== */
  const hof=Array.isArray(rec.hall_of_fame)?rec.hall_of_fame:[];
  const hBody=$("#recHof");
  if(!hof.length){
    hBody.appendChild(el("div","recempty","No inductees yet — the Hall fills as legends retire."));
  }else{
    const grid=el("div","rechofgrid");
    hof.forEach(p=>{
      const igl=p.igl?'<span class="recbadge igl">IGL</span>':'';
      const pills=[];
      if(p.won_mvp) pills.push('<span class="recpill mvp">MVP Winner</span>');
      if(p.won_role_award) pills.push('<span class="recpill roty">Role OTY</span>');
      if((+p.gf_clutches||0)>0) pills.push(`<span class="recpill clutch">GF Clutch ×${esc(String(+p.gf_clutches))}</span>`);
      const card=el("div","rechof");
      card.innerHTML=`<div class="rechoftop">${recFlag(p.country_iso)}
          <div class="rechofname"><span class="nm">${esc(p.name)}</span>${igl}</div>
          ${recRoleChip(p.role)}</div>
        <div class="rechofteam">${p.team_name?esc(p.team_name):'Free Agent'}</div>
        <div class="rechofstats">
          <div class="rechofstat"><span class="v">${fmtInt(p.career_matches)}</span><span class="l">Matches</span></div>
          <div class="rechofstat"><span class="v">${fmt2(p.avg_rating)}</span><span class="l">Avg Rating</span></div>
          <div class="rechofstat"><span class="v">${fmtInt(p.trophies)}</span><span class="l">Trophies</span></div>
          <div class="rechofstat"><span class="v">${fmtInt(p.mvps)}</span><span class="l">MVPs</span></div>
        </div>
        ${pills.length?`<div class="rechofpills">${pills.join('')}</div>`:''}`;
      recWireRow(card, p.id);
      grid.appendChild(card);
    });
    hBody.appendChild(grid);
  }

  /* ===== Leaders ===== */
  const leaders=(rec.leaders&&typeof rec.leaders==="object")?rec.leaders:{};
  const lBody=$("#recLeaders");
  const boards=REC_LEADER_ORDER.filter(k=>leaders[k]);
  if(!boards.length){
    lBody.appendChild(el("div","recempty","No leaderboards yet — records accrue as seasons are played."));
  }else{
    const grid=el("div","recleaders");
    boards.forEach(key=>{
      const board=leaders[key]||{};
      const entries=Array.isArray(board.entries)?board.entries.slice(0,15):[];
      const isFloat=!!REC_FLOAT_LEADERS[key];
      const bx=el("div","recboard");
      bx.appendChild(el("div","recboardhead",esc(board.label||key)));
      if(!entries.length){
        bx.appendChild(el("div","recboardempty","No qualifiers yet."));
      }else{
        entries.forEach((en,i)=>{
          const tcls=i===0?" t1":i===1?" t2":i===2?" t3":"";
          const team=en.team_name?`<span class="tm">${esc(en.team_name)}</span>`:'';
          const val=isFloat?fmt2(en.value):fmtInt(en.value);
          const row=el("div","reclrow"+tcls);
          row.innerHTML=`<span class="reclrank">${i+1}</span>
            <span class="reclflag">${esc(String(en.country_iso||"").toUpperCase())||"—"}</span>
            <span class="reclname">${esc(en.name)}${team}</span>
            <span class="reclval">${val}</span>`;
          recWireRow(row, en.id);
          bx.appendChild(row);
        });
      }
      grid.appendChild(bx);
    });
    lBody.appendChild(grid);
  }

  /* ===== sub-tab switching (client-side; no bridge) ===== */
  const wrap=$("#cRec");
  function selectTab(t){
    recTab=t;
    wrap.querySelectorAll(".rectab").forEach(b=>b.classList.toggle("on", b.dataset.recTab===t));
    wrap.querySelectorAll(".recpane").forEach(p=>p.classList.toggle("on", p.dataset.recPane===t));
  }
  wrap.querySelectorAll("[data-rec-tab]").forEach(b=>{
    b.addEventListener("click",()=>selectTab(b.dataset.recTab));
  });
  // Restore the remembered tab (default "career"); guard against a stale value.
  const valid=["career","season","hof","leaders"];
  selectTab(valid.includes(recTab)?recTab:"career");

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cRec"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}
// Integer formatter with thousands separators (career kills etc.).
function fmtInt(n){ const v=(n==null||isNaN(+n))?0:Math.round(+n); return v.toLocaleString("en-US"); }
// 1-dec / 2-dec float formatters with a muted em-dash for missing values.
function fmt1(n){ return (n==null||isNaN(+n))?"—":(+n).toFixed(1); }
function fmt2(n){ return (n==null||isNaN(+n))?"—":(+n).toFixed(2); }

/* =====================================================================
   renderMatch(M, club)  — M is the whole msg.data payload for screen "match":
   { found, club_color, match:{ header, blue_team[], red_team[], rounds[] } }.
   Read-only post-match results: scoreline banner, dual scoreboards (sorted by
   rating desc, MVP starred), and a round-by-round pip timeline. Player rows
   open the detail modal via nav:playermodal:<id>. Uniquely-named .mv* classes.
   ===================================================================== */
const MATCH_SKEL=`
  <div class="header enter" id="header">
    <div class="wash"></div>
    <div class="hcrest" id="hcrest">O</div>
    <div class="htitle"><div class="hname" id="clubName">Match Result</div><div class="hmeta" id="hmeta"></div></div>
    <div class="hclock"><div class="lab">Last Match</div><div class="val" id="hMatchScore">—</div></div>
  </div>
  <div class="mvwrap enter" id="cMatch"></div>`;

// end_kind → [glyph, human label] for pip icon + tooltip.
const MV_ENDKIND={Elimination:["✕","Elimination"],Detonation:["●","Detonation"],
  Defuse:["✂","Defuse"],Time:["⏱","Time"]};

// Rating → color bucket class (green >=1.15, red <0.9, else neutral).
function mvRatingCls(r){ const v=+r; if(isNaN(v)) return "mid"; return v>=1.15?"hi":(v<0.9?"lo":"mid"); }

// Role chip reusing the ROLE table (label + color var), styled like recRoleChip.
function mvRoleChip(role){
  const[rl,rc]=ROLE[role]||["?","--fg-muted"];
  return `<span class="mvRoleChip" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)">${rl}</span>`;
}

// Build one scoreboard (side = "blue"|"red"). Rows sorted by rating desc; MVP
// row highlighted + starred. Each row wired to open the player modal.
function mvBuildBoard(side, teamName, score, rows){
  const board=el("div","mvBoard "+side);
  board.innerHTML=`<div class="mvBoardHead"><span class="tn">${esc(teamName||"—")}</span><span class="sc num">${esc(String(score==null?"—":score))}</span></div>`;
  const tbl=el("div","mvTbl");
  tbl.appendChild(el("div","mvHead",
    `<span>Player</span><span>Agent</span><span>K</span><span>D</span><span>A</span><span>ADR</span><span>HS%</span><span>FB/FD</span><span>MK</span><span>Rating</span>`));
  const sorted=(Array.isArray(rows)?rows.slice():[]).sort((a,b)=>(+b.rating||0)-(+a.rating||0));
  sorted.forEach(p=>{
    const rcls=mvRatingCls(p.rating);
    const star=p.mvp?'<span class="star" title="Match MVP">★</span>':'';
    const mk=(p.mk!=null&&String(p.mk).trim()!=="")?esc(String(p.mk)):"—";
    const row=el("div","mvRow"+(p.mvp?" mvp":""));
    if(p.id!=null) row.dataset.pid=String(p.id);   // live K/D ticker joins by id
    row.innerHTML=`
      <span class="mvPlayer">${mvRoleChip(p.role)}<span class="pn">${esc(p.name)}</span>${star}</span>
      <span class="mvAgent">${esc(p.agent||"—")}</span>
      <span class="mvCell mvK">${esc(String(p.k==null?"—":p.k))}</span>
      <span class="mvCell dim mvD">${esc(String(p.d==null?"—":p.d))}</span>
      <span class="mvCell">${esc(String(p.a==null?"—":p.a))}</span>
      <span class="mvCell">${esc(String(p.adr==null?"—":Math.round(+p.adr)))}</span>
      <span class="mvCell">${p.hs==null?"—":esc(String(Math.round(+p.hs)))+"%"}</span>
      <span class="mvCell">${esc(String(p.fb==null?"—":p.fb))}/${esc(String(p.fd==null?"—":p.fd))}</span>
      <span class="mvCell dim">${mk}</span>
      <span class="mvRating ${rcls}">${fmt2(p.rating)}</span>`;
    // Reuse the shared modal-open wiring (data-pm + click/keyboard → nav:playermodal:<id>).
    if(p.id!=null) recWireRow(row, p.id);
    tbl.appendChild(row);
  });
  board.appendChild(tbl);
  return board;
}

function renderMatch(M, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="match";

  // Series-aware. The host pushes {match:{series:{best_of, blue/red_name, blue/red_maps,
  // winner_name, user_side/won, series_mvp, maps:[{map,scores,mvp,storyline,teams,rounds}]}}}.
  const S=(M && M.found!==false && M.match && M.match.series) ? M.match.series : null;
  const maps=(S && Array.isArray(S.maps)) ? S.maps : [];
  if(!S || !maps.length){
    view.innerHTML=`<div class="mvEmptyBig">
      <svg viewBox="0 0 24 24"><path d="M4 5l6 7-6 7"/><path d="M20 5l-6 7 6 7"/><path d="M10 12h4"/></svg>
      <div class="h">No match played yet</div>
      <div class="p">Hit <b>Match</b> to play your next game — you'll watch it unfold live, map by map, with full scoreboards and a round-by-round breakdown.</div>
    </div>`;
    return;
  }

  view.innerHTML=MATCH_SKEL;
  const mHc=$("#hcrest"); if(mHc) mHc.textContent=$("#navCrest").textContent;
  const wrap=$("#cMatch");
  const blueName=S.blue_name||"Blue", redName=S.red_name||"Red";
  const bestOf=+S.best_of||1;
  const userSide=(S.user_side==="blue"||S.user_side==="red")?S.user_side:"none";
  const finalBlue=+S.blue_maps||0, finalRed=+S.red_maps||0;
  const needWin=bestOf>1?(Math.floor(bestOf/2)+1):1;

  $("#clubName").textContent=`${blueName} vs ${redName}`;
  const hmeta=$("#hmeta");
  hmeta.appendChild(el("span","plate", bestOf>1?`BEST OF ${bestOf}`:"SINGLE MAP"));
  if(S.event) hmeta.appendChild(el("span","plate",esc(S.event)));

  // persistent series banner + wrap-up card + map tabs + a per-map view
  const banner=el("div","mvBanner"+(userSide==="blue"?" userBlue":userSide==="red"?" userRed":""));
  wrap.appendChild(banner);
  const wrapCard=el("div","mvWrapCard");
  wrap.appendChild(wrapCard);
  const tabs=el("div","mvMapTabs");
  wrap.appendChild(tabs);
  const mapView=el("div","mvMapView");
  wrap.appendChild(mapView);

  // Series aggregates (client-side, from the per-map scoreboards) — powers the
  // post-match wrap-up: MVP card + derived match awards.
  function seriesAgg(){
    const agg={};
    maps.forEach(mm=>{ [["blue_team",blueName],["red_team",redName]].forEach(([tk,tn])=>{
      (mm[tk]||[]).forEach(pr=>{
        const a=agg[pr.id]||(agg[pr.id]={name:pr.name,role:pr.role,agent:pr.agent,team:tn,k:0,d:0,a:0,rs:0,maps:0,fb:0,cl:0});
        a.k+=+pr.k||0; a.d+=+pr.d||0; a.a+=+pr.a||0; a.rs+=+pr.rating||0; a.maps++;
        a.fb+=+pr.fb||0; a.cl+=+pr.clutch||0;
        if(pr.agent) a.agent=pr.agent;
      });
    });});
    return Object.values(agg);
  }
  function paintWrapUp(){
    if(live){ wrapCard.innerHTML=""; wrapCard.style.display="none"; return; }
    const all=seriesAgg();
    if(!all.length){ wrapCard.style.display="none"; return; }
    all.forEach(a=>{ a.rating=a.maps?a.rs/a.maps:0; });
    const mvp=all.find(a=>a.name===S.series_mvp)||all.slice().sort((x,y)=>y.rating-x.rating)[0];
    const byK=all.slice().sort((x,y)=>y.k-x.k)[0];
    const byR=all.filter(a=>a!==mvp).sort((x,y)=>y.rating-x.rating)[0];
    const byFb=all.slice().sort((x,y)=>y.fb-x.fb)[0];
    const byCl=all.slice().sort((x,y)=>y.cl-x.cl)[0];
    const awards=[];
    if(byK)        awards.push(`<span class="mvAward"><b>${esc(byK.name)}</b> Most kills · ${byK.k}</span>`);
    if(byR)        awards.push(`<span class="mvAward"><b>${esc(byR.name)}</b> Top rating · ${byR.rating.toFixed(2)}</span>`);
    if(byFb&&byFb.fb>0) awards.push(`<span class="mvAward"><b>${esc(byFb.name)}</b> Opening duels · ${byFb.fb} FB</span>`);
    if(byCl&&byCl.cl>0) awards.push(`<span class="mvAward"><b>${esc(byCl.name)}</b> Clutch plays · ${byCl.cl}</span>`);
    const declMap=maps[maps.length-1]||{};
    const story=declMap.storyline?`<div class="mvWrapStory">${esc(declMap.storyline)} on the decider${declMap.map?` · ${esc(declMap.map)}`:''}</div>`:'';
    wrapCard.style.display="";
    wrapCard.innerHTML=`
      <div class="mvMvpCard">
        <div class="mvMvpCrest">★</div>
        <div class="mvMvpBody">
          <div class="mvMvpLab">Series MVP</div>
          <div class="mvMvpName">${esc(mvp?mvp.name:'—')}</div>
          <div class="mvMvpSub">${mvp?`${esc(mvp.team)} · ${esc(mvp.role||'')}${mvp.agent?` · ${esc(mvp.agent)}`:''}`:''}</div>
        </div>
        <div class="mvMvpStats">${mvp?`<span><b>${mvp.k}-${mvp.d}-${mvp.a}</b>K-D-A</span><span><b>${mvp.rating.toFixed(2)}</b>RATING</span>`:''}</div>
      </div>
      <div class="mvAwards">${awards.join('')}</div>
      ${story}`;
  }

  let mapIdx=0, live=false, revealedThrough=-1, mapCtl=null;

  // maps won by each side among maps[0..k] (running series score during a live watch)
  function wonThrough(k){ let b=0,r=0; for(let i=0;i<=k&&i<maps.length;i++){ const m=maps[i]; const bs=+m.blue_score||0, rs=+m.red_score||0; if(bs>rs)b++; else if(rs>bs)r++; } return [b,r]; }

  function paintBanner(){
    let bm,rm,decided;
    if(live){ [bm,rm]=wonThrough(revealedThrough); decided=(bm>=needWin||rm>=needWin); }
    else{ bm=finalBlue; rm=finalRed; decided=true; }
    const blueWon=decided&&bm>rm, redWon=decided&&rm>bm;
    $("#hMatchScore").textContent=`${bm} — ${rm}`;
    const tags=[`<span class="mvbTag series">${bestOf>1?`BO${bestOf}`:"BO1"}</span>`];
    if(S.event) tags.push(`<span>${esc(S.event)}</span>`);
    if(S.is_solo_q) tags.push(`<span class="mvbTag ranked">Ranked</span>`);
    if(live) tags.push(`<span class="mvbTag live">● LIVE</span>`);
    const blueCls="mvTeamName blue"+(blueWon?" winner":redWon?" loser":"");
    const redCls="mvTeamName red"+(redWon?" winner":blueWon?" loser":"");
    banner.innerHTML=`
      <div class="mvbEvent">${tags.join("")}</div>
      <div class="mvScore">
        <div class="${blueCls}"><span class="nm">${esc(blueName)}</span></div>
        <div class="mvNums"><span class="n${blueWon?" win":""}">${bm}</span><span class="dash">—</span><span class="n${redWon?" win":""}">${rm}</span></div>
        <div class="${redCls}"><span class="nm">${esc(redName)}</span></div>
      </div>
      <div class="mvOutcome"></div>`;
    const out=banner.querySelector(".mvOutcome");
    if(live){
      const skip=el("button","mvSkip","Skip to result ⏭");
      skip.addEventListener("click",endLive);
      out.appendChild(skip);
    }else if(decided){
      if(userSide!=="none"){ const won=!!S.user_won; out.appendChild(el("span","mvChip "+(won?"won":"lost"),won?"Series Won":"Series Lost")); }
      else if(S.winner_name){ out.appendChild(el("span","mvChip won",esc(S.winner_name)+" take it")); }
      if(S.series_mvp) out.appendChild(el("span","mvMvpTag","★ Series MVP · "+esc(S.series_mvp)));
      if(bestOf>1 || total_rounds_any()){ const rw=el("button","mvSkip ghost","▶ Rewatch live"); rw.addEventListener("click",startLive); out.appendChild(rw); }
    }
  }
  function total_rounds_any(){ return maps.some(m=>Array.isArray(m.rounds)&&m.rounds.length); }

  function paintTabs(){
    tabs.innerHTML="";
    if(maps.length<2 && !live){ tabs.style.display="none"; return; }
    tabs.style.display="";
    maps.forEach((m,i)=>{
      const revealed=!live||i<=revealedThrough;
      const bs=+m.blue_score||0, rs=+m.red_score||0;
      const won=revealed?(bs>rs?"blue":"red"):"";
      const t=el("div","mvMapTab"+(i===mapIdx?" on":"")+(revealed?"":" veiled"));
      t.innerHTML=`<span class="mt">MAP ${i+1}</span><span class="mn">${esc(m.map||"")}</span><span class="ms num ${won}">${revealed?`${bs}-${rs}`:"·"}</span>`;
      t.addEventListener("click",()=>{ live=false; showMap(i,false); });
      tabs.appendChild(t);
    });
  }

  // Build a map's header + scoreboards + replay into mapView; autoplay => live watch.
  function showMap(idx, autoplay){
    if(mapCtl && mapCtl.stop) mapCtl.stop();
    mapIdx=Math.max(0,Math.min(maps.length-1,idx));
    const m=maps[mapIdx];
    mapView.innerHTML="";
    const mh=el("div","mvMapHdr");
    mh.innerHTML=`<span class="mm">MAP ${mapIdx+1} · ${esc(m.map||"")}</span>${m.storyline?`<span class="mst">${esc(m.storyline)}</span>`:""}${m.mvp?`<span class="mmvp">★ ${esc(m.mvp)}</span>`:""}`;
    mapView.appendChild(mh);
    const teams=el("div","mvTeams");
    const blueBoard=mvBuildBoard("blue",blueName,+m.blue_score||0,m.blue_team);
    const redBoard=mvBuildBoard("red",redName,+m.red_score||0,m.red_team);
    teams.appendChild(blueBoard); teams.appendChild(redBoard);
    mapView.appendChild(teams);
    const blueSc=blueBoard.querySelector(".sc"), redSc=redBoard.querySelector(".sc");
    // LIVE K/D ticker: cumulative kills/deaths through the playhead, tallied from
    // the per-round kill feed and painted onto the scoreboard rows by player id.
    // (Assists stay match-final — the engine doesn't attribute them per kill.)
    const roundsArr=Array.isArray(m.rounds)?m.rounds:[];
    const hasKillFeed=roundsArr.some(r=>Array.isArray(r.kills)&&r.kills.length);
    const onRound=hasKillFeed?function(cur){
      const K={},Dd={};
      for(let i=0;i<cur&&i<roundsArr.length;i++){
        (roundsArr[i].kills||[]).forEach(kv=>{ K[kv.k_id]=(K[kv.k_id]||0)+1; Dd[kv.v_id]=(Dd[kv.v_id]||0)+1; });
      }
      mapView.querySelectorAll('.mvRow[data-pid]').forEach(row=>{
        const pid=row.dataset.pid;
        const kc=row.querySelector('.mvK'), dc=row.querySelector('.mvD');
        if(kc) kc.textContent=String(K[pid]||0);
        if(dc) dc.textContent=String(Dd[pid]||0);
      });
    }:null;
    mapCtl=mvBuildMapReplay(m, blueName, redName, ()=>{
      if(mapIdx>revealedThrough) revealedThrough=mapIdx;
      paintBanner(); paintTabs();
      if(live){
        const [bm,rm]=wonThrough(mapIdx);
        if(bm>=needWin||rm>=needWin||mapIdx>=maps.length-1) endLive();
        else setTimeout(()=>{ if(live) showMap(mapIdx+1,true); }, 1100);
      }
    }, autoplay, (bsc,rsc)=>{ if(blueSc) blueSc.textContent=bsc; if(redSc) redSc.textContent=rsc; }, onRound);
    mapView.appendChild(mapCtl.el);
    paintBanner(); paintTabs(); paintWrapUp();
  }

  function startLive(){ live=true; revealedThrough=-1; paintWrapUp(); showMap(0,true); }
  function endLive(){ live=false; revealedThrough=maps.length-1; paintWrapUp(); showMap(maps.length-1,false); }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cMatch"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();

  // Auto-start the live watch on entry — you watch the match happen, not the result.
  // Reduced-motion users go straight to the finished series (skip button is always up).
  if(reduced) endLive(); else startLive();
}

/* Build one map's round-by-round replay controller. Returns {el, stop}. autoplay =>
   start at round 1 and play forward (the "live" watch); onComplete fires when the
   playhead reaches the final round (the series orchestrator uses it to advance maps). */
function mvBuildMapReplay(m, blueName, redName, onComplete, autoplay, onScore, onRound){
  const rounds=Array.isArray(m.rounds)?m.rounds:[];
  const bs=+m.blue_score||0, rs=+m.red_score||0;
  const tcard=el("div","mvTimeCard");
  tcard.innerHTML=`<div class="mvTimeHead">
    <span class="t">Round-by-round</span>
    <span class="leg"><span class="lb"><b>${bs}</b>${esc(blueName)}</span><span class="lr"><b>${rs}</b>${esc(redName)}</span><span>● Detonation</span><span>✂ Defuse</span><span>✕ Elim</span><span>⏱ Time</span></span>
  </div>`;

  if(!rounds.length){
    const strip=el("div","mvTimeline");
    strip.appendChild(el("div","recempty","No round data for this map."));
    tcard.appendChild(strip);
    return {el:tcard, stop:()=>{}};
  }

  const total=rounds.length;
  const bar=el("div","mvRepBar");
  bar.innerHTML=`
    <div class="mvRepTransport">
      <button class="mvRepBtn" data-act="start" title="Round 1" aria-label="First round">⏮</button>
      <button class="mvRepBtn" data-act="prev" title="Previous round" aria-label="Previous round">◀</button>
      <button class="mvRepBtn play" data-act="play" title="Play / pause" aria-label="Play or pause replay">▶</button>
      <button class="mvRepBtn" data-act="next" title="Next round" aria-label="Next round">▶</button>
      <button class="mvRepBtn" data-act="end" title="Skip to final round" aria-label="Final round">⏭</button>
    </div>
    <input type="range" class="mvRepSlider" min="1" max="${total}" value="${autoplay?1:total}" step="1" aria-label="Scrub through rounds">
    <button class="mvRepSpeed" data-act="speed" title="Playback speed">1×</button>
    <span class="mvRepPos"></span>`;
  tcard.appendChild(bar);
  const now=el("div","mvRepNow");
  tcard.appendChild(now);

  const strip=el("div","mvTimeline");
  const pips=[];
  rounds.forEach((r,i)=>{
    let sideCls;
    if(r.winner===blueName) sideCls="blue";
    else if(r.winner===redName) sideCls="red";
    else{ const prev=rounds[i-1]||{}; sideCls=((+r.blue_score||0)>(+((prev.blue_score)||0)))?"blue":"red"; }
    const[glyph,ekLabel]=MV_ENDKIND[r.end_kind]||["•",(r.end_kind||"")];
    const planted=r.spike_planted?" planted":"";
    const rn=(r.round!=null)?r.round:(i+1);
    const rsc=`${r.blue_score==null?"":r.blue_score}-${r.red_score==null?"":r.red_score}`;
    const title=`Round ${rn} — ${r.winner||(sideCls==="blue"?blueName:redName)}`+(ekLabel?` (${ekLabel})`:"")+(r.spike_planted?" · spike planted":"")+(r.retake?" · retake":"");
    const pip=el("div","mvPip "+sideCls);
    pip.setAttribute("title",title);
    pip.setAttribute("role","button");
    pip.setAttribute("tabindex","0");
    pip.innerHTML=`<span class="rn">R${esc(String(rn))}</span><span class="dot${planted}">${glyph}</span><span class="rs num">${esc(rsc)}</span>`;
    strip.appendChild(pip);
    pips.push({el:pip,side:sideCls,ekLabel,rn,r});
  });
  tcard.appendChild(strip);

  const sliderEl=bar.querySelector(".mvRepSlider");
  const posEl=bar.querySelector(".mvRepPos");
  const playBtn=bar.querySelector('[data-act="play"]');
  const speedBtn=bar.querySelector('[data-act="speed"]');
  const SPEEDS=[1,2,0.5]; let spI=0;
  const BASE=780;                 // ms per round at 1×
  let cur=autoplay?1:total, playing=false, timer=null;

  // Economy tier from per-team round investment — mirrors Match.cpp's
  // invest_to_tier thresholds (5=op-buy … 1=eco) so the label is grounded.
  function buyTier(v){ v=+v||0;
    if(v>=18000) return {l:"Op-buy",p:100};
    if(v>=14000) return {l:"Full buy",p:82};
    if(v>=8000)  return {l:"Light buy",p:52};
    if(v>=4500)  return {l:"Force",p:32};
    return {l:"Eco",p:14}; }

  function paint(){
    pips.forEach((p,i)=>{
      p.el.classList.toggle("veiled", i>=cur);
      p.el.classList.toggle("now", i===cur-1);
    });
    sliderEl.value=String(cur);
    posEl.innerHTML=`Round <b>${cur}</b> / ${total}`;
    const p=pips[cur-1]; if(!p) return; const r=p.r;
    // Live board score + per-player K/D track the playhead.
    if(onScore) onScore(r.blue_score==null?"":r.blue_score, r.red_score==null?"":r.red_score);
    if(onRound) onRound(cur);
    const winName=(p.side==="blue")?blueName:redName;
    const blueAtk=!!r.blue_attacking;
    const bSide=blueAtk?["atk","ATK"]:["def","DEF"];
    const rSide=blueAtk?["def","DEF"]:["atk","ATK"];
    const bT=buyTier(r.blue_invest), rT=buyTier(r.red_invest);
    const tags=[];
    if(r.spike_planted) tags.push(`<span class="mvRepTag plant">◆ Spike planted</span>`);
    if(r.retake) tags.push(`<span class="mvRepTag">Defender retake</span>`);
    // Kill feed context (exported per-kill alive counts): clutch = the winning
    // side dropped to a lone player mid-round and still closed it out.
    const kl=Array.isArray(r.kills)?r.kills:[];
    if(kl.length){
      const winBlue=(p.side==="blue");
      for(const kv of kl){
        const wa=winBlue?+kv.t1_alive:+kv.t2_alive, oa=winBlue?+kv.t2_alive:+kv.t1_alive;
        if(wa===1 && oa>=2){ tags.push(`<span class="mvRepTag clutch">1v${oa} CLUTCH</span>`); break; }
      }
    }
    const killsHTML=kl.length?`<div class="mvRepKills">${kl.map(kv=>
      `<span class="mvKline ${kv.side===1?'b':'r'}"><b>${esc(kv.k)}</b> ✕ ${esc(kv.v)}<span class="mc num">${kv.t1_alive}v${kv.t2_alive}</span></span>`).join('')}</div>`:'';
    now.innerHTML=`
      <div class="mvRepScore">
        <span class="rnum">Round ${esc(String(p.rn))}</span>
        <span class="nums"><span class="sb">${esc(String(r.blue_score==null?"":r.blue_score))}</span><span class="sd">–</span><span class="sr">${esc(String(r.red_score==null?"":r.red_score))}</span></span>
      </div>
      <div class="mvRepMid">
        <div class="mvRepWin">
          <span class="mvRepWinChip ${p.side}">${esc(winName)} win</span>
          ${p.ekLabel?`<span class="mvRepEnd"><b>${esc(p.ekLabel)}</b></span>`:""}
          ${tags.join("")}
        </div>
        <div class="mvRepEnd">${esc(blueName)}<span class="mvRepSideTag ${bSide[0]}">${bSide[1]}</span> &nbsp;·&nbsp; ${esc(redName)}<span class="mvRepSideTag ${rSide[0]}">${rSide[1]}</span></div>
      </div>
      <div class="mvRepEco">
        <div class="mvRepEcoRow b"><span class="side">BLU</span><span class="mvRepEcoBar"><i style="width:${bT.p}%"></i></span><span class="lbl">${bT.l}</span></div>
        <div class="mvRepEcoRow r"><span class="side">RED</span><span class="mvRepEcoBar"><i style="width:${rT.p}%"></i></span><span class="lbl">${rT.l}</span></div>
      </div>
      ${killsHTML}`;
  }

  function setCur(v){ cur=Math.max(1,Math.min(total,v|0)); paint(); }
  function stop(){ playing=false; if(timer){clearInterval(timer);timer=null;} playBtn.textContent="▶"; playBtn.classList.remove("on"); }
  function tick(){
    // Self-guard: if the replay was removed (navigated away / re-rendered), kill
    // the orphaned timer instead of poking dead DOM.
    if(!document.body.contains(tcard)){ if(timer){clearInterval(timer);timer=null;} return; }
    if(cur>=total){ stop(); if(onComplete) onComplete(); return; }
    setCur(cur+1);
  }
  function play(){
    if(playing){ stop(); return; }
    if(cur>=total) cur=1;   // at the end → restart from round 1
    playing=true; playBtn.textContent="⏸"; playBtn.classList.add("on");
    timer=setInterval(tick, BASE/SPEEDS[spI]);
    paint();
  }

  playBtn.addEventListener("click",play);
  bar.querySelector('[data-act="start"]').addEventListener("click",()=>{stop();setCur(1);});
  bar.querySelector('[data-act="prev"]').addEventListener("click",()=>{stop();setCur(cur-1);});
  bar.querySelector('[data-act="next"]').addEventListener("click",()=>{stop();setCur(cur+1);});
  bar.querySelector('[data-act="end"]').addEventListener("click",()=>{stop();setCur(total);});
  speedBtn.addEventListener("click",()=>{ spI=(spI+1)%SPEEDS.length; speedBtn.textContent=SPEEDS[spI]+"×";
    if(playing){ clearInterval(timer); timer=setInterval(tick, BASE/SPEEDS[spI]); } });
  sliderEl.addEventListener("input",()=>{ stop(); setCur(+sliderEl.value); });
  pips.forEach((p,i)=>{
    p.el.addEventListener("click",()=>{ stop(); setCur(i+1); });
    p.el.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); stop(); setCur(i+1); } });
  });

  paint();
  if(autoplay) play();   // live watch: roll from round 1
  return {el:tcard, stop};
}

   ===================================================================== */
const MAIL_SKEL=`

// Category → semantic colour var. Anything unmapped falls back to muted gray.
/* Aligned with NEWS_COLOR where the category exists in both feeds (Result blue,
   Award amber) so color semantics don't flip between adjacent screens. */
const MAIL_COLOR={Board:"--red",Award:"--amber",Result:"--blue",Transfer:"--purple",
  Contract:"--gold",Squad:"--green",Media:"--fg-muted"};

let mailOpenId = null;   // remembered open message id — preserves selection across
                         // the re-push that every mail action (read/star/delete) triggers
let mailFilter = {cat:null,unread:false,starred:false};   // client-side inbox filter
function renderMail(M, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="mail";

  if(!M || !M.header){
    view.innerHTML='<div class="preempty">No mail loaded — start or load a season to receive board, transfer and media correspondence.</div>';
    return;
  }

  view.innerHTML=MAIL_SKEL;

  /* ===== header ===== */
  const h=M.header;
  $("#clubName").textContent=h.club_name;
  const mono=String(h.club_name||"").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"V";
  $("#hcrest").textContent=mono; $("#navCrest").textContent=mono;
  [["div",h.division],["",h.region],["",`Year ${h.year}`],["",`Day ${h.day_in_year}/200`],["",h.current_phase]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== items — read/star state is ENGINE-driven (persisted); every action
     (read / star / delete) posts a verb and the host re-pushes fresh mail, so
     the list reflects it.read / it.important directly. mailOpenId remembers the
     open message so the re-push doesn't bounce the reader back to the top. ===== */
  const items=Array.isArray(M.items)?M.items.slice():[];
  const total=(M.total!=null)?M.total:items.length;
  const unread=(M.unread!=null)?M.unread:items.filter(it=>!it.read).length;
  setMailBadge(unread);
  $("#hInbox").textContent = unread>0 ? `${unread} unread` : `${total} messages`;
  $("#inboxStat").textContent = unread>0 ? `${unread} unread` : (total?`${total} read`:"");
  const mar=$("#mailAllRead");
  if(mar){
    if(unread>0) mar.addEventListener("click",()=>post("act:mailallread:mail"));
    else mar.style.display="none";   // nothing to mark
  }

  /* ===== inbox list (client-side filters: All / Unread / ★ / category) ===== */
  const ib=$("#inboxBody");
  const cats=[...new Set(items.map(it=>it.category).filter(Boolean))];
  const fr=el("div","mfilters");
  const addPill=(label,on,fn)=>{ const b=el("button","mfpill"+(on?" on":""),label); b.type="button"; b.addEventListener("click",fn); fr.appendChild(b); };
  addPill("All", !mailFilter.cat&&!mailFilter.unread&&!mailFilter.starred, ()=>{ mailFilter={cat:null,unread:false,starred:false}; renderMail(M,club); });
  addPill("Unread", mailFilter.unread, ()=>{ mailFilter.unread=!mailFilter.unread; renderMail(M,club); });
  addPill("★ Starred", mailFilter.starred, ()=>{ mailFilter.starred=!mailFilter.starred; renderMail(M,club); });
  cats.forEach(cName=>addPill(cName, mailFilter.cat===cName, ()=>{ mailFilter.cat=(mailFilter.cat===cName?null:cName); renderMail(M,club); }));
  ib.appendChild(fr);
  const shown=items.map((it,i)=>[it,i]).filter(([it])=>
    (!mailFilter.cat || it.category===mailFilter.cat) &&
    (!mailFilter.unread || !it.read) &&
    (!mailFilter.starred || it.important));
  if(!shown.length){
    ib.appendChild(el("div","empty",items.length?"No mail matches the filter.":"No mail."));
  }else{
    const list=el("div","mlist");
    shown.forEach(([it,i])=>{
      const c=cssvar(MAIL_COLOR[it.category]||"--fg-muted");
      const row=el("div","mrow");
      row.dataset.idx=i;
      const dot = it.read ? "" : '<span class="mdot" aria-label="unread"></span>';
      const star = it.important ? '<span class="mstar" aria-label="important">★</span>' : "";
      row.innerHTML=`<span class="mpill" style="color:var(--fg);background:color-mix(in srgb,${c} 18%,transparent);border:1px solid color-mix(in srgb,${c} 45%,transparent)">${esc(it.category)}</span>
        <span class="msub${it.read?' read':''}">${dot}${star}<span class="mt">${esc(it.subject)}</span></span>
        <span class="mdate">Y${esc(String(it.year))}·D${esc(String(it.day))}</span>`;
      // Clicking an unread message persists read (verb → re-push, which re-opens
      // it via mailOpenId); an already-read one just shows in the reader locally.
      row.addEventListener("click",()=>{
        mailOpenId=it.id;
        if(!it.read) post("act:mailread:"+it.id+":1:mail");
        else openItem(i);
      });
      list.appendChild(row);
    });
    ib.appendChild(list);
  }

  /* ===== reading pane (display-only; the action buttons post verbs) ===== */
  function openItem(i){
    const it=items[i]; if(!it) return;
    mailOpenId=it.id;
    document.querySelectorAll("#view .mrow").forEach(r=>r.classList.toggle("sel", r.dataset.idx==String(i)));
    const c=cssvar(MAIL_COLOR[it.category]||"--fg-muted");
    $("#readerStat").textContent=esc(it.category);
    const metaBits=[`Y${esc(String(it.year))} · D${esc(String(it.day))}`];
    if(it.team_name) metaBits.push(esc(it.team_name));
    const meta=metaBits.map(b=>`<span>${b}</span>`).join('<span class="dot"></span>');
    const amt=(it.amount_k && it.amount_k>0)?`<span class="dot"></span><span class="mamt">${esc(fmtK(it.amount_k))}</span>`:"";
    // Escape FIRST, then convert newlines so escaping can never be bypassed.
    const bodyHTML=esc(it.body).replace(/\r\n|\r|\n/g,"<br>");
    const byline=it.player_name?`<span class="mbyline">${esc(it.player_name)}</span>`:"";
    const isStar=!!it.important;
    const viewBtn=(it.player_id && +it.player_id>0)
      ? `<button type="button" class="mact link" data-mail-view="${esc(String(it.player_id))}">View ${esc(it.player_name||'player')}</button>` : '';
    $("#readerBody").innerHTML=`<div class="mpane">
      <div class="mphead">
        <span class="mpill" style="align-self:flex-start;color:var(--fg);background:color-mix(in srgb,${c} 18%,transparent);border:1px solid color-mix(in srgb,${c} 45%,transparent)">${esc(it.category)}</span>
        <div class="msubject">${esc(it.subject)}</div>
        <div class="mmeta">${meta}${amt}</div>
        ${byline}
      </div>
      <div class="mactions">
        ${viewBtn}
        <button type="button" class="mact" data-mail-unread="${esc(String(it.id))}">Mark unread</button>
        <button type="button" class="mact${isStar?' on':''}" data-mail-star="${esc(String(it.id))}" data-star="${isStar?0:1}">${isStar?'★ Starred':'☆ Star'}</button>
        <button type="button" class="mact danger" data-mail-del="${esc(String(it.id))}">Delete</button>
      </div>
      <div class="mbody">${bodyHTML}</div>
    </div>`;
    const rb=$("#readerBody");
    const vw=rb.querySelector('[data-mail-view]'); if(vw) vw.addEventListener('click',()=>openPlayerModal(+vw.dataset.mailView));
    const un=rb.querySelector('[data-mail-unread]'); if(un) un.addEventListener('click',()=>{ mailOpenId=it.id; post("act:mailread:"+it.id+":0:mail"); });
    const st=rb.querySelector('[data-mail-star]'); if(st) st.addEventListener('click',()=>{ mailOpenId=it.id; post("act:mailstar:"+it.id+":"+st.dataset.star+":mail"); });
    // Delete is armed two-step (same pattern as Release / staff Fire) — the
    // only instant destructive click in the app was hiding in the mail reader.
    const dl=rb.querySelector('[data-mail-del]'); if(dl) dl.addEventListener('click',()=>{
      if(!dl.classList.contains('armed')){
        dl.classList.add('armed'); dl.textContent='Delete — confirm?';
        setTimeout(()=>{ if(dl.isConnected){ dl.classList.remove('armed'); dl.textContent='Delete'; } },3000);
        return;
      }
      mailOpenId=null; post("act:maildelete:"+it.id+":mail");
    });
  }

  if(shown.length){
    let oi=shown[0][1];
    if(mailOpenId!=null){ const k=shown.find(([x])=>x.id===mailOpenId); if(k) oi=k[1]; }
    openItem(oi);
  }else{
    $("#readerStat").textContent="";
    $("#readerBody").innerHTML='<div class="mpane-empty">'+(items.length?'No message matches the filter.':'No message selected — your inbox is empty.')+'</div>';
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#cInbox","#cReader"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*55); }); }
  }
  run();
}

const STRAT_SKEL=`
  <div class="header enter" id="header">

const PREP_LABELS=["None","Standard","Heavy"];

// WRITE actions — exact bridge command strings. Map names contain no colons.
function stratSetPrep(mapName, level){ post("act:prep:"+mapName+":"+level+":strategy"); }
function stratAgentAuto(mapName){ post("act:agentauto:"+mapName+":strategy"); }
// Author a manual comp: 5 distinct agent names, comma-joined (host validates).
function stratAgentSet(mapName, agents){ post("act:agentset:"+mapName+":"+agents.join(",")+":strategy"); }
window.__stratSetPrep = stratSetPrep;
window.__stratAgentAuto = stratAgentAuto;

const STRAT_ROLE_NAMES=["Duelist","Initiator","Controller","Sentinel"];
// Seed a 5-agent comp from the map's signature agents, padded to 5 distinct
// valid agents (order-preserving). Need not be a legal comp — the user edits it.
function stratSeedComp(sigs, allAgents){
  const seed=[], seen={};
  (sigs||[]).forEach(n=>{ if(seed.length<5 && !seen[n] && allAgents.some(a=>a.name===n)){ seed.push(n); seen[n]=1; } });
  for(const a of allAgents){ if(seed.length>=5) break; if(!seen[a.name]){ seed.push(a.name); seen[a.name]=1; } }
  return seed.slice(0,5);
}
// Comp legality (mirrors the engine's 4 legal comps: exactly one doubled role + 3
// singles). Returns {summary, badge, legal}. Off-meta is allowed, just flagged.
function stratCompLegality(agents, allAgents){
  const c=[0,0,0,0];
  agents.forEach(nm=>{ const a=allAgents.find(x=>x.name===nm); if(a && +a.role>=0 && +a.role<4) c[+a.role]++; });
  let doubled=-1, ones=0, legal=true;
  for(let i=0;i<4;i++){ if(c[i]===2){ if(doubled>=0)legal=false; doubled=i; } else if(c[i]===1) ones++; else legal=false; }
  legal = legal && doubled>=0 && ones===3;
  const dn=["Double Duelist","Double Initiator","Double Controller","Double Sentinel"];
  return { summary:`${c[0]}D ${c[1]}I ${c[2]}C ${c[3]}S`, legal, label: (legal&&doubled>=0)?dn[doubled]:"Off-meta" };
}
// Build the 5-slot comp editor (role-grouped selects, distinct-enforced) + legality.
function stratCompEditorHTML(mapName, agents, allAgents){
  let slots='';
  for(let slot=0; slot<5; slot++){
    const cur=agents[slot]||'';
    const taken=agents.filter((_,j)=>j!==slot);
    let opts='';
    for(let r=0;r<4;r++){
      const group=allAgents.filter(a=>+a.role===r && (a.name===cur || taken.indexOf(a.name)<0));
      if(!group.length) continue;
      opts+=`<optgroup label="${esc(STRAT_ROLE_NAMES[r])}">`
        +group.map(a=>`<option value="${esc(a.name)}"${a.name===cur?' selected':''}>${esc(a.name)}</option>`).join('')
        +`</optgroup>`;
    }
    slots+=`<div class="compSlot"><span class="compSlab">${slot+1}</span><select class="compSel" data-slot="${slot}" aria-label="Comp slot ${slot+1}">${opts}</select></div>`;
  }
  const leg=stratCompLegality(agents, allAgents);
  const badge=`<span class="compBadge ${leg.legal?'legal':'off'}">${esc(leg.label)}</span>`;
  return `<div class="compEditor" data-map="${esc(mapName)}">
    <div class="compGrid">${slots}</div>
    <div class="compFoot"><span class="compSum">${esc(leg.summary)}</span>${badge}<span class="compHint">Engine best-fits these 5 to your roster.</span></div>
  </div>`;
}
