// WRITE action — make a transfer offer for a rival club's contracted player.
// Mirrors marketSignFA/marketHireStaff exactly: just post; the host bids,
// re-pushes fresh team-profile state (rows refresh) + a toast. No optimistic
// DOM update. sellerName may contain spaces — pass verbatim (host splits on ':'
// only); playerId is a uint64 string, feeK an int $K.
function tpBuyPlayer(sellerName, playerId, feeK){ post("act:buyplayer:"+sellerName+":"+playerId+":"+feeK+":teamprofile"); }
window.__tpBuyPlayer = tpBuyPlayer;

function renderTeamProfile(TP, club){
  document.documentElement.style.setProperty("--club", club||"#FF4655");
  const view=$("#view");
  view.className="teamprofile";

  /* ===== not-found / empty payload guard ===== */
  if(!TP || TP.found===false || !TP.team_profile){
    const req=(TP && TP.requested)?TP.requested:"";
    view.innerHTML=`<div class="tpnotfound">
      <div>Team "${esc(req)}" not found.</div>
      <button type="button" class="tpback" id="tpBack"><span class="tparrow">&larr;</span> Back to standings</button>
    </div>`;
    const back=$("#tpBack"); if(back) back.addEventListener("click",()=>go("competition"));
    return;
  }

  view.innerHTML=TP_SKEL;
  $("#tpBack").addEventListener("click",()=>go("competition"));

  const P=TP.team_profile;
  const id=P.identity||{};
  const fin=P.finances||{};
  const staff=P.staff||{};

  /* ===== header ===== */
  // Badge prefers the tag, else the team's first letter (tinted with club color via .tphead .hcrest).
  const mono=(id.tag||id.name||"T").replace(/[^A-Za-z]/g,"").slice(0,1).toUpperCase()||"T";
  $("#hcrest").textContent=mono;
  const yourPill=id.is_user?'<span class="tppill">Your Club</span>':'';
  $("#clubName").innerHTML=`${esc(id.name||"—")}${yourPill}`;
  $("#hTPRank").textContent=(id.rank!=null)?`#${esc(String(id.rank))}`:"—";
  $("#hTPOvr").textContent=(id.ovr!=null)?(+id.ovr).toFixed(1):"—";
  [["",id.region],["div",id.division],["",id.window],
   [" ",(id.rank!=null?`Rank ${id.rank}`:"")],
   ["",(id.ovr!=null?`OVR ${(+id.ovr).toFixed(1)}`:"")]]
    .filter(([,tx])=>tx!=null && tx!=="")
    .forEach(([cl,tx])=>$("#hmeta").appendChild(el("span","plate "+cl,esc(tx))));

  /* ===== identity / summary KPI chips ===== */
  const tw=(id.phase_wins!=null)?id.phase_wins:0, tl=(id.phase_losses!=null)?id.phase_losses:0;
  const chips=[
    ["Prestige",(id.prestige!=null?String(id.prestige):"—"),""],
    ["Brand",(id.brand||"—"),""],
    ["Wealth",(id.wealth_tier||"—"),""],
    ["Record",`${tw}-${tl}`,"This phase"],
    ["OVR",(id.ovr!=null?(+id.ovr).toFixed(1):"—"),(id.window?esc(id.window):"")]
  ];
  const ic=$("#tpIdentity");
  chips.forEach(([lab,val,sub])=>{
    const c=el("div","tpchip");
    c.innerHTML=`<div class="tpclab">${esc(lab)}</div><div class="tpcval">${esc(val)}</div>${sub?`<div class="tpcsub">${esc(sub)}</div>`:""}<div class="tpcbar"></div>`;
    ic.appendChild(c);
  });

  /* ===== finances mini-row =====
     budget is RAW DOLLARS → round to whole $K so fmtK (which expects integer
     thousands and rolls over to $M) renders cleanly, e.g. 314644 → $315K.
     payroll_k / sponsorship_k are already in $K → fmtK directly. */
  const fb=$("#tpFin");
  const finCells=[
    ["Budget",(fin.budget!=null)?fmtK(Math.round((+fin.budget)/1000)):"—"],
    ["Payroll",(fin.payroll_k!=null)?fmtK(+fin.payroll_k):"—"],
    ["Sponsorship",(fin.sponsorship_k!=null)?fmtK(+fin.sponsorship_k):"—"]
  ];
  finCells.forEach(([l,v])=>{
    const box=el("div","tpfinbox");
    box.innerHTML=`<div class="v">${esc(v)}</div><div class="l">${esc(l)}</div>`;
    fb.appendChild(box);
  });

  /* ===== roster table ===== */
  // Defensive: keep starters first even if the host order ever changes.
  const roster=(Array.isArray(P.roster)?P.roster:[]).slice()
    .sort((a,b)=>(a.slot==="bench"?1:0)-(b.slot==="bench"?1:0));
  $("#tpRosterStat").textContent=roster.length?`${roster.length} players`:"";
  const rb=$("#tpRosterBody");
  // Make-Offer column shows ONLY for rival clubs (you can't buy your own
  // players). sellerName is the profiled club's verbatim name (may have spaces).
  const isRival=(id.is_user===false);
  const sellerName=id.name||"";
  const tbl=el("div","tproster"+(isRival?" morival":""));
  tbl.appendChild(el("div","tprh",`<span>SLOT</span><span>PLAYER</span><span>AGE</span><span>OVR</span><span>POT</span><span>RAT</span>${isRival?'<span>OFFER</span>':''}`));
  if(!roster.length){
    tbl.appendChild(el("div","empty","No players on the roster."));
  }else{
    let benchShown=false;
    roster.forEach(p=>{
      const bench=p.slot==="bench";
      if(bench && !benchShown){ tbl.appendChild(el("div","tprsub","Bench")); benchShown=true; }
      const[rl,rc]=ROLE[p.role]||["?","--fg-muted"];
      const igl=p.igl?'<span class="tpbadge">IGL</span>':'';
      const slot=bench?'<span class="tpslot">Bench</span>':'<span class="tpslot start">Starter</span>';
      const row=el("div","tprow"+(bench?" bench":""));
      // Trailing actions cell — rival rows only, and only when a transfer fee
      // is suggested (guard on fee_k). Surfaces the wage commitment too.
      let actHTML='';
      const hasFee=isRival && p.fee_k!=null;
      if(isRival){
        const wageHTML=(p.wage_k!=null)?`<span class="mowage">wage <b>${esc(fmtK(+p.wage_k))}</b></span>`:'';
        const btnHTML=hasFee
          ? `<button type="button" class="mobtn" data-buy-id="${esc(String(p.id))}" data-buy-fee="${esc(String(p.fee_k))}" title="Offer ${esc(fmtK(+p.fee_k))} for ${esc(p.name||"")}">Offer ${esc(fmtK(+p.fee_k))}</button>`
          : '';
        actHTML=`<span class="moact">${wageHTML}${btnHTML}</span>`;
      }
      row.innerHTML=`${slot}
        <span class="tpname"><span class="tprole" style="color:var(--fg);background:color-mix(in srgb,${cssvar(rc)} 18%,transparent);border:1px solid color-mix(in srgb,${cssvar(rc)} 45%,transparent)" title="${esc(String(p.role||""))}">${rl}</span><span class="nm">${esc(p.name)}</span>${igl}<button type="button" class="pmOpenBtn" data-pm-open="${esc(String(p.id))}" title="View full profile" aria-label="View ${esc(p.name)} profile">&#10530;</button></span>
        <span class="tpcell dim">${esc(String(p.age))}</span>
        <span class="tpcell" style="color:${ovrColorRoster(+p.ovr)}">${esc(String(p.ovr))}</span>
        <span class="tpcell dim">${esc(String(p.potential))}</span>
        <span class="tpcell" style="color:${p.avg_rating>=1.15?'var(--green)':(p.avg_rating<0.95?'var(--red-text)':'var(--fg)')}">${(+p.avg_rating).toFixed(2)}</span>${actHTML}`;
      // Wire the Make-Offer button — armed two-step (this click spends REAL
      // budget; Release/Fire already confirm, the most expensive click should too).
      const buyBtn=row.querySelector(".mobtn");
      if(buyBtn){
        const orig=buyBtn.textContent;
        buyBtn.addEventListener("click",ev=>{
          ev.stopPropagation();
          if(!buyBtn.classList.contains("armed")){
            buyBtn.classList.add("armed"); buyBtn.textContent="Confirm "+fmtK(+p.fee_k||0)+"?";
            setTimeout(()=>{ if(buyBtn.isConnected){ buyBtn.classList.remove("armed"); buyBtn.textContent=orig; } },3500);
            return;
          }
          tpBuyPlayer(sellerName, p.id, p.fee_k);
        });
      }
      const ob=row.querySelector(".pmOpenBtn");
      if(ob) ob.addEventListener("click",ev=>{ ev.stopPropagation(); openPlayerModal(p.id); });
      tbl.appendChild(row);
    });
  }
  rb.appendChild(tbl);

  /* ===== finances + staff + history right column ===== */
  const staffRows=[["Coach",staff.coach],["Scout",staff.scout],["Analyst",staff.analyst]];
  const present=staffRows.filter(([,s])=>s).length;
  $("#tpStaffStat").textContent=present?`${present} of 3`:"";
  const sb=$("#tpStaffBody");
  staffRows.forEach(([role,s])=>{
    const row=el("div","tpstrow");
    if(s){
      const pers=(s.personality&&String(s.personality).trim())?`<span class="pers">${esc(s.personality)}</span>`:'';
      row.innerHTML=`<span class="rl">${esc(role)}</span><span class="nm">${esc(s.name||"—")}</span>${pers}`;
    }else{
      row.innerHTML=`<span class="rl">${esc(role)}</span><span class="nm vacant">&mdash;</span>`;
    }
    sb.appendChild(row);
  });

  /* ===== history (most-recent-first already) ===== */
  const history=Array.isArray(P.history)?P.history:[];
  $("#tpHistStat").textContent=history.length?`${history.length} ${history.length===1?'season':'seasons'}`:"";
  const hb=$("#tpHistBody");
  if(!history.length){
    hb.appendChild(el("div","empty","No prior seasons on record."));
  }else{
    const hl=el("div","tphist");
    history.forEach(s=>{
      const row=el("div","tphrow");
      row.innerHTML=`<span class="hyr">Y${esc(String(s.year))}</span>
        <span class="hlab">Regular season</span>
        <span class="hwl">${esc(String(s.wins))}-${esc(String(s.losses))}</span>`;
      hl.appendChild(row);
    });
    hb.appendChild(hl);
  }

  /* ===== motion ===== */
  function run(){
    const seq=["#header","#tpIdentity","#cTPRoster","#tpFin","#cTPStaff","#cTPHist"];
    if(reduced){ document.querySelectorAll("#view .enter").forEach(e=>e.classList.add("in")); }
    else{ seq.forEach((s,i)=>{ const e=$(s); if(e) setTimeout(()=>e.classList.add("in"),60+i*50); }); }
  }
  run();
}

/* =====================================================================
   GLOBAL TOAST  (action feedback; host sends {type:"toast",level,message})
   Capped at one banner — a new toast replaces the previous one so they
   never stack infinitely. Fades out and self-removes after ~2.6s.
   ===================================================================== */
let _toastEl=null, _toastTimers=[];
function showToast(level, msg){
  // clear any in-flight toast (replace, don't stack)
  _toastTimers.forEach(t=>clearTimeout(t)); _toastTimers=[];
  if(_toastEl){ _toastEl.remove(); _toastEl=null; }
  const lvl=(level==="warn")?"warn":"ok";
  const t=el("div","toast "+lvl);
  t.setAttribute("role","status");
  t.innerHTML=`<span class="ttext">${esc(msg==null?"":msg)}</span>`;
  document.body.appendChild(t);
  _toastEl=t;
  // entrance on next frame
  requestAnimationFrame(()=>{ if(_toastEl===t) t.classList.add("in"); });
  // fade out, then remove
  _toastTimers.push(setTimeout(()=>{ t.classList.remove("in"); }, 2600));
  _toastTimers.push(setTimeout(()=>{ if(t===_toastEl){ t.remove(); _toastEl=null; } else { t.remove(); } }, 2600+(reduced?0:300)));
}
window.__toast = showToast;

/* =====================================================================
   PLAYER DETAIL MODAL  — deep overlay openable from anywhere (roster, market,
   team profile). It FLOATS above #view and never replaces it. The host pushes
   {type:"state",screen:"playermodal",data:<payload>}; onState intercepts that
   screen BEFORE the normal render path (so the rail + currentScreen + #view are
   left untouched) and calls renderPlayerModal(data). Open it from anywhere with
   post("nav:playermodal:"+id). Header/edit actions reuse the EXACT roster
   god-mode command shapes but with a `playermodal` screen suffix so the host
   re-pushes the modal state and the panel auto-refreshes.
   ===================================================================== */
let pmOpen = false;        // whether the modal is currently showing
let pmTab = "overview";    // remembered active tab across re-pushes
let pmPlayerId = null;     // last player rendered (for re-open / context)

/* Contract re-sign negotiation — live-preview state. pmResignForm holds the
   CURRENT slider/checkbox/role values (the source of truth for both the preview
   push and the commit, so a resignpreview re-render never has to touch the DOM
   inputs). pmResignTimer debounces preview pushes; pmResignLast caches the last
   preview payload for reference. Reset when a fresh player modal is rendered. */
let pmResignForm = null;   // {id,years,amount,bonus,starter,role}
let pmResignTimer = null;  // debounce handle for the preview push
let pmResignLast = null;   // last resignpreview data received

/* Free-agent signing — form state. Unlike re-sign there's no acceptance gate or
   live preview (do_signfa just signs), so this is a pure client-side form. Holds
   the role/years/bonus the user picks + a snapshot of the player context needed
   to compute the grounded role-fit line without a host round-trip. */
let pmSignForm = null;     // {id,years,role,bonus,name,roleName,ovr,fits}

/* Transfer bid for a rival's contracted player — form state. Holds the fee the
   user offers plus a snapshot (market value, seller, budget) so the fee-vs-value
   verdict renders client-side. Submit posts the buyplayer bid; the host toasts
   the outcome (and, on rejection, the seller's asking hint). */
let pmBidForm = null;      // {id,fee,value,budget,name,seller}

/* Interest / market-scan — live-fetch state. Mirrors the resignpreview idiom:
   opening the Interest tab posts get:playerinterest:<id> once and the host pushes
   a transient {screen:"playerinterest"} state that fills ONLY the Interest pane
   (never re-renders the modal or resets the active tab). pmInterestCache keys the
   last payload by player id so re-opening the tab doesn't re-flash the scan
   placeholder; pmInterestAsked tracks which id we've already requested this
   modal-open so we fire the fetch exactly once per player. */
let pmInterestCache = {};   // { <playerId>: <interest payload> }
let pmInterestAsked = null;  // player id we've posted get:playerinterest for

/* Scout report — live-fetch state, mirrors the Interest idiom EXACTLY: opening
   the Scout tab posts get:scoutreport:<id> once, the host pushes a transient
   {screen:"scoutreport"} state that fills ONLY the Scout pane (never re-renders
   the modal or resets the active tab). pmScoutCache keys the last payload by id
   so re-opening doesn't re-flash; pmScoutAsked tracks which id we've requested
   this modal-open; pmScoutCommit holds the money-slider value ($K) per player so
   a scoutreport re-push doesn't reset the user's slider mid-drag. */
let pmScoutCache = {};      // { <playerId>: <scoutreport payload> }
let pmScoutAsked = null;     // player id we've posted get:scoutreport for
let pmScoutCommit = {};      // { <playerId>: <money $K currently on the slider> }

// Write actions — exact command strings (note the `playermodal` suffix).
function pmFavorite(id, on){ post("act:"+(on?"favorite":"unfavorite")+":"+id+":playermodal"); }
function pmWatch(id, on){ post("act:"+(on?"watch":"unwatch")+":"+id+":playermodal"); }
function pmScout(id){ post("act:scout:"+id+":playermodal"); }
function pmQueueMatch(id){ post("act:queuematch:"+id+":playermodal"); }
// Release a user player (only offered when p.on_user_team===true). Two-step
// inline confirm wiring lives in renderPlayerModal; this just posts.
function pmRelease(id){ post("act:release:"+id+":playermodal"); }
// God-mode edits — same shapes as rosterSetAttr/Pot/Badge but `playermodal` suffix.
function pmSetAttr(id, attrName, val){ post("act:setattr:"+id+":"+attrName+":"+val+":playermodal"); }
function pmSetPot(id, val){ post("act:setpot:"+id+":"+val+":playermodal"); }
function pmAddBadge(id, name){ post("act:addbadge:"+id+":"+name+":playermodal"); }
function pmRmBadge(id, name){ post("act:rmbadge:"+id+":"+name+":playermodal"); }

/* Contract re-sign — command shapes (host wired):
   preview (read-only, no commit): get:resignpreview:<id>:<years>:<amount>:<bonus>:<starter01>:<role>
   commit:                         act:resign:<id>:<years>:<amount>:<bonus>:<starter01>:<role>:playermodal
   role is 0=Duelist,1=Initiator,2=Controller,3=Sentinel, or -1 for natural. */
function pmResignPreview(f){
  post("get:resignpreview:"+f.id+":"+f.years+":"+f.amount+":"+f.bonus+":"+(f.starter?1:0)+":"+f.role);
}
function pmResignSubmit(f){
  post("act:resign:"+f.id+":"+f.years+":"+f.amount+":"+f.bonus+":"+(f.starter?1:0)+":"+f.role+":playermodal");
}
// Debounced preview: coalesce rapid slider drags into one push after ~150ms.
function pmResignPreviewDebounced(){
  if(!pmResignForm) return;
  if(pmResignTimer) clearTimeout(pmResignTimer);
  const snap={...pmResignForm};
  pmResignTimer=setTimeout(()=>{ pmResignTimer=null; pmResignPreview(snap); }, 150);
}

/* Free-agent sign — NEGOTIATED command shape (host wired):
   act:signfa:<id>:<years>:<role>:<bonus>:<amount>:playermodal
   (role -1=natural / 0..3; amount = wage offer in $K; the player can refuse). */
function pmSignSubmit(f){
  post("act:signfa:"+f.id+":"+f.years+":"+f.role+":"+f.bonus+":"+(f.amount>0?f.amount:-1)+":playermodal");
}
/* Debounced acceptance preview for the FA sign form — reuses the resignpreview
   channel (the host resolves free agents too; same negotiation math). */
let pmSignPrevTimer=null;
function pmSignPreviewDebounced(){
  if(!pmSignForm) return;
  const f={...pmSignForm};
  if(pmSignPrevTimer) clearTimeout(pmSignPrevTimer);
  pmSignPrevTimer=setTimeout(()=>{ pmSignPrevTimer=null;
    post("get:resignpreview:"+f.id+":"+f.years+":"+f.amount+":"+f.bonus+":0:"+f.role);
  },150);
}
// Resolve the role_fits entry for the currently-selected role (-1 → natural).
function pmSignFitEntry(f){
  const fits=(f&&f.fits)||[];
  if(+f.role===-1) return fits.find(x=>x.natural) || fits.find(x=>x.name===f.roleName) || null;
  return fits.find(x=>+x.idx===+f.role) || null;
}
/* Refresh the sign form's derived bits (year/bonus labels, grounded role-fit
   line, offer summary) from pmSignForm — all client-side, no host round-trip. */
function pmSignSync(){
  const host=$("#pmContent"); if(!host || !pmSignForm) return;
  const f=pmSignForm;
  const yv=host.querySelector('[data-sg-yearsval]'); if(yv) yv.textContent=f.years+(f.years===1?' yr':' yrs');
  const bv=host.querySelector('[data-sg-bonval]');   if(bv) bv.textContent=fmtK(f.bonus);
  const av=host.querySelector('[data-sg-amountval]'); if(av) av.textContent=fmtK(f.amount)+'/yr';
  pmSignPreviewDebounced();   // live acceptance verdict (fills [data-sg-predict])
  const e=pmSignFitEntry(f);
  const rf=host.querySelector('[data-sg-rolefit]');
  if(rf){
    if(e){
      const pct=Math.round(Math.max(0,Math.min(1,+e.fit||0))*100);
      const col=attrColor(pct);
      const roleLbl=(+f.role===-1)?('Natural · '+esc(e.name||f.roleName)):esc(e.name||'');
      rf.classList.toggle('natural', +f.role===-1);
      rf.innerHTML=`<div class="sgFitrow"><span class="sgFitrole">${roleLbl}</span><span class="sgFitbar"><span class="sgFitfill" style="width:${pct}%;background:${col}"></span></span><span class="sgFitverd" style="color:${col}">${esc(e.verdict||'')}</span></div>`;
    }else{ rf.innerHTML=''; }
  }
  const pd=host.querySelector('[data-sg-predict]');
  if(pd){
    const roleName=(+f.role===-1)?(f.roleName||'their natural role'):((e&&e.name)||'');
    const bonusTx=f.bonus>0?(' with a '+fmtK(f.bonus)+' signing bonus'):' on a free transfer';
    pd.innerHTML=`<div class="sgSummary">
      <div class="sgSumhead">Offer summary</div>
      <div class="sgSumline">Sign <b>${esc(f.name)}</b> (OVR <b>${esc(String(f.ovr))}</b>) as <b>${esc(roleName)}</b></div>
      <div class="sgSumline">${f.years}-year contract${bonusTx}.</div>
    </div>`;
  }
}

/* Transfer bid — command shape (host wired):
   act:buyplayer:<seller team>:<targetId>:<feeK>:playermodal
   (team names are colon-free, so the raw name is safe in the delimited string). */
function pmBidSubmit(f){
  post("act:buyplayer:"+f.seller+":"+f.id+":"+f.fee+":playermodal");
}
/* Fee-vs-value verdict — an ESTIMATE (the seller's true threshold also weighs
   wage + will_sell, revealed in the host's toast after a bid). */
function pmBidVerdict(fee, value, budget){
  if(value<=0) return {cls:'fair', txt:'Make an opening bid.'};
  if(fee>budget) return {cls:'reject', txt:'Over budget — you can’t fund this fee.'};
  const r=fee/value;
  if(r>=1.15) return {cls:'accept', txt:'Strong bid — the seller is likely to accept.'};
  if(r>=0.9)  return {cls:'fair',   txt:'Around market value — could go either way.'};
  return {cls:'reject', txt:'Below market — the seller will probably reject.'};
}
/* Refresh the bid form's fee label + verdict + summary from pmBidForm — all
   client-side (no host round-trip; the real outcome comes back as a toast). */
function pmBidSync(){
  const host=$("#pmContent"); if(!host || !pmBidForm) return;
  const f=pmBidForm;
  const fv=host.querySelector('[data-bd-feeval]'); if(fv) fv.textContent=fmtK(f.fee);
  const v=pmBidVerdict(f.fee, f.value, f.budget);
  const bn=host.querySelector('[data-bd-verdict]');
  if(bn){
    const ico=v.cls==='accept'?'✓':(v.cls==='reject'?'✕':'≈');
    bn.className='rsBanner '+v.cls;
    bn.innerHTML=`<span class="rsBico">${ico}</span><span class="rsBtx"><span class="rsBmain">${esc(fmtK(f.fee))} bid</span><span class="rsBverdict">${esc(v.txt)}</span></span>`;
  }
  const pd=host.querySelector('[data-bd-summary]');
  if(pd){
    const pctOfVal=f.value>0?Math.round(f.fee/f.value*100):0;
    pd.innerHTML=`<div class="sgSummary">
      <div class="sgSumhead">Bid summary</div>
      <div class="sgSumline">Offer <b>${esc(fmtK(f.fee))}</b> to <b>${esc(f.seller)}</b> for <b>${esc(f.name)}</b></div>
      <div class="sgSumline">Market value <b>${esc(fmtK(f.value))}</b> · your bid is <b>${pctOfVal}%</b> of value.</div>
    </div>`;
  }
}

/* Build the prediction-card innerHTML from a resignpreview payload. Pure string
   builder (no side effects) so it can be reused for the first render and every
   live update. Color-codes the verdict/accept banner and lists the +/- factor
   labels, reject reason, explainer, and any counter-offer. */
function pmResignPredictHTML(d){
  if(!d) return '';
  const ask=d.ask||{}, offer=d.offer||{}, bk=d.breakdown||{};
  const verdict=String(bk.verdict||'FAIR').toUpperCase();
  const willAccept=bk.will_accept===true;
  // banner class: accepted/strong/overpay → green, fair → amber, weak/insulting → red.
  let bcls='fair';
  if(willAccept || verdict==='STRONG' || verdict==='OVERPAY') bcls='accept';
  else if(verdict==='WEAK' || verdict==='INSULTING' || !willAccept) bcls='reject';
  if(verdict==='FAIR' && willAccept) bcls='accept';
  const bico = willAccept ? '✓' : '✕';
  const bmain = willAccept ? 'WILL ACCEPT' : 'WILL REJECT';
  const askYears=ask.years!=null?ask.years:'—', askAmt=ask.amount_k!=null?fmtK(ask.amount_k):'—';
  const offYears=offer.years!=null?offer.years:'—', offAmt=offer.amount_k!=null?fmtK(offer.amount_k):'—';
  const offBonus=offer.bonus_k?(' + '+fmtK(offer.bonus_k)+' bonus'):'';
  const offRole=offer.offered_role?esc(offer.offered_role):'';
  const starter=offer.promise_starter?' · starter promised':'';
  const labels=(Array.isArray(bk.labels)?bk.labels:[]).map(l=>{
    const dd=+l.delta||0, cls=dd>0?'up':(dd<0?'down':'flat'), sgn=dd>0?'+':'';
    return `<div class="rsLabel"><span class="rsLn">${esc(l.label)}</span><span class="rsLd ${cls}">${sgn}${dd}</span></div>`;
  }).join('');
  const scoreVal = bk.total!=null ? esc(String(bk.total)) : '';
  const rejectRow = (!willAccept && bk.reject_reason) ? `<div class="rsReject">${esc(bk.reject_reason)}</div>` : '';
  let counterRow='';
  if(bk.has_counter){
    const ca=bk.counter_amount_k!=null?fmtK(bk.counter_amount_k):'—';
    const cy=bk.counter_years!=null?bk.counter_years:'—';
    counterRow=`<div class="rsCounter">
      <span class="rsCotx">Counter: <b>${esc(ca)} / ${esc(String(cy))}y</b> — they'll sign for this.</span>
      <button type="button" class="rsAcceptCounter" data-rs-accept-counter data-amt="${esc(String(bk.counter_amount_k))}" data-years="${esc(String(bk.counter_years))}">Accept counter</button>
    </div>`;
  }
  const explain = ask.explainer ? `<div class="rsExplain">${esc(ask.explainer)}</div>` : '';
  return `
    <div class="rsAskoffer">
      <div class="rsAo"><div class="rsAolab">Their ask</div><div class="rsAoval">${esc(askAmt)} / ${esc(String(askYears))}y</div><div class="rsAosub">min ${ask.min_acceptable_k!=null?esc(fmtK(ask.min_acceptable_k)):'—'}</div></div>
      <div class="rsAo offer"><div class="rsAolab">Your offer</div><div class="rsAoval">${esc(offAmt)} / ${esc(String(offYears))}y</div><div class="rsAosub">${offRole}${offBonus}${starter}</div></div>
    </div>
    <div class="rsBanner ${bcls}">
      <span class="rsBico">${bico}</span>
      <span class="rsBtx"><span class="rsBmain">${bmain}</span><span class="rsBverdict">${esc(verdict)}</span></span>
      ${scoreVal!==''?`<span class="rsScore">${scoreVal}</span>`:''}
    </div>
    ${rejectRow}
    ${labels?`<div class="rsLabels">${labels}</div>`:''}
    ${counterRow}
    ${explain}`;
}

/* Live-update ONLY the prediction card + role-fit line from a resignpreview
   push. Does NOT touch the sliders/checkbox/role buttons, so a mid-drag update
   never resets the user's inputs. Re-binds the accept-counter button (it's
   inside the card). Called from onState for screen:"resignpreview". */
function pmApplyResignPreview(d){
  pmResignLast=d;
  const host=$("#pmContent"); if(!host) return;
  // FA-sign pane: the same preview channel answers the sign form's live verdict.
  // (canSign and hasResign are mutually exclusive, so only one region exists.)
  const sg=host.querySelector("[data-sg-predict]");
  if(sg && pmSignForm && d && d.player && d.player.id===pmSignForm.id){
    const bd=d.breakdown||{}, ask=d.ask||{};
    const ok=bd.will_accept===true;
    const counter=(bd.has_counter && bd.counter_amount_k>0)
      ? `<button type="button" class="rsCounter" data-sg-counter data-amt="${+bd.counter_amount_k}">Meet ${esc(fmtK(bd.counter_amount_k))}/yr</button>` : '';
    sg.innerHTML=`<div class="sgSummary">
      <div class="sgSumhead">Their position</div>
      <div class="sgSumline">Asking <b>${ask.amount_k!=null?esc(fmtK(ask.amount_k)):'—'}/yr</b>${ask.max_acceptable_years!=null?` · open to <b>${esc(String(ask.max_acceptable_years))} yrs</b> max (soft)`:''}</div>
      <div class="sgVerdict ${ok?'accept':'reject'}">${ok?'✓ Would accept this offer':'✗ '+esc(bd.reject_reason||'Would turn this down')}</div>
      <div class="sgSumline dim">Acceptance ${bd.total!=null?esc(String(bd.total)):'—'}/100 ${counter}</div>
    </div>`;
    const cb=sg.querySelector('[data-sg-counter]');
    if(cb) cb.addEventListener('click',()=>{
      const amt=+cb.dataset.amt;
      const inp=host.querySelector('[data-sg-input="amount"]');
      if(inp){ inp.value=Math.max(+inp.min,Math.min(+inp.max,amt)); pmSignForm.amount=+inp.value; }
      else pmSignForm.amount=amt;
      pmSignSync();
    });
    const sub=host.querySelector('[data-sg-submit]');
    if(sub) sub.classList.toggle('longshot', !ok);
    return;
  }
  const card=host.querySelector("[data-rs-predict]");
  if(card){
    card.innerHTML=pmResignPredictHTML(d);
    const ac=card.querySelector("[data-rs-accept-counter]");
    if(ac) ac.addEventListener("click",()=>{
      const amt=+ac.dataset.amt, yrs=+ac.dataset.years;
      pmResignSetTerms({amount:isFinite(amt)?amt:undefined, years:isFinite(yrs)?yrs:undefined});
    });
  }
  // role-fit verdict (from preview.player.role_fit) — show only for non-natural.
  const rf=host.querySelector("[data-rs-rolefit]");
  if(rf){
    const fit=d && d.player && d.player.role_fit;
    const natural = pmResignForm && pmResignForm.role===-1;
    if(natural || !fit){ rf.textContent=''; rf.classList.add('natural'); }
    else{ rf.textContent=fit; rf.classList.remove('natural'); }
  }
  // keep the submit button in sync with will_accept (longshot styling).
  pmResignSyncSubmit(d);
}

/* Update pmResignForm + the matching slider DOM value(s) and re-preview. Used by
   the "Accept counter" shortcut, which programmatically moves the sliders. */
function pmResignSetTerms(patch){
  if(!pmResignForm) return;
  const host=$("#pmContent"); if(!host) return;
  ['years','amount','bonus'].forEach(k=>{
    if(patch[k]==null) return;
    const inp=host.querySelector(`[data-rs-input="${k}"]`);
    if(inp){
      // clamp into the slider's own range so the thumb stays valid
      let v=patch[k]; const lo=+inp.min, hi=+inp.max;
      if(isFinite(lo)) v=Math.max(lo,v); if(isFinite(hi)) v=Math.min(hi,v);
      inp.value=v; pmResignForm[k]=v;
    }else{ pmResignForm[k]=patch[k]; }
  });
  pmResignSyncFormLabels();
  pmResignPreviewDebounced();
}

/* Refresh the numeric value read-outs next to each slider from pmResignForm. */
function pmResignSyncFormLabels(){
  const host=$("#pmContent"); if(!host || !pmResignForm) return;
  const yv=host.querySelector("[data-rs-yearsval]"); if(yv) yv.textContent=pmResignForm.years;
  const sv=host.querySelector("[data-rs-salval]"); if(sv) sv.textContent=fmtK(pmResignForm.amount);
  const bv=host.querySelector("[data-rs-bonval]"); if(bv) bv.textContent=fmtK(pmResignForm.bonus);
}

/* Submit button label/state follows will_accept: submitting a reject applies a
   real in-game penalty, so a rejecting offer becomes an amber "Send anyway". */
function pmResignSyncSubmit(d){
  const host=$("#pmContent"); if(!host) return;
  const btn=host.querySelector("[data-rs-submit]"); if(!btn) return;
  const note=host.querySelector("[data-rs-submitnote]");
  const willAccept = d && d.breakdown && d.breakdown.will_accept===true;
  if(willAccept){
    btn.textContent="Offer Extension";
    btn.classList.remove("longshot");
    if(note){ note.textContent="They're ready to sign these terms."; note.classList.remove("warn"); }
  }else{
    btn.textContent="Send anyway";
    btn.classList.add("longshot");
    if(note){ note.textContent="They'll likely reject — sending a rejected offer sours the relationship."; note.classList.add("warn"); }
  }
}

/* ===== Interest / market-scan tab =====================================
   Fetch (read-only): get:playerinterest:<id>. The host replies with a transient
   {screen:"playerinterest"} push handled by onState → pmApplyInterest, which
   fills ONLY the Interest pane's inner region (never the whole modal). We fire
   the fetch at most once per player per modal-open; a cached payload paints
   immediately (no scan flash). Mirrors the resignpreview live-preview idiom. */
function pmInterestFetch(id){
  if(id==null) return;
  if(pmInterestAsked===id) return;   // already requested for this player
  pmInterestAsked=id;
  post("get:playerinterest:"+id);
}

/* Small strategy chip color — tint by strategy so Contender/Rebuilding read at a
   glance. Falls back to a neutral muted tone. */
function pmInterestStratColor(s){
  const k=String(s||"").toLowerCase();
  if(k==='contender'||k==='win-now'||k==='title') return 'var(--gold)';
  if(k==='rebuilding'||k==='rebuild'||k==='develop'||k==='youth') return 'var(--blue)';
  if(k==='stable'||k==='consolidate') return 'var(--green)';
  return 'var(--fg-muted)';
}

/* Build one club card (pursuing or admirer). `club` is a row from the payload;
   `mode` is "hot" (pursuing) or "cool" (admirer, priced-out). Reasons are
   already human-readable sentences → rendered as escaped bullets. Admirers also
   carry a blocker + blocker_detail line. Card is tinted with its club_color. */
function pmInterestCardHTML(club, mode){
  const cc = (club && club.club_color) ? club.club_color : '#8B93A3';
  const tag = esc(String(club.tag||'').toUpperCase()).slice(0,4) || esc(String(club.team||'?').slice(0,3).toUpperCase());
  const strat = club.strategy ? `<span class="piStrat" style="--sc:${cssvar(pmInterestStratColor(club.strategy))}">${esc(club.strategy)}</span>` : '';
  const reasons = (Array.isArray(club.reasons)?club.reasons:[])
    .map(r=>`<li>${esc(r)}</li>`).join('');
  const reasonsHTML = reasons ? `<ul class="piReasons">${reasons}</ul>` : '';
  let blockerHTML='';
  if(mode==='cool'){
    const bt = club.blocker ? String(club.blocker).toLowerCase() : '';
    const btLabel = bt ? esc(bt) : 'blocked';
    const detail = club.blocker_detail ? esc(club.blocker_detail) : 'Priced out of a move right now.';
    blockerHTML = `<div class="piBlocker"><span class="piBtag piBt-${esc(bt)||'other'}">${btLabel}</span><span class="piBdetail">${detail}</span></div>`;
  }
  return `<div class="piCard ${mode==='hot'?'hot':'cool'}" style="--cc:${cc}">
    <div class="piCardhead">
      <span class="piBadge" style="--cc:${cc}">${tag}</span>
      <span class="piClub">${esc(club.team||'Unknown Club')}</span>
      ${strat}
    </div>
    ${reasonsHTML}
    ${blockerHTML}
  </div>`;
}

/* Full inner HTML for the Interest pane body from a `playerinterest` payload's
   `interest` object. Pure string builder (no DOM writes) — pmApplyInterest drops
   it into the pane's live region so only that region updates. */
function pmInterestBodyHTML(D){
  if(!D || D.found===false || !D.interest){
    return `<div class="piEmpty">No interest data available for this player.</div>`;
  }
  const it=D.interest;
  const pl=it.player||{};
  const pc = (D.club_color)||'#8B93A3';
  const pursuing = Array.isArray(it.pursuing)?it.pursuing:[];
  const admirers = Array.isArray(it.admirers)?it.admirers:[];
  const pCount = (it.pursuing_count!=null)?+it.pursuing_count:pursuing.length;
  const aCount = (it.admirer_count!=null)?+it.admirer_count:admirers.length;
  // header counts + value/asking context
  const pWord = pCount===1?'club pursuing':'clubs pursuing';
  const aWord = aCount===1?'admiring':'admiring';
  let ctx='';
  if(pl.is_free_agent){
    ctx=`<span class="piCtx">Free agent — no fee to prise them away.</span>`;
  }else{
    const val = pl.value_k!=null ? fmtK(pl.value_k) : null;
    const ask = pl.asking_fee_k!=null ? fmtK(pl.asking_fee_k) : null;
    const team = pl.team_name ? esc(pl.team_name) : 'Current club';
    if(val || ask){
      ctx=`<span class="piCtx">${val?`Value ~${esc(val)}`:''}${(val&&ask)?' · ':''}${ask?`${team} asking ~${esc(ask)}`:''}</span>`;
    }
  }
  const statureCtx = pl.rep_tier ? `<span class="piCtx">Stature: <b>${esc(pl.rep_tier)}</b> — only clubs of comparable standing will pursue.</span>` : '';
  const headHTML=`<div class="piHead" style="--cc:${pc}">
    <div class="piCounts"><b>${pCount}</b> ${pWord} · <b>${aCount}</b> ${aWord}</div>
    ${ctx}${statureCtx}
  </div>`;
  // pursuing section (hot)
  const pursuingBody = pursuing.length
    ? pursuing.map(c=>pmInterestCardHTML(c,'hot')).join('')
    : `<div class="piEmpty">No clubs are actively pursuing right now.</div>`;
  const pursuingHTML=`<div class="piSection"><div class="piSeclab hot">Pursuing</div>${pursuingBody}</div>`;
  // admirers section (cool / priced-out) — omit entirely when none
  let admirersHTML='';
  if(admirers.length){
    const body=admirers.map(c=>pmInterestCardHTML(c,'cool')).join('');
    admirersHTML=`<div class="piSection"><div class="piSeclab cool">Admirers · priced out</div>${body}</div>`;
  }else{
    admirersHTML=`<div class="piSection"><div class="piSeclab cool">Admirers · priced out</div><div class="piEmpty">No priced-out suitors.</div></div>`;
  }
  return headHTML+pursuingHTML+admirersHTML;
}

/* Live-fill ONLY the Interest pane's inner region from a playerinterest push.
   Caches the payload by id and does NOT re-render the modal or touch other tabs.
   Called from onState for screen:"playerinterest". */
function pmApplyInterest(D){
  if(!D) return;
  // resolve target id (payload carries it under interest.player.id; fall back to
  // requested_id / the currently-open player).
  let id = (D.interest && D.interest.player && D.interest.player.id);
  if(id==null && D.requested_id!=null) id=D.requested_id;
  if(id==null) id=pmPlayerId;
  if(id!=null) pmInterestCache[id]=D;
  const host=$("#pmContent"); if(!host) return;
  const region=host.querySelector("[data-pi-body]");
  // only paint if the push is for the player currently on screen
  if(region && (id==null || id===pmPlayerId)){
    region.innerHTML=pmInterestBodyHTML(D);
  }
}

/* ===== Scout report tab =================================================
   Fetch (read-only): get:scoutreport:<id>. The host replies with a transient
   {screen:"scoutreport"} push handled by onState → pmApplyScout, which fills
   ONLY the Scout pane's inner region (never the whole modal). Fired at most
   once per player per modal-open; a cached payload paints immediately. Mirrors
   the Interest live-fetch idiom EXACTLY. Commission a report from the unscouted
   form: act:commission:<id>:<moneyK>:playermodal. */
function pmScoutFetch(id){
  if(id==null) return;
  if(pmScoutAsked===id) return;   // already requested for this player
  pmScoutAsked=id;
  post("get:scoutreport:"+id);
}
function pmScoutCommission(id, moneyK){ post("act:commission:"+id+":"+moneyK+":playermodal"); }

/* Money slider ($0–$200K) → estimated scouting duration. The report carries
   est_days_min_money (days at $0 spend, the slow end) and est_days_max_money
   (days at $200K spend, the fast end). We linearly interpolate the day count
   across the $0–$200K range, then present it as "~N weeks" (rounded, min 1). */
const SK_MONEY_MAX=200;   // slider ceiling in $K
function skEstDays(preview, moneyK){
  const dMin=+((preview&&preview.est_days_min_money))||0;   // days at $0
  const dMax=+((preview&&preview.est_days_max_money))||0;   // days at $200K
  const t=Math.max(0,Math.min(1,(+moneyK||0)/SK_MONEY_MAX));
  return dMin + (dMax-dMin)*t;                              // interpolated days
}
function skWeeksLabel(preview, moneyK){
  const days=skEstDays(preview, moneyK);
  const wk=Math.max(1,Math.round(days/7));
  return "~"+wk+(wk===1?" week":" weeks");
}

/* Build the full inner HTML for the Scout pane body from a scoutreport payload.
   Pure string builder (no DOM writes / no listeners) — pmApplyScout drops it in,
   then pmWireScout binds the commission slider/button. Three states:
     unscouted  → coverage/region_note preview + commission form (money slider)
     in_progress→ progress card (bar, ETA, invested, coverage)
     scouted    → FM-style report (confidence + accuracy, strengths/weaknesses,
                  potential, role-fit bars, verdict). */
function pmScoutBodyHTML(D){
  if(!D || D.found===false || !D.scout){
    return `<div class="skEmpty">No scout report available for this player.</div>`;
  }
  const sc=D.scout;
  const status=String(sc.status||"unscouted");

  /* ---- unscouted: preview + commission form ---- */
  if(status==="unscouted"){
    const pv=sc.scout_preview||{};
    const hasScout=pv.has_scout===true;
    const cov=Math.max(0,Math.min(100,+pv.coverage||0));
    const covc=skCovColor(cov);
    const prevHTML=`<div class="skPrev">
      <div class="skPrevtop">
        <div class="skCovbig"><div class="v" style="color:${covc}">${Math.round(cov)}%</div><div class="l">Coverage</div></div>
        <div class="skPrevnote">
          <div class="rn">${esc(pv.region_note||'')}</div>
          <div class="rd">Read depth ${pv.read_depth!=null?esc(String(pv.read_depth)):'—'} · the deeper your scout knows this region, the faster and sharper the report.</div>
        </div>
      </div>
      <div class="skPrevcov skBar"><span class="skFill" style="width:${cov}%;background:${covc}"></span></div>
    </div>`;
    if(!hasScout){
      return `<div class="skWrap"><div class="skSeclab">Scout Preview</div>${prevHTML}
        <div class="skNoscout">Hire a scout first — head to the Market screen to bring one on staff.</div></div>`;
    }
    // seed the commission slider from any remembered value for this player, else $0.
    const id=(sc.player&&sc.player.id);
    const seed=(id!=null && pmScoutCommit[id]!=null)?pmScoutCommit[id]:0;
    const money=Math.max(0,Math.min(SK_MONEY_MAX,+seed||0));
    const weeks=skWeeksLabel(pv, money);
    const commitHTML=`<div class="skCommit" data-sk-commit="${esc(String(id!=null?id:''))}"
        data-sk-dmin="${esc(String(pv.est_days_min_money!=null?pv.est_days_min_money:0))}"
        data-sk-dmax="${esc(String(pv.est_days_max_money!=null?pv.est_days_max_money:0))}">
      <div class="skCommithead"><span class="t">Commission Budget</span><span class="v" data-sk-money>${esc(fmtK(money))}</span></div>
      <input type="range" class="rsSlider" data-sk-slider min="0" max="${SK_MONEY_MAX}" step="5" value="${money}" aria-label="Scouting budget in thousands">
      <div class="skEst"><span class="el">Estimated report</span><span class="ev" data-sk-weeks>${esc(weeks)}</span></div>
      <button type="button" class="skCommitbtn" data-sk-go>Commission Scout Report</button>
    </div>`;
    return `<div class="skWrap"><div class="skSeclab">Scout Preview</div>${prevHTML}${commitHTML}</div>`;
  }

  /* ---- in_progress: progress card ---- */
  if(status==="in_progress"){
    const a=sc.assignment||{};
    const pct=Math.max(0,Math.min(100,+a.pct||0));
    const covv=Math.max(0,Math.min(100,+a.coverage||0));
    const dleft=a.days_remaining!=null?a.days_remaining:'—';
    return `<div class="skWrap"><div class="skSeclab">Scouting In Progress</div>
      <div class="skInprog">
        <div class="ipTitle"><span class="ipDot"></span>Report in ~${esc(String(dleft))} days<span class="ipEta">${Math.round(pct)}%</span></div>
        <div class="skBar"><span class="skFill" style="width:${pct}%;background:var(--amber)"></span></div>
        <div class="skInmeta">
          <div class="m"><span class="k">Days left</span><span class="v">${esc(String(dleft))}d / ${esc(String(a.total_days!=null?a.total_days:'—'))}d</span></div>
          <div class="m"><span class="k">Invested</span><span class="v">${a.money_k!=null?esc(fmtK(a.money_k)):'$0K'}</span></div>
          <div class="m"><span class="k">Coverage</span><span class="v" style="color:${skCovColor(covv)}">${Math.round(covv)}%</span></div>
        </div>
      </div></div>`;
  }

  /* ---- scouted: FM-style report ---- */
  const conf=String(sc.confidence||'').trim();
  const confCls=conf.toLowerCase()||'vague';
  const acc=(sc.accuracy!=null)?Math.round(+sc.accuracy):null;
  // one strength/weakness item: attr name + category tag, plus a value bar when
  // `value` is present (omitted on a low-accuracy/vague read → just the label).
  const itemHTML=(it, kind)=>{
    const hasVal=(it.value!=null);
    const v=hasVal?Math.max(0,Math.min(100,+it.value)):0;
    const barc=kind==='strength'?'var(--green)':'var(--red-text)';
    const bar=hasVal
      ? `<div class="skItembar"><span class="skBar"><span class="skFill" style="width:${v}%;background:${barc}"></span></span><span class="ival">${Math.round(v)}</span></div>`
      : '';
    return `<div class="skItem">
      <div class="skItemtop"><span class="ia">${esc(it.attr||'—')}</span>${it.relative===true?`<span class="ic" title="Relative to his own level, not the league">${kind==='strength'?'best of his kit':'for his level'}</span>`:''}${it.category?`<span class="ic">${esc(it.category)}</span>`:''}</div>
      ${bar}
    </div>`;
  };
  const strengths=Array.isArray(sc.strengths)?sc.strengths:[];
  const weaknesses=Array.isArray(sc.weaknesses)?sc.weaknesses:[];
  const strHTML=strengths.length?strengths.map(x=>itemHTML(x,'strength')).join(''):'<div class="skColempty">No standout strengths surfaced.</div>';
  const weakHTML=weaknesses.length?weaknesses.map(x=>itemHTML(x,'weak')).join(''):'<div class="skColempty">No glaring weaknesses surfaced.</div>';
  // potential — exact value, or a lo–hi band with a "?" when not known.
  const pot=sc.potential||{};
  let potInner;
  if(pot.known===true && pot.value!=null){
    potInner=`<div class="pv">${esc(String(pot.value))}</div><div><div class="pl">Potential</div></div>`;
  }else{
    potInner=`<div class="pv">${esc(String(pot.lo!=null?pot.lo:'?'))}–${esc(String(pot.hi!=null?pot.hi:'?'))}<span class="q">?</span></div>
      <div><div class="pl">Potential</div><div class="pband">Ceiling not yet certain</div></div>`;
  }
  const potHTML=`<div class="skPot">${potInner}</div>`;
  // role fit — mini bars per role (fit is 0–1).
  const rf=Array.isArray(sc.role_fit)?sc.role_fit:[];
  const fitHTML=rf.length?`<div class="skFit">${rf.map(r=>{
    const pctv=Math.max(0,Math.min(100,Math.round((+r.fit||0)*100)));
    const[,rc]=ROLE[r.role]||["?","--fg-muted"];
    return `<div class="skFitrow"><span class="fr">${esc(r.role||'—')}</span>
      <span class="skBar"><span class="skFill" style="width:${pctv}%;background:${cssvar(rc)}"></span></span>
      <span class="fv">${pctv}%</span></div>`;
  }).join('')}</div>`:'';
  const verdictHTML=sc.verdict?`<div class="skVerdict">${esc(sc.verdict)}</div>`:'';
  const traits=Array.isArray(sc.traits)?sc.traits:[];
  const traitsHTML=traits.length?`<div><div class="skSeclab">Scouting Notes</div><ul class="skTraits">${traits.map(t=>`<li>${esc(t)}</li>`).join('')}</ul></div>`:'';
  const accHTML=sc.own_player===true
    ? `<span class="skAccnum">Your player · complete report</span>`
    : (acc!=null?`<span class="skAccnum">Accuracy <b>${acc}%</b></span>`:'');
  return `<div class="skReport">
    <div class="skRephead">
      ${conf?`<span class="skConf ${confCls}">${esc(conf)}</span>`:''}
      ${accHTML}
    </div>
    <div class="skSW">
      <div class="skCol skStrength"><div class="skColhead">Strengths</div><div class="skItems">${strHTML}</div></div>
      <div class="skCol skWeak"><div class="skColhead">Weaknesses</div><div class="skItems">${weakHTML}</div></div>
    </div>
    ${potHTML}
    ${traitsHTML}
    ${fitHTML?`<div><div class="skSeclab">Role Fit</div>${fitHTML}</div>`:''}
    ${verdictHTML}
  </div>`;
}

/* Live-fill ONLY the Scout pane's inner region from a scoutreport push. Caches
   the payload by id, does NOT re-render the modal or touch other tabs, then
   wires the commission slider/button. Called from onState for "scoutreport". */
function pmApplyScout(D){
  if(!D) return;
  let id=(D.scout && D.scout.player && D.scout.player.id);
  if(id==null && D.requested_id!=null) id=D.requested_id;
  if(id==null) id=pmPlayerId;
  if(id!=null) pmScoutCache[id]=D;
  const host=$("#pmContent"); if(!host) return;
  const region=host.querySelector("[data-sk-body]");
  if(region && (id==null || id===pmPlayerId)){
    region.innerHTML=pmScoutBodyHTML(D);
    pmWireScout(region, D);
  }
}

/* Wire the commission slider + button inside the Scout pane (only present in the
   unscouted state). Dragging updates the money read-out + week estimate live and
   remembers the value in pmScoutCommit so a re-push doesn't reset it; the button
   posts act:commission:<id>:<moneyK>:playermodal. */
function pmWireScout(region, D){
  if(!region) return;
  const commit=region.querySelector("[data-sk-commit]");
  if(!commit) return;
  const id=commit.dataset.skCommit;
  const pv={est_days_min_money:+commit.dataset.skDmin, est_days_max_money:+commit.dataset.skDmax};
  const slider=commit.querySelector("[data-sk-slider]");
  const moneyLab=commit.querySelector("[data-sk-money]");
  const weeksLab=commit.querySelector("[data-sk-weeks]");
  const btn=commit.querySelector("[data-sk-go]");
  const sync=()=>{
    const v=+slider.value;
    if(id!=='') pmScoutCommit[id]=v;
    if(moneyLab) moneyLab.textContent=fmtK(v);
    if(weeksLab) weeksLab.textContent=skWeeksLabel(pv, v);
  };
  if(slider) slider.addEventListener("input", sync);
  if(btn) btn.addEventListener("click",()=>{
    const pid=(D && D.scout && D.scout.player && D.scout.player.id);
    if(pid!=null) pmScoutCommission(pid, slider?+slider.value:0);
  });
}

/* Modal open-order counter so a stacked Escape closes only the top modal. */
let modalSeq=0, pmSeq=0, smSeq=0;
/* openPlayerModal(id, tab) — optional tab presets the modal pane (deep links:
   scouting rows → 'scout', market Sign → 'sign', watchlist Bidding → 'bid'). */
function openPlayerModal(id, tab){
  if(id==null) return;
  if(tab) pmTab=tab;
  post("nav:playermodal:"+id);
}
function closePlayerModal(){
  pmOpen=false;
  const m=$("#pmModal");
  if(m){ m.classList.remove("open"); m.setAttribute("aria-hidden","true"); }
}
// Static wiring (backdrop / × / Escape) — bound once at module load.
(function pmWireStatic(){
  const back=$("#pmBackdrop"), close=$("#pmClose");
  if(back) back.addEventListener("click", closePlayerModal);
  if(close) close.addEventListener("click", closePlayerModal);
  document.addEventListener("keydown", e=>{
    if(e.key==="Escape" && pmOpen && (!smOpen || pmSeq>smSeq)){ closePlayerModal(); e.stopImmediatePropagation(); }
  });
})();

const SM_ROLE={coach:"Head Coach",scout:"Head Scout",analyst:"Head Analyst"};

    const s=D.staff;
    document.documentElement.style.setProperty("--club", D.club_color||"#FF4655");
