.tpstrow .rl{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost);width:78px;flex:none}
.tpstrow .nm{font-size:13px;font-weight:600;color:var(--fg);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpstrow .nm.vacant{color:var(--fg-muted);font-weight:500}
.tpstrow .pers{font-size:10.5px;color:var(--amber);flex:none;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* history block */
.tphist{display:flex;flex-direction:column}
.tphrow{display:grid;grid-template-columns:54px 1fr auto;gap:9px;align-items:center;height:32px;padding:0 4px;
  border-top:1px solid var(--hairline);font-size:12.5px}
.tphrow:first-child{border-top:0}
.tphrow .hyr{font-family:var(--font-num);font-size:11px;color:var(--fg-ghost)}
.tphrow .hlab{color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tphrow .hwl{font-family:var(--font-num);font-weight:600;color:var(--fg);justify-self:end}
/* not-found empty state */
.tpnotfound{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;
  color:var(--fg-muted);font-size:15px;text-align:center;padding:40px}

/* =====================================================================
   PLAYER DETAIL MODAL  (.pm* — deep overlay openable from anywhere; floats
   above the active screen, never replaces #view. Uniquely-named .pm* classes
   so they never collide with any existing screen's selectors. Reuses the
   shared dark theme, --club accents, and the god-mode .attredit/.stepbtn/.gb*
   controls for editing.)
   ===================================================================== */
/* tiny "open profile" affordance injected into roster/market/teamprofile rows */
.pmOpenBtn{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  width:20px;height:20px;line-height:1;border-radius:5px;padding:0;flex:none;margin-left:auto;
  font-family:var(--font-num);font-size:12px;display:grid;place-items:center;opacity:0;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease),opacity var(--t-fast) var(--ease)}
.rrow:hover .pmOpenBtn,.farow:hover .pmOpenBtn,.tprow:hover .pmOpenBtn,.pmOpenBtn:focus-visible{opacity:1}
.pmOpenBtn:hover{color:var(--fg);background:var(--bg-3);border-color:var(--club)}
.pmModal{position:fixed;inset:0;z-index:80;display:none;align-items:center;justify-content:center;padding:32px 24px}
.pmModal.open{display:flex}
.pmBackdrop{position:absolute;inset:0;background:rgba(6,8,12,.72);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.pmCard{position:relative;z-index:1;width:min(900px,94vw);max-height:85vh;display:flex;flex-direction:column;min-height:0;
  background:var(--bg-1);border:1px solid var(--border-strong);box-shadow:0 24px 64px rgba(0,0,0,.6),var(--hi-inset);
  border-radius:var(--r-card);overflow:hidden;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.pmCard::before{content:"";position:absolute;top:0;left:0;height:2px;width:34%;
  background:linear-gradient(90deg,transparent,var(--club),transparent);pointer-events:none;
  animation:sweep 6s linear infinite}
.pmClose{position:absolute;top:12px;right:14px;z-index:4;width:30px;height:30px;border-radius:8px;
  border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-num);font-size:18px;line-height:1;display:grid;place-items:center;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.pmClose:hover{color:var(--fg);background:var(--bg-3);border-color:var(--club)}
/* header */
.pmHead{position:relative;flex:none;padding:18px 56px 16px 20px;border-bottom:1px solid var(--hairline);
  background:linear-gradient(180deg,color-mix(in srgb,var(--club) 9%,var(--bg-1)),var(--bg-1));overflow:hidden}
.pmHead .pmWash{position:absolute;top:0;left:0;width:220px;height:100%;
  background:linear-gradient(90deg,color-mix(in srgb,var(--club) 16%,transparent),transparent);pointer-events:none}
.pmHrow{display:flex;align-items:flex-start;gap:14px;position:relative;z-index:1}
.pmCrest{width:52px;height:52px;border-radius:13px;flex:none;display:grid;place-items:center;
  font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--fg);
  background:color-mix(in srgb,var(--club) 22%,var(--bg-3));border:1px solid color-mix(in srgb,var(--club) 55%,var(--border-strong))}
.pmHid{min-width:0;flex:1}
.pmName{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:-.02em;line-height:1.05;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:10px}
.pmYourclub{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;flex:none;
  color:var(--club);background:color-mix(in srgb,var(--club) 16%,transparent);
  border:1px solid color-mix(in srgb,var(--club) 50%,transparent);border-radius:var(--r-pill);padding:3px 9px}
.pmStature{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gold);
  background:rgba(255,215,0,.09);border:1px solid rgba(255,215,0,.4);border-radius:var(--r-pill);padding:2px 9px}
.pmNameEdit{flex:none;cursor:pointer;font-size:14px;line-height:1;color:var(--fg-muted);background:var(--bg-2);
  border:1px solid var(--hairline);border-radius:6px;padding:4px 7px}
.pmNameEdit:hover{color:var(--fg);border-color:var(--border-strong)}
.pmNameInput{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:-.02em;
  background:var(--bg-2);border:1px solid var(--club);border-radius:8px;color:var(--fg);padding:2px 10px;width:min(340px,60%)}
/* staff profile modal (reuses pm* shell; narrower card) */
.smCard{width:min(560px,92vw)}
.smCard .pmBody{display:flex;flex-direction:column;gap:18px}
.smAttrs{display:flex;flex-direction:column;gap:9px}
.smAttr{display:grid;grid-template-columns:110px 1fr 34px;gap:10px;align-items:center;font-size:12px;color:var(--fg-muted)}
.smAttr .av{text-align:right;color:var(--fg);font-family:var(--font-num)}
.smContract{font-size:13px;color:var(--fg-muted);margin-bottom:10px}
.smContract b{color:var(--fg);font-family:var(--font-num)}
.smAttr.edit{grid-template-columns:110px 1fr 34px 52px}
.smStep{display:inline-flex;gap:4px}
.smGod{display:flex;flex-direction:column;gap:8px;margin:4px 0 12px;padding:10px 12px;background:var(--bg-2);
  border:1px solid color-mix(in srgb,var(--club) 35%,var(--hairline));border-radius:10px}
.smGodRow{display:flex;align-items:center;gap:10px;font-size:11.5px;color:var(--fg-muted)}
.smGodRow .gl{min-width:104px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:9.5px;color:var(--fg-ghost)}
.smGodRow .gv{color:var(--fg)}
/* Club god-mode editor bar (roster screen) */
.clubGod{display:flex;align-items:flex-end;gap:14px;margin-top:12px;padding:10px 14px;background:var(--bg-1);
  border:1px solid color-mix(in srgb,var(--club) 40%,var(--hairline));border-radius:var(--r-card);flex:none}
.clubGod .cgLab{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--club);align-self:center;min-width:110px}
.clubGod .cgField{display:flex;flex-direction:column;gap:3px}
.clubGod .cgField label{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-ghost)}
.clubGod input{background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;color:var(--fg);
  font-size:12px;padding:6px 9px;width:150px}
.clubGod input:focus{outline:none;border-color:var(--club)}
.clubGod .cgApply{cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:11px;color:#fff;
  background:color-mix(in srgb,var(--club) 80%,#000);border:1px solid transparent;border-radius:8px;padding:8px 16px}
.clubGod .cgApply:hover{filter:brightness(1.12)}
.scard.staffclick{cursor:pointer;transition:border-color .12s}
.scard.staffclick:hover{border-color:var(--club)}
.rcStRow[data-st-open]{cursor:pointer}
/* AI General Manager toggle bar (Strategy screen) */
.aigm{display:flex;align-items:center;gap:16px;margin-top:14px;padding:13px 16px;background:var(--bg-1);
  border:1px solid var(--hairline);box-shadow:var(--hi-inset);border-radius:var(--r-card)}
.aigm.on{border-color:color-mix(in srgb,var(--club) 45%,var(--hairline));
  box-shadow:0 0 0 1px color-mix(in srgb,var(--club) 20%,transparent),var(--hi-inset)}
.aigm .aigmTxt{flex:1;min-width:0}
.aigm .t{font-family:var(--font-display);font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:9px}
.aigm .p{font-size:12px;color:var(--fg-muted);margin-top:2px}
.aigmLive{font-size:9px;font-weight:700;letter-spacing:.09em;color:#fff;background:var(--club);
  border-radius:var(--r-pill);padding:2px 8px;animation:mvLivePulse 1.6s ease-in-out infinite}
.aigmBtn{flex:none;cursor:pointer;font-family:var(--font-display);font-weight:700;font-size:11.5px;letter-spacing:.04em;
  color:var(--fg);background:var(--bg-2);border:1px solid var(--border-strong);border-radius:9px;padding:9px 16px}
.aigmBtn:hover{border-color:var(--club)}
.aigmBtn.on{color:#fff;background:color-mix(in srgb,var(--club) 80%,#000);border-color:transparent}
/* Mark-all-read pill in the Inbox card header */
.mailAllRead{margin-left:auto;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;color:var(--fg-muted);background:var(--bg-2);border:1px solid var(--hairline);
  border-radius:var(--r-pill);padding:4px 11px}
.mailAllRead:hover{color:var(--fg);border-color:var(--club)}
#cInbox .chead .s{margin-left:9px}   /* button steals the space-between push — keep title/stat apart */
.pmSub{display:flex;align-items:center;gap:8px;margin-top:7px;flex-wrap:wrap;font-size:11.5px;color:var(--fg-muted)}
.pmSub .dot{width:3px;height:3px;border-radius:50%;background:var(--fg-ghost);flex:none}
.pmFlag{font-family:var(--font-num);font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
  color:var(--fg-muted);background:var(--bg-2);border:1px solid var(--border-strong);border-radius:4px;padding:2px 6px;flex:none}
.pmRole{font-family:var(--font-num);font-size:9.5px;font-weight:600;letter-spacing:.05em;padding:3px 7px;flex:none;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px)}
.pmTag{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:var(--r-pill);
  border:1px solid var(--border-strong);color:var(--fg-muted);flex:none}
.pmTag.igl{color:var(--amber);border-color:rgba(212,161,76,.45)}
.pmTag.flex{color:var(--blue);border-color:rgba(0,212,255,.4)}
.pmTag.retired{color:var(--red-text);background:rgba(255,70,85,.12);border-color:rgba(255,70,85,.45)}
.pmDesire{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;color:var(--gold);flex:none;
  background:color-mix(in srgb,var(--gold) 9%,var(--bg-2));border:1px solid rgba(255,215,0,.4);border-radius:var(--r-pill);padding:2px 10px}
/* OVR / POT tiles in the header right edge */
.pmHovr{display:flex;gap:9px;flex:none;align-items:flex-start}
.pmOvrbox{width:66px;text-align:center;background:var(--bg-2);border:1px solid var(--hairline);border-radius:9px;padding:8px 0}
.pmOvrbox .v{font-family:var(--font-num);font-weight:600;font-size:24px;line-height:1}
.pmOvrbox .b{font-family:var(--font-num);font-size:12px;font-weight:600;line-height:1.05}
.pmOvrbox .l{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin-top:3px}
.pmOvrbox .q{color:var(--amber);font-weight:700}
.pmOvrbox .attredit{justify-content:center;margin-top:3px}
/* header action buttons row */
.pmActions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;z-index:1}
.pmBtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--hairline);background:var(--bg-2);
  color:var(--fg-muted);cursor:pointer;font-family:var(--font-display);font-weight:600;font-size:11px;
  letter-spacing:.03em;padding:7px 13px;border-radius:7px;box-shadow:var(--hi-inset);
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.pmBtn:hover{color:var(--fg);background:var(--bg-3);border-color:var(--border-strong)}
.pmBtn.on{color:var(--fg);border-color:color-mix(in srgb,var(--club) 55%,transparent);
  background:color-mix(in srgb,var(--club) 16%,var(--bg-2))}
.pmBtn.star.on{color:var(--gold);border-color:rgba(255,215,0,.5);background:color-mix(in srgb,var(--gold) 12%,var(--bg-2))}
.pmBtn.primary{color:var(--fg);border-color:color-mix(in srgb,var(--club) 55%,transparent);
  background:color-mix(in srgb,var(--club) 18%,var(--bg-2))}
.pmBtn.primary:hover{background:color-mix(in srgb,var(--club) 30%,var(--bg-2));border-color:var(--club)}
.pmBtn .pmcount{font-family:var(--font-num);font-size:10px;color:var(--fg-ghost)}
/* god-mode toggle chip reuses .godtoggle look but pm-scoped placement */
.pmHead .godtoggle{margin-left:auto}
.pmActions .godtoggle{align-self:center}
/* tabs */
.pmTabs{display:flex;gap:0;flex:none;padding:0 20px;border-bottom:1px solid var(--hairline);background:var(--bg-1)}
.pmTab{border:0;background:transparent;color:var(--fg-muted);cursor:pointer;position:relative;
  font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
  padding:13px 16px;transition:color var(--t-fast) var(--ease)}
.pmTab:hover{color:var(--fg)}
.pmTab.on{color:var(--fg)}
.pmTab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;border-radius:2px;
  background:var(--club);box-shadow:0 0 8px color-mix(in srgb,var(--club) 55%,transparent)}
/* body (scrollable) */
/* #pmContent/#smContent must be a min-height:0 flex column, or the .pmBody scroll
   chain breaks: as a default block flex-item it grows past .pmCard's 85vh cap and the
   card's overflow:hidden CLIPS the tall tabs (Scout/Interest) with no way to scroll. */
#pmContent,#smContent{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.pmBody{flex:1;min-height:0;overflow-y:auto;padding:18px 20px 22px;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.pmBody::-webkit-scrollbar{width:7px}.pmBody::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
.pmPane{display:none;flex-direction:column;gap:16px}
.pmPane.on{display:flex}
.pmSec{display:flex;flex-direction:column}
.pmSeclab{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin:0 0 9px}
.pmRescan{float:right;border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  padding:3px 8px;border-radius:6px;transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.pmRescan:hover{color:var(--fg);border-color:var(--border-strong)}
/* stat tiles grid */
.pmStats{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:8px}
.pmStat{background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:9px 6px;text-align:center}
.pmStat .v{font-family:var(--font-num);font-weight:600;font-size:15px;line-height:1;color:var(--fg)}
.pmStat .l{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted);margin-top:5px}
/* mood card */
.pmMood{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:13px 15px;display:flex;flex-direction:column;gap:10px}
.pmMoodtop{display:flex;align-items:center;gap:12px}
.pmMoodtop .mv{font-family:var(--font-num);font-weight:600;font-size:28px;line-height:1}
.pmMoodtop .mverdict{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:var(--r-pill)}
.pmMoodbar{flex:1;height:7px;background:var(--bg-3);border-radius:4px;overflow:hidden}
.pmMoodbar .mf{height:100%;border-radius:4px}
.pmWantsout{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--red-text);
  background:rgba(255,70,85,.14);border:1px solid rgba(255,70,85,.45);border-radius:4px;padding:2px 7px;margin-left:auto;flex:none}
.pmLabels{display:flex;flex-direction:column;gap:5px}
.pmLabel{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--fg)}
.pmLabel .ln{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmLabel .ld{font-family:var(--font-num);font-size:11.5px;font-weight:600;flex:none;width:42px;text-align:right}
.pmLabel .ld.up{color:var(--green)}.pmLabel .ld.down{color:var(--red-text)}.pmLabel .ld.flat{color:var(--fg-ghost)}
.pmDuo{font-size:11.5px;color:var(--fg-muted);padding-top:9px;border-top:1px solid var(--hairline)}
.pmDuo b{color:var(--fg);font-weight:600}
.pmDuo .dv{font-family:var(--font-num);color:var(--green);font-weight:600;margin-left:4px}
/* two-column row of small panels */
.pmRow2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media (max-width:680px){.pmRow2{grid-template-columns:1fr}}
/* personal info / contract mini-boxes */
.pmKv{display:flex;flex-direction:column;gap:7px}
.pmKvrow{display:flex;align-items:baseline;gap:10px;font-size:12.5px}
.pmKvrow .k{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-ghost);width:96px;flex:none}
.pmKvrow .vv{color:var(--fg);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pmContract{display:flex;gap:8px}
.pmCbox{flex:1;background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:9px;text-align:center}
.pmCbox .v{font-family:var(--font-num);font-weight:600;font-size:15px;color:var(--fg)}
.pmCbox .l{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted);margin-top:5px}
/* attributes (two-column bars, like roster) */
.pmAttrs{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px}
@media (max-width:680px){.pmAttrs{grid-template-columns:1fr}}
.pmAttr{display:flex;align-items:center;gap:8px}
.pmAttr .an{font-size:10.5px;color:var(--fg-muted);width:118px;flex:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:capitalize}
.pmAttr .ab{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pmAttr .af{height:100%;border-radius:3px;min-width:2px}
.pmAttr .av{font-family:var(--font-num);font-size:11px;width:20px;text-align:right;color:var(--fg);flex:none}
/* chips (agent pool, badges) */
.pmChips{display:flex;flex-wrap:wrap;gap:6px}
.pmChip{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;padding:3px 10px;
  border-radius:var(--r-pill);background:var(--bg-2);border:1px solid var(--hairline);color:var(--fg);
  max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmChip.sig{border-color:rgba(255,215,0,.5);color:var(--gold);box-shadow:0 0 0 1px rgba(255,215,0,.12)}
.pmChip .pmdot{width:7px;height:7px;border-radius:50%;flex:none}
/* accolades */
.pmTrophies{display:flex;flex-wrap:wrap;gap:14px;font-size:11.5px;color:var(--fg-muted);margin-bottom:8px}
.pmTrophies b{font-family:var(--font-num);color:var(--gold);font-size:14px;font-weight:600}
.pmTitlelist{display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--fg-muted);line-height:1.5}
/* season history table */
.pmHist{width:100%;font-size:12px}
.pmHisthead,.pmHistrow{display:grid;grid-template-columns:44px 36px 1fr 50px 46px 46px 60px 60px;gap:8px;align-items:center;padding:0 8px}
.pmHisthead{height:26px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted)}
.pmHisthead span:nth-child(n+4){text-align:right}
.pmHistrow{height:32px;border-top:1px solid var(--hairline)}
.pmHistrow span:nth-child(n+4){text-align:right;font-family:var(--font-num)}
.pmHistrow .hy{font-family:var(--font-num);color:var(--fg-ghost)}
.pmHistrow .ht{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
/* By-Tournament stat table (player modal Detail) — same idiom as Season History */
.pmTournhead,.pmTournrow{display:grid;grid-template-columns:1fr 42px 40px 92px 44px 44px 42px 46px;gap:8px;align-items:center;padding:0 8px;white-space:nowrap}
.pmTournhead{height:26px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted)}
.pmTournhead span:nth-child(n+3){text-align:right}
.pmTournrow{height:32px;border-top:1px solid var(--hairline)}
.pmTournrow span:nth-child(n+3){text-align:right;font-family:var(--font-num)}
.pmTournrow .hy{font-family:var(--font-num);color:var(--fg-ghost)}
.pmTournrow .ht{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--fg)}
.pmEmpty{color:var(--fg-muted);font-size:12px;padding:4px 0}
/* not-found state */
.pmNotfound{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  padding:54px 30px;color:var(--fg-muted);font-size:15px;text-align:center}

/* ---- Maps / Agents / IGL panes (read-only; club-accented dark surfaces) ---- */
/* comfort-map / signature highlight strip */
.pmComfort{font-size:11.5px;color:var(--fg-muted);margin:0 0 11px;display:flex;align-items:center;gap:6px;
  background:color-mix(in srgb,var(--club) 12%,var(--bg-2));border:1px solid color-mix(in srgb,var(--club) 32%,transparent);
  border-radius:7px;padding:7px 11px}
.pmComfort b{color:var(--fg);font-weight:600;margin-left:2px}
/* map mastery table */
.pmMaps{width:100%;font-size:12.5px}
.pmMaphead,.pmMaprow{display:grid;grid-template-columns:1fr 38px 52px 52px 56px;gap:8px;align-items:center;padding:0 9px}
.pmMaphead{height:26px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-muted)}
.pmMaphead span:nth-child(n+2){text-align:right}
.pmMaprow{height:34px;border-top:1px solid var(--hairline)}
.pmMaprow:first-of-type{border-top:0}
.pmMaprow span:nth-child(n+2){text-align:right;font-family:var(--font-num)}
.pmMaprow .mn{font-weight:600;color:var(--fg);display:flex;align-items:center;gap:6px;min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmMaprow.comf{background:color-mix(in srgb,var(--gold) 7%,transparent)}
.pmComfdot{color:var(--gold);font-size:10px;flex:none}
.pmMaprow .mp{color:var(--fg-muted)}
/* agent pool rows */
.pmAgents{display:flex;flex-direction:column;gap:6px}
.pmAgentrow{display:grid;grid-template-columns:1fr auto auto;grid-template-areas:"name role bonus" "stats stats stats";
  gap:4px 10px;align-items:center;background:var(--bg-2);border:1px solid var(--hairline);border-radius:8px;padding:9px 12px}
.pmAgentrow.sig{border-color:rgba(255,215,0,.4);box-shadow:0 0 0 1px rgba(255,215,0,.1)}
.pmAgname{grid-area:name;font-size:13px;font-weight:600;color:var(--fg);display:flex;align-items:center;gap:6px;
  min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pmStar{color:var(--gold);font-size:12px;flex:none}
.pmAgrole{grid-area:role;font-family:var(--font-num);font-size:9px;font-weight:700;letter-spacing:.05em;
  padding:2px 7px;border-radius:var(--r-pill);white-space:nowrap;justify-self:end}
.pmAgbonus{grid-area:bonus;font-family:var(--font-num);font-size:12px;font-weight:600;justify-self:end;min-width:34px;text-align:right}
.pmAgstats{grid-area:stats;display:flex;gap:14px;font-size:10.5px;color:var(--fg-muted);margin-top:2px}
.pmAgstats .s b{font-family:var(--font-num);font-weight:600;color:var(--fg)}
.pmAgstats.untested{font-style:italic;color:var(--fg-ghost)}
/* IGL tendency sliders */
.pmTend{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.pmTend:last-child{margin-bottom:0}
.pmTendlabs{display:flex;align-items:baseline;font-size:10.5px;color:var(--fg-muted)}
.pmTendlabs .lo{flex:1;text-align:left}
.pmTendlabs .hi{flex:1;text-align:right}
.pmTendlabs .vv{font-family:var(--font-num);font-size:11px;font-weight:600;color:var(--fg);flex:none;padding:0 8px}
.pmTendbar{position:relative;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:visible}
.pmTendfill{position:absolute;left:0;top:0;height:100%;border-radius:3px;
  background:color-mix(in srgb,var(--club) 70%,var(--blue))}
.pmTendmark{position:absolute;top:50%;width:11px;height:11px;border-radius:50%;
  transform:translate(-50%,-50%);background:var(--fg);border:2px solid var(--bg-1);
  box-shadow:0 0 6px color-mix(in srgb,var(--club) 60%,transparent)}

/* ---- Interest pane (.pi* — market-scan report inside the player modal) ----
   Which rival clubs pursue (hot) or admire-but-blocked (cool) this player, with
   the AI's reasons and blockers. Each card is tinted by its own club_color via a
   local --cc. Filled live by pmApplyInterest (pane-only update). */
.piWrap{display:flex;flex-direction:column;gap:14px;max-height:56vh;overflow-y:auto;padding-right:4px;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.piWrap::-webkit-scrollbar{width:7px}
.piWrap::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
/* transient scanning placeholder */
.piScan{display:flex;align-items:center;gap:9px;color:var(--fg-muted);font-size:12.5px;
  padding:18px 4px;font-style:italic}
.piScandot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--club);
  box-shadow:0 0 8px color-mix(in srgb,var(--club) 70%,transparent);animation:piPulse 1.1s var(--ease) infinite}
@keyframes piPulse{0%,100%{opacity:.35;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
@media (prefers-reduced-motion:reduce){.piScandot{animation:none;opacity:.8}}
/* header — counts + value/asking context */
.piHead{display:flex;flex-direction:column;gap:4px;padding:11px 13px;border-radius:var(--r-tile);
  background:color-mix(in srgb,var(--cc,var(--club)) 10%,var(--bg-2));
  border:1px solid color-mix(in srgb,var(--cc,var(--club)) 30%,var(--hairline))}
.piCounts{font-size:13px;color:var(--fg)}
.piCounts b{font-family:var(--font-num);font-weight:700;font-size:15px;color:var(--fg)}
.piCtx{font-size:11.5px;color:var(--fg-muted)}
/* sections */
.piSection{display:flex;flex-direction:column;gap:8px}
.piSeclab{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);
  display:flex;align-items:center;gap:7px}
.piSeclab::before{content:"";width:7px;height:7px;border-radius:50%;flex:none}
.piSeclab.hot{color:color-mix(in srgb,var(--green) 75%,var(--fg-muted))}
.piSeclab.hot::before{background:var(--green);box-shadow:0 0 7px color-mix(in srgb,var(--green) 60%,transparent)}
.piSeclab.cool{color:color-mix(in srgb,var(--amber) 70%,var(--fg-muted))}
.piSeclab.cool::before{background:var(--amber);box-shadow:0 0 6px color-mix(in srgb,var(--amber) 45%,transparent)}
/* club card */
.piCard{position:relative;background:var(--bg-2);border:1px solid var(--hairline);border-radius:9px;
  padding:11px 13px 12px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.piCard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;flex:none;
  background:var(--cc,var(--club))}
.piCard.hot{border-color:color-mix(in srgb,var(--cc,var(--green)) 34%,var(--hairline));
  background:linear-gradient(180deg,color-mix(in srgb,var(--cc,var(--green)) 8%,var(--bg-2)),var(--bg-2))}
.piCard.cool{opacity:.94;background:color-mix(in srgb,var(--amber) 3%,var(--bg-2))}
.piCardhead{display:flex;align-items:center;gap:9px;min-width:0}
.piBadge{font-family:var(--font-num);font-size:10px;font-weight:700;letter-spacing:.04em;
  color:#fff;background:var(--cc,var(--club));border-radius:5px;padding:3px 7px;flex:none;line-height:1;
  text-shadow:0 1px 2px rgba(0,0,0,.5);box-shadow:0 0 0 1px color-mix(in srgb,var(--cc,var(--club)) 50%,transparent)}
.piClub{font-size:13.5px;font-weight:600;color:var(--fg);min-width:0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.piStrat{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex:none;margin-left:auto;
  color:var(--sc,var(--fg-muted));padding:2px 8px;border-radius:var(--r-pill);
  background:color-mix(in srgb,var(--sc,var(--fg-muted)) 14%,transparent);
  border:1px solid color-mix(in srgb,var(--sc,var(--fg-muted)) 42%,transparent)}
.piReasons{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px}
.piReasons li{position:relative;padding-left:15px;font-size:12px;line-height:1.45;color:var(--fg-muted)}
.piReasons li::before{content:"";position:absolute;left:2px;top:7px;width:5px;height:5px;border-radius:50%;
  background:color-mix(in srgb,var(--cc,var(--club)) 70%,var(--fg-ghost))}
.piCard.hot .piReasons li{color:var(--fg)}
/* blocker line (admirers only) */
.piBlocker{display:flex;align-items:flex-start;gap:8px;margin-top:2px;padding-top:9px;
  border-top:1px dashed color-mix(in srgb,var(--amber) 30%,var(--hairline));font-size:11.5px;line-height:1.4}
.piBtag{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;flex:none;
  padding:2px 7px;border-radius:4px;color:var(--amber);
  background:color-mix(in srgb,var(--amber) 14%,transparent);
  border:1px solid color-mix(in srgb,var(--amber) 45%,transparent)}
.piBtag.piBt-funds{color:#ff9a6b;background:rgba(255,120,60,.14);border-color:rgba(255,120,60,.45)}
.piBtag.piBt-fee{color:var(--amber);background:color-mix(in srgb,var(--amber) 14%,transparent);border-color:color-mix(in srgb,var(--amber) 45%,transparent)}
.piBtag.piBt-wage{color:var(--purple);background:color-mix(in srgb,var(--purple) 16%,transparent);border-color:color-mix(in srgb,var(--purple) 48%,transparent)}
.piBtag.piBt-marginal{color:var(--fg-muted);background:rgba(255,255,255,.06);border-color:var(--border-strong)}
.piBdetail{color:var(--fg-muted);min-width:0}
/* empty states */
.piEmpty{color:var(--fg-muted);font-size:12px;padding:8px 2px;font-style:italic}

/* =====================================================================
   GLOBAL TOAST (action feedback — bottom-center banner)
   ===================================================================== */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);z-index:60;
  display:flex;align-items:center;gap:10px;max-width:min(560px,72vw);
  background:var(--bg-3);border:1px solid var(--border-strong);box-shadow:0 10px 30px rgba(0,0,0,.5),var(--hi-inset);
  border-radius:9px;padding:11px 16px;font-size:13px;font-weight:500;color:var(--fg);
  opacity:0;transition:opacity var(--t-mid) var(--ease),transform var(--t-mid) var(--ease);
  clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px)}
.toast.in{opacity:1;transform:translateX(-50%) translateY(0)}
.toast::before{content:"";width:4px;align-self:stretch;border-radius:2px;flex:none;background:var(--toast-accent,var(--green))}
.toast.ok{--toast-accent:color-mix(in srgb,var(--club) 70%,var(--green))}
.toast.warn{--toast-accent:var(--amber)}
.toast .ttext{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media (prefers-reduced-motion:reduce){.toast{transition:none}}

/* =====================================================================
   FAVORITES-SPECIFIC  (.fav* — single scrollable list of starred players,
   each row opens the player modal; per-row ✕ unfavorites). Uniquely-named
   so they never collide with any existing screen's selectors. Mirrors the
   .fatable / .farow market-table language.
   ===================================================================== */
.favgrid{display:flex;flex-direction:column;gap:16px;margin-top:16px;flex:1;min-height:0}
.favgrid .card{flex:1}
.favtable{width:100%;font-size:13.5px}
.favhead,.favrow{display:grid;grid-template-columns:48px 1fr 56px 40px 50px 150px 44px 50px 60px 34px;gap:9px;align-items:center;padding:0 8px}
.favhead{height:26px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:2}
.favhead span:nth-child(n+4){text-align:right}
.favhead span:nth-child(2),.favhead span:nth-child(3),.favhead span:nth-child(6){text-align:left}
.favhead span:last-child{text-align:center}
.favrow{height:46px;border-top:1px solid var(--hairline);cursor:pointer;position:relative;
  transition:background var(--t-fast) var(--ease)}
.favrow:first-of-type{border-top:0}
.favrow:hover{background:var(--bg-2)}
.favrow:focus-visible{outline:2px solid var(--blue);outline-offset:-2px;border-radius:4px}
.favflag{font-family:var(--font-num);font-size:9.5px;font-weight:700;letter-spacing:.03em;color:var(--fg-muted);
  background:var(--bg-2);border:1px solid var(--border-strong);border-radius:5px;padding:3px 0;text-align:center;justify-self:start;min-width:36px}
.favname{display:flex;align-items:center;gap:7px;min-width:0}
.favname .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.favbadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none}
.favbadge.igl{color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.favrole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.favcell{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.favcell.dim{color:var(--fg-muted)}
.favovr{font-family:var(--font-num);font-weight:600;font-size:14px;text-align:right}
.favteam{font-size:12.5px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.favteam .dim{color:var(--fg-muted)}
.favx{justify-self:center}
.favunfav{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-ghost);cursor:pointer;
  width:22px;height:22px;line-height:1;border-radius:5px;padding:0;flex:none;
  font-family:var(--font-num);font-size:14px;display:grid;place-items:center;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.favunfav:hover{color:var(--red-text);background:rgba(255,70,85,.16);border-color:rgba(255,70,85,.45)}

/* =====================================================================
   WATCHLIST-SPECIFIC  (.wl* — like favorites, but each row carries a status
   <select>, an editable note input, and an unwatch ✕). Row click (away from
   those controls) opens the modal. Uniquely-named so they never collide.
   ===================================================================== */
.wlgrid{display:flex;flex-direction:column;gap:16px;margin-top:16px;flex:1;min-height:0}
.wlgrid .card{flex:1}
.wltable{width:100%;font-size:13.5px}
.wlhead,.wlrow{display:grid;grid-template-columns:48px 1fr 56px 40px 50px 130px 116px 150px 34px;gap:9px;align-items:center;padding:0 8px}
.wlhead{height:26px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:2}
.wlhead span:nth-child(4),.wlhead span:nth-child(5){text-align:right}
.wlhead span:last-child{text-align:center}
.wlrow{height:48px;border-top:1px solid var(--hairline);cursor:pointer;position:relative;
  transition:background var(--t-fast) var(--ease)}
.wlrow:first-of-type{border-top:0}
.wlrow:hover{background:var(--bg-2)}
.wlflag{font-family:var(--font-num);font-size:9.5px;font-weight:700;letter-spacing:.03em;color:var(--fg-muted);
  background:var(--bg-2);border:1px solid var(--border-strong);border-radius:5px;padding:3px 0;text-align:center;justify-self:start;min-width:36px}
.wlname{display:flex;align-items:center;gap:7px;min-width:0}
.wlname .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wlbadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none}
.wlbadge.igl{color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.wlrole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.wlcell{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.wlcell.dim{color:var(--fg-muted)}
.wlovr{font-family:var(--font-num);font-weight:600;font-size:14px;text-align:right}
.wlteam{font-size:12.5px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wlteam .dim{color:var(--fg-muted)}
.wlstatuswrap,.wlnotewrap{min-width:0}
.wlstatuswrap{display:flex;align-items:center;gap:5px}
.wlbid{flex:none;border:1px solid color-mix(in srgb,var(--club) 50%,transparent);background:color-mix(in srgb,var(--club) 14%,var(--bg-2));
  color:var(--fg);cursor:pointer;font-family:var(--font-display);font-weight:600;font-size:9.5px;letter-spacing:.03em;
  padding:4px 8px;border-radius:6px;white-space:nowrap;transition:background var(--t-fast) var(--ease)}
.wlbid:hover{background:color-mix(in srgb,var(--club) 26%,var(--bg-2))}
.wlstatus{width:100%;font-family:var(--font-ui);font-size:11px;font-weight:600;color:var(--fg);
  background:var(--bg-3);border:1px solid var(--hairline);border-radius:6px;padding:5px 7px;cursor:pointer;
  transition:color var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.wlstatus:hover{border-color:var(--border-strong)}
.wlstatus:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
.wlstatus option{background:var(--bg-2);color:var(--fg)}
.wlnote{width:100%;font-family:var(--font-ui);font-size:12px;color:var(--fg);
  background:var(--bg-2);border:1px solid var(--hairline);border-radius:6px;padding:6px 8px;
  transition:border-color var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.wlnote::placeholder{color:var(--fg-ghost)}
.wlnote:hover{border-color:var(--border-strong)}
.wlnote:focus{outline:none;border-color:color-mix(in srgb,var(--club) 55%,var(--border-strong));
  background:var(--bg-3)}
.wlx{justify-self:center}
.wlunwatch{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-ghost);cursor:pointer;
  width:22px;height:22px;line-height:1;border-radius:5px;padding:0;flex:none;
  font-family:var(--font-num);font-size:14px;display:grid;place-items:center;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.wlunwatch:hover{color:var(--red-text);background:rgba(255,70,85,.16);border-color:rgba(255,70,85,.45)}

/* =====================================================================
   RECORDS  (.rec* — all-time hub: GOAT boards, Hall of Fame, league leaders.
   Uniquely-named so nothing collides with the other list screens. Club-color
   accents; gold/silver/bronze for the top-3 GOAT ranks.)
   ===================================================================== */
.recwrap{display:flex;flex-direction:column;gap:14px;margin-top:16px;flex:1;min-height:0}
/* sub-tab strip (client-side switch, mirrors the .pmTabs idiom) */
.rectabs{display:flex;gap:0;flex:none;border-bottom:1px solid var(--hairline)}
.rectab{border:0;background:transparent;color:var(--fg-muted);cursor:pointer;position:relative;
  font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
  padding:11px 18px;transition:color var(--t-fast) var(--ease)}
.rectab:hover{color:var(--fg)}
.rectab.on{color:var(--fg)}
.rectab.on::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;border-radius:2px;
  background:var(--club);box-shadow:0 0 8px color-mix(in srgb,var(--club) 55%,transparent)}
/* panes */
.recpane{display:none;flex:1;min-height:0;flex-direction:column}
.recpane.on{display:flex}
.recbody{flex:1;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.recbody::-webkit-scrollbar{width:6px}.recbody::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.recempty{color:var(--fg-muted);font-size:12.5px;padding:16px 4px;text-align:center}
/* ranked GOAT tables */
.rectable{width:100%;font-size:13.5px}
.rechead,.recrow{display:grid;gap:9px;align-items:center;padding:0 8px}
.rechead{height:26px;font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--fg-muted);
  position:sticky;top:0;background:var(--bg-1);z-index:2}
.rectable.career .rechead,.rectable.career .recrow{grid-template-columns:44px 46px 1fr 56px 160px 84px}
.rectable.season .rechead,.rectable.season .recrow{grid-template-columns:44px 46px 1fr 56px 150px 56px 56px 76px}
.rechead span:nth-child(n+4){text-align:right}
.rectable.career .rechead span:nth-child(3),.rectable.season .rechead span:nth-child(3){text-align:left}
.recrow{height:46px;border-top:1px solid var(--hairline);cursor:pointer;position:relative;
  transition:background var(--t-fast) var(--ease)}
.recrow:first-of-type{border-top:0}
.recrow:hover{background:var(--bg-2)}
.recrow:focus-visible{outline:2px solid var(--blue);outline-offset:-2px;border-radius:4px}
.recrank{font-family:var(--font-num);font-weight:700;font-size:14px;color:var(--fg-muted);text-align:center;justify-self:start;
  width:34px;height:26px;line-height:26px;border-radius:6px;background:var(--bg-2);border:1px solid var(--hairline)}
.recrank.g1{color:#141414;background:linear-gradient(180deg,#FFE082,var(--gold));border-color:#C9A227;box-shadow:0 0 10px rgba(255,215,0,.35)}
.recrank.g2{color:#141414;background:linear-gradient(180deg,#E6E9EF,#B9C0CC);border-color:#8E97A6;box-shadow:0 0 8px rgba(200,208,220,.28)}
.recrank.g3{color:#1a1208;background:linear-gradient(180deg,#E4A66A,#C77B3C);border-color:#9C5C29;box-shadow:0 0 8px rgba(199,123,60,.30)}
.recflag{font-family:var(--font-num);font-size:9.5px;font-weight:700;letter-spacing:.03em;color:var(--fg-muted);
  background:var(--bg-2);border:1px solid var(--border-strong);border-radius:5px;padding:3px 0;text-align:center;justify-self:start;min-width:36px}
.recname{display:flex;align-items:center;gap:7px;min-width:0}
.recname .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recbadge{font-size:8px;font-weight:700;letter-spacing:.05em;padding:1px 4px;border-radius:4px;flex:none}
.recbadge.igl{color:var(--amber);border:1px solid rgba(212,161,76,.45)}
.recrole{font-family:var(--font-num);font-size:9px;font-weight:600;letter-spacing:.05em;padding:3px 5px;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);justify-self:start}
.recteam{font-size:12.5px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recteam .dim{color:var(--fg-muted)}
.reccell{font-family:var(--font-num);font-size:13px;text-align:right;color:var(--fg)}
.reccell.dim{color:var(--fg-muted)}
.recseason{text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recseason .yr{font-family:var(--font-num);font-size:12.5px;color:var(--fg)}
.recseason .tm{font-size:11px;color:var(--fg-muted);margin-left:5px}
.recscore{font-family:var(--font-num);font-weight:700;font-size:15px;text-align:right;
  color:color-mix(in srgb,var(--club) 72%,var(--fg))}
/* Hall of Fame cards */
.rechofgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;padding:2px 2px 6px}
.rechof{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:12px 13px;
  cursor:pointer;position:relative;overflow:hidden;transition:border-color var(--t-fast) var(--ease),background var(--t-fast) var(--ease)}
.rechof::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--amber))}
.rechof:hover{background:var(--bg-3);border-color:var(--border-strong)}
.rechof:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
.rechoftop{display:flex;align-items:center;gap:8px;min-width:0}
.rechoftop .recflag{flex:none}
.rechofname{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.rechofname .nm{font-family:var(--font-display);font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rechofteam{font-size:11.5px;color:var(--fg-muted);margin:6px 0 9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rechofstats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:9px}
.rechofstat{display:flex;flex-direction:column;gap:1px}
.rechofstat .v{font-family:var(--font-num);font-weight:600;font-size:15px;color:var(--fg);line-height:1}
.rechofstat .l{font-size:8.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg-ghost)}
.rechofpills{display:flex;gap:5px;flex-wrap:wrap}
.recpill{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:var(--r-pill);
  color:var(--fg-muted);background:var(--bg-1);border:1px solid var(--hairline);white-space:nowrap}
.recpill.mvp{color:var(--gold);border-color:rgba(255,215,0,.42);background:rgba(255,215,0,.08)}
.recpill.roty{color:var(--purple);border-color:rgba(123,94,255,.42);background:rgba(123,94,255,.08)}
.recpill.clutch{color:var(--blue);border-color:rgba(0,212,255,.38);background:rgba(0,212,255,.07)}
/* Leader boards grid */
.recleaders{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:2px 2px 6px;align-content:start}
.recboard{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);padding:11px 12px 8px;display:flex;flex-direction:column;min-width:0}
.recboardhead{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--fg-muted);padding-bottom:7px;margin-bottom:4px;border-bottom:1px solid var(--hairline)}
.reclrow{display:grid;grid-template-columns:26px 40px 1fr 66px;gap:7px;align-items:center;height:30px;
  cursor:pointer;border-radius:5px;padding:0 4px;transition:background var(--t-fast) var(--ease)}
.reclrow:hover{background:var(--bg-3)}
.reclrow:focus-visible{outline:2px solid var(--blue);outline-offset:-2px}
.reclrank{font-family:var(--font-num);font-size:11px;font-weight:700;color:var(--fg-ghost);text-align:center}
.reclrow.t1 .reclrank{color:var(--gold)}.reclrow.t2 .reclrank{color:#C8D0DC}.reclrow.t3 .reclrank{color:#D69A5C}
.reclflag{font-family:var(--font-num);font-size:8.5px;font-weight:700;color:var(--fg-muted);
  background:var(--bg-1);border:1px solid var(--border-strong);border-radius:4px;padding:2px 0;text-align:center;min-width:32px}
.reclname{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reclname .tm{font-size:10.5px;color:var(--fg-muted);margin-left:6px;font-weight:400}
.reclval{font-family:var(--font-num);font-weight:600;font-size:13px;text-align:right;color:color-mix(in srgb,var(--club) 60%,var(--fg))}
.recboardempty{font-size:11px;color:var(--fg-ghost);padding:8px 4px;text-align:center}

/* =====================================================================
   POST-MATCH RESULTS  (.mv* — read-only scoreline + dual scoreboards +
   round timeline for the user's most recent match. Blue side uses a cool
   accent, red side a warm accent; the user's side is tinted with --club.)
   ===================================================================== */
.mvwrap{display:flex;flex-direction:column;gap:14px;margin-top:16px;flex:1;min-height:0;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
.mvwrap::-webkit-scrollbar{width:7px}.mvwrap::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
/* ---- scoreline banner ---- */
.mvBanner{position:relative;background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);
  border-radius:var(--r-card);padding:18px 22px 20px;overflow:hidden;flex:none;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.mvBanner::before{content:"";position:absolute;inset:0 auto 0 0;width:38%;pointer-events:none;
  background:linear-gradient(90deg,color-mix(in srgb,var(--mv-blue) 14%,transparent),transparent)}
.mvBanner::after{content:"";position:absolute;inset:0 0 0 auto;width:38%;pointer-events:none;
  background:linear-gradient(270deg,color-mix(in srgb,var(--mv-red) 14%,transparent),transparent)}
.mvBanner.userBlue::before{background:linear-gradient(90deg,color-mix(in srgb,var(--club) 20%,transparent),transparent)}
.mvBanner.userRed::after{background:linear-gradient(270deg,color-mix(in srgb,var(--club) 20%,transparent),transparent)}
.mvbEvent{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  font-size:11px;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:14px}
.mvbEvent .mvbMap{color:var(--fg);background:var(--bg-2);border:1px solid var(--border-strong);
  padding:3px 10px;border-radius:var(--r-pill);letter-spacing:.06em}
.mvbEvent .mvbTag{padding:3px 9px;border-radius:var(--r-pill);letter-spacing:.05em;
  background:var(--bg-2);border:1px solid var(--hairline);color:var(--fg-muted)}
.mvbEvent .mvbTag.ranked{color:var(--purple);border-color:rgba(123,94,255,.42);background:rgba(123,94,255,.08)}
.mvbEvent .mvbTag.series{color:var(--amber);border-color:rgba(212,161,76,.42);background:rgba(212,161,76,.08)}
.mvScore{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px}
.mvTeamName{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:-.02em;line-height:1.05;
  display:flex;align-items:center;gap:10px;min-width:0}
.mvTeamName.blue{justify-content:flex-end;text-align:right;color:var(--mv-blue)}
.mvTeamName.red{justify-content:flex-start;text-align:left;color:var(--mv-red)}
.mvTeamName .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mvTeamName.loser{color:var(--fg-muted);opacity:.85}
.mvTeamName.winner .nm{color:var(--green);text-shadow:0 0 18px rgba(63,209,122,.30)}
.mvNums{display:flex;align-items:center;gap:14px;font-family:var(--font-num);font-weight:700;line-height:1}
.mvNums .n{font-size:52px;color:var(--fg-muted);transition:color var(--t-fast)}
.mvNums .n.win{font-size:60px;color:var(--green)}
.mvNums .dash{font-size:34px;color:var(--fg-ghost)}
.mvOutcome{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap;position:relative;z-index:1}
.mvChip{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:5px 12px;border-radius:var(--r-pill)}
.mvChip.won{color:#0c1a10;background:linear-gradient(180deg,#63E39B,var(--green));box-shadow:0 0 14px rgba(63,209,122,.35)}
.mvChip.lost{color:#fff;background:color-mix(in srgb,var(--red) 88%,#000);box-shadow:0 0 14px rgba(255,70,85,.30)}
.mvStory{font-size:12.5px;color:var(--fg);background:var(--bg-2);border:1px solid var(--hairline);
  border-left:3px solid var(--club);padding:5px 12px;border-radius:6px;max-width:640px}
.mvMvpTag{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--gold);
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.42);border-radius:var(--r-pill);padding:4px 11px}
/* ---- LIVE series viewer: live badge, skip control, per-map tabs, map header ---- */
.mvbEvent .mvbTag.live{color:#fff;border-color:rgba(255,70,85,.55);background:color-mix(in srgb,var(--red) 30%,transparent);
  animation:mvLivePulse 1.25s ease-in-out infinite}
@keyframes mvLivePulse{0%,100%{opacity:1}50%{opacity:.45}}
.mvSkip{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;
  padding:5px 13px;border-radius:var(--r-pill);color:#fff;background:var(--club);border:1px solid transparent;
  box-shadow:0 0 12px color-mix(in srgb,var(--club) 40%,transparent)}
.mvSkip.ghost{color:var(--fg-muted);background:var(--bg-2);border:1px solid var(--hairline);box-shadow:none}
.mvSkip:hover{filter:brightness(1.1)}
.mvMapTabs{display:flex;gap:8px;flex-wrap:wrap;flex:none}
.mvMapTab{display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--bg-1);border:1px solid var(--hairline);
  box-shadow:var(--hi-inset);border-radius:10px;padding:7px 12px;transition:border-color .15s,background .15s}
.mvMapTab:hover{border-color:var(--border-strong)}
.mvMapTab.on{border-color:var(--club);background:color-mix(in srgb,var(--club) 12%,var(--bg-1))}
.mvMapTab.veiled{opacity:.5}
.mvMapTab .mt{font-size:9.5px;font-weight:700;letter-spacing:.1em;color:var(--fg-ghost)}
.mvMapTab .mn{font-family:var(--font-display);font-size:13px;font-weight:600}
.mvMapTab .ms{font-family:var(--font-num);font-size:13px;color:var(--fg-muted)}
.mvMapTab .ms.blue{color:#6ea8ff}.mvMapTab .ms.red{color:#ff8087}
.mvMapView{display:flex;flex-direction:column;gap:14px;min-height:0}
.mvMapHdr{display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex:none}
.mvMapHdr .mm{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.04em}
.mvMapHdr .mst{font-size:12px;color:var(--fg);background:var(--bg-2);border:1px solid var(--hairline);
  border-left:3px solid var(--club);padding:3px 10px;border-radius:6px}
.mvMapHdr .mmvp{font-size:11px;font-weight:700;color:var(--gold)}
/* pre-match team talk chips (dashboard hero, match-today only) */
.ttRow{display:flex;align-items:center;gap:7px;margin:2px 0 4px}
.ttLab{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost);margin-right:3px}
.ttChip{cursor:pointer;font-size:10.5px;font-weight:700;color:var(--fg-muted);background:var(--bg-2);
  border:1px solid var(--hairline);border-radius:var(--r-pill);padding:4px 12px;transition:color .12s,border-color .12s}
.ttChip:hover{color:var(--fg);border-color:var(--border-strong)}
.ttChip.fit{border-style:dashed;border-color:color-mix(in srgb,var(--gold,#d4a14c) 55%,var(--hairline))}
.ttChip.on{color:#fff;background:color-mix(in srgb,var(--club) 70%,#000);border-color:var(--club);border-style:solid}
/* post-match wrap-up: Series MVP card + derived match awards + decider storyline */
.mvWrapCard{display:flex;flex-direction:column;gap:10px;flex:none;background:var(--bg-1);
  border:1px solid color-mix(in srgb,var(--gold,#d4a14c) 35%,var(--hairline));box-shadow:var(--hi-inset);
  border-radius:var(--r-card);padding:14px 16px}
.mvMvpCard{display:flex;align-items:center;gap:14px}
.mvMvpCrest{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;
  color:#1a1405;background:linear-gradient(180deg,#ffd97a,#d4a14c);box-shadow:0 0 18px rgba(212,161,76,.35)}
.mvMvpBody{flex:1;min-width:0}
.mvMvpLab{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold,#d4a14c)}
.mvMvpName{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.01em;line-height:1.1}
.mvMvpSub{font-size:11.5px;color:var(--fg-muted);margin-top:1px}
.mvMvpStats{display:flex;gap:14px}
.mvMvpStats span{display:flex;flex-direction:column;align-items:flex-end;font-size:8.5px;font-weight:700;
  letter-spacing:.08em;color:var(--fg-ghost)}
.mvMvpStats b{font-family:var(--font-num);font-size:17px;color:var(--fg);letter-spacing:0}
.mvAwards{display:flex;gap:8px;flex-wrap:wrap}
.mvAward{font-size:11px;color:var(--fg-muted);background:var(--bg-2);border:1px solid var(--hairline);
  border-radius:var(--r-pill);padding:4px 11px}
.mvAward b{color:var(--fg);font-weight:600}
.mvWrapStory{font-size:12px;color:var(--fg);background:var(--bg-2);border:1px solid var(--hairline);
  border-left:3px solid var(--gold,#d4a14c);padding:5px 11px;border-radius:6px}
/* the live viewer stacks banner+tabs+map header+scoreboards+replay — let it scroll */
#view.match{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
#view.match::-webkit-scrollbar{width:7px}
#view.match::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
/* ---- dual scoreboards ---- */
.mvTeams{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:none}
.mvBoard{background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);border-radius:var(--r-card);
  padding:12px 14px 10px;display:flex;flex-direction:column;min-width:0;position:relative;overflow:hidden}
.mvBoard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px}
.mvBoard.blue::before{background:linear-gradient(180deg,var(--mv-blue),color-mix(in srgb,var(--mv-blue) 40%,transparent))}
.mvBoard.red::before{background:linear-gradient(180deg,var(--mv-red),color-mix(in srgb,var(--mv-red) 40%,transparent))}
.mvBoardHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;padding-left:4px}
.mvBoardHead .tn{font-family:var(--font-display);font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mvBoard.blue .mvBoardHead .tn{color:var(--mv-blue)}
.mvBoard.red .mvBoardHead .tn{color:var(--mv-red)}
.mvBoardHead .sc{font-family:var(--font-num);font-weight:700;font-size:18px;color:var(--fg)}
.mvTbl{width:100%;font-size:12.5px}
.mvHead,.mvRow{display:grid;gap:6px;align-items:center;
  grid-template-columns:1fr 74px 30px 30px 30px 44px 44px 54px 48px 56px;padding:0 4px}
.mvHead{height:24px;font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--fg-muted);
  border-bottom:1px solid var(--hairline)}
.mvHead span:nth-child(n+3){text-align:right}
.mvRow{height:40px;border-top:1px solid var(--hairline);cursor:pointer;transition:background var(--t-fast) var(--ease)}
.mvRow:first-of-type{border-top:0}
.mvRow:hover{background:var(--bg-2)}
.mvRow:focus-visible{outline:2px solid var(--blue);outline-offset:-2px;border-radius:4px}
.mvRow.mvp{background:color-mix(in srgb,var(--gold) 9%,transparent)}
.mvRow.mvp:hover{background:color-mix(in srgb,var(--gold) 14%,transparent)}
.mvPlayer{display:flex;align-items:center;gap:7px;min-width:0}
.mvPlayer .pn{font-weight:600;font-size:13px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mvPlayer .star{color:var(--gold);font-size:12px;flex:none}
.mvRoleChip{font-family:var(--font-num);font-size:8px;font-weight:700;letter-spacing:.04em;padding:2px 4px;flex:none;
  clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px)}
.mvAgent{font-family:var(--font-num);font-size:10px;font-weight:600;letter-spacing:.02em;color:var(--fg);
  background:var(--bg-2);border:1px solid var(--border-strong);border-radius:5px;padding:3px 6px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;justify-self:start;max-width:74px}
.mvCell{font-family:var(--font-num);font-size:12px;text-align:right;color:var(--fg)}
.mvCell.dim{color:var(--fg-muted)}
.mvRating{font-family:var(--font-num);font-weight:700;font-size:13px;text-align:right}
.mvRating.hi{color:var(--green)}.mvRating.lo{color:var(--red)}.mvRating.mid{color:var(--fg)}
/* ---- round timeline ---- */
.mvTimeCard{background:var(--bg-1);border:1px solid var(--hairline);box-shadow:var(--hi-inset);border-radius:var(--r-card);
  padding:13px 15px 14px;flex:none;
  clip-path:polygon(var(--bevel) 0,100% 0,100% 100%,0 100%,0 var(--bevel))}
.mvTimeHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.mvTimeHead .t{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted)}
.mvTimeHead .leg{display:flex;gap:12px;font-size:9.5px;color:var(--fg-muted);flex-wrap:wrap}
.mvTimeHead .leg b{font-family:var(--font-num);color:var(--fg);font-weight:600;margin-right:3px}
.mvTimeHead .leg .lb{color:var(--mv-blue)}.mvTimeHead .leg .lr{color:var(--mv-red)}
.mvTimeline{display:flex;flex-wrap:wrap;gap:6px}
.mvPip{display:flex;flex-direction:column;align-items:center;gap:3px;width:30px;flex:none}
.mvPip .dot{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;position:relative;
  font-family:var(--font-num);font-size:11px;font-weight:700;line-height:1;border:1px solid transparent}
.mvPip.blue .dot{color:#eaf9ff;background:color-mix(in srgb,var(--mv-blue) 26%,var(--bg-2));border-color:color-mix(in srgb,var(--mv-blue) 60%,transparent)}
.mvPip.red .dot{color:#ffeaed;background:color-mix(in srgb,var(--mv-red) 26%,var(--bg-2));border-color:color-mix(in srgb,var(--mv-red) 60%,transparent)}
.mvPip .dot.planted::after{content:"";position:absolute;right:-2px;top:-2px;width:6px;height:6px;border-radius:50%;
  background:var(--amber);box-shadow:0 0 5px rgba(212,161,76,.7)}
.mvPip .rn{font-family:var(--font-num);font-size:8px;color:var(--fg-ghost)}
.mvPip .rs{font-family:var(--font-num);font-size:8.5px;color:var(--fg-muted);white-space:nowrap}
/* Interactive replay scrubber — the round timeline upgraded to a transport with
   a scrub track (click a pip / drag the slider), a playhead that reveals rounds
   progressively, and a per-round readout (winner, end kind, sides, economy). */
.mvPip{cursor:pointer;transition:opacity .12s}
.mvPip .dot{transition:box-shadow .14s,transform .14s}
.mvPip.veiled{opacity:.5}
.mvPip.veiled .rs{visibility:hidden}
.mvPip.veiled .dot{color:var(--fg-ghost);background:var(--bg-2);border-color:var(--hairline);filter:saturate(.25)}
.mvPip.veiled .dot.planted::after{opacity:.25}
.mvPip.now .dot{transform:translateY(-1px) scale(1.16);box-shadow:0 0 0 2px var(--club),0 4px 12px rgba(0,0,0,.45)}
.mvPip.now .rn{color:var(--club);font-weight:700}
.mvPip:hover:not(.now):not(.veiled) .dot{box-shadow:0 0 0 1.5px color-mix(in srgb,var(--fg-muted) 55%,transparent)}
.mvPip:focus-visible{outline:none}.mvPip:focus-visible .dot{box-shadow:0 0 0 2px var(--club)}
.mvRepBar{display:flex;align-items:center;gap:10px;margin:0 0 12px;flex-wrap:wrap}
.mvRepTransport{display:flex;align-items:center;gap:4px}
.mvRepBtn{width:30px;height:30px;display:grid;place-items:center;border-radius:8px;cursor:pointer;
  background:var(--bg-2);border:1px solid var(--hairline);color:var(--fg-muted);
  font-family:var(--font-num);font-size:12px;line-height:1;transition:background .12s,color .12s,border-color .12s}
.mvRepBtn:hover{color:var(--fg);border-color:var(--border-strong)}
.mvRepBtn.play{width:36px;color:var(--fg);border-color:color-mix(in srgb,var(--club) 55%,transparent);
  background:color-mix(in srgb,var(--club) 14%,var(--bg-2))}
.mvRepBtn.play.on{background:color-mix(in srgb,var(--club) 28%,var(--bg-2))}
.mvRepSlider{flex:1;min-width:150px;accent-color:var(--club);height:4px;cursor:pointer}
.mvRepPos{font-family:var(--font-num);font-size:11px;color:var(--fg-muted);white-space:nowrap;min-width:82px;text-align:right}
.mvRepPos b{color:var(--fg)}
.mvRepSpeed{font-family:var(--font-num);font-size:11px;color:var(--fg-muted);cursor:pointer;
  background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:6px 8px;line-height:1}
.mvRepSpeed:hover{color:var(--fg);border-color:var(--border-strong)}
.mvRepNow{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
  background:var(--bg-2);border:1px solid var(--hairline);border-radius:10px;padding:11px 14px;margin-bottom:13px}
.mvRepScore{display:flex;flex-direction:column;align-items:center;gap:2px;font-family:var(--font-num)}
.mvRepScore .rnum{font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--fg-ghost);white-space:nowrap}
.mvRepScore .nums{display:flex;align-items:baseline;gap:6px;font-weight:700}
.mvRepScore .sb{font-size:26px;color:var(--mv-blue)}
.mvRepScore .sr{font-size:26px;color:var(--mv-red)}
.mvRepScore .sd{font-size:15px;color:var(--fg-ghost)}
.mvRepMid{display:flex;flex-direction:column;gap:6px;min-width:0}
.mvRepWin{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mvRepWinChip{font-family:var(--font-display);font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:6px;white-space:nowrap}
.mvRepWinChip.blue{color:#eaf9ff;background:color-mix(in srgb,var(--mv-blue) 24%,transparent);border:1px solid color-mix(in srgb,var(--mv-blue) 55%,transparent)}
.mvRepWinChip.red{color:#ffeaed;background:color-mix(in srgb,var(--mv-red) 24%,transparent);border:1px solid color-mix(in srgb,var(--mv-red) 55%,transparent)}
.mvRepTag{font-size:9.5px;color:var(--fg-muted);padding:2px 7px;border-radius:5px;background:var(--bg-1);border:1px solid var(--hairline);white-space:nowrap}
.mvRepTag.plant{color:var(--amber);border-color:color-mix(in srgb,var(--amber) 45%,transparent)}
.mvRepTag.clutch{color:var(--gold);border-color:color-mix(in srgb,var(--gold) 45%,transparent);font-weight:700}
/* per-round kill feed (alive counts from the exporter) */
.mvRepKills{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:8px;padding-top:8px;border-top:1px solid var(--hairline)}
.mvKline{font-size:10px;color:var(--fg-muted);white-space:nowrap}
.mvKline b{font-weight:600;color:var(--fg)}
.mvKline.b b{color:var(--mv-blue)}
.mvKline.r b{color:var(--mv-red)}
.mvKline .mc{margin-left:5px;font-size:9px;color:var(--fg-ghost)}
.mvRepEnd{font-size:11px;color:var(--fg-muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mvRepEnd b{color:var(--fg)}
.mvRepSideTag{font-size:8.5px;font-weight:700;letter-spacing:.05em;padding:1px 5px;border-radius:3px;margin-left:3px}
.mvRepSideTag.atk{color:#ffb4bb;background:color-mix(in srgb,var(--mv-red) 18%,transparent)}
.mvRepSideTag.def{color:#bfe6ff;background:color-mix(in srgb,var(--mv-blue) 18%,transparent)}
.mvRepEco{display:flex;flex-direction:column;gap:6px;min-width:150px}
.mvRepEcoRow{display:flex;align-items:center;gap:7px;font-family:var(--font-num);font-size:10px}
.mvRepEcoRow .side{width:26px;font-weight:700;letter-spacing:.04em}
.mvRepEcoRow.b .side{color:var(--mv-blue)}.mvRepEcoRow.r .side{color:var(--mv-red)}
.mvRepEcoBar{flex:1;height:6px;border-radius:3px;background:var(--bg-1);overflow:hidden;border:1px solid var(--hairline)}
.mvRepEcoBar>i{display:block;height:100%;border-radius:3px;transition:width .18s}
.mvRepEcoRow.b .mvRepEcoBar>i{background:color-mix(in srgb,var(--mv-blue) 68%,transparent)}
.mvRepEcoRow.r .mvRepEcoBar>i{background:color-mix(in srgb,var(--mv-red) 68%,transparent)}
.mvRepEcoRow .lbl{width:56px;color:var(--fg-muted);text-align:right;white-space:nowrap}
@media(max-width:640px){.mvRepNow{grid-template-columns:1fr}.mvRepEco{min-width:0}}
.mvEmptyBig{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100%;
  text-align:center;color:var(--fg-muted);padding:40px}
.mvEmptyBig svg{width:64px;height:64px;stroke:var(--border-strong);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.mvEmptyBig .h{font-family:var(--font-display);font-weight:700;font-size:18px;color:var(--fg)}
.mvEmptyBig .p{font-size:13px;max-width:420px;line-height:1.5}

/* =====================================================================
   DANGER ACTIONS  (.pmDanger on the player modal · .fireBtn on roster staff
   cards). Both use a muted danger accent so they're never mistaken for the
   safe actions, and an armed (.armed) state for the two-step inline confirm.
   ===================================================================== */
.pmBtn.pmDanger{color:var(--red-text);border-color:rgba(255,70,85,.40);background:rgba(255,70,85,.08)}
.pmBtn.pmDanger:hover{color:#fff;background:rgba(255,70,85,.22);border-color:var(--red)}
.pmBtn.pmDanger.armed{color:#fff;background:var(--red);border-color:var(--red);box-shadow:var(--red-glow)}
.fireBtn{border:1px solid rgba(255,70,85,.40);background:rgba(255,70,85,.08);color:var(--red-text);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:9px;letter-spacing:.05em;text-transform:uppercase;
  padding:4px 9px;border-radius:6px;clip-path:polygon(3px 0,100% 0,100% 100%,0 100%,0 3px);flex:none;white-space:nowrap;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.fireBtn:hover{color:#fff;background:rgba(255,70,85,.22);border-color:var(--red)}
.fireBtn.armed{color:#fff;background:var(--red);border-color:var(--red);box-shadow:var(--red-glow)}
.fireBtn:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
/* =====================================================================
   CONTRACT RE-SIGN NEGOTIATION PANEL  (.rs* — player modal "Re-sign" tab)
   A negotiation form (years / salary / bonus / starter-promise / role) on the
   left and a LIVE acceptance-prediction card on the right. All controls fire a
   debounced get:resignpreview push; the resignpreview state re-renders ONLY the
   prediction card so the sliders never reset mid-drag. Club-color accents.
   ===================================================================== */
.rsForm{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:640px){.rsForm{grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr)}}
.rsControls{display:flex;flex-direction:column;gap:15px;min-width:0}
.rsRow{display:flex;flex-direction:column;gap:7px}
.rsRowhead{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.rsRowhead .rsLab{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-ghost)}
.rsRowhead .rsVal{font-family:var(--font-num);font-weight:600;font-size:14px;color:var(--fg)}
.rsRowhead .rsHint{font-size:10px;color:var(--fg-muted);font-family:var(--font-num)}
.rsSlideline{display:flex;align-items:center;gap:10px}
/* range input — styled uniquely for the re-sign panel (no other ranges exist) */
.rsSlider{-webkit-appearance:none;appearance:none;flex:1;min-width:0;height:5px;border-radius:4px;
  background:var(--bg-3);outline:none;cursor:pointer;
  background-image:linear-gradient(var(--club),var(--club));background-repeat:no-repeat}
.rsSlider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:15px;height:15px;border-radius:50%;
  background:var(--fg);border:2px solid var(--club);box-shadow:0 0 8px color-mix(in srgb,var(--club) 55%,transparent);
  cursor:pointer;transition:transform var(--t-fast) var(--ease)}
.rsSlider::-webkit-slider-thumb:hover{transform:scale(1.12)}
.rsSlider::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--fg);border:2px solid var(--club);
  box-shadow:0 0 8px color-mix(in srgb,var(--club) 55%,transparent);cursor:pointer}
.rsSlider::-moz-range-progress{height:5px;border-radius:4px;background:var(--club)}
.rsSlider:focus-visible{box-shadow:0 0 0 2px var(--blue)}
.rsSlider:disabled{opacity:.45;cursor:not-allowed}
.rsStep{display:inline-flex;align-items:center;gap:5px;flex:none}
.rsStepbtn{width:24px;height:24px;border-radius:6px;border:1px solid var(--hairline);background:var(--bg-2);
  color:var(--fg-muted);font-size:15px;line-height:1;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:color var(--t-fast) var(--ease),background var(--t-fast) var(--ease),border-color var(--t-fast) var(--ease)}
.rsStepbtn:hover{color:var(--fg);background:var(--bg-3);border-color:var(--border-strong)}
.rsStepbtn:disabled{opacity:.4;cursor:not-allowed}
/* starter-promise checkbox row */
.rsCheck{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;
  background:var(--bg-2);border:1px solid var(--hairline);border-radius:7px;padding:10px 12px}
.rsCheck:hover{border-color:var(--border-strong)}
.rsCheck input{position:absolute;opacity:0;width:0;height:0}
.rsCheckbox{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border-strong);background:var(--bg-3);
  flex:none;display:inline-flex;align-items:center;justify-content:center;transition:all var(--t-fast) var(--ease)}
.rsCheck input:checked+.rsCheckbox{background:var(--club);border-color:var(--club)}
.rsCheck input:checked+.rsCheckbox::after{content:"✓";color:#fff;font-size:11px;font-weight:700;line-height:1}
.rsCheck input:focus-visible+.rsCheckbox{box-shadow:0 0 0 2px var(--blue)}
.rsCheck .rsCktx{display:flex;flex-direction:column;gap:1px;min-width:0}
.rsCheck .rsCktx b{font-size:12px;font-weight:600;color:var(--fg)}
.rsCheck .rsCktx span{font-size:10px;color:var(--fg-muted)}
/* role selector — segmented buttons */
.rsRoles{display:flex;flex-wrap:wrap;gap:6px}
.rsRole{border:1px solid var(--hairline);background:var(--bg-2);color:var(--fg-muted);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;
  padding:6px 10px;border-radius:6px;transition:all var(--t-fast) var(--ease)}
.rsRole:hover{color:var(--fg);border-color:var(--border-strong)}
.rsRole.on{color:var(--fg);border-color:var(--club);background:color-mix(in srgb,var(--club) 16%,var(--bg-2));
  box-shadow:0 0 8px color-mix(in srgb,var(--club) 30%,transparent)}
.rsRolefit{font-size:10.5px;color:var(--amber);margin-top:2px;min-height:13px}
.rsRolefit.natural{color:var(--fg-ghost)}
/* prediction column (card + submit) */
.rsPredside{display:flex;flex-direction:column;gap:12px;min-width:0;align-self:start}
/* prediction card */
.rsPredict{background:var(--bg-2);border:1px solid var(--hairline);border-radius:var(--r-tile);
  padding:14px 15px;display:flex;flex-direction:column;gap:12px;min-width:0}
.rsAskoffer{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rsAo{background:var(--bg-3);border:1px solid var(--hairline);border-radius:6px;padding:8px 10px}
.rsAo .rsAolab{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:4px}
.rsAo .rsAoval{font-family:var(--font-num);font-weight:600;font-size:13px;color:var(--fg)}
.rsAo .rsAosub{font-size:9.5px;color:var(--fg-muted);margin-top:1px}
.rsAo.offer{border-color:color-mix(in srgb,var(--club) 45%,var(--hairline))}
.rsBanner{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:7px;font-weight:700}
.rsBanner .rsBico{font-family:var(--font-num);font-size:19px;line-height:1;flex:none}
.rsBanner .rsBtx{display:flex;flex-direction:column;gap:2px;min-width:0}
.rsBanner .rsBmain{font-size:13px;font-weight:700;letter-spacing:.03em}
.rsBanner .rsBverdict{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;opacity:.9}
.rsBanner.accept{background:rgba(63,209,122,.12);border:1px solid rgba(63,209,122,.45);color:var(--green)}
.rsBanner.reject{background:rgba(255,70,85,.10);border:1px solid rgba(255,70,85,.42);color:var(--red-text)}
.rsBanner.fair{background:rgba(212,161,76,.12);border:1px solid rgba(212,161,76,.45);color:var(--amber)}
.rsScore{margin-left:auto;font-family:var(--font-num);font-weight:600;font-size:22px;line-height:1;flex:none}
.rsReject{font-size:11px;color:var(--red-text);background:rgba(255,70,85,.08);border:1px solid rgba(255,70,85,.28);
  border-radius:6px;padding:8px 10px;line-height:1.4}
.rsLabels{display:flex;flex-direction:column;gap:5px}
.rsLabel{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--fg)}
.rsLabel .rsLn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rsLabel .rsLd{font-family:var(--font-num);font-size:11.5px;font-weight:600;flex:none;width:44px;text-align:right}
.rsLabel .rsLd.up{color:var(--green)}.rsLabel .rsLd.down{color:var(--red-text)}.rsLabel .rsLd.flat{color:var(--fg-ghost)}
.rsExplain{font-size:11px;color:var(--fg-muted);line-height:1.45}
/* counter-offer row */
.rsCounter{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:color-mix(in srgb,var(--blue) 8%,var(--bg-3));border:1px solid rgba(0,212,255,.32);
  border-radius:7px;padding:9px 12px}
.rsCounter .rsCotx{font-size:11.5px;color:var(--fg);flex:1;min-width:0}
.rsCounter .rsCotx b{font-family:var(--font-num);color:var(--blue)}
.rsAcceptCounter{border:1px solid rgba(0,212,255,.5);background:rgba(0,212,255,.12);color:var(--blue);cursor:pointer;
  font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;
  padding:6px 11px;border-radius:6px;flex:none;transition:all var(--t-fast) var(--ease)}
.rsAcceptCounter:hover{color:#fff;background:rgba(0,212,255,.26);border-color:var(--blue)}
/* submit */
.rsSubmitrow{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.rsSubmit{border:1px solid var(--club);background:color-mix(in srgb,var(--club) 22%,var(--bg-2));color:var(--fg);cursor:pointer;
  font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:.05em;text-transform:uppercase;
  padding:11px 16px;border-radius:7px;transition:all var(--t-fast) var(--ease)}
.rsSubmit:hover{background:color-mix(in srgb,var(--club) 34%,var(--bg-2));box-shadow:0 0 12px color-mix(in srgb,var(--club) 35%,transparent)}
.rsSubmit.longshot{border-color:rgba(212,161,76,.55);background:rgba(212,161,76,.12);color:var(--amber)}
.rsSubmit.longshot:hover{background:rgba(212,161,76,.22);box-shadow:0 0 12px rgba(212,161,76,.3)}
.rsSubmit:focus-visible{outline:2px solid var(--blue);outline-offset:1px}
.rsSubmitnote{font-size:10px;color:var(--fg-muted);text-align:center;line-height:1.4}
.rsSubmitnote.warn{color:var(--amber)}
/* Free-agent sign form — reuses the .rs* controls; these add the grounded
   role-fit line + the offer summary card (the sign path has no accept preview). */
.sgRolefit{min-height:20px;margin-top:4px}
.sgFitrow{display:flex;align-items:center;gap:9px}
.sgFitrole{font-size:10.5px;font-weight:600;color:var(--fg);white-space:nowrap;min-width:104px}
.sgFitbar{flex:1;height:6px;border-radius:3px;background:var(--bg-3);overflow:hidden;border:1px solid var(--hairline)}
.sgFitfill{display:block;height:100%;border-radius:3px;transition:width .18s,background .18s}
.sgFitverd{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;flex:none}
.sgSummary{display:flex;flex-direction:column;gap:7px}
.sgSumhead{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-ghost)}
.sgSumline{font-size:12px;color:var(--fg-muted);line-height:1.45}
.sgSumline b{color:var(--fg);font-weight:600}
.sgSumline.dim{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--fg-ghost)}
/* FA negotiation live verdict (fed by the resignpreview channel) */
.sgVerdict{font-size:12.5px;font-weight:700;border-radius:8px;padding:7px 11px}
.sgVerdict.accept{color:var(--green);background:rgba(63,209,122,.09);border:1px solid rgba(63,209,122,.35)}
.sgVerdict.reject{color:var(--red-text);background:rgba(255,70,85,.08);border:1px solid rgba(255,70,85,.32)}
.sgSumline .rsCounter,.sgSumline button.rsCounter{cursor:pointer;font-size:10.5px;font-weight:700;color:var(--fg);
  background:var(--bg-2);border:1px solid var(--border-strong);border-radius:var(--r-pill);padding:3px 10px}
.sgSumline button.rsCounter:hover{border-color:var(--club)}

/* =====================================================================
   SCOUTING — screen (knowledge map + assignments + completed) and the
   Player-modal Scout tab (commission form + FM-style report). All classes
   uniquely `sk`-prefixed so they never collide with any other screen/tab.
   ===================================================================== */
/* screen layout */
#view.scouting{overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border-strong) transparent}
#view.scouting::-webkit-scrollbar{width:7px}
#view.scouting::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.skGrid2{display:grid;grid-template-columns:300px 1fr;gap:14px;margin-top:14px;align-items:start}
@media(max-width:1080px){.skGrid2{grid-template-columns:1fr}}
.skNoscout{color:var(--fg-muted);font-size:13px;line-height:1.5;padding:26px 20px;text-align:center;
  background:var(--bg-2);border:1px dashed var(--border-strong);border-radius:var(--r-tile)}
/* scout card */
.skScout{display:flex;flex-direction:column;gap:12px}
.skScoutTop{display:flex;align-items:center;gap:12px}
.skScoutCrest{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;
  background:color-mix(in srgb,var(--club) 20%,var(--bg-3));border:1px solid color-mix(in srgb,var(--club) 45%,var(--hairline));
  font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--fg)}
.skScoutId{min-width:0;flex:1}
