};

/* =====================================================================
   INCOMING STATE  (host → page, parsed object)
   ===================================================================== */
function onState(msg){
  if(!msg) return;
  // Action feedback: host pushes {type:"toast",level,message}. Handle and
  // return early — do NOT fall through to the state-render path.
  if(msg.type==="toast"){ showToast(msg.level, msg.message); return; }
  if(msg.type!=="state") return;
  // Player Detail modal: a MODAL OVERLAY, not a rail screen. Intercept BEFORE
  // touching currentScreen / the rail / #view so it floats over whatever screen
  // is active and the underlying screen is left exactly as it was.
  if(msg.screen==="playermodal"){ renderPlayerModal(msg.data); return; }
  if(msg.screen==="staffmodal"){ renderStaffModal(msg.data); return; }
  // Contract re-sign LIVE preview: a transient push that updates ONLY the
  // prediction card in the open modal's Re-sign tab. Must NOT re-render the
  // modal or disturb the base screen / the user's slider positions. Ignore it
  // when found:false (the id wasn't a user player).
  if(msg.screen==="resignpreview"){
    if(msg.data && msg.data.found!==false) pmApplyResignPreview(msg.data);
    return;
  }
  // Player Interest LIVE fetch: a transient push that fills ONLY the Interest
  // pane's inner region in the open modal. Must NOT re-render the modal or
  // disturb the base screen / the active tab / any other pane. found:false is
  // handled gracefully inside pmApplyInterest (shows a muted empty state).
  if(msg.screen==="playerinterest"){
    pmApplyInterest(msg.data);
    return;
  }
  // Scout Report LIVE fetch: a transient push that fills ONLY the Scout pane's
  // inner region in the open modal (mirrors the Interest intercept). Must NOT
  // re-render the modal or disturb the base screen / the active tab / any other
  // pane. found:false is handled gracefully inside pmApplyScout (empty state).
  if(msg.screen==="scoutreport"){
    pmApplyScout(msg.data);
    return;
  }
  // Save-slot metadata (main-menu panels) — transient, never a screen change.
  if(msg.screen==="saves"){
    mmApplySaves(msg.data);
    return;
  }
  const club = msg.data && msg.data.club_color;
  worldActive = true;                              // a real world screen arrived
  document.body.classList.remove("menuMode");      // leave the title screen
  currentScreen = msg.screen;
  setNavActive(msg.screen);
  if(msg.screen==="dashboard") renderDashboard(msg.data.dashboard, club);
  else if(msg.screen==="roster") renderRoster(msg.data.roster, club);
  else if(msg.screen==="competition") renderCompetition(msg.data.competition, club);
  else if(msg.screen==="strategy") renderStrategy(msg.data.strategy, club);
  else if(msg.screen==="finance") renderFinance(msg.data.finance, club);
  else if(msg.screen==="mail") renderMail(msg.data.mail, club);
  else if(msg.screen==="calendar") renderCalendar(msg.data.calendar, club);
  else if(msg.screen==="market") renderMarket(msg.data.market, club);
  // Scouting carries `club_color` + the `scouting` object at the data ROOT
  // (like records/favorites), so pass the whole msg.data through.
  else if(msg.screen==="scouting") renderScouting(msg.data, club);
  else if(msg.screen==="recruitment") renderRecruitment(msg.data, club);
  else if(msg.screen==="favorites") renderFavorites(msg.data, club);
  else if(msg.screen==="watchlist") renderWatchlist(msg.data, club);
  else if(msg.screen==="awards") renderAwards(msg.data.awards, club);
  else if(msg.screen==="brackets") renderBrackets(msg.data.brackets, club);
  // Records carries `club_color` + the `records` object at the data ROOT (like
  // favorites/watchlist), so pass the whole msg.data through.
  else if(msg.screen==="records") renderRecords(msg.data, club);
  // Match carries `found`, `club_color` and the `match` object at the data ROOT
  // (like records/teamprofile), so pass the whole msg.data through.
  else if(msg.screen==="match") renderMatch(msg.data, club);
  // Team Profile carries `found`, `club_color` and `team_profile` at the data
  // ROOT (not an inner object), so pass the whole msg.data through.
  else if(msg.screen==="teamprofile") renderTeamProfile(msg.data, club);
  // New-game wizard carries the option lists at msg.data.newgame.
  else if(msg.screen==="newgame") renderNewgame(msg.data, club);
}
if(bridge) bridge.addEventListener("message", e => onState(e.data));

/* =====================================================================
   STANDALONE FALLBACK  (no bridge — render bundled data so the file
   still works when opened directly in a browser)
   ===================================================================== */
function renderFromFallback(screen){
  if(String(screen||"").split(":")[0]==="teamprofile"){
    // Bridge-only screen (the profile is resolved & pushed by the host); render
    // the graceful not-found empty state when opened directly with no bridge.
    const req=String(screen||"").split(":").slice(1).join(":");
    const RAW = window.TEAMPROFILE_DATA;
    if(RAW && RAW.team_profile) renderTeamProfile(RAW, RAW.club_color);
    else renderTeamProfile({found:false,requested:req}, null);
  }else if(screen==="roster"){
    const RAW = window.ROSTER_DATA;
    if(RAW && RAW.roster) renderRoster(RAW.roster, RAW.club_color);
    else renderRoster(null, null);
  }else if(screen==="competition"){
    // Bridge-only screen; render the graceful empty state when opened directly.
    const RAW = window.COMPETITION_DATA;
    if(RAW && RAW.competition) renderCompetition(RAW.competition, RAW.club_color);
    else renderCompetition(null, null);
  }else if(screen==="strategy"){
    // Bridge-only screen (write actions need the host); render the graceful
    // empty state when opened directly with no bridge.
    const RAW = window.STRATEGY_DATA;
    if(RAW && RAW.strategy) renderStrategy(RAW.strategy, RAW.club_color);
    else renderStrategy(null, null);
  }else if(screen==="finance"){
    const RAW = window.FINANCE_DATA;
    if(RAW && RAW.finance) renderFinance(RAW.finance, RAW.club_color);
    else renderFinance(null, null);
  }else if(screen==="mail"){
    // Bridge-only screen; render the graceful empty state when opened directly.
    const RAW = window.MAIL_DATA;
    if(RAW && RAW.mail) renderMail(RAW.mail, RAW.club_color);
    else renderMail(null, null);
  }else if(screen==="calendar"){
    // Bridge-only screen; render the graceful empty state when opened directly.
    const RAW = window.CALENDAR_DATA;
    if(RAW && RAW.calendar) renderCalendar(RAW.calendar, RAW.club_color);
    else renderCalendar(null, null);
  }else if(screen==="market"){
    // Bridge-only screen (the make-offer action needs the host); render the
    // graceful empty state when opened directly with no bridge.
    const RAW = window.MARKET_DATA;
    if(RAW && RAW.market) renderMarket(RAW.market, RAW.club_color);
    else renderMarket(null, null);
  }else if(screen==="scouting"){
    // Bridge-only screen (scouting lives on the user's save + needs the host for
    // commission actions); render from bundled data if present, else the empty
    // state. renderScouting reads the `scouting` object off the passed object.
    const RAW = window.SCOUTING_DATA;
    if(RAW && RAW.scouting) renderScouting(RAW, RAW.club_color);
    else renderScouting(null, null);
  }else if(screen==="favorites"){
    // Bridge-only screen (favorites live on the user's save); render from
    // bundled data if present, otherwise the graceful empty state.
    const RAW = window.FAVORITES_DATA;
    if(RAW) renderFavorites(RAW, RAW.club_color);
    else renderFavorites({favorites:{count:0,players:[]}}, null);
  }else if(screen==="watchlist"){
    // Bridge-only screen; render from bundled data if present, otherwise empty.
    const RAW = window.WATCHLIST_DATA;
    if(RAW) renderWatchlist(RAW, RAW.club_color);
    else renderWatchlist({watchlist:{count:0,entries:[]}}, null);
  }else if(screen==="awards"){
    // Bridge-only screen; render the graceful empty state when opened directly.
    const RAW = window.AWARDS_DATA;
    if(RAW && RAW.awards) renderAwards(RAW.awards, RAW.club_color);
    else renderAwards(null, null);
  }else if(screen==="brackets"){
    // Bridge-only screen; render the graceful empty state when opened directly.
    const RAW = window.BRACKETS_DATA;
    if(RAW && RAW.brackets) renderBrackets(RAW.brackets, RAW.club_color);
    else renderBrackets(null, null);
  }else if(screen==="records"){
    // Bridge-only screen; render from bundled data if present, otherwise the
    // graceful empty states (thin GOAT / empty HoF / no leaderboards).
    const RAW = window.RECORDS_DATA;
    if(RAW) renderRecords(RAW, RAW.club_color);
    else renderRecords({records:{player_pool:0,goat_career:[],goat_season:[],hall_of_fame:[],leaders:{}}}, null);
  }else if(screen==="match"){
    // Bridge-only screen (the last match is resolved & pushed by the host);
    // render from bundled data if present, otherwise the friendly empty state.
    const RAW = window.MATCH_DATA;
    if(RAW) renderMatch(RAW, RAW.club_color);
    else renderMatch({found:false}, null);
  }else if(screen==="newgame"){
    // The wizard's option lists come from the host; with no bridge, render from
    // bundled NEWGAME_DATA if present, else sensible built-in defaults.
    renderNewgame(window.NEWGAME_DATA || null, null);
  }else if(screen==="recruitment"){
    const RAW=window.RECRUITMENT_DATA;
    if(RAW && RAW.recruitment) renderRecruitment(RAW, RAW.club_color);
    else renderRecruitment(null, null);
  }else{
    const RAW = window.DASHBOARD_DATA;
    if(RAW && RAW.dashboard) renderDashboard(RAW.dashboard, RAW.club_color);
    else renderDashboard(null, null);
  }
}

/* =====================================================================
   MAIN MENU — client-rendered title screen (no host data needed except the
   save-slot list via get:saves). The world keeps running behind it; "Menu"
   on the rail returns here without touching the session.
   ===================================================================== */
let mmSaves=null, mmPanelMode=null, worldActive=false;
function mmLatest(){
  const s=(mmSaves||[]).filter(x=>x.exists);
  if(!s.length) return null;
  s.sort((a,b)=>String(b.saved_at||'').localeCompare(String(a.saved_at||'')));
  return s[0].slot;
}
function showMainMenu(){
  document.body.classList.add("menuMode");
  currentScreen="mainmenu";
  const view=$("#view"); view.className="mainmenu";
  view.innerHTML=`<div class="mmWrap">
    <div class="mmBrand"><div class="mmLogo">VLR<span>MANAGER</span></div><div class="mmTag">Build the roster. Survive the board. Win Champions.</div></div>
    <div class="mmBtns">
      <button type="button" class="mmBtn primary" id="mmContinue" disabled>Continue</button>
      <button type="button" class="mmBtn" id="mmNew">New Career</button>
      <button type="button" class="mmBtn" id="mmSave" style="display:none">Save Game</button>
      <button type="button" class="mmBtn" id="mmLoad">Load Game</button>
      <button type="button" class="mmBtn ghost" id="mmSettings">Settings</button>
    </div>
    <div class="mmPanel" id="mmPanel"></div>
    <div class="mmFoot">VLR Manager · Valosim</div>
  </div>`;
  $("#mmNew").addEventListener("click",()=>{ mmLeave(); go("newgame"); });
  $("#mmLoad").addEventListener("click",()=>{ mmPanelMode=(mmPanelMode==="load")?null:"load"; mmRenderPanel(); });
  $("#mmSettings").addEventListener("click",()=>{ mmPanelMode=(mmPanelMode==="settings")?null:"settings"; mmRenderPanel(); });
  $("#mmSave").addEventListener("click",()=>{ mmPanelMode=(mmPanelMode==="save")?null:"save"; mmRenderPanel(); });
  $("#mmContinue").addEventListener("click",()=>{
    if(worldActive){ mmLeave(); go("dashboard"); return; }
    const s=mmLatest(); if(s!=null) post("act:load:"+s+":dashboard");
  });
  if(worldActive){ const b=$("#mmSave"); if(b) b.style.display=""; const c=$("#mmContinue"); if(c) c.disabled=false; }
  mmRenderPanel();
  if(bridge) post("get:saves");
}
function mmLeave(){ document.body.classList.remove("menuMode"); mmPanelMode=null; }
function mmRenderPanel(){
  const host=$("#mmPanel"); if(!host) return;
  if(!mmPanelMode){ host.innerHTML=""; return; }
  if(mmPanelMode==="settings"){
    host.innerHTML=`<div class="mmSet">
      <div class="mmSetRow"><div class="sl">Reduced motion<div class="sub">Skip entrance animations and live-match autoplay.</div></div>
        <button type="button" class="mmToggle${reduced?' on':''}" data-mm-set="reduced" aria-pressed="${reduced}"></button></div>
      <div class="mmSetRow"><div class="sl">Autosave<div class="sub">Save to the AUTO slot after every advance.</div></div>
        <button type="button" class="mmToggle${autosaveOn?' on':''}" data-mm-set="autosave" aria-pressed="${autosaveOn}"></button></div>
    </div>`;
    host.querySelectorAll("[data-mm-set]").forEach(t=>t.addEventListener("click",()=>{
      if(t.dataset.mmSet==="reduced"){ reduced=!reduced; try{localStorage.setItem("vlr_reduced",reduced?"1":"0");}catch(_){} }
      else{ autosaveOn=!autosaveOn; try{localStorage.setItem("vlr_autosave",autosaveOn?"1":"0");}catch(_){} }
      mmRenderPanel();
    }));
    return;
  }
  // save / load slot lists
  const mode=mmPanelMode;
  const slots=(mmSaves&&mmSaves.length)?mmSaves:[{slot:"1"},{slot:"2"},{slot:"3"},{slot:"auto"}];
  host.innerHTML=`<div class="mmSlots">${slots.map(s=>{
    const label=(s.slot==="auto")?"Auto":("Slot "+s.slot);
    const info=s.exists?`<b>${esc(s.club||"—")}</b> · Year ${esc(String(s.year||"—"))} · Day ${esc(String(s.day||"—"))}<div class="sub">${esc(s.saved_at||"")}</div>`:'<span style="color:var(--fg-ghost)">Empty</span>';
    const canSave=(mode==="save"&&s.slot!=="auto");
    const canLoad=(mode==="load"&&s.exists);
    return `<div class="mmSlot"><span class="sn">${label}</span><span class="si">${info}</span>
      ${canSave?`<button type="button" data-mm-save="${esc(String(s.slot))}">${s.exists?"Overwrite":"Save"}</button>`:""}
      ${canLoad?`<button type="button" data-mm-load="${esc(String(s.slot))}">Load</button>`:""}
    </div>`; }).join("")}</div>`;
  host.querySelectorAll("[data-mm-save]").forEach(b=>b.addEventListener("click",()=>post("act:save:"+b.dataset.mmSave+":saves")));
  host.querySelectorAll("[data-mm-load]").forEach(b=>b.addEventListener("click",()=>post("act:load:"+b.dataset.mmLoad+":dashboard")));
}
function mmApplySaves(data){
  mmSaves=(data&&Array.isArray(data.slots))?data.slots:[];
  const c=$("#mmContinue");
  if(c && (worldActive || mmLatest()!=null)) c.disabled=false;
  if(mmPanelMode==="save"||mmPanelMode==="load") mmRenderPanel();
}

/* =====================================================================
   BOOT  — hash picks initial screen; bridge gets the initial get,
   otherwise render from bundled DASHBOARD_DATA / ROSTER_DATA.
   ===================================================================== */
function boot(){
  const hash=(location.hash||"").replace(/^#/,"").toLowerCase();
  const known=["dashboard","roster","competition","strategy","finance","mail","calendar","market","scouting","recruitment","favorites","watchlist","awards","brackets","records","match","teamprofile","newgame"];
  // Fresh launch (no deep-link hash) lands on the MAIN MENU (Continue / New
  // Career / Load / Settings). --shot/#hash still deep-link for headless captures.
  if(!known.includes(hash)){ showMainMenu(); return; }
  currentScreen = hash;
  setNavActive(currentScreen);
  if(bridge){
    post("get:"+currentScreen);
  }else{
    renderFromFallback(currentScreen);
  }
}
if(document.readyState!=="loading") boot(); else document.addEventListener("DOMContentLoaded", boot);
</script>
</body>
</html>
